# SPDX-License-Identifier: Apache-2.0
# Status: 🧪 Experimental
# Caveats: MTP n=8 code-optimized sister. club-3090 ref (2× 3090) =
#   101/142 TPS @ MTP n=8 (vs n=4: code +9% / narr −3%). Our 2× A5000
#   rig not bench-validated for this profile — pending A/B vs n=4 sister.
# Genesis V2 model definition — Gemma 4 31B AWQ-4bit + MTP K=8 (CODE profile).
# Per audit GEMMA4_PATCH_OPTIMIZATION_PLAN_2026-05-17_RU section P1:
#   "31B: add mtp_n4_default + mtp_n8_code profiles".
# Reference: club-3090 public A/B showed MTP n=8 gives code +9% TPS vs n=4
# but narrative -3%. Use this profile ONLY for code/agent endpoints.
#
# This is a sister profile to gemma-4-31b-it-awq.yaml (which is mtp_n4_default).
# Difference: num_speculative_tokens: 8 instead of 4.

schema_version: 2
kind: model
id: gemma-4-31b-it-awq-mtp-n8-code
title: Gemma 4 31B-it AWQ-4bit + MTP K=8 (code-optimized profile)
maintainer: sandermage
last_validated: '2026-05-17'
license: gemma-license

# ─── Identity (same checkpoint as default profile) ─────────────────────
model_path: /models/gemma-4-31B-it-AWQ-4bit
served_model_name: gemma-4-31b-code
quantization: null
dtype: bfloat16
trust_remote_code: false
chat_template: /tmp/genesis/chat_templates/gemma4.jinja

# ─── Capabilities — KEY DIFFERENCE: num_speculative_tokens: 8 ──────────
capabilities:
  attention_arch: gemma4_dense
  tool_call_parser: gemma4
  reasoning_parser: null
  enable_auto_tool_choice: true
  spec_decode:
    method: mtp
    num_speculative_tokens: 8                              # CODE profile: +9% code TPS vs n=4 (club-3090 A/B), -3% narrative
    model: /models/gemma-4-31B-it-assistant
  kv_cache_dtype: auto

# ─── Hardware preconditions ────────────────────────────────────────────
requires:
  min_total_vram_mib: 30000                                # ~14 GB weights + ~8 GB KV + larger draft scratch for n=8
  min_gpu_count: 1
  min_cuda_capability: [8, 6]
  rig_arch_blocklist: []

versions:
  genesis_pin_min: v12.0.0
  vllm_pin_required: 0.21.1rc0+g626fa9bba566
  reference_metrics_ref: null  # Phase 5.2.D (2026-05-22): formalize receipt-only state. The referenced baseline JSON was never generated (audit_v2_vllm_pin_consistency reported file-not-found). 31B-it-awq MTP-N8-code is the structured-output code-generation variant; no formal canonical bench exists yet. A baseline JSON requires the full sustained-methodology bench cycle and is deferred to Phase 7.

# ─── Canonical patches matrix (mirrors default profile + same TQ stack) ───
patches:
  # ── Gemma 4 family guards (refuse known-broken combos) ──
  GENESIS_ENABLE_G4_01_GEMMA4_FP8_BLOCK_GUARD: '1'
  GENESIS_ENABLE_G4_03_GEMMA4_NON_CAUSAL_DRAFTER_GUARD: '1'
  GENESIS_ENABLE_G4_12_GEMMA4_FP8_E4NV_GUARD: '1'
  # ── Gemma 4 family fixes (stable) ──
  # G4_05 retired 2026-05-24 (PIN.R-G4_05-RETIRE.1) — superseded by vllm#39930 in dev16+; env removed.
  GENESIS_ENABLE_G4_09_GEMMA4_SWA_PREFILL_CHUNKER: '1'
  GENESIS_ENABLE_G4_11_GEMMA4_CHAT_TEMPLATE_INSTALL: '1'
  GENESIS_ENABLE_G4_13_GEMMA4_PER_TOKEN_HEAD_KV_GUARD: '1'   # added 2026-05-17
  GENESIS_ENABLE_G4_14_GEMMA4_TOOL_CALL_PARSER_PAD: '1'
  GENESIS_ENABLE_G4_16_GEMMA4_FULL_AND_PIECEWISE: '1'        # +10-30% TPS
  GENESIS_ENABLE_G4_23_GEMMA4_VISION_FP16_OVERFLOW: '1'
  GENESIS_ENABLE_G4_25_GEMMA4_RoPE_DUAL_BASE_GUARD: '1'
  # ── Gemma 4 family perf (opt-in; bench-gate before promoting) ──
  GENESIS_ENABLE_G4_15_GEMMA4_FUSED_RMSNORM: '0'             # +5-10% TPS (bench-gate)
  GENESIS_ENABLE_G4_24_GEMMA4_FUSED_SOFTCAP: '0'             # +3-5% TPS (bench-gate)
  GENESIS_ENABLE_G4_06_GEMMA4_KV_PROJ_V0: '0'                # ~3% memory savings
  # ── Vision tower management (operator choice) ──
  GENESIS_ENABLE_G4_17_GEMMA4_VISION_SKIP: '0'
  # ── Genesis G4 TurboQuant KV cache wrapper-stack (256K unlock) ──
  GENESIS_ENABLE_G4_19_GEMMA4_TURBOQUANT_KV: '1'             # vector-quant KV
  GENESIS_ENABLE_G4_19B_GEMMA4_TQ_KV_SPEC: '1'               # memory accounting
  # Phase 7.G4.31B-MODELDEF.G4_19C-DEFAULT-OFF (2026-05-23):
  # mirrored from gemma-4-31b-it-awq.yaml — default '1' → '0' until
  # the Lloyd-Max codebook quality regression is resolved.
  GENESIS_ENABLE_G4_19C_ATTN_WRAP: '0'                       # round-trip wrapper OFF (codebook quality regression pending)
  GENESIS_ENABLE_G4_31_TQ_DTYPE_PRESERVE: '1'                # AWQ kv_cache_scheme guard
  # ── PR #40914 backport — TQ K+1 spec-verify cudagraph fix ──
  GENESIS_ENABLE_G4_67_TQ_SPEC_VERIFY_ROUTE: '1'             # MORE relevant here: K=8 amplifies cudagraph stress
  # ── Qwen-applicable patches (MTP/general-purpose) ──
  GENESIS_ENABLE_PN33_SPEC_DECODE_WARMUP_K: '1'              # MTP K-aware warmup (K=8 needs even more sizing)
  GENESIS_ENABLE_PN35_INPUTS_EMBEDS_OPTIONAL: '1'  # text-only inputs_embeds skip
  GENESIS_ENABLE_PN116: '1'  # TQ prefill max_seq_len fallback
  GENESIS_ENABLE_PN118: '1'  # TQ workspace graceful-fallback
  GENESIS_ENABLE_PN119: '1'  # TQ k8v4 GQA head grouping
  GENESIS_ENABLE_PN286_FA_LAYOUT_REVERT_SM86: '1'  # Ampere SM 8.6 FA KV layout revert
  GENESIS_ENABLE_P108: '1'             # MTP stream sync
  GENESIS_ENABLE_P109: '1'             # sampler safety (vllm#42614) — short form matches registry env_flag
  GENESIS_ENABLE_PN110: '1'            # BlockPool.free_blocks dedup (vllm#42615) — short form matches registry env_flag
  # ── Cross-family supporting patches ──
  GENESIS_ENABLE_PN126_V1_DECODE_WARMUP: '1'
  GENESIS_ENABLE_PN132_TOPK_TOPP_CONTIGUOUS: '1'

compose_hints:
  family: gemma4
  drafter_method: mtp
  drafter_id: gemma4-31b-assistant
  workload_hint: code
