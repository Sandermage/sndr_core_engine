# SPDX-License-Identifier: Apache-2.0
# Status: 🧪 Experimental
# Caveats: projected bench only (~80-100 TPS dense decode, MTP K=3).
#   Server validation pending — promote to ✅ after verify-full + 5×5 bench
#   n=25 + soak PASS on 2× A5000. club-3090 ref `dual.yml` = 108/142 TPS.
# Genesis V2 model definition — Gemma 4 31B AWQ-4bit (cyankiwi) + MTP assistant.
# Dense architecture; MTP K=3 spec decode via google/gemma-4-31B-it-assistant.
# Tested on 2× A5000 (SM 8.6) — uses Genesis G4_NN family patches.
#
# Per-line comment style:
#   • WHAT the patch does / why this setting
#   • default + valid values for non-binary settings
#   • cross-reference to G4_NN patch when applicable
#
# Bench reference (projected — server validation pending):
#   wall_TPS  ~80-100 (dense decode, MTP K=3)
#   TPOT_ms   ~10-12  (decode at batch=1)
#   accept_rate ~0.75-0.85 (MTP assistant causal, KV-shared)
#   context   256K (with G4_09 chunked prefill)

schema_version: 2
kind: model
id: gemma-4-31b-it-awq
title: Gemma 4 31B-it AWQ-4bit (cyankiwi) + MTP assistant
maintainer: sandermage
last_validated: '2026-05-17'
license: gemma-license

# ─── Identity ──────────────────────────────────────────────────────────
model_path: /models/gemma-4-31B-it-AWQ-4bit              # cyankiwi/gemma-4-31B-it-AWQ-4bit checkpoint
served_model_name: gemma-4-31b                           # OpenAI-API model name
quantization: null                                       # let vLLM detect from compressed-tensors metadata (cyankiwi uses CT not stock awq_marlin)
dtype: bfloat16                                          # CHANGED 2026-05-17 per audit: club-3090 A/B confirmed --dtype half is -2-3% on Gemma 4 AWQ Ampere; BF16 is canonical for AWQ Marlin path on SM 8.6
trust_remote_code: false                                 # Gemma 4 is native vLLM model — no custom code
chat_template: /tmp/genesis/chat_templates/gemma4.jinja  # installed by G4_11 at boot

# ─── Capabilities — inherent to this model ─────────────────────────────
capabilities:
  attention_arch: gemma4_dense                           # Gemma 4 dense (interleaved sliding+global+p-RoPE)
  tool_call_parser: gemma4                               # Gemma 4 tool-call parser (cleaned by G4_14 pad-strip)
  reasoning_parser: null                                 # Gemma 4 doesn't use <think> tags by default
  enable_auto_tool_choice: true                          # auto tool_choice on tool-mention prompts
  # Variant A migration (2026-05-20): MTP moved from ModelDef into the
  # structured-role profile gemma4-31b-tq-mtp-structured-k4. MTP is a
  # workload-conditional behavior, not an inherent model property:
  # structured workloads (tool_json, structured_count) benefit (+24%
  # on G5 bench); chat / summarization regress (-51%). The default-
  # role profile leaves spec_decode unset; structured/code profiles
  # set it via spec_decode_override.
  # See docs/_internal/GEMMA4_MTP_MODELDEF_MIGRATION_AUDIT_2026-05-20.md
  # for the audit + decision record.
  spec_decode: null
  kv_cache_dtype: auto                                   # values: auto|fp8|fp16; auto stays in dtype for safety

# ─── Hardware preconditions composer enforces ──────────────────────────
requires:
  min_total_vram_mib: 28000                              # 14 GB × 2 (AWQ 4-bit at TP=2; plus KV ~6 GB)
  min_gpu_count: 1                                       # supports 1× (single A6000 48 GB) and 2× (A5000 24 GB each)
  min_cuda_capability: [8, 6]                            # Ampere SM 8.6; G4_01 / G4_03 / G4_12 protect against unsupported combos
  rig_arch_blocklist: []

versions:
  genesis_pin_min: v12.0.0                               # G4_NN family lands in v12
  vllm_pin_required: 0.21.1rc0+g626fa9bba566         # current PROD baseline (Gemma 4 native model_executor support)
  # Variant A migration (2026-05-20): old baseline at
  # tests/integration/baselines/gemma4_31b_awq_baseline.json was
  # captured with MTP K=4 ON; that file is now the (future) reference
  # for the structured profile, not the model baseline. A separate
  # MTP-OFF baseline will be captured post-rehearsal once the default-
  # role profile gets its first observation window. Drift-check is OFF
  # for this model until that baseline lands.
  reference_metrics_ref: null

# ─── Canonical patches matrix ──────────────────────────────────────────
patches:
  # ── Gemma 4 family guards (refuse known-broken combos) ──
  GENESIS_ENABLE_G4_01_GEMMA4_FP8_BLOCK_GUARD: '1'        # refuses FP8_BLOCK + Ampere (closes vllm#39407 user pain)
  GENESIS_ENABLE_G4_03_GEMMA4_NON_CAUSAL_DRAFTER_GUARD: '1'  # refuses Eagle3/DFlash drafter on Ampere (closes #40382)
  GENESIS_ENABLE_G4_12_GEMMA4_FP8_E4NV_GUARD: '1'         # refuses FP8 e4nv on Ampere (closes #41014)
  # ── Gemma 4 family fixes (default-on stability) ──
  # G4_05 retired 2026-05-24 (PIN.R-G4_05-RETIRE.1) — superseded by vllm#39930 in dev16+; env removed.
  GENESIS_ENABLE_G4_09_GEMMA4_SWA_PREFILL_CHUNKER: '1'    # closes vllm#39914 engine hang at prefill > 4K
  GENESIS_ENABLE_G4_11_GEMMA4_CHAT_TEMPLATE_INSTALL: '1'  # installs enhanced gemma4.jinja chat template
  GENESIS_ENABLE_G4_14_GEMMA4_TOOL_CALL_PARSER_PAD: '1'   # strips <pad>/<eos> from tool-call JSON (closes #39392)
  GENESIS_ENABLE_G4_16_GEMMA4_FULL_AND_PIECEWISE: '1'     # forces FULL_AND_PIECEWISE cudagraph (+10-30% TPS at low batch)
  GENESIS_ENABLE_G4_23_GEMMA4_VISION_FP16_OVERFLOW: '1'   # vision tower → BF16 to avoid FP16 overflow (closes #40124)
  GENESIS_ENABLE_G4_25_GEMMA4_RoPE_DUAL_BASE_GUARD: '1'   # diagnoses dual-RoPE config; warns on single-table collapse
  # ── Gemma 4 family perf (opt-in; bench-gate before promoting) ──
  GENESIS_ENABLE_G4_15_GEMMA4_FUSED_RMSNORM: '0'          # +5-10% TPS (route Q/K/V + residual norms through Triton)
  GENESIS_ENABLE_G4_24_GEMMA4_FUSED_SOFTCAP: '0'          # +3-5% TPS (fuse div+tanh+mul for softcap)
  GENESIS_ENABLE_G4_06_GEMMA4_KV_PROJ_V0: '0'             # vendor #41944 — ~3% memory savings on V slot
  # ── Vision tower management (operator choice) ──
  GENESIS_ENABLE_G4_17_GEMMA4_VISION_SKIP: '0'            # set + GENESIS_GEMMA4_TEXT_ONLY=1 to save ~2.3 GB VRAM
  # ── Gemma 4 stability extension (added 2026-05-17) ──
  GENESIS_ENABLE_G4_13_GEMMA4_PER_TOKEN_HEAD_KV_GUARD: '1' # silent corruption guard (closes vllm#40388)
  # ── Genesis G4 TurboQuant KV cache wrapper-stack (Gemma 4 256K unlock) ──
  GENESIS_ENABLE_G4_19_GEMMA4_TURBOQUANT_KV: '1'          # vector-quant KV (3-bit global / 4-bit sliding); 5.33x compression
  GENESIS_ENABLE_G4_19B_GEMMA4_TQ_KV_SPEC: '1'            # memory accounting hook (effective 37.84 GB)
  # Phase 7.G4.31B-MODELDEF.G4_19C-DEFAULT-OFF (2026-05-23):
  # default flipped '1' → '0'. The iter-3 architectural fix
  # (commit 47acc808) made the wrapper fullgraph-safe, but the
  # SEPARATE Lloyd-Max codebook quality regression documented in
  # g4_19c_attention_wrapper.py §"SERVER A/B RESULT 2026-05-17"
  # is NOT fixed — running G4_19C on production K/V tensors skews
  # attention scores → divergent token sampling (rig smoke
  # 2026-05-23 confirmed: output text "SBBBBBBBBBBBB" / "Sそしてそして…").
  # Production default must match the wrapper docstring's stated
  # "Default status of G4_19c: OFF in production launcher until
  # quality regression is resolved" stance. Operators running the
  # A/B harness for codebook calibration can force-on via
  # `sndr launch <preset> --extra-env GENESIS_ENABLE_G4_19C_ATTN_WRAP=1`
  # (CLI passthrough from Phase 7.G4.CLI-EXTRA-ENV, commit 9d2470fd).
  GENESIS_ENABLE_G4_19C_ATTN_WRAP: '0'                    # round-trip wrapper OFF by default (codebook quality regression pending)
  GENESIS_ENABLE_G4_31_TQ_DTYPE_PRESERVE: '1'             # preserve turboquant_* against AWQ kv_cache_scheme override
  # ── PR #40914 backport — TQ K+1 spec-verify cudagraph fix ──
  GENESIS_ENABLE_G4_67_TQ_SPEC_VERIFY_ROUTE: '1'          # safe no-op for wrapper path; primes upstream-overlay path
  # ── Qwen-applicable patches (general-purpose, MTP-aware) ──
  GENESIS_ENABLE_PN33_SPEC_DECODE_WARMUP_K: '1'           # MTP K-aware warmup sizing (vllm#37521)
  GENESIS_ENABLE_PN35_INPUTS_EMBEDS_OPTIONAL: '1'  # text-only inputs_embeds skip
  GENESIS_ENABLE_PN116: '1'  # TQ prefill max_seq_len fallback
  GENESIS_ENABLE_PN118: '1'  # TQ workspace graceful-fallback
  GENESIS_ENABLE_PN286_FA_LAYOUT_REVERT_SM86: '1'  # Ampere SM 8.6 FA KV layout revert
  GENESIS_ENABLE_P108: '1'          # MTP draft-loop stream synchronization (vllm#42603)
  GENESIS_ENABLE_P109: '1'          # sampler safety (vllm#42614) — short form matches registry env_flag
  GENESIS_ENABLE_PN110: '1'         # BlockPool.free_blocks dedup (vllm#42615) — short form matches registry env_flag
  # ── Cross-family supporting patches (Genesis-wide quality) ──
  GENESIS_ENABLE_PN119: '0'               # Gemma 4 doesn't use upstream TQ — N/A on wrapper path
  GENESIS_ENABLE_PN126_V1_DECODE_WARMUP: '1'              # V1 decode + spec-decode warmup at boot (TTFT CV drop)
  GENESIS_ENABLE_PN132_TOPK_TOPP_CONTIGUOUS: '1'          # sampler stability (cross-model)

# ─── Composition hints for the V1 ModelConfig compose() ────────────────
compose_hints:
  family: gemma4
  drafter_method: mtp
  drafter_id: gemma4-31b-assistant
