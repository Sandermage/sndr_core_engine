# SPDX-License-Identifier: Apache-2.0
# Genesis V2 profile — Path C tier-aware cache reference for 2× A5000 rig.
# Uses existing 27B-TQ k8v4 model + a5000-2x hardware, adds PN95 tier-aware
# cache via patches_delta.enable.
# Lifecycle: experimental (community-facing example).

schema_version: 2
kind: profile
id: tier-aware-2x                 # path-c- prefix = Path C tier-aware reference
parent_model: qwen3.6-27b-int4-autoround-tq-k8v4 # parent: existing TQ k8v4 model
maintainer: sandermage
status: experimental                             # values: experimental|validated|deprecated
created: '2026-05-09'

# ─── Patches delta — Path C tier-aware + Wave 7 essentials ─────────────
# P82 threshold tuned to 0.1 (matches canonical model.patches; explicit
# here so operators see it's the tier-aware tuning).
patches_delta:
  enable:
    GENESIS_ENABLE_PN95_TIER_AWARE_CACHE: '1'            # PN95 tier-aware cache (GPU+CPU tiers, vision page demotion, Mamba SSM GPU-resident)
    GENESIS_PN95_CONFIG_KEY: a5000-2x-tier-aware         # PN95 config key — resolves to vllm/sndr_core/cache/pn95/tier_configs/<key>.yaml (PN95-internal V2 source after 2026-06-01 architectural unblock) with V1 builtin/<key>.yaml fallback. Same tier specs by name.
    GENESIS_PN95_TICK_EVERY: '100'                       # PN95 page-move evaluation every N decode steps (range 50-500)
    GENESIS_PN95_DEMOTE_FREE_MIB_THRESHOLD: '2048'       # PN95 demotion threshold — start moving pages when free VRAM drops below 2 GiB
    GENESIS_ENABLE_PN16_LAZY_REASONER: '1'               # PN16 v2 — cache-safe
    GENESIS_PN16_TOOL_THINK_BUDGET: '200'                # V8 — short msg cap on <think>
    GENESIS_ENABLE_P82: '1'                              # SGLang acceptance OR-clause backport
  disable: []                                    # no removals
  override:
    GENESIS_P82_THRESHOLD_SINGLE: '0.1'                  # 0.1 — tier-aware example uses tighter threshold

# ─── Sizing override — tier-aware uses 131K ctx + max_num_seqs=4 ───────
sizing_override:
  max_model_len: 131072                          # 128K context (TQ k8v4 canonical)
  gpu_memory_utilization: 0.92                   # 0.92 — same as canonical 2× TQ
  max_num_seqs: 4                                # 4 concurrent — tier-aware permits higher concurrency via page demotion
  max_num_batched_tokens: 4096                   # standard 4096 chunks
  enable_chunked_prefill: true                   # required for spec-decode + long ctx
  enforce_eager: false                           # cudagraph capture enabled
  disable_custom_all_reduce: true                # NCCL fallback

# ─── Override policy (CONFIG-UX.4.DEBT.2A, 2026-05-24) ──────────────────
# Class `bench` — PN95 tier-aware experiment kept as example profile;
# PN95 experiment was sunset, profile preserved for tier-transition
# coverage documentation. Tier-aware-3090 sibling is deferred to
# CONFIG-UX.4.DEBT.2C operator investigation.
override_policy:
  override_class: bench
  reason: "PN95 tier-aware experiment on 2×A5000; context 131K + max_num_seqs=4 for tier transition coverage"
  evidence_refs: []
  evidence_visibility: public
  expires_at: '2026-08-22'
  allowed_to_exceed_hardware_default: false

promotion:
  validation_required:
    - "PN95 tier-aware cache observed promoting GPU↔CPU pages without crash"
    - "long_context + vision combined load completes without OOM"
  promote_to: null                               # null = example profile, no promotion path
  notes: |
    Reference example for Path C tier-aware cache on 2× A5000. Mirrors
    the legacy a5000-2x-tier-aware-EXAMPLE. PN95 sizing per-GPU; total
    resources scale with n_gpus.
