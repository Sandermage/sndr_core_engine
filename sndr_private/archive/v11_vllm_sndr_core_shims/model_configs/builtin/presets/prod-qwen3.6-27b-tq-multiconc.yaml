# Genesis V2 alias — operator shortcut for the 27B TQ k8v4 THROUGHPUT triplet (Wave 10).
# Companion to `prod-qwen3.6-27b-tq-k8v4` (latency profile). `sndr launch prod-qwen3.6-27b-tq-multiconc`
# resolves this file to (model, hardware, profile).
#
# Bench validated 2026-05-15 on dev371+bf610c2f5 (tools/multi_conc_bench.py):
#   conc=1 :  97 TPS  TTFT 105 ms  (single-user latency)
#   conc=8 : 379 TPS  TTFT 189 ms  (aggregate throughput, 3.89x scaling) ⭐
# Note: 27B INT4 has the BEST multi-conc scaling on this rig (3.89x vs 35B's
# 3.21x) because INT4 weight fetch is cheaper, leaving more SM cycles for
# parallel KV access. TTFT at conc=8 also lower than 35B (189 ms vs 243 ms).

model: qwen3.6-27b-int4-autoround-tq-k8v4        # same model file as prod-qwen3.6-27b-tq-k8v4
hardware: a5000-2x-24gbvram-16cpu-128gbram       # same rig — Sander's 2× A5000 homelab
profile: qwen3.6-27b-multiconc                           # THROUGHPUT profile (vs prod-qwen3.6-27b-tq-k8v4's qwen3.6-27b-tq-k8v4 LATENCY profile)

# CONFIG-UX.2 — operator card (2026-05-24)
card:
  title: "Qwen 3.6 27B INT4 AutoRound — TQ k8v4 multi-conc (K=3 MTP)"
  summary: |
    Throughput-tuned multi-conc variant of the qwen3_6_27b_int4_tq family.
    Best multi-conc scaling on this rig (3.89x at conc=8, 379 TPS) — INT4
    weight fetch leaves more SM cycles for parallel KV access. Falls back
    to prod-qwen3.6-27b-tq-k8v4 for single-stream / low-conc workloads.
  status: production_candidate
  audience: operator
  maturity: validated
  mode: throughput
  workload_allow:
    - free_chat
    - structured_json.short
    - tool_call.short
    - summarization
    - code_gen
  workload_deny:
    - structured_json.long
    - tool_call.long
  concurrency:
    min: 1
    max: 8
    canonical: 8
  K: 3
  context:
    max_model_len: 131072
    typical_input_tokens: 2048
    typical_output_tokens: 2048
  routing_family: qwen3_6_27b_int4_tq
  default_for_family: false
  fallback_preset: prod-qwen3.6-27b-tq-k8v4
  primary_metric:
    kind: agg_TPS
    value: 379.0
    source: tests/integration/baselines/27b_v11_wave9.json
    measured_at: 2026-05-15
  evidence_refs:
    - type: bench
      path: tests/integration/baselines/27b_v11_wave9.json
      visibility: public
      note: Wave 9 canonical baseline; multi-conc bench at conc=8 = 379 TPS, TTFT 189 ms.
  evidence_visibility: public
  tradeoffs:
    - "Multi-conc tuned (max_num_seqs=8); single-conc latency benefits from prod-qwen3.6-27b-tq-k8v4 instead."
    - "Smaller context envelope (131K vs 262K default) to fit max_num_seqs=8."
    - "Best multi-conc scaling on 2x A5000 — 3.89x at conc=8."
  do_not_use:
    - condition: "single-stream latency-critical workloads"
      reason: "Throughput profile sacrifices single-user latency; use prod-qwen3.6-27b-tq-k8v4 for K=3 single-conc."
    - condition: "context > 131K"
      reason: "Sizing tops at 131K for max_num_seqs=8; full 262K available in prod-qwen3.6-27b-tq-k8v4 single-conc."
  card_version: 1
  card_updated: 2026-05-24
  card_author: sander
