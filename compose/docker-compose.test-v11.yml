# SPDX-License-Identifier: Apache-2.0
#
# audit-no-hardcoded-paths EXEMPT (E26): this file is a remote-host
# test deployment compose; the `/home/sander/...` paths reflect the
# specific test rig layout. NOT a portable preset — operators on
# other rigs should NOT consume this file directly.
#
# Clean v11 test container — no legacy cruft.
#
# What this does NOT mount:
#   - tools/genesis_vllm_plugin (deleted in v11)
#   - vllm/_genesis/ (deleted in v11)
#   - PROD's compile/triton cache (own fresh dirs, no contention)
#
# What it mounts:
#   - v11 sndr_core (canonical Apache 2.0 community tier)
#   - v11 sndr_engine (skeleton — public namespace stub)
#   - models from /nfs/genesis/models read-only
#   - own triton + compile cache (per-test isolation)
#
# Usage from server side:
#   cd ~/genesis-vllm-patches-v11
#   docker compose -f compose/docker-compose.test-v11.yml up -d
#   docker compose -f compose/docker-compose.test-v11.yml logs -f
#   curl -s http://localhost:8001/health
#   curl -s -H 'Authorization: Bearer genesis-local' http://localhost:8001/v1/models
#   docker compose -f compose/docker-compose.test-v11.yml down
#
# Coexistence with PROD (vllm-server-mtp-test, port 8000):
#   - On 2× A5000 (24 GiB each), test container uses gpu-memory-utilization=0.45
#     so it fits alongside PROD if PROD is using ~85%. SAFE TO RUN ONLY when
#     PROD has been stopped or is using less than half VRAM.
#   - For a SAFE-WHEN-PROD-RUNNING smoke, use a CPU-only sub-target (no GPU
#     contention). For full benchmark, stop PROD first.
#
# Author: Sandermage(Sander)-Barzov Aleksandr.

services:
  vllm-test-v11:
    image: vllm/vllm-openai:nightly
    container_name: vllm-test-v11
    runtime: nvidia
    ipc: host
    shm_size: 8gb
    ports:
      # Use 8001 to coexist with PROD on 8000.
      - "8001:8000"
    volumes:
      # Models (shared, read-only)
      - /nfs/genesis/models:/models:ro
      - /home/sander/.cache/huggingface:/root/.cache/huggingface:ro
      # v11 layout — canonical Apache 2.0 community
      - /home/sander/genesis-vllm-patches-v11/vllm/sndr_core:/usr/local/lib/python3.12/dist-packages/vllm/sndr_core:ro
      - /home/sander/genesis-vllm-patches-v11/vllm/sndr_engine:/usr/local/lib/python3.12/dist-packages/vllm/sndr_engine:ro
      # OWN cache directories — never share with PROD to avoid pollution
      - /home/sander/Genesis_Project/vllm_engine/triton-cache-test-v11:/root/.triton/cache
      - /home/sander/Genesis_Project/vllm_engine/compile-cache-test-v11:/root/.cache/vllm/torch_compile_cache
    environment:
      # Offline: we only use models already on /nfs/genesis/models.
      HF_HUB_OFFLINE: "1"
      # Genesis env (subset of PROD; default-on patches in v11 registry).
      # Operators flip extras at runtime via `docker compose exec` env.
      GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL: "1"
      GENESIS_P67_USE_UPSTREAM: "1"
      GENESIS_ENABLE_P82: "1"
      GENESIS_P82_THRESHOLD_SINGLE: "0.3"
      GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: "1"
      GENESIS_ENABLE_P60_GDN_NGRAM_FIX: "1"
      GENESIS_ENABLE_P81_FP8_BLOCK_SCALED_M_LE_8: "1"
      GENESIS_ENABLE_PN8_MTP_DRAFT_ONLINE_QUANT: "1"
      GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: "1"
      GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: "1"
      GENESIS_ENABLE_P72_PROFILE_RUN_CAP: "1"
      GENESIS_PROFILE_RUN_CAP_M: "4096"
      GENESIS_ENABLE_P99: "1"
      GENESIS_ENABLE_PN77_FP8_LM_HEAD: "1"
      GENESIS_PREALLOC_TOKEN_BUDGET: "4096"
      # T2.1 — PN91 default OFF; flip to "1" + SNDR_PN91_POLICY=2q to test eviction.
      # GENESIS_ENABLE_PN91_KV_EVICTION_POLICY: "1"
      # SNDR_PN91_POLICY: "2q"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "==========================================="
        echo "v11 sndr_core test container — bootstrap"
        echo "==========================================="
        # Tiny deps (no /plugin install — v11 needs nothing extra)
        pip install --quiet --disable-pip-version-check --root-user-action=ignore \
          pandas scipy xxhash pyyaml packaging 2>&1 | tail -2
        echo ""
        echo "==========================================="
        echo "v11 sndr_core apply (DEFAULT-ON patches)"
        echo "==========================================="
        python3 -m vllm.sndr_core.apply 2>&1 | tail -10
        echo ""
        echo "==========================================="
        echo "vllm serve — 35B-A3B-FP8 short-ctx test config"
        echo "==========================================="
        # Reduced max-model-len + max-num-seqs for FAST boot (~2-3 min)
        # vs PROD's 320K * 2-seq (~6-8 min boot). Same flags otherwise.
        exec vllm serve \
          --model /models/Qwen3.6-35B-A3B-FP8 \
          --tensor-parallel-size 2 \
          --gpu-memory-utilization 0.85 \
          --max-model-len 32768 \
          --max-num-seqs 1 \
          --max-num-batched-tokens 4096 \
          --dtype float16 \
          --kv-cache-dtype turboquant_k8v4 \
          --served-model-name qwen3.6-35b-a3b-test \
          --tool-call-parser qwen3_coder \
          --reasoning-parser qwen3 \
          --enable-chunked-prefill \
          --disable-custom-all-reduce \
          --language-model-only \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --api-key genesis-local \
          --host 0.0.0.0 \
          --port 8000 \
          --speculative-config '{"method": "mtp", "num_speculative_tokens": 3}' \
          --no-scheduler-reserve-full-isl \
          --performance-mode interactivity \
          --attention-config.flash_attn_version 2 \
          --generation-config vllm
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 600s  # 10 min cold-boot grace (compile cache cold first time)
