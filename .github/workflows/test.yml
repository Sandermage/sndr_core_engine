# Genesis test suite — runs the 400+ unit tests on every push/PR.
#
# Scoped to the compat layer + core dispatcher / patch / wiring helpers.
# Tests that require a real vllm install (model_detect probes against
# live engine, kernel-level Triton tests) are SKIPPED on this CI —
# those run on the dev box where vllm is installed.
#
# Triggered:
#   - push to main
#   - any PR
#   - manual workflow_dispatch
#
# Author: Sandermage (Sander) Barzov Aleksandr.
name: Genesis test suite

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install minimal deps
        # Genesis stays runtime-dep-free, so for tests we only need:
        #   - pytest + pytest-cov for the suite + coverage
        #   - torch (CPU build) for the few tests that import torch.cuda
        #   - numpy — kernel/parity tests do a top-level `import numpy`
        #     (e.g. tests/unit/kernels/test_pn119_mse_grouped_parity.py);
        #     without it those modules fail at collection, not skip.
        #   - PyYAML — CLI render tests load `sndr.*` helpers that
        #     `import yaml` transitively (compose/quadlet/k8s render),
        #     so the dep must be present for collection to succeed.
        #   - requests — boot-probe tests import it inside the test body.
        #   - cryptography — the secrets-store + wheel-contract tests
        #     exercise the Fernet at-rest encryption path.
        #   - build — the wheel-contract tests run `python -m build`.
        #   - packaging (stdlib of pip; pin for safety)
        #   - tomli — backport of stdlib `tomllib` (3.11+). The 3.10 matrix
        #     leg needs it so pyproject-parsing tests (e.g.
        #     tests/unit/model_configs/test_in_process_plugin_entrypoint.py
        #     and scripts/audit_wheel_contents.py) import via the
        #     `tomli as tomllib` fallback instead of reporting "tomllib
        #     unavailable". On 3.12 stdlib tomllib wins, so the dep is inert.
        #   - pytest-timeout — per-test ceiling so a genuinely hung test
        #     fails fast with a traceback instead of letting the ~40-min
        #     suite drift into the GitHub job timeout. No legitimate test
        #     approaches the ceiling (slowest subprocess tests are <60s).
        #   - fastapi + httpx + uvicorn — the product-API / GUI backend
        #     HTTP+auth surface (tests/unit/product_api/**, ~150 tests in
        #     ~30 modules incl. test_http_security / test_auth_http /
        #     test_unified_gateway_auth / test_gui_contract) is guarded by
        #     module-level `pytest.importorskip("fastapi")`. Post-release
        #     audit 2026-07-04 finding #13: without these deps the whole
        #     surface SILENTLY skipped in every CI leg since the
        #     "FastAPI-optional CI" decision (91be9297, then 4 modules) —
        #     "CI green" asserted nothing about the deployed GUI backend
        #     or its auth. pydantic rides in as a fastapi dependency.
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout packaging numpy PyYAML \
              requests cryptography build tomli \
              "fastapi>=0.110" httpx "uvicorn[standard]>=0.27"
          pip install --index-url https://download.pytorch.org/whl/cpu \
              "torch>=2.0,<3.0"

      - name: Guard — product-API / GUI test surface must be RUNNABLE
        # Recurrence gate for audit finding #13: if a future dep cleanup
        # drops fastapi/httpx/uvicorn from the install above, the
        # product_api tests would go back to green-by-skip without anyone
        # noticing (importorskip converts a missing dep into a silent
        # skip). Failing THIS step turns that silent hole back into a red
        # CI leg.
        run: |
          python -c "import fastapi, httpx, uvicorn, pydantic; print('product-API test deps present:', fastapi.__version__)"

      - name: Run tracked tests (compat + dispatcher + PN-family + scripts)
        run: |
          # v12 layout: the vllm/sndr_core/ namespace moved to top-level
          # sndr/. Tests live at repo-root tests/ and target sndr.*.
          # The full tracked test surface across tests/unit/{cli,community,
          # dispatcher,integrations,model_configs,proof,runtime,scripts,...}
          # is the load-bearing CI gate.
          #
          # Collect only `test_*.py` (mirrors `python_files` in
          # pyproject.toml). Globbing every `*.py` would force-collect
          # tests/legacy/pristine_fixtures/*.py — those are vendored
          # pristine vLLM/FLA source snapshots used as anchor-validation
          # fixtures, not pytest modules; they import einops/regex and use
          # package-relative imports, so collecting them aborts the run.
          # --timeout=300: hang-guard. A stuck test is killed with a
          # thread traceback after 5 min instead of stalling the whole
          # job. --timeout-method=thread is subprocess-safe (the wheel /
          # make-evidence tests block on subprocess.run, which the thread
          # method interrupts cleanly).
          python -m pytest -v --tb=short \
              --timeout=300 --timeout-method=thread \
              --cov=sndr \
              --cov-report=term-missing:skip-covered \
              $(git ls-files 'tests/**/test_*.py' 'tests/test_*.py')

      - name: Registry contract aggregator
        # Single audit gate covering 8 invariants: conflicts symmetry,
        # category enum, family↔path consistency, apply_module coverage,
        # retired provenance, pin gate, dict-key dedup, docstring lifecycle.
        run: |
          python3 scripts/audit_registry_contract.py

      - name: Phase 3 relocation invariants
        # Enforces §0.5 architectural invariants on the post-Phase-3
        # integrations/ tree:
        #   R1 — gemma4/ is small-compat namespace (whitelist enforced)
        #   R2 — registry apply_module never points at a relocation shim
        #   R3 — structured-profile envs are all in PATCH_REGISTRY
        #   R4 — no shell scripts / subprocess docker-run under integrations/
        # See sndr_private/planning/audits/RELOCATION_DESIGN_2026-05-21_RU.md §0.5.
        run: |
          python3 scripts/audit_phase3_relocation.py

      - name: Shim-window integrity audit
        # BUILD-SHIM-WINDOW-AUDIT.2 — verify historical-path compatibility
        # shims stay in valid shim state (E.1/E.2/E.3/E.4/E.5). Current
        # manifest: integrations/gemma4/ → attention/turboquant/overlays/
        # pr42637/. Catches accidental "empty folder, delete" or overlay
        # gutting that would silently break launcher-path reproducibility.
        run: |
          python3 scripts/audit_shim_window.py

      - name: V2 runtime + ModelDef pin harmonization
        # P2.6 — locks the runtime image and ModelDef pin discipline so
        # the next pin bump cannot silently regress to a bare mutable
        # :nightly tag or to an unknown pin:
        #   R-PIN-1 — no bare mutable vLLM nightly in hardware YAMLs
        #   R-PIN-2 — hardware image_digest present + correct prefix
        #   R-PIN-3 — rendered IMAGE == composed cfg.docker.image
        #   R-PIN-4 — ModelDef vllm_pin_required in allowed set;
        #             migration table emitted as info only (Qwen dev338
        #             allowed until P2.4d promotes per-model with
        #             smoke + bench evidence)
        run: |
          python3 scripts/audit_v2_runtime_pins.py

      - name: V2 ModelDef ↔ hardware canonical-pin drift audit
        # Phase 5.2.E — orthogonal to R-PIN-4 above. R-PIN-4 accepts BOTH
        # dev338 and dev371 as legitimate during per-model P2.4d promotion;
        # this audit is stricter and waiver-aware:
        #   R-MD-HW-1 — all hardware YAMLs pin the same docker image SHA
        #   R-MD-HW-2 — every ModelDef's vllm_pin_required SHA matches
        #               the canonical hardware SHA, OR carries a
        #               non-empty `versions.pin_hold` rationale (waiver
        #               currently set on qwen3.6-7b-dense per F-Q7B).
        # Closes the silent-drift gap that motivated Phase 5.2.E.
        run: |
          python3 scripts/audit_v2_modeldef_vs_hardware_pin.py

      - name: Preventive repo-garbage audit
        # §9.A.2 — forbid merge leftovers (.orig/.rej), .DS_Store, editor
        # backups, illegal filename chars, and repo-root scratchpad names
        # (out.txt / tmp.json / debug.md). Operator-local .claude/,
        # CLAUDE.md, sndr_private/ are allowlisted. Tracked-tree scan
        # only on CI (faster; --tracked-only mode).
        run: |
          python3 scripts/audit_repo_garbage.py --tracked-only

      - name: External findings tracker validation
        # §9.A.7 — schema + cross-finding validation of the external
        # findings tracker (vLLM PRs / club-3090 issues / papers /
        # other upstream observations operator decided to track
        # structurally instead of as research-tree URL lists).
        # Thin wrapper around sndr.findings.validator. The
        # canonical tracker dir is gitignored (sndr_private/planning/
        # external_findings/), so CI sees an empty fallback dir and
        # the audit safely no-ops with exit 0. The gate enforces
        # format invariants on operator-local trees + catches schema
        # drift if the findings package is refactored.
        run: |
          python3 scripts/audit_external_findings.py

      - name: Generated-doc link integrity audit
        # §9.A.4 — verifies docs/PATCHES_AUTO.md + docs/CONFIGS_AUTO.md:
        # generator --check sync; [#NNNN](URL) number/URL consistency;
        # GitHub PR/issue URL shape; no placeholder TODO/... targets.
        # Sibling to audit_links.py (which gates path/anchor integrity
        # across every markdown file) — this audit narrows to generator
        # output and catches drift specific to mechanically-rendered tables.
        run: |
          python3 scripts/audit_generated_links.py

      - name: Markdown link integrity audit
        # §9.A.3 — verify every tracked-tree markdown link resolves to
        # an existing path. External URLs (http/https/mailto), out-of-repo
        # paths, inline code spans, and fenced code blocks are skipped.
        # Anchor verification is opt-in (`--anchors`) and run as a separate
        # operator-driven gate (`make audit-links-strict`) — it surfaces
        # pre-existing TOC drift that belongs to the doc-reconcile track.
        run: |
          python3 scripts/audit_links.py

      - name: Attribution-label policy audit
        # §9.A.6 — forbid syntactic AI-attribution constructs in tracked
        # source (Co-Authored-By trailer with AI agent name, Generated-by
        # AI markers, robot-emoji Generated, AI-assisted prose, promotional  <!-- audit-ai-attribution: allow -->
        # "Powered by AI" footers). Bare AI-tool names in legitimate
        # contexts (HF model IDs, .claude/ paths, gemini-code-assist bot
        # credits, ANTHROPIC env-var prefixes) are NEVER flagged. Inline
        # `<!-- audit-ai-attribution: allow -->` waives a line. Automates
        # the recurring manual grep sweep operator + Claude Code ran on
        # every commit during 2026-05-26 Track F closure.
        run: |
          python3 scripts/audit_ai_attribution.py

      - name: Lifecycle audit
        # Ensures no patch was added with an unknown lifecycle state.
        run: |
          python3 -m sndr.compat.lifecycle_audit_cli --quiet

      - name: Schema validate PATCH_REGISTRY
        # Ensures every entry validates against the canonical schema.
        # Catches typo'd field names, missing required, bad env_flag pattern.
        run: |
          python3 -m sndr.compat.schema_validator --quiet

      - name: Genesis self-test
        # Operator-facing structural sanity check. Same tool an operator
        # runs after a `git pull` / pin bump on their box. Exits 1 on any
        # failed check.
        run: |
          python3 -m sndr.compat.cli self-test --quiet

      - name: Regenerate patch-proof artefacts
        # `evidence/patch_proof/<id>__*.json` is operator-generated
        # per host (carries hostname + measured_at + commit SHA). The
        # files are gitignored — CI regenerates them once per build so
        # the downstream `require-static` release gate has something to
        # validate against. Takes <2 s for all 169 patches.
        run: |
          python3 -m sndr.cli patches prove --all

      - name: make evidence (release-gate aggregator)
        # Runs every gating audit (schema sync, methodology sync,
        # no-stub scan, public-paths, cross-reference, …) plus the
        # static-proof release check that consumes the artefacts
        # regenerated in the previous step. Must stay all-green.
        run: |
          make evidence

  memory-postgres:
    # Review finding C1: run the memory storage CONTRACT against a real
    # Postgres + pgvector so the in-memory <-> Postgres parity claim is actually
    # verified in CI (the same suite that's skipped when MEMORY_TEST_DSN is unset).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: genesis
          POSTGRES_PASSWORD: genesis
          POSTGRES_DB: genesis_memory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genesis -d genesis_memory"
          --health-interval 5s --health-timeout 5s --health-retries 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install memory deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest "psycopg[binary]>=3.1" PyYAML \
              "fastapi>=0.110" "uvicorn[standard]>=0.27" httpx
      - name: Memory contract + API + gateway against live Postgres
        env:
          MEMORY_TEST_DSN: postgresql://genesis:genesis@127.0.0.1:5432/genesis_memory
        run: |
          python -m pytest -v --tb=short \
              tests/unit/test_memory_store_contract.py \
              tests/unit/test_memory_engine.py \
              tests/unit/test_memory_embedder.py \
              tests/unit/test_memory_api.py \
              tests/unit/test_memory_middleware.py \
              tests/unit/test_memory_auth.py \
              tests/unit/test_gateway_route.py \
              tests/unit/test_memory_gateway.py \
              tests/unit/test_obsidian_import.py
