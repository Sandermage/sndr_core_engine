# Genesis test suite — runs the 400+ unit tests on every push/PR.
#
# Scoped to the compat layer + core dispatcher / patch / wiring helpers.
# Tests that require a real vllm install (model_detect probes against
# live engine, kernel-level Triton tests) are SKIPPED on this CI —
# those run on the dev box where vllm is installed.
#
# Triggered:
#   - push to main
#   - any PR
#   - manual workflow_dispatch
#
# Author: Sandermage (Sander) Barzov Aleksandr.
name: Genesis test suite

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install minimal deps
        # Genesis stays runtime-dep-free, so for tests we only need:
        #   - pytest + pytest-cov for the suite + coverage
        #   - torch (CPU build) for the few tests that import torch.cuda
        #   - packaging (stdlib of pip; pin for safety)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov packaging
          pip install --index-url https://download.pytorch.org/whl/cpu \
              "torch>=2.0,<3.0"

      - name: Run tracked tests (compat + dispatcher + PN-family + scripts)
        run: |
          # Wave 10 layout: legacy vllm/_genesis/ namespace was removed in
          # the sndr_core self-containment refactor. Tests now live at
          # repo-root tests/ and target vllm.sndr_core.*. The full tracked
          # test surface across tests/unit/{cli,community,dispatcher,
          # integrations,model_configs,proof,runtime,scripts,...} is the
          # load-bearing CI gate.
          python -m pytest -v --tb=short \
              --cov=vllm.sndr_core \
              --cov-report=term-missing:skip-covered \
              $(git ls-files 'tests/**/*.py' 'tests/*.py')

      - name: Registry contract aggregator
        # Single audit gate covering 8 invariants: conflicts symmetry,
        # category enum, family↔path consistency, apply_module coverage,
        # retired provenance, pin gate, dict-key dedup, docstring lifecycle.
        run: |
          python3 scripts/audit_registry_contract.py

      - name: Lifecycle audit
        # Ensures no patch was added with an unknown lifecycle state.
        run: |
          python3 -m vllm.sndr_core.compat.lifecycle_audit_cli --quiet

      - name: Schema validate PATCH_REGISTRY
        # Ensures every entry validates against the canonical schema.
        # Catches typo'd field names, missing required, bad env_flag pattern.
        run: |
          python3 -m vllm.sndr_core.compat.schema_validator --quiet

      - name: Genesis self-test
        # Operator-facing structural sanity check. Same tool an operator
        # runs after a `git pull` / pin bump on their box. Exits 1 on any
        # failed check.
        run: |
          python3 -m vllm.sndr_core.compat.cli self-test --quiet

      - name: make evidence (41/41 audit gates)
        # The release-gate aggregator. Runs all 41 gating audits including
        # schema sync, methodology sync, no-stub scan, public-paths,
        # cross-reference, etc. Must stay 41/41 green.
        run: |
          make evidence
