# Genesis test suite — runs the 400+ unit tests on every push/PR.
#
# Scoped to the compat layer + core dispatcher / patch / wiring helpers.
# Tests that require a real vllm install (model_detect probes against
# live engine, kernel-level Triton tests) are SKIPPED on this CI —
# those run on the dev box where vllm is installed.
#
# Triggered:
#   - push to main
#   - any PR
#   - manual workflow_dispatch
#
# Author: Sandermage (Sander) Barzov Aleksandr.
name: Genesis test suite

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install minimal deps
        # Genesis stays runtime-dep-free, so for tests we only need:
        #   - pytest + pytest-cov for the suite + coverage
        #   - torch (CPU build) for the few tests that import torch.cuda
        #   - packaging (stdlib of pip; pin for safety)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov packaging
          pip install --index-url https://download.pytorch.org/whl/cpu \
              "torch>=2.0,<3.0"

      - name: Run tracked tests (compat + dispatcher + PN-family + scripts)
        run: |
          # Wave 10 layout: legacy vllm/_genesis/ namespace was removed in
          # the sndr_core self-containment refactor. Tests now live at
          # repo-root tests/ and target vllm.sndr_core.*. The full tracked
          # test surface across tests/unit/{cli,community,dispatcher,
          # integrations,model_configs,proof,runtime,scripts,...} is the
          # load-bearing CI gate.
          python -m pytest -v --tb=short \
              --cov=vllm.sndr_core \
              --cov-report=term-missing:skip-covered \
              $(git ls-files 'tests/**/*.py' 'tests/*.py')

      - name: Registry contract aggregator
        # Single audit gate covering 8 invariants: conflicts symmetry,
        # category enum, family↔path consistency, apply_module coverage,
        # retired provenance, pin gate, dict-key dedup, docstring lifecycle.
        run: |
          python3 scripts/audit_registry_contract.py

      - name: Phase 3 relocation invariants
        # Enforces §0.5 architectural invariants on the post-Phase-3
        # integrations/ tree:
        #   R1 — gemma4/ is small-compat namespace (whitelist enforced)
        #   R2 — registry apply_module never points at a relocation shim
        #   R3 — structured-profile envs are all in PATCH_REGISTRY
        #   R4 — no shell scripts / subprocess docker-run under integrations/
        # See sndr_private/planning/audits/RELOCATION_DESIGN_2026-05-21_RU.md §0.5.
        run: |
          python3 scripts/audit_phase3_relocation.py

      - name: Shim-window integrity audit
        # BUILD-SHIM-WINDOW-AUDIT.2 — verify historical-path compatibility
        # shims stay in valid shim state (E.1/E.2/E.3/E.4/E.5). Current
        # manifest: integrations/gemma4/ → attention/turboquant/overlays/
        # pr42637/. Catches accidental "empty folder, delete" or overlay
        # gutting that would silently break launcher-path reproducibility.
        run: |
          python3 scripts/audit_shim_window.py

      - name: V2 runtime + ModelDef pin harmonization
        # P2.6 — locks the runtime image and ModelDef pin discipline so
        # the next pin bump cannot silently regress to a bare mutable
        # :nightly tag or to an unknown pin:
        #   R-PIN-1 — no bare mutable vLLM nightly in hardware YAMLs
        #   R-PIN-2 — hardware image_digest present + correct prefix
        #   R-PIN-3 — rendered IMAGE == composed cfg.docker.image
        #   R-PIN-4 — ModelDef vllm_pin_required in allowed set;
        #             migration table emitted as info only (Qwen dev338
        #             allowed until P2.4d promotes per-model with
        #             smoke + bench evidence)
        run: |
          python3 scripts/audit_v2_runtime_pins.py

      - name: V2 ModelDef ↔ hardware canonical-pin drift audit
        # Phase 5.2.E — orthogonal to R-PIN-4 above. R-PIN-4 accepts BOTH
        # dev338 and dev371 as legitimate during per-model P2.4d promotion;
        # this audit is stricter and waiver-aware:
        #   R-MD-HW-1 — all hardware YAMLs pin the same docker image SHA
        #   R-MD-HW-2 — every ModelDef's vllm_pin_required SHA matches
        #               the canonical hardware SHA, OR carries a
        #               non-empty `versions.pin_hold` rationale (waiver
        #               currently set on qwen3.6-7b-dense per F-Q7B).
        # Closes the silent-drift gap that motivated Phase 5.2.E.
        run: |
          python3 scripts/audit_v2_modeldef_vs_hardware_pin.py

      - name: Lifecycle audit
        # Ensures no patch was added with an unknown lifecycle state.
        run: |
          python3 -m vllm.sndr_core.compat.lifecycle_audit_cli --quiet

      - name: Schema validate PATCH_REGISTRY
        # Ensures every entry validates against the canonical schema.
        # Catches typo'd field names, missing required, bad env_flag pattern.
        run: |
          python3 -m vllm.sndr_core.compat.schema_validator --quiet

      - name: Genesis self-test
        # Operator-facing structural sanity check. Same tool an operator
        # runs after a `git pull` / pin bump on their box. Exits 1 on any
        # failed check.
        run: |
          python3 -m vllm.sndr_core.compat.cli self-test --quiet

      - name: Regenerate patch-proof artefacts
        # `evidence/patch_proof/<id>__*.json` is operator-generated
        # per host (carries hostname + measured_at + commit SHA). The
        # files are gitignored — CI regenerates them once per build so
        # the downstream `require-static` release gate has something to
        # validate against. Takes <2 s for all 169 patches.
        run: |
          python3 -m vllm.sndr_core.cli patches prove --all

      - name: make evidence (release-gate aggregator)
        # Runs every gating audit (schema sync, methodology sync,
        # no-stub scan, public-paths, cross-reference, …) plus the
        # static-proof release check that consumes the artefacts
        # regenerated in the previous step. Must stay all-green.
        run: |
          make evidence
