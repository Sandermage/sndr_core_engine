# Genesis release pipeline — builds wheel + generates SBOM + uploads artifacts.
#
# T4 (UNIFIED_CONFIG plan 2026-05-09): wires `scripts/generate_sbom.py`
# into the release path so every published wheel ships with a CycloneDX
# 1.5 + SPDX 2.3 SBOM as a sibling artifact. Operators downloading a
# release tarball get full provenance + dep tree without rebuilding.
#
# Workflow:
#   1. Trigger on tag push (`v*` like v11.0.1) or manual dispatch.
#   2. Build sdist + wheel with `python -m build`.
#   3. Install the freshly-built wheel (so SBOM transitive resolution is real).
#   4. Run generate_sbom.py to produce {.cdx.json, .spdx.json, .txt}.
#   5. Strict-test mode: re-run pytest WITHOUT SNDR_ALLOW_LEGACY_LICENSE_KEYS
#      to verify the production strict path is green at this tag.
#   6. Upload wheel + sdist + SBOM bundle to the GitHub release.
#
# Triggered:
#   - push to tags matching `v*`
#   - manual workflow_dispatch (for dry-run rebuilds)

name: Genesis release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build artifacts but do not attach to a release'
        required: false
        default: 'false'

permissions:
  contents: write   # needed to attach files to the GitHub Release

jobs:
  build_and_sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for SBOM provenance

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest PyYAML cryptography

      - name: Build sdist + wheel
        run: |
          python -m build --sdist --wheel
          ls -lh dist/

      - name: Install built wheel (for full transitive SBOM)
        run: |
          python -m pip install dist/*.whl

      - name: Generate SBOM (CycloneDX 1.5 + SPDX 2.3 + plain text)
        run: |
          mkdir -p sbom
          python scripts/generate_sbom.py --out sbom/genesis-sbom
          ls -lh sbom/

      - name: Strict-test pass (no legacy license gate)
        env:
          SNDR_ALLOW_LEGACY_LICENSE_KEYS: ""
        run: |
          # Re-verify the production strict path is green at this tag.
          # Patches dir is excluded — it needs torch+vllm runtime.
          python -m pytest tests/unit tests/installer -q \
            --ignore=tests/unit/integrations \
            --durations=10

      - name: Verify SBOM is well-formed JSON
        run: |
          python -c "
          import json, glob
          for f in glob.glob('sbom/*.json'):
              with open(f) as fh: json.load(fh)
              print(f'{f}: OK')
          "

      - name: Upload artifacts (workflow scope, non-release)
        uses: actions/upload-artifact@v4
        with:
          name: genesis-release-${{ github.ref_name }}
          path: |
            dist/*
            sbom/*
          retention-days: 30
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            sbom/*
          generate_release_notes: true
          fail_on_unmatched_files: true
