# SNDR Control Center web app — CI gate for the React/TypeScript GUI.
#
# Runs the public-tree quality gates on every change under gui/web:
#   build job: typecheck (tsc) -> lint (eslint) -> production build (vite).
#
# The vitest unit suite + the hermetic Playwright e2e harness (with the
# axe-core accessibility scan) were extracted to the operator-private
# archive in 2026 (`chore(gui): extract tests to sndr_private (release
# hygiene)`). Those gates — and the dev-box specs that need a live daemon
# (smoke / host_wiring / server_switch / chat_rag) — run on the operator
# box, not on the public CI, because their fixtures (e2e/fixtures.ts,
# tests/**) are not part of the published source tree. The public gate
# therefore validates exactly what ships: types compile, lint is clean,
# the production bundle builds.
#
# Triggered:
#   - push to main (only when gui/web changes)
#   - any PR that touches gui/web
#   - manual workflow_dispatch
#
# Author: Sandermage (Sander) Barzov Aleksandr.
name: GUI web CI

on:
  push:
    branches: [ main ]
    paths: [ "gui/web/**", ".github/workflows/gui_web.yml" ]
  pull_request:
    paths: [ "gui/web/**", ".github/workflows/gui_web.yml" ]
  workflow_dispatch:

defaults:
  run:
    working-directory: gui/web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Production build (vite)
        run: npm run build
