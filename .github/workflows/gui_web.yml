# SNDR Control Center web app — CI gate for the React/TypeScript GUI.
#
# Runs the public-tree quality gates on every change under gui/web:
#   build job: typecheck (tsc) -> lint (eslint) -> unit tests (vitest) ->
#              production build (vite).
#
# The public vitest suite is the CO-LOCATED unit + component-smoke tests
# (src/**/*.test.{ts,tsx}) — pure lib logic (coerce/format/config-utils/
# readiness-gates/safe-storage) and prop-only presentational primitives. They
# need no external fixtures and no live daemon, so they ship with the source
# and run here. The hermetic Playwright e2e harness (with the axe-core
# accessibility scan) and the dev-box specs that need a live daemon (smoke /
# host_wiring / server_switch / chat_rag) still run on the operator box, not on
# the public CI, because their fixtures (e2e/fixtures.ts) are not part of the
# published tree. The public gate validates exactly what ships: types compile,
# lint is clean, the unit/smoke suite passes, the production bundle builds.
#
# Triggered:
#   - push to main (only when gui/web changes)
#   - any PR that touches gui/web
#   - manual workflow_dispatch
#
# Author: Sandermage (Sander) Barzov Aleksandr.
name: GUI web CI

on:
  push:
    branches: [ main ]
    paths: [ "gui/web/**", ".github/workflows/gui_web.yml" ]
  pull_request:
    paths: [ "gui/web/**", ".github/workflows/gui_web.yml" ]
  workflow_dispatch:

defaults:
  run:
    working-directory: gui/web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: gui/web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm test

      - name: Production build (vite)
        run: npm run build
