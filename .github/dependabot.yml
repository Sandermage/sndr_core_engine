# Dependabot configuration for Genesis vLLM Patches
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Python dependencies (genesis_vllm_plugin + tests + benchmarks)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Group minor + patch updates to reduce PR noise
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflow files
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci"

  # Docker base image (vllm/vllm-openai:nightly is in compose templates,
  # but Dependabot can track Dockerfile FROM lines if we ever add one)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels:
      - "docker"
      - "automated"
