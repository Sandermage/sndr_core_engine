# SPDX-License-Identifier: Apache-2.0
# Genesis V2 alias — operator shortcut for the 35B THROUGHPUT triplet (Wave 10).
# Companion to `prod-35b` (latency profile). `sndr launch prod-35b-multiconc`
# resolves this file to (model, hardware, profile) for the multi-concurrency
# throughput preset.
#
# Bench validated 2026-05-15 on dev371+bf610c2f5 (tools/multi_conc_bench.py):
#   conc=1  : 215 TPS  TTFT 65 ms  (single-user latency)
#   conc=8  : 689 TPS  TTFT 243 ms (aggregate throughput, 3.21x scaling) ⭐
# Use `prod-35b` for latency-critical single-user chat; this preset for
# agentic / batch / multi-tenant workloads where aggregate TPS dominates.

model: qwen3.6-35b-a3b-fp8                       # same model file as prod-35b
hardware: a5000-2x-24gbvram-16cpu-128gbram       # same rig — Sander's 2× A5000 homelab
profile: 35b-multiconc                           # THROUGHPUT profile (vs prod-35b's 35b-balanced LATENCY profile)
# runtime: docker                                # optional; defaults to hardware.runtime.default

# CONFIG-UX.2 — operator card (2026-05-24)
card:
  title: "Qwen 3.6 35B-A3B FP8 — multi-conc K=3 MTP (672 TPS @ conc=8)"
  summary: |
    Throughput-tuned multi-conc variant of qwen3_6_35b_a3b_fp8. Reference
    free-chat multi-conc baseline on this rig (689 TPS at conc=8, 3.21x
    scaling). For agentic / batch / multi-tenant workloads where aggregate
    TPS dominates over single-user latency.
  status: production_candidate
  audience: operator
  maturity: validated
  mode: throughput
  workload_allow:
    - free_chat
    - structured_json.short
    - tool_call.short
    - summarization
  workload_deny:
    - structured_json.long
    - tool_call.long
  concurrency:
    min: 1
    max: 8
    canonical: 8
  K: 3
  context:
    max_model_len: 280000
    typical_input_tokens: 2048
    typical_output_tokens: 2048
  routing_family: qwen3_6_35b_a3b_fp8
  default_for_family: false
  fallback_preset: prod-35b
  primary_metric:
    kind: agg_TPS
    value: 689.0
    source: tests/integration/baselines/35b_v11_wave9.json
    measured_at: 2026-05-15
  evidence_refs:
    - type: bench
      path: tests/integration/baselines/35b_v11_wave9.json
      visibility: public
      note: Wave 9 multi-conc bench; conc=8 = 689 TPS / TTFT 243 ms (3.21x scaling).
  evidence_visibility: public
  tradeoffs:
    - "Aggregate throughput maximised; single-user TTFT increases vs prod-35b (243 ms vs 65 ms)."
    - "Multi-conc free-chat reference; prod-gemma4-26b-multiconc loses on free-chat (-39%) but wins on short structured."
  do_not_use:
    - condition: "single-user latency-critical chat"
      reason: "TTFT triples vs prod-35b; use prod-35b for single-user latency."
  card_version: 1
  card_updated: 2026-05-24
  card_author: sander
