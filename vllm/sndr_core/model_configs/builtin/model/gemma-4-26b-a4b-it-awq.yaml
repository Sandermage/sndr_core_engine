# SPDX-License-Identifier: Apache-2.0
# Status: 🧪 Experimental
# Caveats: G4_NN family patches (Marlin K-pad + asymmetric KV-heads) not
#   yet server-validated on rig. Projected bench only. Promotion to ✅
#   requires: verify-full + 5×5 bench n=25 + soak-continuous PASS on 2× A5000.
# Genesis V2 model definition — Gemma 4 26B-A4B-it AWQ-4bit (cyankiwi) + MTP.
# 128-expert MoE; sliding+global asymmetric KV-heads (sliding=8, full=2).
# Genesis G4_NN family closes Marlin K-dim (K=352%64≠0) + asymmetric KV.
#
# Bench reference (projected — server validation pending):
#   wall_TPS  ~120-160 (MoE active params A=4B; faster than 31B dense)
#   TPOT_ms   ~6-8     (decode at batch=1)
#   accept_rate ~0.78-0.85 (MTP assistant)
#   context   256K (with G4_09 chunked prefill)

schema_version: 2
kind: model
id: gemma-4-26b-a4b-it-awq
title: Gemma 4 26B-A4B-it AWQ-4bit (cyankiwi) + MTP assistant
maintainer: sandermage
last_validated: '2026-05-17'
license: gemma-license

# ─── Identity ──────────────────────────────────────────────────────────
model_path: /models/gemma-4-26B-A4B-it-AWQ-4bit          # cyankiwi/gemma-4-26B-A4B-it-AWQ-4bit checkpoint
served_model_name: gemma-4-26b-a4b                       # OpenAI-API model name
quantization: null                                       # let vLLM detect from compressed-tensors metadata
dtype: bfloat16                                          # CHANGED 2026-05-17 per audit: BF16 canonical for AWQ on SM 8.6 Ampere
trust_remote_code: false
chat_template: /tmp/genesis/chat_templates/gemma4.jinja  # installed by G4_11 at boot

# ─── Capabilities ──────────────────────────────────────────────────────
capabilities:
  attention_arch: gemma4_moe                             # Gemma 4 MoE (128 experts, top_k=8, A=4B active)
  tool_call_parser: gemma4
  reasoning_parser: null
  enable_auto_tool_choice: true
  # Phase 7.G4.26B-A4B.VARIANT-A-FIX (2026-05-23): MTP ownership moved
  # from ModelDef to ProfileDef. The K-choice is workload-class-dependent
  # per the WORKLOAD-GATE-POLICY (see sndr_private/research/gemma4/
  # analysis/G4_WORKLOAD_GATE_POLICY_UPDATE_2026-05-23.md):
  #   • free-chat / long-form / code / summarization → K=1 (no MTP)
  #   • short structured JSON / tool_call → K=4 (positive in B2 + B4)
  # ModelDef therefore leaves spec_decode = null. Each profile sets
  # spec_decode_override explicitly when it wants K>1. Mirrors the
  # 31B AWQ ModelDef pattern (gemma-4-31b-it-awq.yaml line 48).
  spec_decode: null
  kv_cache_dtype: auto                                   # G4_18 makes this per-layer-type when enabled

# ─── Hardware preconditions ────────────────────────────────────────────
requires:
  min_total_vram_mib: 24000                              # 26B-A4B AWQ ~12 GB weights + ~8 GB KV at 32K ctx
  min_gpu_count: 1
  min_cuda_capability: [8, 6]
  rig_arch_blocklist: []

versions:
  genesis_pin_min: v12.0.0
  vllm_pin_required: 0.21.1rc0+g626fa9bba566
  reference_metrics_ref: null  # Phase 5.2.D (2026-05-22): formalize receipt-only state. The referenced baseline JSON was never generated (audit_v2_vllm_pin_consistency reported file-not-found). dev371 evidence for this model lives in the Gemma 4 P1.7d byte-equivalence test (rehearsal 2026-05-20). A formal canonical baseline JSON requires the full sustained-methodology bench cycle and is deferred to Phase 7.

# ─── Canonical patches matrix ──────────────────────────────────────────
patches:
  # ── Gemma 4 family guards (default-on safety) ──
  GENESIS_ENABLE_G4_01_GEMMA4_FP8_BLOCK_GUARD: '1'
  GENESIS_ENABLE_G4_03_GEMMA4_NON_CAUSAL_DRAFTER_GUARD: '1'
  GENESIS_ENABLE_G4_12_GEMMA4_FP8_E4NV_GUARD: '1'

  # ── G4_02 disabled because G4_08 supersedes it (Triton K-pad unblocks K=352) ──
  GENESIS_ENABLE_G4_02_GEMMA4_MARLIN_KDIM_GUARD: '0'  # disabled — G4_08 handles K=352 instead

  # ── G4_13 disabled because G4_18 supersedes it (per-layer KV instead of refusal) ──
  GENESIS_ENABLE_G4_13_GEMMA4_PER_TOKEN_HEAD_KV_GUARD: '0'   # disabled — G4_18 handles asymmetric KV

  # ── Gemma 4 family fixes (default-on) ──
  GENESIS_ENABLE_G4_04_GEMMA4_AWQ_MOE_KEYS_REMAP: '1'      # vendors vllm#40886 (AWQ MoE keys for 26B-A4B)
  # G4_05 retired 2026-05-24 (PIN.R-G4_05-RETIRE.1) — superseded by vllm#39930 in dev16+; env removed.
  GENESIS_ENABLE_G4_09_GEMMA4_SWA_PREFILL_CHUNKER: '1'
  GENESIS_ENABLE_G4_11_GEMMA4_CHAT_TEMPLATE_INSTALL: '1'
  GENESIS_ENABLE_G4_14_GEMMA4_TOOL_CALL_PARSER_PAD: '1'
  GENESIS_ENABLE_G4_16_GEMMA4_FULL_AND_PIECEWISE: '1'
  GENESIS_ENABLE_G4_23_GEMMA4_VISION_FP16_OVERFLOW: '1'
  GENESIS_ENABLE_G4_25_GEMMA4_RoPE_DUAL_BASE_GUARD: '1'

  # ── Deep fixes (this model needs them!) ──
  GENESIS_ENABLE_G4_08_MARLIN_KDIM_PAD: '1'                # Triton K-pad MoE GEMM — unblocks K=352 (704/2 at TP=2)
  GENESIS_ENABLE_G4_18_GEMMA4_PER_LAYER_KV_PAGE_SIZE: '1'  # per-layer KV-head counts (sliding=8, full=2)

  # ── Perf kernels (opt-in; bench-gate) ──
  GENESIS_ENABLE_G4_15_GEMMA4_FUSED_RMSNORM: '0'           # +5-10% TPS (route Q/K/V + residual norms through Triton)
  GENESIS_ENABLE_G4_24_GEMMA4_FUSED_SOFTCAP: '0'           # +3-5% TPS (fuse div+tanh+mul for softcap)
  GENESIS_ENABLE_G4_06_GEMMA4_KV_PROJ_V0: '0'              # vendor #41944

  # ── Vision tower (operator choice) ──
  GENESIS_ENABLE_G4_17_GEMMA4_VISION_SKIP: '0'

  # ── PR #40914 backport — TQ K+1 spec-verify cudagraph fix (added 2026-05-17) ──
  # Safe no-op for this model (no TurboQuant backend instantiated unless
  # operator enables G4_19 stack), but primes the path for future TQ adoption.
  GENESIS_ENABLE_G4_67_TQ_SPEC_VERIFY_ROUTE: '1'

  # ── Qwen-applicable patches (MTP/general-purpose, added 2026-05-17) ──
  GENESIS_ENABLE_PN33_SPEC_DECODE_WARMUP_K: '1'              # MTP K-aware warmup
  GENESIS_ENABLE_P108_MTP_DRAFT_STREAM_SYNC: '1'             # MTP draft stream sync
  GENESIS_ENABLE_P109_SAMPLING_PARAMS_VOCAB_RANGE_VALIDATORS: '1'
  GENESIS_ENABLE_PN110_BLOCK_POOL_FREE_DEDUP: '1'

  # ── Cross-family ──
  GENESIS_ENABLE_PN126_V1_DECODE_WARMUP: '1'
  GENESIS_ENABLE_PN132_TOPK_TOPP_CONTIGUOUS: '1'

# ─── Composition hints ─────────────────────────────────────────────────
compose_hints:
  family: gemma4
  attention_arch: gemma4_moe
  drafter_method: mtp
  drafter_id: gemma4-26b-a4b-assistant
