# SPDX-License-Identifier: Apache-2.0
# Genesis V2 model definition — Qwen 3.6 35B-A3B FP8 (Sander PROD reference).
# Source-of-truth identity + capabilities + canonical patches.
# POC migration from legacy combined `a5000-2x-35b-prod.yaml`.
# Wave 9 reference bench: wall_TPS 232.36 / decode_TPOT 3.97 ms on 2× A5000 24 GB.
#
# Per-line comment style (W-B exemplar from legacy 35B PROD):
#   • explain WHAT the patch does in 1 line
#   • state default + valid values for non-binary settings
#   • cite empirical evidence (TPS delta / OOM avoided / tool quality) when known
#   • for exhaustive details run `sndr patches explain <patch-id>` (e.g. P67)

schema_version: 2
kind: model
id: qwen3.6-35b-a3b-fp8                          # canonical ID; <model-family>-<size>-<quant> kebab style
title: Qwen 3.6 35B-A3B FP8 (Sander PROD reference)
maintainer: sandermage
last_validated: '2026-05-09'                     # ISO-8601 date of last bench-and-update
license: apache-2.0                              # values: apache-2.0 | mit | ...; apache-2.0 matches upstream Qwen license

# ─── Identity ──────────────────────────────────────────────────────────
model_path: /models/Qwen3.6-35B-A3B-FP8          # container-side path; matches Y3 artifact spec
served_model_name: qwen3.6-35b-a3b               # OpenAI-API `model` field clients send
quantization: null                               # null = FP8 native (no extra --quantization arg). Range: null|auto_round|gptq_marlin|fp8|...
dtype: float16                                   # values: float16|bfloat16|float32; float16 standard for MTP+TQ k8v4
trust_remote_code: true                          # required for Qwen3-A3B custom modeling code (vendor pattern)

# 2026-05-14 chat-template override — Qwen3.6-35B-A3B-FP8 ships the
# byte-identical chat_template.jinja as 27B-int4-AutoRound (verified
# via cmp -s). Same multi-turn tool-call bug (club-3090 disc #53),
# same fix. Enhanced template lives next to the checkpoint and is
# exposed via the existing /models mount.
chat_template: /models/Qwen3.6-35B-A3B-FP8/chat_template_enhanced.jinja

# ─── Capabilities — inherent to this model ─────────────────────────────
# Different capabilities mean a different model file; do NOT override these
# from hardware/profile layers (ownership rule, see roadmap §4.2).
capabilities:
  attention_arch: hybrid_gdn_moe                 # Qwen 3.6 architecture: hybrid GDN (gated delta net) + MoE; drives PN59/P98/PN11 enablement
  tool_call_parser: qwen3_coder                  # qwen3_coder tool-call parser (XML+JSON fallback via PN56)
  reasoning_parser: qwen3                        # qwen3 reasoning_content parser (</think> boundaries)
  enable_auto_tool_choice: true                  # auto-set tool_choice=required when prompt mentions tools (P68 dependency)
  spec_decode:
    method: mtp                                  # spec-decode method (range: mtp|dflash|ngram|null); MTP K=3 is the throughput winner on hybrid GDN
    num_speculative_tokens: 3                    # MTP K-value (1-7 valid; 3 = empirical optimum, +32% TPS vs no-spec on 35B)
    model: null                                  # MTP draft is integrated into target; DFlash variant uses separate /models/Qwen3.6-35B-A3B-DFlash
    # 2026-05-15 ROLLBACK: probabilistic draft sampling tested on dev371 +
    # MTP K=3 + hybrid_gdn_moe + TQ k8v4 — DELIVERED REGRESSION not gain.
    # Empirical bench (n=25, same hardware, same prompts, same Triton cache):
    #   - greedy draft (current):       TPS 209.90, accept 0.793
    #   - probabilistic draft:          TPS 197.54, accept 0.716
    #   - Delta:                        −5.9% TPS, −10% accept_rate
    # The PN90-era "+1.4-2.8% accept_rate" measurement was on dev93/dev209
    # pre-merge state — upstream native vllm#40269 implementation behaves
    # differently for our exact (MTP integrated draft + K=3) combo: the
    # full-logits path costs more memory + has different rejection bias
    # than the PN90 backport did. Leaving fields commented out so anyone
    # who tries them sees the bench history before flipping again.
    # rejection_sample_method: standard           # → regression on our shape
    # draft_sample_method: probabilistic          # → regression on our shape
  kv_cache_dtype: turboquant_k8v4                # values: fp16|fp8_e5m2|fp8_e4m3|turboquant_k8v4; TQ k8v4 = +~2× KV concurrency at quality parity (Wave 9 win)

# ─── Hardware preconditions composer enforces ──────────────────────────
requires:
  min_total_vram_mib: 44000                      # 2 × 22 GB minimum (weights ~14 GB + KV pool ~6 GB + activations + reserve)
  min_gpu_count: 2                               # 35B+TQ k8v4 needs TP=2; single-card variant not validated for this model
  min_cuda_capability: [8, 6]                    # CUDA SM 8.6 (Ampere); 8.9 (Ada) + 9.0 (Hopper) are forward-compat
  rig_arch_blocklist: []                         # empty — no rig class refuses this model

versions:
  genesis_pin_min: v11.0.0                       # minimum sndr_core version (semver)
  vllm_pin_required: 0.20.2rc1.dev338+gbf0d2dc6d # current PROD baseline (Wave 9 dev338 — smoke 35B tool-call PASS 2026-05-14)
  reference_metrics_ref: tests/integration/baselines/35b_v11_wave9.json  # bench reference for bench-validate (E22: realigned to actual filename)

# ─── Canonical patches matrix (44 entries) ─────────────────────────────
# Format: 'GENESIS_ENABLE_<PATCH_ID>': '1' enables; '0' or absent disables.
patches:
  # ── Spec-decode + structured-output safety net (Qwen3-A3B + MTP K=3) ──
  GENESIS_ENABLE_P58_ASYNC_PLACEHOLDER_FIX: '1'      # vllm#40807 backport — async-scheduler [-1] placeholder fix; root-cause for #40831 spec-decode degenerate loops
  GENESIS_ENABLE_P60_GDN_NGRAM_FIX: '1'              # vllm#40738 backport (Phase 1) — GDN+ngram SSM state recovery on rollback
  GENESIS_ENABLE_P60B_TRITON_KERNEL: '1'             # Phase 2 — Triton kernel offset fix for GDN+ngram
  GENESIS_ENABLE_P61B_STREAMING_OVERLAP: '1'         # vllm#40783 backport — Qwen3 streaming partial-tag overlap guard
  GENESIS_ENABLE_P61C_QWEN3CODER_DEFERRED_COMMIT: '1'   # 2026-05-06: closes club-3090#72 (30-120s SSE silence on narrative `<tool_call>`). Live verify: gap 0.24s vs 57.9s upstream, 30/30 tool regression, TPS −0.3% (noise).
  GENESIS_ENABLE_P62_STRUCT_OUT_SPEC_TIMING: '1'     # vllm#36138 backport — structured-output spec-decode reasoning-end timing fix
  GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: '1'   # vllm#39598 backport — qwen3coder MTP streaming early-return removal (4 sub-patches across parser + serving)
  GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: '1'      # cudagraph capture size filter — protects against OOM when too many capture sizes
  # ── TQ kernel + MoE optimisation ──
  GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL: '1'      # Genesis-original Triton multi-query kernel for spec-decode K+1 verify (+32% TPS on 35B PROD)
  GENESIS_P67_USE_UPSTREAM: '1'                      # P67 routing flag: '1'=upstream Genesis kernel, '0'=Genesis fork (DEFAULT 1; fork was quality mirage 2026-04-28)
  GENESIS_P67_NUM_KV_SPLITS: '48'                    # P67 split-K factor. Sprint 1 sweep on 35B PROD: 48 optimal at 320K context (+3.85% wall_TPS, -6.4% TTFT vs 32). 32 was optimum at 256K — longer context shifts optimum to 48.                    # P67 split-K factor. Sprint 1 sweep on 35B PROD: 48 optimal at 320K context (+3.85% wall_TPS, -6.4% TTFT vs 32). 32 was optimum at 256K — longer context shifts optimum to 48.
  GENESIS_ENABLE_P81_FP8_BLOCK_SCALED_M_LE_8: '1'    # Genesis-original — FP8 block-scaled MM optimization for M≤8 (spec-decode K+1 batch shape)
  GENESIS_ENABLE_P95: '1'                            # vllm#40385 backport — Marlin TP cudagraph cap on Ampere (TP=2 + Marlin defensive)
  # ── Tool-call safety net ──
  GENESIS_ENABLE_P68_AUTO_FORCE_TOOL: '1'            # Genesis-original — auto-set tool_choice=required when prompt mentions tools (long-ctx adherence mitigation)
  GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: '1'     # Genesis-original — inject system-message reminder of tool format at long-ctx threshold
  GENESIS_ENABLE_P70_AUTO_STRICT_NGRAM: '1'          # Genesis-original — auto-set prompt_lookup_min=8 (closes club-3090#34 ngram quality cliff)
  GENESIS_ENABLE_PN56_QWEN3CODER_XML_FALLBACK: '1'   # vllm#41466 backport — XML parse fallback when JSON tool-call parse fails (qwen3_coder)
  GENESIS_P68_P69_LONG_CTX_THRESHOLD_CHARS: '50000'  # P68/P69 threshold in CHARACTERS (≈12K tokens at 4 chars/tok); below = no reminder, above = inject
  # ── Memory / KV cache management ──
  GENESIS_ENABLE_P71_BLOCK_VERIFY: '1'               # vllm#40819 + gemini bug-fixes — block-verify rejection sampler. Bench: +2.3% wall_TPS (226.30→231.41) +1.3% accept_rate. Activates when max_spec_len≥3 + draft_probs available.
  GENESIS_ENABLE_P72_PROFILE_RUN_CAP: '1'            # Genesis-original — caps profile_run M dim at GENESIS_PROFILE_RUN_CAP_M (Dynamo fake-tensor mismatch on moe_align_block_size symbolic shape)
  GENESIS_PROFILE_RUN_CAP_M: '4096'                  # P72 cap value (must equal max_num_batched_tokens)
  GENESIS_ENABLE_P74_CHUNK_CLAMP: '1'                # chunked-prefill chunk-size clamp (avoids degenerate single-token chunks under spec-decode)
  GENESIS_ENABLE_PN52_PROMPT_LOGPROBS_EVICTION: '1'  # vllm#41411 backport — prompt_logprobs eviction fix during chunked prefill (only fires when logprobs requested)
  GENESIS_ENABLE_PN17_FA2_LSE_CLAMP: '1'             # Cliff 1 mech A guard (Issue #11) — runtime clamp on FA2 softmax_lse for long context (280K relevant after 2026-05-15 trim)
  GENESIS_ENABLE_PN19_SCOPED_MAX_SPLIT: '1'          # vllm#41268 backport — max_split_size_mb=20 scope-restored during model load (reduces fragmentation)
  GENESIS_TQ_MAX_MODEL_LEN: '280000'                 # 2026-05-15: trimmed 320000→280000. Reasoning: 35B-A3B+TQ k8v4+MTP K=3 at gpu_memory_utilization=0.9 left ~1.0-1.5 GiB headroom per card. FULL_AND_PIECEWISE cudagraph capture (v1 default for hybrid_gdn_moe) needs +200-400 MiB margin. 280K still serves above the model's 256K published context (VLLM_ALLOW_LONG_MAX_MODEL_LEN=1) while restoring ~3-4 GiB free per card for cudagraph + activation safety. Must equal --max-model-len in launch script.
  GENESIS_PREALLOC_TOKEN_BUDGET: '4096'              # Genesis prealloc framework — token budget for shared scratch pools
  # ── Hybrid-GDN attention specifics ──
  GENESIS_ENABLE_PN11_GDN_AB_CONTIGUOUS: '1'         # GDN A/B projection contiguity guard (avoids non-contiguous tensor on hybrid GDN path)
  GENESIS_ENABLE_P37: '1'                            # MoE intermediate cache pool (avoids per-call torch.empty for top-k aggregation)
  # ── MoE / FP8 ──
  GENESIS_ENABLE_P99: '1'                            # FP8 block-scaled MM batch-invariance fix
  GENESIS_ENABLE_P101: '1'                           # vllm#41127 backport (P100-companion) — uniform query_len>1 batches through prefill wrapper in cudagraph mode
  GENESIS_ENABLE_PN66: '1'                           # vllm#41696 backport — multiturn </think> leak fix in DelegatingParser (streaming reasoning purity)
  GENESIS_ENABLE_PN67: '1'                           # vllm#41674 backport — thinking_token_budget inverted bool fix (1-line guard)
  GENESIS_ENABLE_PN77_FP8_LM_HEAD: '1'               # Phase E.6 Marlin tier — FP8 LM head; on 35B (vocab=248320, hidden=2048) ≈243 MiB/rank saving
  GENESIS_ENABLE_PN8_MTP_DRAFT_ONLINE_QUANT: '1'     # MTP draft model online quantization (saves ~1 GiB/rank on FP8 draft)
  # ── Probabilistic draft + truncation detection ──
  GENESIS_ENABLE_PN90_PROBABILISTIC_DRAFT: '1'       # vllm#40269 backport — propagate draft_probs to verifier; min(1, target/draft) accept rule. Bench: TPS 231.91 (≈baseline 231.41), accept_rate 0.816 vs 0.794 (+2.8%), tool 7/7. Quality lift without TPS penalty.
  GENESIS_ENABLE_P107_MTP_TRUNCATION_DETECTOR: '1'   # vllm#41467 — detect+log MTP truncation at think→tool_call boundary; defensive, +tool_call quality on edge cases
  # ── Lazy reasoner (PN16 v2) ──
  GENESIS_ENABLE_PN16_LAZY_REASONER: '1'             # PN16 v2 — cache-safe; default behavior leaves chat_template_kwargs untouched. Hook overhead micro-secs per request.
  GENESIS_PN16_TOOL_THINK_BUDGET: '200'              # V8 — prepends short system message capping <think> at 200 tokens for tool-attached requests. Bench: TPS 237.95 (+0.7% vs baseline 236.24) + tool 7/7 (london_think FIXED). Cache-stable.
  GENESIS_PN16_CLASSIFIER_MAX_TOKENS: '0'            # V7 OFF — V7 cap on bench-trivial prompts caused -3.7% wall_TPS measurement artifact. Operators with no-cache workloads may opt in for hard response-length ceiling.
  # ── Sweep tunable ──
  GENESIS_ENABLE_P82: '1'                            # SGLang acceptance OR-clause backport (vllm#40807-related); allows softer accept threshold
  GENESIS_P82_THRESHOLD_SINGLE: '0.3'                # P82 threshold for single-query (range 0.1-0.5; 0.3 empirically optimum on 35B with MTP K=3)
  # ── Observability + buffer mode ──
  GENESIS_OBSERVABILITY: '1'                         # Per-patch apply timing + RSS delta logged via genesis.observability. Operator UX; zero hot-path overhead (fires only at apply time).
  GENESIS_BUFFER_MODE: 'shared'                      # Genesis buffer manager mode (range: 'shared'|'exclusive'|'auto'; 'shared' = one buffer shared across ranks for read-only data)
  # ── Wave 9 (2026-05-14) — verified on the dcacdf9a TP=2 ladder.
  GENESIS_ENABLE_P87: '1'                            # Spec-decode rejection ratio sanity guard.
  GENESIS_ENABLE_P91: '1'                            # Long-prompt tool-call reminder helper (renamed PN72).
  GENESIS_ENABLE_PN71_THINKING_TAG_NORMALIZE: '1'    # Malformed `<think>` tokenizer-drift normaliser.
  GENESIS_ENABLE_PN73_TOOL_ARGS_SAFE_NORMALIZE: '1'  # Tool argument JSON normaliser.
  GENESIS_ENABLE_PN91_DEVELOPER_ROLE: '1'            # OpenAI `developer` role passthrough for IDE agents.
  GENESIS_ENABLE_PN92_NIXL_EP_TRIAL_IMPORT: '1'      # vllm#40154 backport — trial-import guard for nixl_ep / deep_ep / mori.
  GENESIS_ENABLE_PN95_TIER_AWARE_CACHE: '1'          # Tier-aware KV cache: GPU hot + CPU pinned warm + (optional) disk cold tier. Anchored at 11 sites in vllm/v1 (admit, touch, mamba-init, register-kv-caches, scheduler-tick, blockpool-register, demote-on-evict, promote-on-miss, phase5 boot-check, BlockPool.__init__, get_new_blocks). Active only when CONFIG_KEY set below — without it lazy-init returns and TierManager stays None (noop).
  GENESIS_PN95_CONFIG_KEY: a5000-2x-tier-aware-example  # Looks up tier spec from model_configs/builtin/a5000-2x-tier-aware-EXAMPLE.yaml. Defines GPU tier (22 GiB per card) + CPU pinned tier (8 GiB per worker). Mamba SSM groups hard-excluded (state cannot be moved). 35B-A3B: 30 of 41 layers Mamba (excluded), 11 attention + 1 MTP eligible for demote.
  GENESIS_PN95_TICK_EVERY: '100'                     # Tick frequency: scheduler-tick runs page-move evaluation every N decode steps (range 50-500). 100 = conservative, suitable for 8K-32K workloads. Lower N → faster demote response under sudden pressure but more overhead.
  GENESIS_PN95_DEMOTE_FREE_MIB_THRESHOLD: '2048'     # Trigger threshold: when free VRAM drops below 2 GiB on either card, start demoting pages to CPU pinned tier. On 8K+8seq workloads VRAM rarely drops below 4 GiB → demote never fires → PN95 is a noop tax (~1% TPS). On 32K+ ctx or 12+seq mixed-batch this becomes the dominant memory mgmt mechanism.
  GENESIS_ENABLE_PN96_EMERGENCY_DEMOTE: '1'          # Emergency demote companion to PN95.
  GENESIS_ENABLE_PN104_OFFLOAD_PREFETCH_REDIRECT: '0' # cpu_offload → Prefetch redirect — OFF on 35B PROD (no weight offload).
  GENESIS_ENABLE_PN105_AUTOROUND_OFFLOAD_COMPAT: '0' # AutoRound INT4 compat — OFF on FP8 35B; declared for cross-config consistency.
  GENESIS_ENABLE_PN106_GDN_H_POOL: '1'               # GDN inner chunk-state `h` pool.
  GENESIS_ENABLE_PN108_FUSED_RECURRENT_PREFILL: '0' # TOMBSTONED — fla recurrent kernel cannot serve single-seq prefill.
  GENESIS_ENABLE_PN200_GDN_SCRATCH_REUSE: '0'        # OFF — anchor ordering dependency on P28.
  GENESIS_ENABLE_PN201_SCHEDULER_EMPTY_CACHE: '1'    # Scheduler-tick `empty_cache()` hook, threshold-gated.
  GENESIS_ENABLE_PN204_DUAL_STREAM_INPROJ: '0'       # vllm#42301 port — OFF in single-conc latency profile.
                                                       # v1 history: eager event allocation crashed.
                                                       # v1 lazy-init follow-up: dev371 profile_run crashed via
                                                       #   torch/_inductor/runtime/static_triton_launcher.py:291 CUDA invalid argument.
                                                       # v2 redesign 2026-05-15 (Sander): torch.compiler.is_compiling() guard +
                                                       #   _PN204_ARMED arming hook (Worker.determine_available_memory wrap) +
                                                       #   explicit device=hidden_states.device on Stream + per-layer single-strike
                                                       #   fallback. Bench dev371 35B conc=8: neutral within CV (agg 675 vs 689,
                                                       #   TTFT 240 vs 237 ms). Hardware-future-proof — Hopper SM 9.0+ gives
                                                       #   +5-10% TPOT per upstream PR. Enabled in multi-conc preset (see
                                                       #   model/qwen3.6-35b-a3b-fp8-multiconc.yaml).
                                                       # Requires GENESIS_LEGACY_P7=0 when enabled (registry conflicts_with).
  GENESIS_ENABLE_SNDR_WORKSPACE_001: '1'             # Workspace grow-after-lock graceful fix.

  # ── Wave 10 (2026-05-15) — multi-concurrency + correctness recoveries ──
  # All flags below verified via tools/multi_conc_bench.py on dev371+bf610c2f5.
  # Impact at conc=1: neutral within CV. Impact at conc=8: aggregate 689 TPS (3.21x).
  GENESIS_ENABLE_PN96B: '1'                          # Marlin persistent workspace (renamed 2026-05-15 from PN96 dict-key collision with kv_cache/PN96). +4-5% TPS recovery — was silently unloaded pre-rename.
  GENESIS_ENABLE_PN51_QWEN3_STREAMING_THINKING_DISABLED: '1'  # vllm#40816 (OPEN). Reactivated after retired-audit 2026-05-15 confirmed upstream streaming entry-point still lacks thinking-disabled short-circuit. Defensive guard for OpenAI clients reading delta.content (Open WebUI, LibreChat, Cline, OpenCode). Zero risk: guard False for thinking-enabled (dominant case).
  GENESIS_ENABLE_PN125_HYBRID_FULL_AND_PIECEWISE: '1' # PyTorch blog 2026-05 — forces cudagraph_mode=FULL_AND_PIECEWISE on Qwen3.5/3.6 hybrid_gdn_moe. dev371 v1 already does this by default, but kept ON for upstream-bypass insurance + older pins.
  GENESIS_ENABLE_PN126_V1_DECODE_WARMUP: '1'         # V1 decode kernel warmup orchestrator — pre-JITs decode + spec-decode kernels at boot. Lower TTFT spike on first user request after restart.
  GENESIS_ENABLE_PN127_AUTO_CHAT_TEMPLATE: '1'       # Qwen3.5/3.6 enhanced chat-template auto-install at /tmp/genesis/chat_templates/qwen3.6_enhanced.jinja.
  GENESIS_ENABLE_PN128_SPEC_DECODE_WARMUP: '1'       # vllm#41481 backport — pre-JITs 4 eagle helper kernels (closes 4 of 8 JIT spikes in jit_monitor on first request).
  GENESIS_ENABLE_PN129_SLOT_MAPPING_WARMUP: '1'      # vllm#42165 backport — pre-JITs _compute_slot_mapping_kernel + do_not_specialize='num_tokens' patch.
  GENESIS_ENABLE_PN130_TQ_DECODE_WARMUP: '1'         # vllm#42215 backport — pre-JITs _tq_grouped_decode_stage1 + workspace prealloc before lock.
  GENESIS_ENABLE_PN132_TOPK_TOPP_CONTIGUOUS: '1'     # vllm#42739 backport — Triton top-k/top-p contiguous fix. No-op when VLLM_USE_FLASHINFER_SAMPLER=1 (correctness defense for fallback path).
  GENESIS_ENABLE_PN133_MTP_EMPTY_OUTPUT_FIX: '1'     # vllm#42722 backport — MTP scheduler empty-output guard. Prevents num_accepted=-1 Prometheus ValueError on rare K=3 reject-all path.
  # GENESIS_ENABLE_PN134_TORCH_COMPILE_FULLGRAPH_211: KEEP OFF — retired 2026-05-15 (-25% TPS bench regressor; StorageBox monkey-patch blows Inductor compile cache on hybrid_gdn_moe). See pn134_torch_compile_fullgraph_211.py docstring + iron-rule waiver.

