# SPDX-License-Identifier: Apache-2.0
# Genesis V2 model definition — Qwen 3.6 27B INT4 (Lorbus AutoRound) + TurboQuant k8v4 KV.
# Hybrid GDN architecture; MTP K=3 spec decode; turboquant_k8v4 KV cache.
# Source: legacy `a5000-2x-27b-int4-tq-k8v4.yaml` (Wave 9 dev209 validated).
# Wave 9 reference bench: long_gen_sustained_tps 109.8 on 2× A5000, tool 10/10.
#
# Per-line comment style — same W-B exemplar discipline as 35B PROD:
#   • WHAT the patch does in one line
#   • default + valid values for non-binary settings
#   • empirical evidence when known

schema_version: 2
kind: model
id: qwen3.6-27b-int4-autoround-tq-k8v4           # canonical ID; <model-family>-<size>-<quant>-<kv-format>
title: Qwen 3.6 27B INT4 Lorbus AutoRound + TurboQuant k8v4 KV
maintainer: sandermage
last_validated: '2026-05-21'                     # P2.4d-Q27 dev371 smoke + canonical-flow validation
license: apache-2.0

# ─── Identity ──────────────────────────────────────────────────────────
model_path: /models/Qwen3.6-27B-int4-AutoRound   # container-side path; Lorbus INT4 AutoRound checkpoint
served_model_name: qwen3.6-27b                   # OpenAI-API model name
quantization: null                               # null = auto-detected by vLLM from AutoRound metadata (range: null|auto_round|gptq_marlin|fp8)
dtype: float16                                   # values: float16|bfloat16|float32; float16 standard for MTP+TQ k8v4 hybrid path
trust_remote_code: true                          # required for Qwen3 hybrid-GDN custom modeling code

# 2026-05-14 chat-template override. Stock chat_template.jinja shipped
# with Qwen3.6-27B has a multi-turn agentic bug — the assistant branch
# can leave `<think>` open before `<tool_call>` blocks, so historical
# reasoning leaks into `tool_response` and downstream tool-call rate
# collapses (club-3090 disc #53 — allanchan339 root-cause writeup).
# `qwen3.6-enhanced.jinja` adds self-healing logic that injects
# `</think>` immediately before the first `<tool_call>` when the
# model output did not close the reasoning block itself. The file
# lives next to the checkpoint on host (under ${models_dir}) so the
# existing `${models_dir}:/models:ro` mount exposes it inside the
# container — no new mount slot required.
chat_template: /models/Qwen3.6-27B-int4-AutoRound/chat_template_enhanced.jinja

# ─── Capabilities — inherent to this model ─────────────────────────────
capabilities:
  attention_arch: hybrid_gdn_moe                 # Qwen 3.6 hybrid (gated delta net + MoE); drives PN59/P98/PN11 + PN82
  tool_call_parser: qwen3_coder                  # qwen3_coder XML+JSON tool-call parser (PN56 XML fallback)
  reasoning_parser: qwen3                        # qwen3 </think> reasoning_content parser
  enable_auto_tool_choice: true                  # P68/P69 dependency — auto tool_choice on tool-mention prompts
  spec_decode:
    method: mtp                                  # MTP K=3 throughput winner on hybrid GDN (range: mtp|dflash|ngram|null)
    num_speculative_tokens: 3                    # MTP K-value (1-7 valid; 3 optimal on 27B Lorbus)
    model: null                                  # integrated MTP draft (DFlash uses separate /models/Qwen3.6-27B-DFlash drafter)
  kv_cache_dtype: turboquant_k8v4                # TQ k8v4: ~2× KV concurrency vs fp16, +91% TPS vs fp8_e5m2 (Wave 9 win)

# ─── Hardware preconditions composer enforces ──────────────────────────
requires:
  # Absolute minimum to run this model. The 2× rig is the bench-validated
  # reference (see profile wave9-27b-tq-k8v4); single-card 78K context is
  # also bench-validated (see profile qa-27b-tq-1x-tested).
  min_total_vram_mib: 22000                      # 1 × 22 GB minimum (78K ctx single-card variant)
  min_gpu_count: 1                               # supports 1× (single-card 78K) and 2× (131K production)
  min_cuda_capability: [8, 6]                    # Ampere SM 8.6; 8.9 / 9.0 forward-compat
  rig_arch_blocklist: []                         # no rig class refuses this model

versions:
  genesis_pin_min: v11.0.0                       # minimum sndr_core version
  vllm_pin_required: 0.20.2rc1.dev371+gbf610c2f5 # promoted 2026-05-21 (P2.4d-Q27) — dev371 smoke PASS + quick bench (decode_TPOT 10.03 ms / TTFT 111 ms / wall_TPS 81.6 mean). Requires P103 wrapper kwargs ABI fix (commit 122c2576). Previous pin dev338 retained side-by-side on server as :nightly-previous for rollback per CLAUDE.md pin policy.
  reference_metrics_ref: tests/integration/baselines/27b_v11_wave9.json   # NOTE: still the dev338 Wave 9 baseline. dev371 runtime evidence currently lives under sndr_private/planning/bench_results/2026-05-21/P2_Q27_TQ_DEV371_SMOKE_RECEIPT_2026-05-21_RU.md. A formal dev371 baseline JSON requires a full canonical bench cycle (genesis_bench_suite --quick + sustained methodology), captured separately when the rest of the Qwen family is promoted.

# ─── Canonical patches matrix (52 entries) ─────────────────────────────
patches:
  # ── Spec-decode + structured-output safety net ──
  GENESIS_ENABLE_P58_ASYNC_PLACEHOLDER_FIX: '1'      # vllm#40807 — async-scheduler [-1] placeholder fix; root-cause for #40831 spec-decode degenerate loops
  GENESIS_ENABLE_P60_GDN_NGRAM_FIX: '1'              # vllm#40738 (Phase 1) — GDN+ngram SSM state recovery on rollback
  GENESIS_ENABLE_P60B_TRITON_KERNEL: '1'             # Phase 2 — Triton kernel offset fix for GDN+ngram
  GENESIS_ENABLE_P61B_STREAMING_OVERLAP: '1'         # vllm#40783 — Qwen3 streaming partial-tag overlap guard
  GENESIS_ENABLE_P61C_QWEN3CODER_DEFERRED_COMMIT: '1' # PR38 Day 3 (2026-05-08): close club-3090#72 SSE silence on narrative <tool_call>
  GENESIS_ENABLE_P62_STRUCT_OUT_SPEC_TIMING: '1'     # vllm#36138 — structured-output spec-decode reasoning-end timing fix
  GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: '1'   # vllm#39598 — qwen3coder MTP streaming early-return removal
  GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: '1'      # cudagraph capture size filter — OOM protection on many sizes
  # ── TQ k8v4 KV + MoE ──
  GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL: '1'      # Genesis-original Triton multi-query kernel; required for spec_decode + TQ k8v4
  GENESIS_P67_USE_UPSTREAM: '1'                      # P67 routing: '1'=upstream Genesis kernel, '0'=fork (DEFAULT 1)
  GENESIS_P67_NUM_KV_SPLITS: '32'                    # P67 split-K factor. Wave 8 sweep: P67=16 (132.28 TPS / TTFT 100.9) vs P67=32 (131.48 / TTFT 97.1, CV 4.76% more stable). 32 wins TTFT by 3.7% on 27B@131K. 35B@320K wants 48 — per-model.
  GENESIS_ENABLE_P94: '1'
  GENESIS_ENABLE_P95: '1'                            # vllm#40385 — Marlin TP cudagraph cap on Ampere (TP=2 defensive)
  GENESIS_ENABLE_P98: '1'                            # CRITICAL: vllm#40941 WorkspaceManager race-condition lock fix (TQ + hybrid GDN combo)
  GENESIS_ENABLE_PN14_TQ_DECODE_OOB_CLAMP: '1'       # GroupAB: out-of-bounds clamp in TQ decode; +9.2% group with PN12+P94
  # ── Hybrid GDN ──
  GENESIS_ENABLE_PN11_GDN_AB_CONTIGUOUS: '1'         # GDN A/B projection contiguity guard
  GENESIS_ENABLE_PN59_STREAMING_GDN: '1'             # required for ctx ≥ 64K hybrid (Cliff 2b OOM guard)
  GENESIS_ENABLE_PN82_MAMBA_CUDAGRAPH_PREFILL_ZERO: '1' # vllm#41873 — zeros padded `is_prefilling` rows (CG correctness on hybrid)
  # ── Tool-call safety net ──
  GENESIS_ENABLE_P68_AUTO_FORCE_TOOL: '1'            # auto-set tool_choice=required when prompt mentions tools
  GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: '1'     # inject system-message reminder of tool format at long-ctx
  GENESIS_ENABLE_P70_AUTO_STRICT_NGRAM: '1'          # auto-set prompt_lookup_min=8; closes club-3090#34 ngram quality cliff
  GENESIS_ENABLE_PN56_QWEN3CODER_XML_FALLBACK: '1'   # vllm#41466 — XML parse fallback when JSON tool-call parse fails
  GENESIS_P68_P69_LONG_CTX_THRESHOLD_CHARS: '50000'  # P68/P69 char threshold (≈12K tokens); above = inject reminder
  # ── Memory / KV management ──
  GENESIS_ENABLE_P72_PROFILE_RUN_CAP: '1'            # caps profile_run M dim (Dynamo fake-tensor mismatch on moe_align_block_size)
  GENESIS_PROFILE_RUN_CAP_M: '4096'                  # P72 cap value (must equal max_num_batched_tokens)
  GENESIS_ENABLE_P74_CHUNK_CLAMP: '1'                # chunked-prefill chunk-size clamp (degenerate single-token chunks under spec-decode)
  GENESIS_ENABLE_P78_TOLIST_CAPTURE_GUARD: '0'       # opt-out; '0' = default-off on MTP path (DFlash variant turns it '1')
  GENESIS_ENABLE_PN52_PROMPT_LOGPROBS_EVICTION: '1'  # vllm#41411 — prompt_logprobs eviction fix during chunked prefill
  GENESIS_ENABLE_PN17_FA2_LSE_CLAMP: '1'             # Cliff 1 mech A guard — runtime clamp on FA2 softmax_lse for long context
  GENESIS_ENABLE_PN19_SCOPED_MAX_SPLIT: '1'          # vllm#41268 — max_split_size_mb=20 scope-restored during model load
  GENESIS_ENABLE_PN12_FFN_INTERMEDIATE_POOL: '1'     # GroupAB (2026-04-30): -1.7 GiB peak + part of +9.2% TPS group on 27B INT4+TQ
  GENESIS_TQ_MAX_MODEL_LEN: '262144'                 # 2026-05-16 V1↔V2 sync: raised 131072→262144 to match V1 + profile sizing. Per V1 comment: 'Raised 2026-05-14: TP=2 256K ladder PASS (50K/100K/156K/180K/200K/230K/256K green on dcacdf9a pin). Keep TQ_MAX in sync with max_model_len so the workspace allocator sizes correctly for the worst-case context.'
  GENESIS_PREALLOC_TOKEN_BUDGET: '4096'              # Genesis prealloc — token budget for shared scratch pools
  # ── FP8 (selective — k8v4 path) ──
  GENESIS_ENABLE_P81_FP8_BLOCK_SCALED_M_LE_8: '0'    # opt-out for k8v4 (35B FP8 turns it '1'; 27B INT4 routes elsewhere)
  GENESIS_ENABLE_P99: '1'                            # FP8 block-scaled MM batch-invariance fix
  GENESIS_ENABLE_P101: '1'                           # vllm#41127 (P100-companion) — uniform query_len>1 batches through prefill wrapper
  GENESIS_ENABLE_P103: '1'                           # FLA Cliff 2 chunked prefill — applicable to hybrid GDN (Qwen3.5/3.6/Next)
  GENESIS_ENABLE_PN66: '1'                           # vllm#41696 — multiturn </think> leak fix in DelegatingParser
  GENESIS_ENABLE_PN67: '1'                           # vllm#41674 — thinking_token_budget inverted bool fix
  GENESIS_ENABLE_PN77_FP8_LM_HEAD: '1'               # Phase E.6 Marlin tier FP8 LM head; ~606 MiB/rank saving (27B+TQ proven +21% TPS)
  GENESIS_ENABLE_PN8_MTP_DRAFT_ONLINE_QUANT: '1'     # MTP draft online quant; saves ~1 GiB/rank on FP8 draft
  # ── Spec decode quality ──
  GENESIS_ENABLE_PN30_DS_LAYOUT_SPEC_DECODE: '1'     # issue #17 — DS conv state + spec-decode accept_len>1 protection
  GENESIS_ENABLE_PN90_PROBABILISTIC_DRAFT: '1'       # vllm#40269 — propagate draft_probs; min(1, target/draft) accept. Bench 27B INT4+TQ: TPS 124.63 vs 116.01 (+7.4%), accept 0.788 vs 0.697 (+13.1% rel), tool 7/7
  GENESIS_ENABLE_P107_MTP_TRUNCATION_DETECTOR: '1'   # vllm#41467 — defensive at think→tool_call boundary
  # ── Compatibility shims ──
  GENESIS_ENABLE_PN25_SILU_INDUCTOR_SAFE: '1'        # Cliff 1B closure (Inductor opaque-op pool for SiluAndMul); NULL impact on 2×A5000, win for 24GB community
  # ── Lazy reasoner (PN16 v2) ──
  GENESIS_ENABLE_PN16_LAZY_REASONER: '1'             # PN16 v2 — cache-safe; default leaves chat_template_kwargs untouched
  GENESIS_PN16_TOOL_THINK_BUDGET: '200'              # V8 — short system msg cap on <think>. 27B bench: TPS ≈baseline noise, TPOT -7%, tool 8/8 (london_think FIXED)
  GENESIS_PN16_CLASSIFIER_MAX_TOKENS: '0'            # V7 OFF — V7 cap caused -3.7% wall_TPS measurement artifact
  # ── Sweep tunable ──
  GENESIS_ENABLE_P82: '1'                            # SGLang acceptance OR-clause backport; allows softer accept threshold
  GENESIS_P82_THRESHOLD_SINGLE: '0.1'                # P82 single-query threshold — 27B sweep 2026-05-09: monotonic 0.1=130.79 / 0.2=127.12 / 0.3=126.64. 27B wins at 0.1 (35B wins at 0.3 — per-model)
  # ── Observability + buffer mode ──
  GENESIS_OBSERVABILITY: '1'                         # Per-patch apply timing + RSS delta logged; zero hot-path overhead
  GENESIS_BUFFER_MODE: 'shared'                      # Genesis buffer manager mode (range: 'shared'|'exclusive'|'auto')
  # ── Wave 9 (2026-05-14) — verified on the dcacdf9a TP=2 256K ladder.
  #    Defaults match the env-flag matrix that produced
  #    `docs/_internal/runs/tp2_256k_probe_27b.json` (200K/230K/256K PASS).
  GENESIS_ENABLE_P87: '1'                            # Spec-decode rejection ratio sanity guard.
  GENESIS_ENABLE_P91: '1'                            # Renamed PN72 (registry ID collision); long-prompt tool-call reminder helper.
  GENESIS_ENABLE_PN71_THINKING_TAG_NORMALIZE: '1'    # Normalises malformed `<think>`/`</think>` from upstream tokenizer drift.
  GENESIS_ENABLE_PN73_TOOL_ARGS_SAFE_NORMALIZE: '1'  # Tool argument JSON normaliser (Qwen3-Coder edge cases).
  GENESIS_ENABLE_PN91_DEVELOPER_ROLE: '1'            # OpenAI-style `developer` role passthrough for IDE agents (Cline / Claude Code / OpenCode).
  GENESIS_ENABLE_PN92_NIXL_EP_TRIAL_IMPORT: '1'      # Backport of vllm#40154 — trial-import guard for nixl_ep / deep_ep / mori.
  GENESIS_ENABLE_PN95_TIER_AWARE_CACHE: '1'          # Tier-aware KV cache: GPU hot + CPU pinned warm + (optional) disk cold tier. 11 anchor sites in vllm/v1 (admit, touch, mamba-init, register-kv-caches, scheduler-tick, blockpool-register, demote-on-evict, promote-on-miss, phase5 boot-check, BlockPool.__init__, get_new_blocks). Active only when CONFIG_KEY set below — without it lazy-init returns and TierManager stays None (noop).
  GENESIS_PN95_CONFIG_KEY: a5000-2x-tier-aware-example  # Looks up tier spec from model_configs/builtin/a5000-2x-tier-aware-EXAMPLE.yaml. Defines GPU tier (22 GiB per card) + CPU pinned tier (8 GiB per worker). Mamba SSM groups hard-excluded (state cannot be moved). 27B-INT4-AutoRound: ~16 attention layers + ~16 SSM layers (excluded). Mamba state is large (~256 MiB/layer) so cache pressure higher than 35B.
  GENESIS_PN95_TICK_EVERY: '100'                     # Tick frequency: scheduler-tick runs page-move evaluation every N decode steps (range 50-500). 100 = conservative, suitable for 8K-32K workloads. Lower N → faster demote response under sudden pressure but more overhead.
  GENESIS_PN95_DEMOTE_FREE_MIB_THRESHOLD: '2048'     # Trigger threshold: when free VRAM drops below 2 GiB on either card, start demoting pages to CPU pinned tier. 27B-INT4 ~13 GiB weights + Mamba state → smaller VRAM footprint than 35B but Mamba state cannot demote. On 8K + low concurrency: demote rarely fires. On 32K+ ctx or 12+seq: dominant memory mgmt path.
  GENESIS_ENABLE_PN96_EMERGENCY_DEMOTE: '1'          # Companion to PN95 — emergency demote on scheduler free-blocks threshold.
  GENESIS_ENABLE_PN104_OFFLOAD_PREFETCH_REDIRECT: '0' # cpu_offload → Prefetch redirect. OFF — only used when `--cpu-offload-gb > 0`.
  GENESIS_ENABLE_PN105_AUTOROUND_OFFLOAD_COMPAT: '0' # AutoRound INT4 + Prefetch compat. OFF — tied to PN104.
  GENESIS_ENABLE_PN106_GDN_H_POOL: '1'               # GDN inner chunk-state `h` pool — removes 32-48 MiB × 48-layer alloc churn each chunked-prefill step.
  GENESIS_ENABLE_PN108_FUSED_RECURRENT_PREFILL: '0' # TOMBSTONED — fla `fused_recurrent_gated_delta_rule` cannot serve single-seq prefill (design conflict, see patch docstring).
  GENESIS_ENABLE_PN200_GDN_SCRATCH_REUSE: '0'        # GDN `core_attn_out` pool. OFF — anchor depends on P28 modification but dispatcher runs PN200 first.
  GENESIS_ENABLE_PN201_SCHEDULER_EMPTY_CACHE: '1'    # Scheduler-tick `torch.cuda.empty_cache()` hook, threshold-gated.
  GENESIS_ENABLE_PN204_DUAL_STREAM_INPROJ: '0'       # Port of vllm#42301 (open). OFF in single-conc latency profile.
                                                       # v1 history: eager `__init__` allocation of torch.cuda.Event raised type error.
                                                       # v1 lazy-init follow-up: crashed during profile_run on dev371 with
                                                       #   torch/_inductor/runtime/static_triton_launcher.py:291 CUDA invalid argument.
                                                       # v2 fix 2026-05-15 (Sander): torch.compiler.is_compiling() guard +
                                                       #   _PN204_ARMED arming hook (Worker.determine_available_memory wrap) +
                                                       #   explicit device=hidden_states.device on Stream + per-layer single-strike disable.
                                                       # Bench dev371 27B INT4 multi-conc=8: neutral within CV (375 vs 379 agg TPS).
                                                       # Enabled in 27B multi-conc preset via:
                                                       #     V2 profile  → profile/27b-multiconc.yaml (patches_delta.enable)
                                                       #     V2 launch   → presets/prod-27b-tq-multiconc.yaml (alias)
                                                       #     V1 preset   → a5000-2x-27b-int4-multiconc.yaml (legacy flat)
                                                       # Requires GENESIS_LEGACY_P7=0 when enabled (registry conflicts_with).
  GENESIS_ENABLE_SNDR_WORKSPACE_001: '1'             # Workspace grow-after-lock graceful fix — replaces upstream assert with one-shot grow + warn.

  # ── Wave 10 (2026-05-15) — multi-conc unlock + correctness recoveries ──
  # Bench: tools/multi_conc_bench.py on dev371+bf610c2f5.
  # Single-conc neutral within CV; multi-conc max_num_seqs=8 → 379 TPS aggregate (3.89x scaling).
  GENESIS_ENABLE_PN96B: '1'                          # Marlin persistent workspace (renamed 2026-05-15 from PN96 dict-key collision). +4-5% TPS recovery on Marlin MoE — was silently unloaded pre-rename.
  GENESIS_ENABLE_PN51_QWEN3_STREAMING_THINKING_DISABLED: '1'  # vllm#40816 (OPEN). Defensive streaming guard for OpenAI clients reading delta.content. Zero risk for thinking-enabled (dominant case).
  GENESIS_ENABLE_PN125_HYBRID_FULL_AND_PIECEWISE: '1' # PyTorch blog 2026-05 — forces cudagraph_mode=FULL_AND_PIECEWISE on Qwen3.5/3.6 hybrid_gdn_moe.
  GENESIS_ENABLE_PN126_V1_DECODE_WARMUP: '1'         # V1 decode kernel warmup orchestrator — pre-JITs decode + spec-decode kernels at boot.
  GENESIS_ENABLE_PN127_AUTO_CHAT_TEMPLATE: '1'       # Qwen3.5/3.6 enhanced chat-template auto-install.
  GENESIS_ENABLE_PN128_SPEC_DECODE_WARMUP: '1'       # vllm#41481 backport — pre-JITs 4 eagle helper kernels (closes 4 of 8 JIT spikes).
  GENESIS_ENABLE_PN129_SLOT_MAPPING_WARMUP: '1'      # vllm#42165 backport — pre-JITs _compute_slot_mapping_kernel + do_not_specialize='num_tokens'.
  GENESIS_ENABLE_PN130_TQ_DECODE_WARMUP: '1'         # vllm#42215 backport — pre-JITs _tq_grouped_decode_stage1 + workspace prealloc.
  GENESIS_ENABLE_PN132_TOPK_TOPP_CONTIGUOUS: '1'     # vllm#42739 backport — Triton top-k/top-p contiguous fix (no-op when FlashInfer sampler active).
  GENESIS_ENABLE_PN133_MTP_EMPTY_OUTPUT_FIX: '1'     # vllm#42722 backport — MTP scheduler empty-output guard (prevents Prometheus -1 ValueError).
  # GENESIS_ENABLE_PN134_TORCH_COMPILE_FULLGRAPH_211: KEEP OFF — retired 2026-05-15 (-25% TPS bench regressor on hybrid_gdn_moe).

notes:
  - "27B hybrid GDN + TQ k8v4 + MTP K=3. Validated 2026-05-11 on 2× A5000."
  - "Phase 3 migration from a5000-2x-27b-int4-tq-k8v4 (2026-05-12)."
  - "P2.4d-Q27 runtime pin promotion 2026-05-21: dev338 → dev371. First
    cross-pin smoke that validated the canonical renderer flow end-to-end
    (no sed override): hardware YAML pinned dev371 (commit 7d067bb1) →
    renderer reads hw.runtime.docker.image verbatim (commit a3fa5265) →
    rendered IMAGE = dev371. Backed by container boot PASS, /v1/models
    served, two coherent text smokes (Paris + TCP/UDP, both factually
    correct with constraints honored), and a 25-sample quick bench:
    decode_TPOT 10.03 ms median (CV 15%), TTFT 111 ms median (CV 7.6%),
    wall_TPS 81.6 mean. No `chunked_fwd … core_attn_out` ABI errors
    across 4186-log-line dispatch surface. No TQ kernel/storage mismatch.
    309 Genesis patches applied / 0 failed. Receipt:
    sndr_private/planning/bench_results/2026-05-21/P2_Q27_TQ_DEV371_SMOKE_RECEIPT_2026-05-21_RU.md.
    The quick bench is a correctness + workload-flow probe, NOT a full
    canonical baseline replacement — reference_metrics_ref remains
    pointed at the dev338 Wave 9 baseline file until a formal capture
