# │ `example-3090-tier-aware` (closest match — same PN95 tier-aware   │
# │ concept, different hardware tier).                                │
# │                                                                   │
# │ V1 sunset BLOCKED on PN95 runtime coupling: this file is the      │
# │ single-A5000 PN95 tier-spec source; PN95 hook reads `cache_       │
# │ config.tiers` via V1 get() at runtime.                            │
# │                                                                   │
# │ Architectural migration required (same as a5000-2x-tier-aware-    │
# │ EXAMPLE.yaml) — move tier_specs to either V2 profile or PN95-     │
# │ internal config dir.                                              │
# │                                                                   │
