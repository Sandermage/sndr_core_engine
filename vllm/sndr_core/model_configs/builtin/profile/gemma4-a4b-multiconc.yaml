# SPDX-License-Identifier: Apache-2.0
# Genesis V2 profile — gemma4-a4b-multiconc
# Purpose: K=4 MTP + max_num_seqs=8 for SHORT STRUCTURED-JSON multi-conc.
#          NOT a generic free-chat multi-conc throughput profile.
#
# Empirical scope (locked 2026-05-23 after B2 + B3 + B4 bench closure):
#
#   USE WHEN:
#     workload_class    ∈ {structured_json, tool_call}
#     expected_output   short (≤ ~200 tokens)
#     concurrency_mode  any 1..8
#
#   K=4 wins observed:
#     B2 conc=1 short:   K=4 mean elapsed -38% vs K=1
#     B4 conc=8 Mode A:  K=4 235.9 TPS vs K=1 209.1 TPS (+12.8%)
#     B4 conc=8 Mode B:  K=4 271.4 TPS, schema_rate 100% (xgrammar)
#
#   DO NOT USE WHEN:
#     - free-chat multi-conc throughput
#       (B3 closed at 408 TPS aggregate @ conc=8 — MIXED band,
#        -39% below Qwen 35B-A3B 672 TPS reference. For free-chat
#        multi-conc throughput, use prod-35b-multiconc.)
#     - long-form structured JSON (>200 tokens output)
#       (B2 closed long structured K=4 at -53% TPS vs K=1.)
#     - code generation / summarization
#       (β'-A artifact denied; policy K=1 default for these workloads.)
#
# Original hypothesis (proven INCORRECT, kept for historical context):
#   Gemma 4 26B-A4B MoE was hypothesized to replicate the Qwen 35B-A3B
#   multi-conc effect — "bigger" nominal model wins multi-conc aggregate
#   throughput vs dense alternatives because active params load is
#   smaller. Phase 7.B.2.B2 measured Qwen 35B-A3B at 672 TPS aggregate
#   at conc=8 vs 27B-dense INT4 at 471 TPS (+43%). Phase 7.G4.26B-A4B.B3
#   measured 26B-A4B with the same harness at 408 TPS @ conc=8 — the
#   architectural advantage did NOT replicate for free-chat workloads
#   on this MoE family. Root cause: K=4 verify-pass cost on 128 experts
#   × top_k=8 expert routing overwhelms the drafter's high acceptance
#   rate. B4 then showed K=4 wins only on short-structured workloads
#   where the per-step verify cost is amortized over a short decode
#   tail. See VERDICT files under sndr_private/runs/g4_26b_a4b_*.
#
# Policy reference:
#   sndr_private/research/gemma4/analysis/
#     G4_WORKLOAD_GATE_POLICY_UPDATE_2026-05-23.md
#
# Sizing rationale (unchanged from B0):
#   max_num_seqs=8 to match the Qwen multi-conc bench design.
#   max_model_len reduced to 16K because 8 concurrent streams require
#   8x the KV budget vs single-stream. With AWQ-4bit weights ~8.5 GB
#   per GPU at TP=2, plus MoE expert dispatch cache, plus 8x KV pool,
#   we need a tighter context bound. 16K is conservative; B1/B3/B4
#   smoke confirmed VRAM headroom ~3 GiB free per card at conc=8 with
#   gpu_memory_utilization=0.85, so the sizing stays as designed.

schema_version: 2
kind: profile
id: gemma4-a4b-multiconc
parent_model: gemma-4-26b-a4b-it-awq
maintainer: sandermage
status: experimental                              # not yet boot-validated; B0 creates this file
created: '2026-05-23'

# ─── Runtime role ──────────────────────────────────────────────────────
# Phase 7.G4.26B-A4B.VARIANT-A-FIX (2026-05-23): role flipped from
# default → structured. The original `default` choice was load-bearing
# only for the B3 free-chat multi-conc bench (which closed in MIXED
# band at 408 TPS). Post-B4, this preset's production niche is short
# structured-JSON / tool_call multi-conc — exactly the workload set
# the `structured` role is designed for. Switching to structured ALSO
# closes the `10_default_clean` validate-debt this profile carried
# under role=default + spec_decode_override=K=4.
#
# multi-conc semantic stays in sizing_override.max_num_seqs=8 below;
# K-choice stays in spec_decode_override.
role: structured
spec_decode_override:                             # explicit K=4 (matches K=4 sibling gemma4-a4b-mtp-k4)
  method: mtp
  num_speculative_tokens: 4
  model: /models/gemma-4-26B-A4B-it-assistant
compression_plan: null
backend_plan: null
routing:                                          # workload intent per PRESET_LABELING + B4 verdict
  intended_workloads:
    - structured_count
    - tool_json
validation: null                                  # no cryptographic artifact for 26B-A4B (β'-A is 31B-specific)

# ─── Sizing override ───────────────────────────────────────────────────
# Multi-conc regime: lower max_model_len to fit 8 concurrent KV pools.
# Same gpu_memory_utilization as single-stream profiles — KV pool grows
# linearly with max_num_seqs, not with max_model_len.
sizing_override:
  max_model_len: 16384                            # 16K — conservative for 8x KV; raise after boot smoke if headroom available
  gpu_memory_utilization: 0.85
  max_num_seqs: 8                                 # the multi-conc test target
  max_num_batched_tokens: 4096
  enable_chunked_prefill: true
  enforce_eager: false
  disable_custom_all_reduce: true

# ─── Patches delta ─────────────────────────────────────────────────────
# G4_19C disable — same rationale as siblings.
patches_delta:
  enable: {}
  disable: []
  override:
    GENESIS_ENABLE_G4_19C_ATTN_WRAP: '0'

# ─── Promotion contract ────────────────────────────────────────────────
promotion:
  validation_required:
    - "26B-A4B B1 multiconc smoke: boot prod-gemma4-26b-a4b-multiconc through V2 compose without G4_08/G4_18 OR MoE expert-routing runtime failures"
    - "tools/multi_conc_bench.py --conc 8 --rounds 5 --max-tok 1024: agg_TPS measured + compared against Qwen 35B-A3B 672 TPS reference"
    - "no schema corruption / unicode garble at conc=8 (5-prompt smoke)"
    - "PN248 acceptance distribution at conc=8 captured and parsed"
  promote_to: null
  notes: |
    Bench cycle CLOSED 2026-05-23 (Phase 7.G4.26B-A4B.B4).

    Original question: does Gemma 4 MoE A=4B multiconc throughput
    land in the same TPS-class as Qwen 35B-A3B (672 TPS @ conc=8)?
    Answer: NO for free-chat (B3: 408 TPS, MIXED band, -39% vs ref).
            YES for short structured JSON (B4 Mode A: K=4 235.9 TPS
            vs K=1 209.1 TPS, +12.8%; Mode B xgrammar: 271.4 TPS
            with schema_rate 100%).

    The architectural hypothesis (A=4B active params → multi-conc
    win) held for the Qwen MoE family but did NOT replicate on the
    Gemma 4 MoE family. Root cause: K=4 verify-pass cost on 128
    experts × top_k=8 expert routing overwhelms the drafter's high
    acceptance rate on free-chat workloads. On short-structured
    workloads the per-step verify cost is amortized over a short
    decode tail, so K=4 wins.

    Current production posture: KEEP THIS PRESET, but treat it as
    a SHORT STRUCTURED-JSON multi-conc preset. Any router or doc
    that lists it as a generic free-chat throughput preset is wrong.
    For free-chat multi-conc throughput, prod-35b-multiconc (Qwen
    35B-A3B at 672 TPS @ conc=8) remains the production baseline.

    Status stays `experimental` until the workload-gate router /
    caller-side routing implementation lands (Phase
    7.G4.WORKLOAD-GATE-POLICY.IMPLEMENT, queued). The preset itself
    boots cleanly and the K=4 short-structured win is validated.
    What's missing is the operational layer that prevents callers
    from accidentally picking it for the wrong workload.

    See: sndr_private/research/gemma4/analysis/
         G4_WORKLOAD_GATE_POLICY_UPDATE_2026-05-23.md
