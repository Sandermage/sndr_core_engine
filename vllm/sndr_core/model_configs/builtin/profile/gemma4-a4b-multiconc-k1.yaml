# SPDX-License-Identifier: Apache-2.0
# Genesis V2 profile — gemma4-a4b-multiconc-k1
# Role: K=1 multi-conc baseline — fair K=1 vs K=4 comparator for B4.
#
# Created by Phase 7.G4.26B-A4B.B4-PRE (2026-05-23) as the precursor
# to the structured-JSON multi-conc bench (B4 actual). It is the K=1
# control sibling of `gemma4-a4b-multiconc` and exists for one
# specific reason: same harness, same conc, same session K=1 vs K=4
# multiconc comparison on 26B-A4B. Without this, B4's verdict would
# be cross-phase + cross-harness (the same confound that made B3's
# K=4 multiconc result mixed-band ambiguous).
#
# Mechanically: "K=1 control" is implemented as spec_decode_override
# with `num_speculative_tokens: 1`, NOT as `spec_decode_override:
# null`, because the 26B-A4B ModelDef declares spec_decode at the
# model level (K=4 with the assistant drafter, pre-Variant-A). compose()
# reads the model default unless the profile overrides with a
# non-null SpecDecodeConfig. SpecDecodeConfig.method enum has no
# "none"/"off" — K=1 is the closest available control and matches the
# precedent set by gemma4-a4b-no-mtp (B0 commit 870824db).
#
# Inherits the same `10_default_clean` validate-debt as the other
# three 26B-A4B profiles (role=default + spec_decode_override set).
# This will be cleaned up together by the queued VARIANT-A-FIX phase
# which migrates 26B-A4B ModelDef to spec_decode=null and lets each
# profile carry its own K explicitly.
#
# Sizing: identical to gemma4-a4b-multiconc EXCEPT spec_decode K.
# Same max_model_len=16K, max_num_seqs=8, gpu_memory_utilization=0.85.
# This is intentional — the bench needs to isolate the K-axis from
# all other dimensions.

schema_version: 2
kind: profile
id: gemma4-a4b-multiconc-k1
parent_model: gemma-4-26b-a4b-it-awq
maintainer: sandermage
status: experimental                              # B4-PRE creates this; B4 actual is its first bench
created: '2026-05-23'

# ─── Runtime role ──────────────────────────────────────────────────────
# Same role=default convention as gemma4-a4b-multiconc (and the other
# 26B-A4B profiles). PROFILE_ROLES has no "k_control" entry; the K=1
# semantic lives entirely in spec_decode_override below.
role: default
spec_decode_override:                             # K=1 control (matches Qwen multi-conc precedent for K=1 baseline)
  method: mtp
  num_speculative_tokens: 1
  model: /models/gemma-4-26B-A4B-it-assistant
compression_plan: null
backend_plan: null
routing: null                                     # multiconc K=1 baseline takes all incoming workloads
validation: null

# ─── Sizing override ───────────────────────────────────────────────────
# Identical to gemma4-a4b-multiconc — only K differs between the two.
sizing_override:
  max_model_len: 16384
  gpu_memory_utilization: 0.85
  max_num_seqs: 8
  max_num_batched_tokens: 4096
  enable_chunked_prefill: true
  enforce_eager: false
  disable_custom_all_reduce: true

# ─── Patches delta ─────────────────────────────────────────────────────
# Same profile-local G4_19C disable as siblings — see B1.1-UNBLOCK
# commit 81949928 for the rationale. For 26B-A4B specifically the
# disable is semantically moot (kv_cache_dtype: auto, not turboquant)
# but mechanically required to avoid the Dynamo fullgraph-trace bail
# observed on 31B.
patches_delta:
  enable: {}
  disable: []
  override:
    GENESIS_ENABLE_G4_19C_ATTN_WRAP: '0'

# ─── Promotion contract ────────────────────────────────────────────────
promotion:
  validation_required:
    - "B4 actual: K=1 vs K=4 multi-conc Mode A pass-rate + agg_TPS at conc=8 measured cleanly"
    - "tools/multi_conc_json_bench.py at conc=8 yields http_2xx_rate >= 0.95 and parse_rate >= 0.30"
    - "no runtime crash on first boot through V2 compose"
  promote_to: null
  notes: |
    Status experimental — created to enable Phase 7.G4.26B-A4B.B4
    K=1 vs K=4 multiconc structured-JSON bench. This preset is NOT
    expected to ship as a production baseline; its role is purely
    diagnostic. If B4 closes with K=4 winning multiconc structured,
    then this K=1 profile becomes the historical baseline only. If
    K=1 wins multiconc structured, then this profile becomes a
    legitimate production candidate.
