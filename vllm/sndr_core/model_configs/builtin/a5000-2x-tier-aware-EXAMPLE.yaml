# │ GENESIS_PN95_CONFIG_KEY in 3 callers:                             │
# │   - profile/tier-aware-2x.yaml:21                                 │
# │   - model/qwen3.6-27b-int4-autoround-tq-k8v4.yaml:157             │
# │   - model/qwen3.6-35b-a3b-fp8.yaml:169                            │
# │                                                                   │
# │ PN95 hook (cache/pn95/hooks.py:231,437) reads `cache_config.      │
# │ tiers` from this V1 file at runtime. To retire the V1 file the    │
# │ tier_specs block (lines 98-124) needs to migrate to either:       │
# │   (a) V2 profile `tier-aware-2x.yaml` + PN95 hook reads V2        │
# │   (b) PN95-internal config dir (cache/pn95/tier_configs/)         │
# │ Both options require PN95 hook code change.                       │
# │                                                                   │
