# SPDX-License-Identifier: Apache-2.0
# Genesis builtin model config — 35B FP8 + DFlash N=3 multi-concurrency throughput preset (Wave 10).
#
# Sister config to a5000-2x-35b-fp8-dflash.yaml (LATENCY single-stream profile).
# Differs in: max_num_seqs=8 (was 1), max_model_len=100K (was 160K, lowered for
# 8× fp16 KV streams to fit 2×24GB VRAM after DFlash drafter overhead),
# PN204=1 (v2 redesign safe), GENESIS_LEGACY_P7=0 (PN204 conflicts_with).
#
# Bench validated 2026-05-15 on dev371+bf610c2f5 (tools/multi_conc_bench.py):
#   conc=1: 153 TPS  TTFT  74 ms  TPOT 20.0 ms
#   conc=2: 226 TPS  TTFT  85 ms  TPOT 23.1 ms
#   conc=4: 359 TPS  TTFT 154 ms  TPOT 27.4 ms
#   conc=8: 562 TPS  TTFT 162 ms  TPOT 35.9 ms ⭐ optimum
#
# Compared to MTP+TQ sibling (a5000-2x-35b-multiconc.yaml):
#   MTP+TQ conc=8: 689 TPS / TTFT 243 ms  (+23% TPS / -33% TTFT vs DFlash)
#   DFlash conc=8: 562 TPS / TTFT 162 ms  (DFlash WINS on TTFT)
# DFlash is the LATENCY-WIN preset. MTP+TQ is the THROUGHPUT-WIN +
# LONG-CONTEXT-WIN preset (256K vs DFlash's 100K cap).

key: a5000-2x-35b-fp8-dflash-multiconc
title: 2× RTX A5000 — Qwen3.6-35B-A3B-FP8 + DFlash N=3 multi-conc throughput preset
description: >-
  Throughput-optimised companion to a5000-2x-35b-fp8-dflash. Same target +
  drafter, raised max_num_seqs=8 + PN204 v2 enabled. Validated 562 TPS
  aggregate (vs 153 TPS single). DFlash wins TTFT at conc=8 (162 ms vs MTP+TQ
  243 ms — best latency profile available on 35B). Use for multi-tenant
  latency-sensitive serving; for max throughput / 256K context use MTP+TQ
  sibling a5000-2x-35b-multiconc.yaml.
schema_version: 1
maintainer: sandermage
last_validated: '2026-05-15'
genesis_pin: v11.0.0+wave10
vllm_pin_required: 0.20.2rc1.dev371+gbf610c2f5
lifecycle: stable
workload_tag: throughput

hardware:
  gpu_match_keys: [rtx a5000]
  n_gpus: 2
  min_vram_per_gpu_mib: 22000
  cuda_capability_min: [8, 6]

model_path: /models/Qwen3.6-35B-A3B-FP8                # target weights (FP8 native — same as MTP variant)
served_model_name: qwen3.6-35b-a3b                     # OpenAI-API model name
quantization: null                                     # FP8 native (no --quantization arg)
kv_cache_dtype: null                                   # null = default fp16 — DFlash head_size=256 forbids TQ/fp8 KV on Ampere

# Multi-conc-optimised dimensions (vs DFlash latency 160000/1):
max_model_len: 100000                                  # 100K — DFlash multi-conc cap (fp16 KV without TQ compression). Compare: MTP+TQ supports 280K.
gpu_memory_utilization: 0.92                           # 0.92 — leaves headroom for DFlash drafter overhead + 8 concurrent decode buffers.
max_num_seqs: 8                                        # 8 concurrent. DFlash optimum — diminishing returns at 16 (fp16 KV pressure).
max_num_batched_tokens: 2048                           # 2048 — DFlash drafter favors smaller chunks at high concurrency.
enable_chunked_prefill: true                           # required for spec-decode + long ctx.
dtype: bfloat16                                        # NOT float16 — DFlash drafter expects bf16 (PN23 dtype-fix enforces).
cudagraph_mode: FULL_AND_PIECEWISE                     # PN125 forces this on hybrid_gdn_moe; matches dev371 v1 default.
enforce_eager: false                                   # cudagraph capture enabled (production).
disable_custom_all_reduce: true                        # NCCL fallback (consumer Ampere PCIe — no NVLink).
language_model_only: true                              # no multimodal path.
trust_remote_code: true                                # required for Qwen3-A3B custom modeling code.

scheduler_reserve_full_isl: false                      # Sprint 1 flag — allows scheduler to pack more sequences (multi-conc).

enable_auto_tool_choice: true                          # auto-set tool_choice=required when prompt mentions tools.
tool_call_parser: qwen3_coder                          # qwen3_coder tool-call parser.
reasoning_parser: qwen3                                # qwen3 reasoning_content parser.

spec_decode:
  method: dflash                                       # DFlash N=3 with separate drafter.
  num_speculative_tokens: 3                            # K=3 (same as MTP K=3 — empirical optimum on this stack).
  model: /models/Qwen3.6-35B-A3B-DFlash                # separate drafter checkpoint (NOT integrated like MTP).

genesis_env:
  # ── Inherited from a5000-2x-35b-fp8-dflash.yaml (LATENCY profile) ──
  # See sibling for full annotations. Throughput-mode-specific diffs below.

  GENESIS_BUFFER_MODE: shared                            # Genesis buffer manager mode (shared | exclusive | auto).

  # GDN / hybrid attention (same as latency)
  GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL: '1'          # Genesis-original Triton multi-query kernel for spec-decode K+1 verify.
  GENESIS_P67_USE_UPSTREAM: '1'                          # P67 routing flag: '1'=upstream-merged Genesis kernel, '0'=local fork.
  GENESIS_P67_NUM_KV_SPLITS: '48'                        # P67 split-K factor — 35B@100K wants 48 (35B@320K MTP optimum).
  GENESIS_ENABLE_PN11_GDN_AB_CONTIGUOUS: '1'             # vllm#41142 — force a/b contiguity in fix_query_key_value_ordering.
  GENESIS_ENABLE_PN106_GDN_H_POOL: '1'                   # GDN inner chunk-state `h` pool — removes per-step alloc churn.

  # ── THROUGHPUT-MODE DIFFS vs DFlash-latency profile ──────────────────
  GENESIS_ENABLE_PN204_DUAL_STREAM_INPROJ: '1'           # ENABLED 2026-05-15 (v2 redesign — is_compiling() guard + arming hook). Bench-neutral on Ampere; future-proof for Hopper +5-10%.
  GENESIS_LEGACY_P7: '0'                                 # P7 OFF — required when PN204=1 (registry conflicts_with declared).

  # ── Spec-decode + structured-output safety net (same as latency) ──────
  GENESIS_ENABLE_P58_ASYNC_PLACEHOLDER_FIX: '1'          # vllm#40807 — async-scheduler [-1] placeholder fix (#40831 spec-decode loops root cause).
  GENESIS_ENABLE_P60_GDN_NGRAM_FIX: '1'                  # vllm#40738 Phase 1 — GDN+ngram SSM state recovery on rollback.
  GENESIS_ENABLE_P60B_TRITON_KERNEL: '1'                 # vllm#40738 Phase 2 — Triton kernel offset fix for GDN+ngram.
  GENESIS_ENABLE_P61B_STREAMING_OVERLAP: '1'             # vllm#40783 — Qwen3 streaming partial-tag overlap guard.
  GENESIS_ENABLE_P61C_QWEN3CODER_DEFERRED_COMMIT: '1'    # closes club-3090#72 SSE silence on narrative <tool_call>.
  GENESIS_ENABLE_P62_STRUCT_OUT_SPEC_TIMING: '1'         # vllm#36138 — structured-output spec-decode reasoning-end timing fix.
  GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: '1'       # vllm#39598 — qwen3coder MTP streaming early-return removal.
  GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: '1'          # cudagraph_capture_sizes spec-decode divisibility filter.
  GENESIS_ENABLE_P68_AUTO_FORCE_TOOL: '1'                # Genesis-original — auto-set tool_choice=required when prompt mentions tools.
  GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: '1'         # Genesis-original — inject tool-format reminder at long-ctx threshold.
  GENESIS_ENABLE_P70_AUTO_STRICT_NGRAM: '1'              # Genesis-original — auto-set prompt_lookup_min=8 (closes club-3090#34).
  GENESIS_ENABLE_P71_BLOCK_VERIFY: '1'                   # vllm#40819 — block-verify rejection sampler. +2.3% TPS +1.3% accept at K≥3.
  GENESIS_ENABLE_P72_PROFILE_RUN_CAP: '1'                # Genesis-original — caps profile_run M dim (Dynamo fake-tensor fix).
  GENESIS_ENABLE_P74_CHUNK_CLAMP: '1'                    # Chunked-prefill chunk-size clamp.
  GENESIS_ENABLE_P82: '1'                                # SGLang-style acceptance threshold OR-clause.
  GENESIS_P82_THRESHOLD_SINGLE: '0.3'                    # P82 threshold single-query (35B optimum 0.3; 27B uses 0.1 — per-model).
  GENESIS_ENABLE_P87: '1'                                # Spec-decode rejection ratio sanity guard.
  GENESIS_ENABLE_P91: '1'                                # Long-prompt tool-call reminder helper.
  GENESIS_ENABLE_P95: '1'                                # vllm#40385 — Marlin TP cudagraph cap on Ampere.
  GENESIS_ENABLE_P99: '1'                                # FP8 block-scaled MM batch-invariance fix.
  GENESIS_ENABLE_P101: '1'                               # vllm#41127 — uniform query_len>1 batches through prefill wrapper in cudagraph mode.
  GENESIS_ENABLE_P107_MTP_TRUNCATION_DETECTOR: '1'       # vllm#41467 — detect+log MTP truncation at think→tool_call boundary.

  # Wave 8/9 stack — all inherited
  GENESIS_ENABLE_PN8_MTP_DRAFT_ONLINE_QUANT: '1'         # Draft online-quant propagation — also helps DFlash separate drafter mem.
  GENESIS_ENABLE_PN16_LAZY_REASONER: '1'                 # PN16 v2 lazy-reasoner request hook — cache-safe.
  GENESIS_PN16_CLASSIFIER_MAX_TOKENS: '0'                # PN16 V7 classifier cap OFF.
  GENESIS_PN16_TOOL_THINK_BUDGET: '200'                  # PN16 V8 — system-msg hint <think> cap at 200 tokens.
  GENESIS_ENABLE_PN17_FA2_LSE_CLAMP: '1'                 # Cliff 1 mech A — long context guard.
  GENESIS_ENABLE_PN19_SCOPED_MAX_SPLIT: '1'              # vllm#41268 — max_split_size_mb=20 scope-restored during model load.
  GENESIS_ENABLE_PN22_LOCAL_ARGMAX_TP: '1'               # Local argmax for TP draft (DFlash spec-decode helper).
  # ── DFlash family (separate drafter optimizations) ──
  GENESIS_ENABLE_PN23_DFLASH_DTYPE_FIX: '1'              # DFlash dtype guard — drafter bf16 mismatch fix.
  GENESIS_ENABLE_PN24_DFLASH_AUX_LAYER_FIX: '1'          # vllm#40727 — DFlash aux layer +1 indexing fix.
  GENESIS_ENABLE_PN40_DFLASH_OMNIBUS: '1'                # DFlash N=3 omnibus (sub-A fused per-layer K-norm).
  GENESIS_ENABLE_PN52_PROMPT_LOGPROBS_EVICTION: '1'      # vllm#41411 — prompt_logprobs eviction fix during chunked prefill.
  GENESIS_ENABLE_PN56_QWEN3CODER_XML_FALLBACK: '1'       # vllm#41466 — XML parse fallback when JSON tool-call parse fails.
  GENESIS_ENABLE_PN66: '1'                               # vllm#41696 — multiturn </think> leak fix in DelegatingParser.
  GENESIS_ENABLE_PN67: '1'                               # vllm#41674 — thinking_token_budget inverted-bool fix.
  GENESIS_ENABLE_PN71_THINKING_TAG_NORMALIZE: '1'        # Malformed <think> tokenizer-drift normaliser.
  GENESIS_ENABLE_PN73_TOOL_ARGS_SAFE_NORMALIZE: '1'      # Tool argument JSON normaliser (Qwen3-Coder edge cases).
  GENESIS_ENABLE_PN77_FP8_LM_HEAD: '1'                   # Phase E.6 Marlin tier FP8 lm_head — ~243 MiB/rank on 35B.
  GENESIS_ENABLE_PN91_DEVELOPER_ROLE: '1'                # OpenAI `developer` role passthrough for IDE agents.
  GENESIS_ENABLE_PN92_NIXL_EP_TRIAL_IMPORT: '1'          # vllm#40154 — trial-import guard.
  GENESIS_ENABLE_PN95_TIER_AWARE_CACHE: '1'              # Tier-aware KV cache (GPU + CPU pinned + disk cold).
  GENESIS_PN95_CONFIG_KEY: a5000-2x-tier-aware-example   # Tier spec lookup key.
  GENESIS_PN95_DEMOTE_FREE_MIB_THRESHOLD: '2048'         # Trigger demote when free VRAM < 2 GiB.
  GENESIS_PN95_TICK_EVERY: '100'                         # Scheduler-tick page-move evaluation every N decode steps.
  GENESIS_ENABLE_PN96_EMERGENCY_DEMOTE: '1'              # Companion to PN95 — emergency demote on free-blocks threshold.
  GENESIS_ENABLE_PN96B: '1'                              # Marlin persistent workspace (renamed from PN96 collision). +4-5% TPS recovery.
  GENESIS_ENABLE_PN201_SCHEDULER_EMPTY_CACHE: '1'        # Scheduler-tick empty_cache hook, threshold-gated.
  GENESIS_ENABLE_SNDR_WORKSPACE_001: '1'                 # Workspace grow-after-lock graceful fix.
  GENESIS_ENABLE_P103: '1'                               # FLA Cliff 2 chunked prefill — applies to hybrid GDN layers.

  # Wave 10 (2026-05-15)
  GENESIS_ENABLE_PN51_QWEN3_STREAMING_THINKING_DISABLED: '1'  # vllm#40816 (OPEN) — streaming defensive guard.
  GENESIS_ENABLE_PN125_HYBRID_FULL_AND_PIECEWISE: '1'         # PR-blog 2026-05 — hybrid cudagraph forcing.
  GENESIS_ENABLE_PN126_V1_DECODE_WARMUP: '1'                  # JIT decode warmup orchestrator.
  GENESIS_ENABLE_PN127_AUTO_CHAT_TEMPLATE: '1'                # Qwen3.6 chat-template auto-install.
  GENESIS_ENABLE_PN128_SPEC_DECODE_WARMUP: '1'                # vllm#41481 — eagle helper kernel warmup (no-op on DFlash but cost zero).
  GENESIS_ENABLE_PN129_SLOT_MAPPING_WARMUP: '1'               # vllm#42165 — slot mapping warmup.
  GENESIS_ENABLE_PN130_TQ_DECODE_WARMUP: '1'                  # vllm#42215 — TQ decode warmup (no-op on DFlash but cost zero).
  GENESIS_ENABLE_PN132_TOPK_TOPP_CONTIGUOUS: '1'              # vllm#42739 — Triton top-k/top-p contiguous fix.
  GENESIS_ENABLE_PN133_MTP_EMPTY_OUTPUT_FIX: '1'              # vllm#42722 — MTP scheduler empty-output guard (no-op on DFlash but cost zero).
  # GENESIS_ENABLE_PN134_TORCH_COMPILE_FULLGRAPH_211: KEEP OFF — retired 2026-05-15 (-25% TPS bench regressor)

  # Misc
  GENESIS_OBSERVABILITY: '1'                              # Per-patch apply timing + RSS delta logged.
  GENESIS_TQ_MAX_MODEL_LEN: '100000'                      # must match max_model_len above.
  GENESIS_PREALLOC_TOKEN_BUDGET: '4096'                   # token budget for shared scratch pools.
  GENESIS_PROFILE_RUN_CAP_M: '4096'                       # P72 cap value (must equal max_num_batched_tokens × 2 = 4096).
  GENESIS_P68_P69_LONG_CTX_THRESHOLD_CHARS: '50000'       # P68/P69 threshold in chars.

system_env:
  PYTORCH_CUDA_ALLOC_CONF: 'expandable_segments:True,max_split_size_mb:256'  # PyTorch allocator config.
  VLLM_NO_USAGE_STATS: '1'                                # disable telemetry ping.
  VLLM_LOGGING_LEVEL: WARNING                             # -10ms TTFT vs INFO (verified bench).
  VLLM_FLOAT32_MATMUL_PRECISION: high                     # TF32 on Ampere+ (~3-4× faster, bit-identical for our shapes).
  VLLM_USE_FLASHINFER_SAMPLER: '1'                        # FlashInfer top-p/top-k sampler (PN132 becomes no-op when ON).
  VLLM_USE_FUSED_MOE_GROUPED_TOPK: '1'                    # fused MoE gate+topk kernel.
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'                      # allow max_model_len > model's published context.
  VLLM_WORKER_MULTIPROC_METHOD: spawn                     # spawn required for CUDA reinit with TP>1.
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'                         # Marlin reduction via atomicAdd (faster on Ampere SM 8.6).
  VLLM_MOE_USE_DEEP_GEMM: '0'                             # DeepGEMM Hopper-only; Marlin on Ampere.
  VLLM_USE_DEEP_GEMM: '0'                                 # disable DeepGEMM globally on Ampere.
  VLLM_USE_FLASHINFER_MOE_FP8: '0'                        # disable FlashInfer MoE FP8 (Hopper SM 9.0+ required).
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: '1'           # vllm#30515 — include CUDA graphs in memory profiler estimate.
  TRITON_CACHE_DIR: /root/.triton/cache                   # Triton kernel cache location (mounted as docker volume).
  NCCL_P2P_DISABLE: '1'                                   # consumer Ampere has no NVLink P2P.
  NCCL_DEBUG: WARN                                        # surface silent NCCL failures.
  OMP_NUM_THREADS: '1'                                    # 1 = avoid CPU oversubscription with TP=2.
  CUDA_DEVICE_MAX_CONNECTIONS: '8'                        # CUDA stream pool size per device.
  CUDA_MODULE_LOADING: LAZY                               # defer kernel module loading until first use.
