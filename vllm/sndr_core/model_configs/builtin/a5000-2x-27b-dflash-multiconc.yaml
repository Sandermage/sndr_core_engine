# SPDX-License-Identifier: Apache-2.0
# Genesis builtin model config — 27B INT4-AutoRound + DFlash N=5 multi-conc throughput preset (Wave 10).
#
# Sister config to a5000-2x-27b-dflash-true.yaml (LATENCY single-stream).
# Differs in: max_num_seqs=8 (was 1), max_model_len=80K (was 185K, lowered for
# 8× fp16 KV streams), PN204=1 (v2 redesign safe), GENESIS_LEGACY_P7=0.
#
# Bench validated 2026-05-15 on dev371+bf610c2f5 (tools/multi_conc_bench.py):
#   conc=1: 102 TPS  TTFT 102 ms  TPOT 30.1 ms
#   conc=2: 146 TPS  TTFT 109 ms  TPOT 32.9 ms
#   conc=4: 268 TPS  TTFT 160 ms  TPOT 39.4 ms
#   conc=8: 385 TPS  TTFT 190 ms  TPOT 51.5 ms ⭐ optimum (3.76x scaling)
#
# Compared to MTP+TQ sibling (a5000-2x-27b-int4-multiconc.yaml):
#   MTP+TQ conc=8: 379 TPS / TTFT 189 ms (essentially TIED, Δ <2%)
#
# On 27B both methods are equivalent — choose by context length cap:
#   DFlash multi-conc: 80K (fp16 KV without TQ allowed on Ampere head=256)
#   MTP+TQ multi-conc: 262K (TQ k8v4 4-8x compression enabled)

key: a5000-2x-27b-dflash-multiconc
title: 2× RTX A5000 — Qwen3.6-27B-INT4 + DFlash N=5 multi-conc throughput preset
description: >-
  Throughput-optimised companion to a5000-2x-27b-dflash-true. Same target +
  drafter, raised max_num_seqs=8 + PN204 v2 enabled. Validated 385 TPS
  aggregate at conc=8 (vs 102 TPS single). On 27B DFlash is TIED with
  MTP+TQ k8v4 sibling — choose by context length requirement.
schema_version: 1
maintainer: sandermage
last_validated: '2026-05-15'
genesis_pin: v11.0.0+wave10
vllm_pin_required: 0.20.2rc1.dev371+gbf610c2f5
lifecycle: stable
workload_tag: throughput

hardware:
  gpu_match_keys: [rtx a5000]
  n_gpus: 2
  min_vram_per_gpu_mib: 22000
  cuda_capability_min: [8, 6]

model_path: /models/Qwen3.6-27B-int4-AutoRound          # target weights (INT4 AutoRound — same as MTP+TQ variant)
served_model_name: qwen3.6-27b                         # OpenAI-API model name
quantization: null                                     # AutoRound loads natively
kv_cache_dtype: null                                   # null = default fp16 — DFlash head_size=256 forbids TQ on Ampere

# Multi-conc-optimised dimensions (vs DFlash latency 185K/1):
max_model_len: 80000                                   # 80K cap on this rig (fp16 KV without TQ compression)
gpu_memory_utilization: 0.85                           # 0.85 (vs latency 0.95) — headroom for 8 concurrent decode buffers + drafter
max_num_seqs: 8                                        # 8 concurrent — DFlash 27B multi-conc optimum
max_num_batched_tokens: 2048                           # 2048 — DFlash drafter favors smaller chunks at high concurrency
enable_chunked_prefill: true                           # required for spec-decode + long ctx
dtype: bfloat16                                        # NOT float16 — DFlash drafter expects bf16 (PN23 dtype-fix enforces)
cudagraph_mode: FULL_AND_PIECEWISE                     # PN125 forces this on hybrid_gdn_moe; matches dev371 v1 default
enforce_eager: false                                   # cudagraph capture enabled
disable_custom_all_reduce: true                        # NCCL fallback (consumer Ampere PCIe)
language_model_only: true                              # no multimodal path
trust_remote_code: true                                # required for Qwen3-A3B custom modeling

scheduler_reserve_full_isl: false                      # Sprint 1 flag — allow scheduler to pack more sequences

enable_auto_tool_choice: true
tool_call_parser: qwen3_coder
reasoning_parser: qwen3

spec_decode:
  method: dflash                                       # DFlash with separate drafter
  num_speculative_tokens: 5                            # N=5 (legacy 27B DFlash bench winner — 35B uses K=3)
  model: /models/Qwen3.6-27B-DFlash                    # separate drafter checkpoint (bf16)

# All genesis_env + system_env inherited from a5000-2x-27b-dflash-true.yaml
# (latency profile) PLUS the throughput-mode diffs below.
genesis_env:
  # ── THROUGHPUT-MODE DIFFS vs DFlash-latency profile ──────────────────
  GENESIS_ENABLE_PN204_DUAL_STREAM_INPROJ: '1'           # ENABLED 2026-05-15 (v2 redesign safe). Bench-neutral on Ampere.
  GENESIS_LEGACY_P7: '0'                                 # P7 OFF — required when PN204=1 (registry conflicts_with).

  # ── Identical patch matrix as latency profile (inherited) ─────────────
  GENESIS_BUFFER_MODE: shared                            # buffer manager mode
  GENESIS_ENABLE_P58_ASYNC_PLACEHOLDER_FIX: '1'          # vllm#40807 — async-scheduler [-1] placeholder fix
  GENESIS_ENABLE_P60_GDN_NGRAM_FIX: '1'                  # vllm#40738 Phase 1 — GDN+ngram SSM state recovery
  GENESIS_ENABLE_P60B_TRITON_KERNEL: '1'                 # vllm#40738 Phase 2 — Triton kernel offset fix
  GENESIS_ENABLE_P61B_STREAMING_OVERLAP: '1'             # vllm#40783 — Qwen3 streaming partial-tag overlap guard
  GENESIS_ENABLE_P61C_QWEN3CODER_DEFERRED_COMMIT: '1'    # closes club-3090#72 SSE silence
  GENESIS_ENABLE_P62_STRUCT_OUT_SPEC_TIMING: '1'         # vllm#36138 — structured-output spec-decode timing
  GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: '1'       # vllm#39598 — qwen3coder MTP streaming fix
  GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: '1'          # cudagraph_capture_sizes spec-decode divisibility
  GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL: '1'          # Genesis multi-query Triton kernel for spec-decode K+1 verify
  GENESIS_P67_USE_UPSTREAM: '1'                          # P67 routing: upstream-merged Genesis kernel
  GENESIS_P67_NUM_KV_SPLITS: '32'                        # 27B optimum at 80-131K (vs 35B 48 at 100-320K)
  GENESIS_ENABLE_P68_AUTO_FORCE_TOOL: '1'                # auto-set tool_choice=required when prompt mentions tools
  GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: '1'         # inject tool-format reminder at long-ctx threshold
  GENESIS_ENABLE_P70_AUTO_STRICT_NGRAM: '1'              # auto-set prompt_lookup_min=8
  GENESIS_ENABLE_P71_BLOCK_VERIFY: '1'                   # vllm#40819 — block-verify rejection sampler
  GENESIS_ENABLE_P72_PROFILE_RUN_CAP: '1'                # caps profile_run M dim
  GENESIS_ENABLE_P74_CHUNK_CLAMP: '1'                    # chunked-prefill chunk-size clamp
  GENESIS_ENABLE_P82: '1'                                # SGLang-style acceptance threshold OR-clause
  GENESIS_P82_THRESHOLD_SINGLE: '0.1'                    # P82 threshold — 27B optimum 0.1 (35B uses 0.3 — per-model)
  GENESIS_ENABLE_P87: '1'                                # Spec-decode rejection ratio sanity guard
  GENESIS_ENABLE_P91: '1'                                # Long-prompt tool-call reminder helper
  GENESIS_ENABLE_P95: '1'                                # vllm#40385 — Marlin TP cudagraph cap
  GENESIS_ENABLE_P99: '1'                                # FP8 block-scaled MM batch-invariance fix
  GENESIS_ENABLE_P101: '1'                               # vllm#41127 — uniform query_len>1 prefill wrapper in CG
  GENESIS_ENABLE_P103: '1'                               # FLA Cliff 2 chunked prefill on hybrid GDN
  GENESIS_ENABLE_P107_MTP_TRUNCATION_DETECTOR: '1'       # vllm#41467 — MTP truncation detector
  GENESIS_ENABLE_PN8_MTP_DRAFT_ONLINE_QUANT: '1'         # also helps DFlash separate drafter memory
  GENESIS_ENABLE_PN11_GDN_AB_CONTIGUOUS: '1'             # vllm#41142 — force a/b contiguity
  GENESIS_ENABLE_PN16_LAZY_REASONER: '1'                 # PN16 v2 lazy-reasoner request hook
  GENESIS_PN16_CLASSIFIER_MAX_TOKENS: '0'                # V7 classifier cap OFF
  GENESIS_PN16_TOOL_THINK_BUDGET: '200'                  # V8 system-msg hint <think> cap at 200 tokens
  GENESIS_ENABLE_PN17_FA2_LSE_CLAMP: '1'                 # FA2 softmax_lse runtime clamp
  GENESIS_ENABLE_PN19_SCOPED_MAX_SPLIT: '1'              # vllm#41268 — max_split_size_mb scope-restore
  GENESIS_ENABLE_PN22_LOCAL_ARGMAX_TP: '1'               # Local argmax for TP draft (DFlash helper)
  # ── DFlash family (separate drafter optimizations) ──
  GENESIS_ENABLE_PN23_DFLASH_DTYPE_FIX: '1'              # DFlash dtype guard — drafter bf16 mismatch fix
  GENESIS_ENABLE_PN24_DFLASH_AUX_LAYER_FIX: '1'          # vllm#40727 — DFlash aux layer +1 indexing fix
  GENESIS_ENABLE_PN38_DFLASH_QUANT_DRAFTER: '1'          # PR #40425 — DFlash quantized drafter (27B INT4 → bf16 conversion path)
  GENESIS_ENABLE_PN40_DFLASH_OMNIBUS: '1'                # DFlash N=5 omnibus optimization
  GENESIS_ENABLE_PN52_PROMPT_LOGPROBS_EVICTION: '1'      # vllm#41411 — prompt_logprobs eviction fix
  GENESIS_ENABLE_PN56_QWEN3CODER_XML_FALLBACK: '1'       # vllm#41466 — XML parse fallback
  GENESIS_ENABLE_PN66: '1'                               # vllm#41696 — multiturn </think> leak fix
  GENESIS_ENABLE_PN67: '1'                               # vllm#41674 — thinking_token_budget inverted bool fix
  GENESIS_ENABLE_PN71_THINKING_TAG_NORMALIZE: '1'        # malformed <think> normaliser
  GENESIS_ENABLE_PN73_TOOL_ARGS_SAFE_NORMALIZE: '1'      # tool argument JSON normaliser
  GENESIS_ENABLE_PN77_FP8_LM_HEAD: '1'                   # Marlin tier FP8 lm_head (applies on INT4 weight + TQ KV combo)
  GENESIS_ENABLE_PN91_DEVELOPER_ROLE: '1'                # OpenAI developer role passthrough
  GENESIS_ENABLE_PN92_NIXL_EP_TRIAL_IMPORT: '1'          # vllm#40154 — trial-import guard
  GENESIS_ENABLE_PN95_TIER_AWARE_CACHE: '1'              # Tier-aware KV cache
  GENESIS_PN95_CONFIG_KEY: a5000-2x-tier-aware-example
  GENESIS_PN95_DEMOTE_FREE_MIB_THRESHOLD: '2048'
  GENESIS_PN95_TICK_EVERY: '100'
  GENESIS_ENABLE_PN96_EMERGENCY_DEMOTE: '1'              # PN95 companion
  GENESIS_ENABLE_PN96B: '1'                              # Marlin persistent workspace (renamed from PN96 collision)
  GENESIS_ENABLE_PN201_SCHEDULER_EMPTY_CACHE: '1'        # scheduler-tick empty_cache hook
  GENESIS_ENABLE_SNDR_WORKSPACE_001: '1'                 # workspace grow-after-lock graceful fix

  # Wave 10 (2026-05-15)
  GENESIS_ENABLE_PN51_QWEN3_STREAMING_THINKING_DISABLED: '1'  # vllm#40816 streaming defensive
  GENESIS_ENABLE_PN125_HYBRID_FULL_AND_PIECEWISE: '1'         # PR-blog 2026-05 hybrid cudagraph forcing
  GENESIS_ENABLE_PN126_V1_DECODE_WARMUP: '1'                  # JIT decode warmup orchestrator
  GENESIS_ENABLE_PN127_AUTO_CHAT_TEMPLATE: '1'                # Qwen3.6 chat-template auto-install
  GENESIS_ENABLE_PN128_SPEC_DECODE_WARMUP: '1'                # vllm#41481 — eagle helper kernel warmup (no-op on DFlash but cost zero)
  GENESIS_ENABLE_PN129_SLOT_MAPPING_WARMUP: '1'               # vllm#42165 — slot mapping warmup
  GENESIS_ENABLE_PN130_TQ_DECODE_WARMUP: '1'                  # vllm#42215 — TQ decode warmup (no-op on DFlash but cost zero)
  GENESIS_ENABLE_PN132_TOPK_TOPP_CONTIGUOUS: '1'              # vllm#42739 — Triton top-k/top-p contiguous fix
  GENESIS_ENABLE_PN133_MTP_EMPTY_OUTPUT_FIX: '1'              # vllm#42722 — MTP scheduler empty-output guard (no-op on DFlash)
  # GENESIS_ENABLE_PN134_TORCH_COMPILE_FULLGRAPH_211: KEEP OFF — retired 2026-05-15 (-25% TPS bench regressor)

  # Misc
  GENESIS_OBSERVABILITY: '1'                              # per-patch apply timing + RSS delta logged
  GENESIS_TQ_MAX_MODEL_LEN: '80000'                       # must match max_model_len above
  GENESIS_PREALLOC_TOKEN_BUDGET: '4096'                   # token budget for shared scratch pools
  GENESIS_PROFILE_RUN_CAP_M: '2048'                       # P72 cap value (matches max_num_batched_tokens=2048)
  GENESIS_P68_P69_LONG_CTX_THRESHOLD_CHARS: '50000'       # P68/P69 threshold in chars

system_env:
  PYTORCH_CUDA_ALLOC_CONF: 'expandable_segments:True,max_split_size_mb:256'  # PyTorch allocator config
  VLLM_NO_USAGE_STATS: '1'                                # disable telemetry ping
  VLLM_LOGGING_LEVEL: WARNING                             # -10ms TTFT vs INFO (verified bench)
  VLLM_FLOAT32_MATMUL_PRECISION: high                     # TF32 on Ampere+
  VLLM_USE_FLASHINFER_SAMPLER: '1'                        # FlashInfer top-p/top-k sampler
  VLLM_USE_FUSED_MOE_GROUPED_TOPK: '1'                    # fused MoE gate+topk kernel
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'                      # allow max_model_len > model's published context
  VLLM_WORKER_MULTIPROC_METHOD: spawn                     # spawn for CUDA reinit with TP=2
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'                         # Marlin reduction via atomicAdd
  VLLM_MOE_USE_DEEP_GEMM: '0'                             # DeepGEMM Hopper-only
  VLLM_USE_DEEP_GEMM: '0'                                 # disable globally on Ampere
  VLLM_USE_FLASHINFER_MOE_FP8: '0'                        # FlashInfer MoE FP8 requires Hopper
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: '1'           # accurate KV pool sizing under CG capture
  VLLM_SSM_CONV_STATE_LAYOUT: DS                          # device-first layout for streaming-GDN at long ctx
  TRITON_CACHE_DIR: /root/.triton/cache                   # Triton kernel cache location
  NCCL_P2P_DISABLE: '1'                                   # consumer Ampere has no NVLink P2P
  NCCL_DEBUG: WARN                                        # surface silent NCCL failures
  NCCL_CUMEM_ENABLE: '0'                                  # disable NCCL CUDA Unified Memory (PCIe rig)
  OMP_NUM_THREADS: '1'                                    # avoid CPU oversubscription with TP=2
  CUDA_DEVICE_MAX_CONNECTIONS: '8'                        # CUDA stream pool size per device
  CUDA_MODULE_LOADING: LAZY                               # defer kernel module loading until first use
