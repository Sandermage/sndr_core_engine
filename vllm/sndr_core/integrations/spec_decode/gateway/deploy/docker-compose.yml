# SPDX-License-Identifier: Apache-2.0
#
# SNDR spec-decode three-service deployment.
#
#   default      Gemma 4 + TQ + MTP OFF        (port 8101, production-safe)
#   structured   Gemma 4 + TQ + MTP K=4 β′-A    (port 8102, validated profile)
#   gateway      OpenAI-compat dispatcher       (port 8100, external)
#
# Both vLLM containers run the SAME image and pin. They differ ONLY
# in their env matrix.
#
# Operator workflow:
#   cd vllm/sndr_core/integrations/spec_decode/gateway/deploy
#   docker compose up -d default          # production posture: default alone
#   curl http://localhost:8101/v1/models  # direct, no gateway
#   docker compose up -d                  # add structured + gateway
#   curl http://localhost:8100/v1/models  # via gateway, structured candidate
#   docker compose down structured        # rollback level 2 (instant)
#
# All env names use SNDR_* canonical; GENESIS_* aliases still work.

services:

  default:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly}
    container_name: sndr-gemma4-default
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    network_mode: bridge
    ports:
      - "8101:8101"
    volumes:
      - ${GENESIS_REPO:-../../../../../../..}:/genesis:ro
      - ${MODEL_ROOT:-/nfs/genesis/models}:/models:ro
    environment:
      VLLM_NO_USAGE_STATS: "1"
      VLLM_LOGGING_LEVEL: WARNING
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
      # Production posture: TQ everywhere, MTP OFF.
      # No GENESIS_ENABLE_G4_71B / 75 / etc. = drafter never engages.
      SNDR_ENABLE_G4_60A_TQ_SLIDING_SPEC: "1"
      SNDR_ENABLE_G4_60B_TQ_ATTN_OVERLAY: "1"
      SNDR_ENABLE_G4_60C_TQ_DECODE_OVERLAY: "1"
      SNDR_ENABLE_G4_60D_TQ_STORE_OVERLAY: "1"
      SNDR_ENABLE_G4_60E_KV_CACHE_UTILS: "1"
      SNDR_ENABLE_G4_60G_TQ_DISPATCH: "1"
      SNDR_ENABLE_G4_60H_TQ_CONFIG_AUGMENT: "1"
      SNDR_ENABLE_G4_60K_TQ_ENGINE_CONFIG: "1"
      SNDR_ENABLE_G4_61_TQ_SHARED_WORKSPACE: "1"
      SNDR_ENABLE_G4_62_TQ_KERNEL_WARMUP: "1"
      SNDR_ENABLE_G4_31_TQ_DTYPE_PRESERVE: "1"
      SNDR_ENABLE_G4_32_TQ_VALIDATION_BYPASS: "1"
    entrypoint:
      - vllm
      - serve
      - ${GEMMA4_MODEL:-/models/gemma-4-31B-it-AWQ-4bit}
      - --served-model-name=gemma-4-31b
      - --tensor-parallel-size=${TP:-2}
      - --disable-custom-all-reduce
      - --dtype=bfloat16
      - --kv-cache-dtype=turboquant_4bit_nc
      - --attention-backend=TURBOQUANT
      - --max-model-len=${MAX_MODEL_LEN:-4096}
      - --max-num-seqs=${MAX_NUM_SEQS:-1}
      - --max-num-batched-tokens=8192
      - --enable-chunked-prefill
      - --trust-remote-code
      - --gpu-memory-utilization=${GPU_MEM_UTIL:-0.92}
      - --api-key=${API_KEY:-genesis-local}
      - --host=0.0.0.0
      - --port=8101
      - --disable-log-stats
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8101/v1/models', timeout=2).status == 200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 180s

  structured:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly}
    container_name: sndr-gemma4-structured-k4
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    network_mode: bridge
    ports:
      - "8102:8102"
    volumes:
      - ${GENESIS_REPO:-../../../../../../..}:/genesis:ro
      - ${MODEL_ROOT:-/nfs/genesis/models}:/models:ro
    environment:
      VLLM_NO_USAGE_STATS: "1"
      VLLM_LOGGING_LEVEL: WARNING
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
      # β′-A K=4 validated structured profile.
      # Match keys with vllm/sndr_core/integrations/spec_decode/artifacts/
      # gemma4-tq-mtp-structured-k4.json so guard verdict =
      # FUNCTIONALLY_VALIDATED.
      SNDR_ENABLE_G4_60A_TQ_SLIDING_SPEC: "1"
      SNDR_ENABLE_G4_60B_TQ_ATTN_OVERLAY: "1"
      SNDR_ENABLE_G4_60C_TQ_DECODE_OVERLAY: "1"
      SNDR_ENABLE_G4_60D_TQ_STORE_OVERLAY: "1"
      SNDR_ENABLE_G4_60E_KV_CACHE_UTILS: "1"
      SNDR_ENABLE_G4_60G_TQ_DISPATCH: "1"
      SNDR_ENABLE_G4_60H_TQ_CONFIG_AUGMENT: "1"
      SNDR_ENABLE_G4_60K_TQ_ENGINE_CONFIG: "1"
      SNDR_ENABLE_G4_61_TQ_SHARED_WORKSPACE: "1"
      SNDR_ENABLE_G4_62_TQ_KERNEL_WARMUP: "1"
      SNDR_ENABLE_G4_31_TQ_DTYPE_PRESERVE: "1"
      SNDR_ENABLE_G4_32_TQ_VALIDATION_BYPASS: "1"
      SNDR_ENABLE_G4_69_SKIP_LAYERS_NATIVE_BACKEND: "1"
      SNDR_G4_TQ_FORCE_SKIP_LAYERS: "58,59"
      SNDR_ENABLE_G4_70_PN259B_MIXED_ALLOC: "1"
      SNDR_ENABLE_G4_70_PN259B_FAIL_FAST: "1"
      SNDR_ENABLE_G4_70_PN259C_ROUTE_B: "1"
      SNDR_ENABLE_G4_71B_DRAFTER_SLIDING_TRITON: "1"
      SNDR_ENABLE_G4_75_DRAFTER_HEAD512_TRITON: "1"
      SNDR_ENABLE_G4_76_DISABLE_DRAFTER_KV_SHARING: "0"
      SNDR_ENABLE_G4_78_DRAFTER_TARGET_KV_BRIDGE: "0"
      # Structural opt-in (artifact match unlocks via guard policy).
      SNDR_ALLOW_SPEC_DECODE_KV_ADAPTER: "1"
      # PN248 trace optional; on for the first deploy cycle.
      SNDR_ENABLE_PN248_ACCEPTANCE_TRACE: "1"
    entrypoint:
      - vllm
      - serve
      - ${GEMMA4_MODEL:-/models/gemma-4-31B-it-AWQ-4bit}
      - --served-model-name=gemma-4-31b
      - --tensor-parallel-size=${TP:-2}
      - --disable-custom-all-reduce
      - --dtype=bfloat16
      - --kv-cache-dtype=turboquant_4bit_nc
      - --attention-backend=TURBOQUANT
      - --max-model-len=${MAX_MODEL_LEN:-4096}
      - --max-num-seqs=${MAX_NUM_SEQS:-1}
      - --max-num-batched-tokens=8192
      - --enable-chunked-prefill
      - --trust-remote-code
      - --speculative-config={"method":"mtp","num_speculative_tokens":4,"model":"${GEMMA4_ASSISTANT:-/models/gemma-4-31B-it-assistant}","attention_backend":"FLASH_ATTN"}
      - --gpu-memory-utilization=${GPU_MEM_UTIL:-0.92}
      - --api-key=${API_KEY:-genesis-local}
      - --host=0.0.0.0
      - --port=8102
      - --disable-log-stats
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8102/v1/models', timeout=2).status == 200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 240s
    profiles:
      - structured

  gateway:
    build:
      context: ../../../../../..
      dockerfile: vllm/sndr_core/integrations/spec_decode/gateway/deploy/Dockerfile
    image: sndr-gateway:dev
    container_name: sndr-gateway
    ports:
      - "8100:8100"
    environment:
      SNDR_GATEWAY_DEFAULT_URL: http://default:8101
      SNDR_GATEWAY_STRUCTURED_URL: http://structured:8102
      SNDR_GATEWAY_PROFILE: gemma4-tq-mtp-structured-k4
      SNDR_GATEWAY_BIND_PORT: "8100"
      SNDR_GATEWAY_HEALTH_INTERVAL: "5"
      SNDR_GATEWAY_TIMEOUT: "120"
      SNDR_GATEWAY_LOG_LEVEL: INFO
      # admin endpoints localhost-only inside the container — same
      # network namespace as gateway process, so 127.0.0.1 hits work.
    depends_on:
      default:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8100/healthz', timeout=1).status == 200 else 1)\""]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 30s
    profiles:
      - gateway
