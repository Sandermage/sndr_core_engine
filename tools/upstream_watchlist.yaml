  # ─── S4.1 (audit P4-1, 2026-05-12): DFlash + quantized target KV ───
  - upstream: vllm#42102
    status: open
    local_patches: [PN21, PN23, PN24, PN38, PN40]
    action: port
    since: 2026-05-12
    notes: |
      DFlash drafter coexistence with quantized target KV. Upstream
      предлагает три механизма:
        1. partition DFlash draft KV specs before page-size unify
           (draft and target живут в разных KV groups).
        2. drafter cache_dtype="auto" когда target global KV dtype
           quantized (drafter inherits либо fp16/bf16).
        3. per-spec dtype в FlashAttention metadata scheduler.

      Genesis уже имеет PN21..PN40 для DFlash на Ampere. Релевантный
      backport target — гибридный path где target KV = turboquant_k8v4
      а drafter держит fp16 (head_size=256 constraint).

      Backport plan: см. docs/_internal/research/upstream_42102_dflash_
      independent_kv_groups_plan_2026-05-12.md (S4.1 closure).

      Critical compatibility check: refined COMPAT-001 (qwen-next only)
      освобождает Qwen3.6-27B Lorbus + DFlash для дальнейшей разработки.

