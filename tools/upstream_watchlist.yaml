# Upstream vLLM watchlist for Genesis drift detection.
#
# DA-019 (audit 2026-05-08): structured replacement for hardcoded notes
# scattered across `tools/check_upstream_drift.py` + per-patch
# docstrings. Each entry maps an upstream issue/PR to the local Genesis
# patches that track it, and what action to take when state changes.
#
# Format:
#
#   - upstream: vllm#<NUMBER>            # PR or issue identifier
#     status: open | merged | closed     # last known upstream status
#     local_patches: [P67, P67b]         # affected Genesis patch IDs
#     action: drift-check | a-b-test |   # what to do when status changes
#             retire | watch | port
#     since: 2026-05-08                  # when entry was added
#     notes: |                           # free-form context
#       Multi-line context — what to look for, expected outcome.
#
# `tools/check_upstream_drift.py` reads this file (as YAML), queries
# GitHub for current status of each `upstream:` entry, and emits:
#
#   - WARN if `status` field drifted (e.g. open → merged).
#   - PORT_CANDIDATE if action=port and PR is now merged.
#   - RETIRE_CANDIDATE if action=retire and an upstream marker matches
#     a Genesis patch's `marker` field.
#   - DRIFT if action=drift-check and anchor md5 changed in upstream.

watch:
  # ─── TurboQuant family ─────────────────────────────────────────────
  - upstream: vllm#38479
    status: merged
    local_patches: [P3, P4, P5, P6, P22, P26, P28, P36, P38, P44, P46]
    action: a-b-test
    since: 2026-04-15
    notes: |
      Upstream merged TurboQuant KV cache compression. Genesis stack
      (P3..P46) overlaps significantly. Need A/B vs upstream's
      `--kv-cache-dtype turboquant_k8v4` to confirm Genesis advantage
      on hybrid (Mamba/DeltaNet) models that upstream excludes per
      §10.10 audit note.

  - upstream: vllm#40914
    status: open
    local_patches: [P67, P67b]
    action: a-b-test
    since: 2026-05-08
    notes: |
      Routes uniform K+1 spec-verify batches through the multi-query
      kernel. P67/P67b are Genesis's own implementation. After upstream
      merge: A/B comparison required — keep Genesis path if it
      outperforms (likely so on Ampere; uncertain on Hopper+).

  - upstream: vllm#40069
    status: open
    local_patches: [P4, P5, P67, P67b, P78, P98, P99, P101, PN57]
    action: drift-check
    since: 2026-05-08
    notes: |
      TurboQuant/HIGGS attention follow-up tracking issue. Genesis stack
      should auto-retire patches as their corresponding bullet points
      land in upstream PRs.

  # ─── Speculative decode ────────────────────────────────────────────
  - upstream: vllm#40269
    status: open
    local_patches: [P77, PN40]
    action: port
    since: 2026-05-08
    notes: |
      Probabilistic draft rejection — passes draft_probs from drafter
      to verifier. Genesis P77 (adaptive ngram K) is orthogonal but
      complementary. Port as PN90 when upstream merges.

  - upstream: vllm#26504
    status: open
    local_patches: []
    action: port
    since: 2026-05-31
    notes: |
      DynamicProposer — per-sequence adaptive K based on rolling
      acceptance-rate window. Claims +5-12% TPS on mixed workload
      vs static K. **Limitation for Genesis**: PR extends
      `EagleProposer` directly, NOT MTP-compatible as-written. Our
      4 PROD models use MTP K=3/K=4 (not Eagle). Backport requires
      MTP adaptation: either inherit from MTP-proposer instead of
      Eagle, or extract a mixin/composition pattern. STUDY done
      2026-05-31 (see commit a074e900 follow-up notes). PR has
      `needs-rebase` label — wait for author to rebase before
      attempting the MTP-adapt backport. Acceptance threshold +
      hysteresis algorithm is generic enough to lift.

  # ─── Tool parsers ──────────────────────────────────────────────────
  - upstream: vllm#42006
    status: open
    local_patches: [G4_T1]
    action: retire
    since: 2026-05-30
    notes: |
      Gemma4 MTP streaming multi-tool-calls fix — segment-replay
      refactor of `_extract_streaming`. Vendored as G4_T1 v1 overlay
      `g4_t1_gemma4_tool_parser_pr42006_overlay.py` (matches
      noonghunna/club-3090 stack 2026-05-08). On merge: delete both
      v1 and v2 overlay files + remove `-v` mount in launcher
      `start_gemma4-tq-mtp-structured-k4.sh`. SUPERSEDED locally by
      the v2 vendor of PR #42237 (see next entry) but kept here for
      retire-on-merge symmetry.

  - upstream: vllm#42237
    status: open
    local_patches: [G4_T1]
    action: retire
    since: 2026-05-31
    notes: |
      Gemma4 streaming tool parser REWRITE in Hermes/Kimi style
      (accumulated text + rescan + diff). Net -103 LOC vs PR #42006
      and drops the third-party `regex` import. Currently vendored
      as G4_T1 v2 overlay
      `g4_t1_v2_gemma4_tool_parser_pr42237_overlay.py` — this is
      the file the launcher bind-mounts as of 2026-05-31. Empirical
      result on gemma4-31B AWQ-4bit + TQ k8v4 + MTP K=4: 35/35 tool
      calls (7 cases × 5 runs, both streaming and non-streaming,
      with `Connection: close` header — see Bug Class 13 notes in
      docs/TROUBLESHOOTING.md). On merge: delete both overlay files
      + remove launcher `-v` mount. The HTTP keep-alive parser
      state-leak (case 5 nested-object missing closing `"}` two
      chars on runs 2..N when client uses keep-alive) is a residual
      vLLM-side bug worth flagging to the PR author when the merge
      is being prepared.

  - upstream: vllm#43909
    status: merged
    local_patches: []
    action: a-b-test
    since: 2026-05-31
    notes: |
      [Bug] Fix gemma4 MTP IMA issue when TP>1 (CUDA error: illegal
      memory access). Merged 2026-05-30 (after our pin 626fa9bb of
      2026-05-28). Minimal +9/-1 LOC fix in
      `vllm/model_executor/models/gemma4_mtp.py`: caches
      `_stable_full_lm_head_weight` to prevent CUDA graph from
      capturing a dangling pointer to a temp tensor (post all_gather
      + slice). Author bench on Gemma-4-E2B-it shows 0.64s avg
      latency for batch=16 input-len=512 output-len=128.

      Vendored 2026-05-31 as Genesis G4_77 overlay (4-file
      bind-mount to `/usr/local/lib/python3.12/dist-packages/
      vllm/model_executor/models/gemma4_mtp.py`). A/B bench on
      gemma4-31b AWQ + TQ k8v4 + MTP K=4 + TP=2 + 2× A5000 +
      gpu-mem-util=0.80 (Bug Class 14 fix), 3 samples × 4
      workloads, greedy decode, `Connection: close`:

        | Workload | Baseline | With G4_77 | Δ |
        |---|---:|---:|---:|
        | chat | 23.54 | 20.27 | -13.9% |
        | code | 41.73 | 42.95 | +2.9% |
        | count | 52.37 | 50.05 | -4.4% |
        | json | 53.47 | 47.63 | -10.9% |

      NET NEGATIVE. Reverted. Likely cause: the cached tensor
      (post all_gather across TP=2) consumes additional VRAM at
      a config that is already running gpu-mem-util=0.80 to give
      Genesis P38 TQ workspace its 1 GiB alloc. Reduced KV cache
      → more KV churn on longer prompts → measurable regression
      on chat (longest output) and JSON (structured but long).
      The PR's author bench was on Gemma-4-E2B-it (much smaller
      model, presumably more memory headroom). The IMA workaround
      Genesis already ships (G4_71..G4_76 stack in launcher) may
      also be incompatible with the upstream cache in subtle ways.
      Re-evaluate after next pin bump if the upstream lands in
      production builds.

  - upstream: vllm#43803
    status: merged
    local_patches: []
    action: a-b-test
    since: 2026-05-31
    notes: |
      [Perf] remove seqlen from Mamba SSD chunk kernels. Merged
      2026-05-28. +0/-10 LOC — removes a dead `seqlen` parameter
      from 5 Mamba prefill kernels (`_chunk_cumsum_fwd_kernel`,
      `_chunk_state_fwd_kernel`, `_chunk_scan_fwd_kernel`,
      `_bmm_chunk_fwd_kernel`, `_causal_conv1d_fwd_kernel`).
      Triton specializes plain `int` args by default, so every
      prefill with a new total-token-count was triggering a
      fresh JIT compile. Author claim on Nemotron-H-8B / A10G /
      ShareGPT: Mean TTFT -17%, P99 TTFT -46%. Throughput
      unchanged.

      Vendored 2026-05-31 to qwen3.6-27b-int4-autoround
      launcher as a 4-file bind-mount (`/tmp/mamba_fixed/
      {causal_conv1d,ssd_bmm,ssd_chunk_scan,ssd_chunk_state}.py`).
      Cleared ~/.triton/cache before measurement to force fresh
      JIT path. A/B vs baseline 27B, 8-sample TTFT × 3 prompt
      lengths, 3-sample TPS × 4 workloads, greedy, `Connection:
      close`:

        | Metric | Baseline | With #43803 | Δ |
        |---|---:|---:|---:|
        | TTFT short (5 tok prompt) | 151.3ms | 139.4ms | -7.9% |
        | TTFT medium (80 tok prompt) | 169.7ms | 176.0ms | +3.7% (noise) |
        | TTFT long (400 tok prompt) | 233.2ms | 232.5ms | -0.3% (noise) |
        | TPS chat | 91.68 | 86.95 | -5.2% |
        | TPS code | 113.53 | 113.05 | -0.4% (noise) |
        | TPS count | 117.79 | 116.43 | -1.2% (noise) |
        | TPS json | 105.61 | 107.77 | +2.0% |

      NET marginal-to-negative. Reverted. Does NOT reproduce the
      PR's claimed -17%/-46% on our config. Likely cause: our
      qwen3.6-27B is a hybrid GDN + Mamba architecture, NOT pure
      Mamba like Nemotron-H. The GDN layers dominate the prefill
      hot path and the Mamba SSD kernels see fewer invocations
      with varying seqlen — fewer JIT recompiles to save. The
      TPS chat regression (-5.2%) is just outside the run-to-run
      noise band (~3%) and may reflect a different code path
      taken without the dead `seqlen` arg in our specific
      configuration. Re-evaluate if Genesis later vendors a pure
      Mamba model (e.g. nemotron-h-* family) where this PR's
      architecture would actually apply.

