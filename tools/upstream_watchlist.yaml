  - upstream: vllm#43074
    status: open
    local_patches: [Q3_T1]
    action: retire
    since: 2026-05-31
    notes: |
      [Bugfix] Qwen3Coder streaming: emit args when whole tool body
      lands in one delta. PR #43074 fixes the EXACT bug class our
      Q3_T1 v1 overlay addresses — the upstream state machine drops
      tool_calls when MTP K=3 packs the whole `<function=NAME>...
      </function></tool_call>` body into a single delta after
      is_tool_call_started flipped on the prior delta. Reproduces
      with `--tool-call-parser qwen3_coder --stream-interval 20
      --speculative-config '{"method":"mtp","num_speculative_tokens":3}'`
      on Qwen3.6-27B — exactly our 27B PROD launcher config.

      Author's fix is a surgical +81/-41 LOC patch to the state
      machine ("collapsed body" detection + emit args inline).
      Our Q3_T1 v1 takes a different approach — full Hermes/Kimi
      rescan + diff rewrite (~250 LOC of new method) — which is
      more general (covers ALL packing patterns, not just "whole
      body in one delta") but heavier. After upstream merges,
      verify the fix covers our 7-case bench at 100% on both 27B
      and 35B, then retire Q3_T1 v1.

      Related (track but not primary retire triggers):
