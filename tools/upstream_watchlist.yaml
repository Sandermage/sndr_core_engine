# ════════════════════════════════════════════════════════════════════
# 2026-06-11 PR sweep — merge-event bookkeeping (one row per studied PR)
#
# Source: docs/superpowers/journal/2026-06-11-pr-sweep-50-roadmap.md
# (50 upstream PRs deep-studied; 5 chunk syntheses). Validated by
# tools/check_upstream_watchlist.py (`make watchlist-check`) — a
# DIFFERENT schema from the legacy `watch:` section above, which stays
# owned by scripts/audit_upstream_watchlist.py.
#
# Row schema (all keys required):
#   pr            int  — upstream vllm PR number
#   genesis_patch str  — patch id(s) / 'planned: <id>' / 'watch-only'
#   trigger       str  — retire-on-merge | reanchor-on-merge |
#                        review-on-merge
#   note          str  — duplicates, clusters, wave plan, actions
#
# Trigger semantics at the pin bump that first contains the merge:
#   retire-on-merge   — iron-rule-#11 deep-diff, then retire/trim vendor
#   reanchor-on-merge — anchors break; re-derive before bumping
#   review-on-merge   — re-read the study; no automatic action
# ════════════════════════════════════════════════════════════════════

