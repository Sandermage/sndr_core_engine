# SPDX-License-Identifier: Apache-2.0
# Genesis V2 profile — gemma4-31b-eagle3
# Role: structured — EAGLE-3 speculative decode for gemma-4-31b-it-awq.
#
# EAGLE-3 approach (Genesis 2026-06-15). The official RedHatAI/NeuralMagic
# EAGLE-3 draft head (RedHatAI/gemma-4-31B-it-speculator.eagle3, ~2.2B,
# 1 draft layer, aux hidden layers [2,30,57]) reads the target's intermediate
# HIDDEN STATES, NOT the shared KV cache — structurally sidestepping the
# TQ-compressed-shared-KV collapse behind the Gemma-4 MTP 0%-acceptance.
# vLLM PR#39450 (in dev491) added the Gemma4 EAGLE-3 loader — no pin bump.
#
# WHY THIS over the TQ-MTP profile: our gemma4-31b-tq-mtp-chat-k3 BOOT-FAILS
# on dev491 (TQ+MTP combo / MTP-IMA on TP>1). This profile uses the PLAIN AWQ
# target DIRECTLY with the EAGLE-3 drafter — no TQ stack, no MTP head — so it
# avoids that failure path. club-3090 shows 31B spec-decode can reach
# 119-154 TPS on consumer Ampere (2.4-3.1x our 49 TPS no-mtp baseline).
#
# Reported accept-lengths (RedHatAI card, bf16 target): HumanEval 3.10 /
# summarization 2.07. AWQ-target accept UNVERIFIED (quant-agnostic; A/B it).
# EXPERIMENTAL — pending boot + OOM check (31B AWQ ~16GB + 2.2B drafter
# ~4.5GB on 2x24GB) + A/B vs no-mtp 49 TPS on dev491.

schema_version: 2
kind: profile
id: gemma4-31b-eagle3
parent_model: gemma-4-31b-it-awq
maintainer: sandermage
status: experimental
created: '2026-06-15'

role: structured

spec_decode_override:
  method: eagle3
  num_speculative_tokens: 3
  model: /models/gemma-4-31B-it-speculator.eagle3

compression_plan: null
backend_plan: null

routing:
  intended_workloads:
    - free_chat
    - code_gen
    - summarization

# ─── Sizing override ───────────────────────────────────────────────────
# 31B AWQ (~16 GB) + ~2.2B EAGLE-3 drafter (~4.5 GB) + KV on 2x24GB. Start at
# 64K (not the no-mtp 200K) with gmu 0.88 to leave drafter + KV headroom;
# raise context after a boot+OOM ladder confirms the footprint.
sizing_override:
  max_model_len: 65536
  gpu_memory_utilization: 0.88
  max_num_seqs: 2
  max_num_batched_tokens: 4096
  enable_chunked_prefill: true
  enforce_eager: false
