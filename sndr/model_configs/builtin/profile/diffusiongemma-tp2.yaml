# SPDX-License-Identifier: Apache-2.0
# Genesis V2 profile — diffusiongemma-tp2
# Role: bench — the single rig-validated TP=2 runtime for
# diffusiongemma-26b-a4b-fp8 (block-diffusion text, 2× A5000, dev491).
# (role=bench, not default: it carries a backend_plan for the
# --attention-backend flag, which the default-clean validator forbids on
# role=default; see the Runtime role block below.)
#
# ═══════════════════════════════════════════════════════════════════════
# RENDER NOTES — what the rendered launcher gets right, and the FOUR things
# it does NOT (operator must hand-add). Verified against the render source
# (sndr/cli/legacy/profile.py:render_profile_launcher) 2026-06-17.
# ═══════════════════════════════════════════════════════════════════════
# Render command:
#   python3 -m sndr.cli profile render-launchers diffusiongemma-tp2 \
#     --hardware a5000-2x-24gbvram-16cpu-128gbram --dry-run
#
# RENDERED CORRECTLY (matches the validated hand-launcher):
#   --tensor-parallel-size 2          (from hardware.n_gpus=2)
#   --dtype bfloat16                  (model.dtype)
#   --max-model-len 131072            (sizing_override; 128K — see sizing block)
#   --max-num-seqs 2                  (sizing_override)
#   --max-num-batched-tokens 1024     (sizing_override; lowered with the KV cap)
#   --gpu-memory-utilization 0.9      (sizing_override; "0.90" renders as 0.9)
#   --num-gpu-blocks-override 8192    (parent ModelDef.extra_vllm_flags — THE
#                                      KV-pool cap; emitted by the profile
#                                      render path's extra_vllm_flags branch)
#   --attention-backend TRITON_ATTN   (backend_plan.target_default below;
#                                      the validated config used TRITON_ATTN)
#   --served-model-name diffusiongemma
#   --enable-auto-tool-choice --tool-call-parser gemma4
#   --api-key genesis-local
#   -e GENESIS_ENABLE_G4_26_DIFFUSIONGEMMA_TP_VOCAB=1
#   -e GENESIS_ENABLE_PN_FP8MOE_KPAD=1
#   -e GENESIS_PROFILE_RUN_CAP_M=1024 (system_env; matches max_num_batched_tokens)
#   mounts: /nfs/genesis/models:/models:ro
#           ${GENESIS_REPO}/sndr:.../dist-packages/sndr:ro   (plugin path)
#
# RENDER STATUS (updated 2026-06-17 after the R1-R7 renderer fix —
# 2026-06-17-gemma-cascade-emitter-plan.md):
#   1. EXPLICIT GENESIS APPLY STEP — NOW EMITTED (R3). render_profile_
#      launcher inserts `python3 -m sndr.apply 2>&1 | tail -5` before
#      `exec vllm serve`, so G4_26 + PN-FP8MOE-KPAD patch the live
#      diffusion_gemma.py module on disk before serve. No hand-edit needed.
#   2. --enforce-eager — NOW EMITTED (R7). The serve builder emits it when
#      `enforce_eager: true` (set below). No hand-edit needed.
#   4. model-specific system_env — NOW SUPPORTED (R2). Declare V2-runner /
#      allocator knobs in this profile's `system_env:` block below; compose
#      layers hardware < model < profile, so they do NOT leak onto the
#      shared a5000-2x hardware YAML (35B/27B keep the V2 runner OFF).
#
# STILL NOT RENDERED — operator MUST hand-add to the rendered launcher:
#   3. --generation-config vllm   (no schema field for this flag yet).
#
# Back-compat sndr mount: the render path bind-mounts ${GENESIS_REPO}/sndr
# into .../dist-packages/sndr:ro. The plugin path (sndr.plugin.register)
# resolves through that mount. If the operator runs against an image where
# Genesis lives under .../vllm/sndr_core, ALSO add the legacy mirror mount
#   ${GENESIS_REPO}/sndr:.../vllm/sndr_core:ro
# — it is REQUIRED for the plugin path on those images.
#
# NO MTP / spec-decode (block diffusion has its own sampler) → no
# spec_decode_override, no drafter, no --speculative-config in the render.

schema_version: 2
kind: profile
id: diffusiongemma-tp2
parent_model: diffusiongemma-26b-a4b-fp8
maintainer: sandermage
status: experimental                              # TP=2 coherent-serve validated 2026-06-17; speed bench pending → experimental, not validated
created: '2026-06-17'
# Pin the rig: this is a 2× A5000 TP=2 config. Without target_hardware the
# renderer auto-picks the largest-VRAM satisfying hardware (also a5000-2x
# here), but declaring it makes the TP=2 intent explicit and stable.
target_hardware: a5000-2x-24gbvram-16cpu-128gbram

# ─── Runtime role ──────────────────────────────────────────────────────
# role=bench: this is the TP=2 bring-up / bench profile. It carries a
# backend_plan (target_default TRITON_ATTN, to emit the --attention-backend
# CLI flag) but NO spec_decode / compression / routing / validation. It
# CANNOT be role=default because the [10_default_clean] validator forbids a
# default-role profile from setting ANY runtime-role block — and that check
# DOES include backend_plan. It is NOT role=structured either: structured
# requires a spec-decode validation artifact + non-empty routing
# intersection (checks 06/09), which a no-spec-decode block-diffusion model
# has none of. role=bench carries backend_plan cleanly (checks 09/10 do not
# apply to it) and matches the experimental status. Renders on port 8102.
role: bench

# ─── Runtime sizing — rig-validated high-util config (2026-06-23) ──────
# sizing_override is full-replacement (compose uses profile.sizing_override
# wholesale when set), so all fields are present even when only some differ
# from the a5000-2x hardware defaults.
#
# VALIDATED CONFIG (rig agent, 2026-06-23): gpu_memory_utilization=0.90 +
# max_model_len=131072 + num-gpu-blocks-override=8192 + TRITON_ATTN boots,
# serves coherent ("Paris"), real util 94.3%, 1.4 GiB/card margin, Genesis
# applied=43/failed=0. SUPERSEDES the gmu0.70 / 4K fallback from commit
# 26d781c3 — the user wants this checkpoint at gmu 0.89-0.92 with max ctx.
#
# ROOT CAUSE of the prior gmu0.70 OOM was KV OVER-ALLOCATION, not an
# activation spike. vLLM sizes the KV cache pool to FILL the
# gpu-memory-utilization budget; at gmu0.90 the UNBOUNDED pool grabs all
# the post-weight headroom for KV and the post-load block-diffusion working
# set then has nowhere to go → OOM. The fix is NOT lowering the util — it is
# CAPPING the KV pool with --num-gpu-blocks-override so the util budget keeps
# headroom for the post-KV buffer. That flag lives in the parent ModelDef's
# extra_vllm_flags (raw pass-through; emitted by the profile render path).
#
#   max_model_len:            131072  (128K — max SAFE ctx at gmu0.90. The
#                                     ladder at gmu0.90: 131072 safe; 196608
#                                     boots but only ~424 MiB free = unsafe
#                                     edge; 262144 = OOM. 128K is a 32x jump
#                                     over the old 4096 and serves block-
#                                     diffusion long-context comfortably.)
#   gpu_memory_utilization:   0.90    (was 0.70 — user wants 0.89-0.92;
#                                     validated live at 0.90 → 94.3% real
#                                     util, 1.4 GiB/card margin, boots +
#                                     serves coherent. The KV pool no longer
#                                     fills the whole 0.90 budget because
#                                     num-gpu-blocks-override caps it.)
#   num_gpu_blocks_override:  8192    (NOT a sizing field — set in the parent
#                                     ModelDef.extra_vllm_flags. THE key
#                                     lever: 8192 blocks × 16 tokens/block =
#                                     131072 tokens, exactly max_model_len,
#                                     so the KV pool is sized for the worst-
#                                     case context and the rest of the 0.90
#                                     budget stays free for the post-KV
#                                     block-diffusion buffer.)
#   max_num_seqs:             2       (unchanged)
#   max_num_batched_tokens:   1024    (was 4096 — lowered with the KV-pool
#                                     cap; chunked prefill on. Tracked by
#                                     GENESIS_PROFILE_RUN_CAP_M=1024 in
#                                     system_env per the P72 cap rule.)
#   enforce_eager:            true    (unchanged; block-diffusion sampler is
#                                     not cudagraph-safe. R7 (2026-06-17):
#                                     the render path emits --enforce-eager
#                                     from this field.)
#   enable_chunked_prefill:   true    (unchanged)
#   disable_custom_all_reduce:true    (unchanged; render path emits it
#                                     unconditionally anyway; benign at TP=2)
#
# Attention backend: TRITON_ATTN (backend_plan.target_default below) — the
# validated config launched with --attention-backend TRITON_ATTN.
#
# Block-diffusion caveat (model quality, NOT config): the block-diffusion
# sampler can lose exact-long-string fidelity (verbatim recall of very long
# literal spans) independent of context length. This is a property of the
# diffusion decode, not of the sizing above; the gmu0.90 / 128K config does
# not change it.
sizing_override:
  max_model_len: 131072  # was 4096 — max SAFE ctx at gmu0.90 (196608 unsafe-edge, 262144 OOM). 32x increase. See sizing comment above.
  gpu_memory_utilization: 0.90  # was 0.70 — user wants 0.89-0.92; validated live at 0.90 = 94.3% real util, 1.4 GiB/card margin. KV pool capped by num-gpu-blocks-override so the budget keeps headroom.
  max_num_seqs: 2
  max_num_batched_tokens: 1024  # was 4096 — lowered with the KV-pool cap; GENESIS_PROFILE_RUN_CAP_M tracks it at 1024 (P72 cap rule).
  enable_chunked_prefill: true
  enforce_eager: true
  disable_custom_all_reduce: true

# ── Workload runtime env (profile-scoped, R2 2026-06-17) ───────────────
# Realizes header gap #4 as actual config (was hand-added before R2). These
# are intrinsic to serving block-diffusion DiffusionGemma at TP=2 on dev491:
#   VLLM_USE_V2_MODEL_RUNNER  block-diffusion needs the V2 model runner;
#                             the explicit `python3 -m sndr.apply` step (R3)
#                             now applies G4_26 + PN-FP8MOE-KPAD on disk so
#                             the V2-runner plugin-ordering gap no longer
#                             leaves them unapplied.
#   VLLM_ALLOW_LONG_MAX_MODEL_LEN  permits the declared max_model_len (131072).
#   PYTORCH_CUDA_ALLOC_CONF   expandable segments for the FP8-MoE + vocab
#                             all-gather working set at gpu_mem 0.90.
#   GENESIS_PROFILE_RUN_CAP_M  matches max_num_batched_tokens=1024 (lowered
#                             from 4096 with the KV-pool cap). Per the P72
#                             cap rule the profile_run M cap tracks
#                             max_num_batched_tokens. Inert here unless P72
#                             is enabled (this ModelDef does not set
#                             GENESIS_ENABLE_P72_PROFILE_RUN_CAP), but kept
#                             in sync so a future P72-on launch sizes
#                             profile_run for the 1024-token chunk.
# Profile-scoped so they do NOT leak onto the shared a5000-2x hardware YAML
# (35B/27B must keep the V2 runner OFF). compose layers hw < model < profile.
# NOTE: needs a non-PROD rig boot to confirm the config-rendered launcher
# matches the validated hand-launch end-to-end (see ModelDef header).
system_env:
  VLLM_USE_V2_MODEL_RUNNER: "1"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  GENESIS_PROFILE_RUN_CAP_M: "1024"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

# ─── Backend plan — drives the --attention-backend CLI flag ────────────
# Only target_default is set: ("target_default", "TRITON_ATTN") maps to
# None in BACKEND_PLAN_EMISSION_MAP (no env, CLI-flag-only), and compose.py
# step 4d emits `--attention-backend TRITON_ATTN`. The render path's
# attn_backend_arg branch then writes it into the launcher. No drafter
# backend fields (no MTP).
backend_plan:
  target_default: TRITON_ATTN

# ─── Patches delta — none ──────────────────────────────────────────────
# The two load-bearing flags (G4_26, PN-FP8MOE-KPAD) live in the parent
# ModelDef.patches because they are inherent to serving THIS checkpoint at
# TP=2, not workload-conditional. The profile adds nothing.
patches_delta:
  enable: {}
  disable: []
  override: {}

# ─── Override policy (CONFIG-UX.1) ─────────────────────────────────────
# sizing_override reaches below the hardware default max_model_len
# (280000 → 131072) and keeps gpu_memory_utilization at the hardware
# default 0.90 (raised back from the prior 0.70 fallback now that the KV
# pool is capped by num-gpu-blocks-override). Class `bench` — this is the
# experimental TP=2 bring-up profile; not production traffic until the
# block-diffusion speed bench lands and status promotes to validated.
override_policy:
  override_class: bench
  reason: "DiffusionGemma 26B-A4B FP8 block-diffusion TP=2 bring-up; rig-validated high-util config 2026-06-23 on 2× A5000 / dev491 (gmu0.90 + 131072 ctx + num-gpu-blocks-override 8192 → 94.3% real util, 1.4 GiB/card margin, coherent serve); KV pool capped so the util budget keeps headroom for the post-KV block-diffusion buffer; speed bench pending block-diffusion-aware harness"
  evidence_refs: []
  evidence_visibility: public
  expires_at: '2026-09-17'
  allowed_to_exceed_hardware_default: false

# ─── Promotion contract ────────────────────────────────────────────────
promotion:
  promote_to: null            # flags stay model-side; profile is the TP=2 runtime variant
  validation_required:
    - "TP=2 coherent serve PASS (smoke: model returns coherent text, no init crash)"
    - "G4_26 + PN-FP8MOE-KPAD both confirmed APPLIED at boot (explicit register() apply step ran)"
    - "block-diffusion end-to-end throughput bench captured (per-block, not AR-TPOT)"
    - "tool-call smoke via native gemma4 parser"
  notes: |
    Promotion to `validated` is blocked on the block-diffusion speed bench
    (the AR decode-TPOT metric is N/A). Coherent serve is already proven
    (2026-06-17). Before any production promotion the render path should
    gain first-class support for the four hand-added items (apply-step,
    --enforce-eager, --generation-config, model-scoped system_env) so the
    rendered launcher is self-sufficient — until then this profile requires
    the operator post-edit documented in the header.
