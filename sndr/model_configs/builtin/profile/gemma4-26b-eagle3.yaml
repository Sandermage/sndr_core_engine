# Genesis V2 profile — gemma4-26b-eagle3
# Role: structured — EAGLE-3 speculative decode for gemma-4-26b-a4b-it-awq.
#
# EAGLE-3 approach (Genesis 2026-06-15). The official RedHatAI/NeuralMagic
# EAGLE-3 draft head (RedHatAI/gemma-4-26B-A4B-it-speculator.eagle3, ~0.93B,
# 1 draft layer, aux hidden layers [2,15,27]) reads the target's intermediate
# HIDDEN STATES, NOT the shared KV cache. This structurally sidesteps the
# TQ-compressed-shared-KV collapse that pinned the Gemma-4 MTP drafter at 0%
# acceptance (internal root-cause H6, MTP_TQ_GEMMA4_FINAL_SYNTHESIS_2026-05-18).
# vLLM PR#39450 (merged 2026-04-10, in dev491) added the Gemma4 EAGLE-3 loader
# — no pin bump. Targets the PLAIN AWQ checkpoint (NOT the TQ-MTP stack).
#
# Reported accept-lengths (RedHatAI card, bf16 target): HumanEval 2.75 /
# math 2.95 / QA 1.99. Against our AWQ-4bit target the accept rate is
# UNVERIFIED (EAGLE-3 is quant-agnostic — reads dequant activations — so it
# should hold; must A/B bench). EXPERIMENTAL — pending A/B (accept-length +
# chat-matrix vs no-mtp 119.5 TPS and mtp-chat-k3 198 TPS) on dev491.

schema_version: 2
kind: profile
id: gemma4-26b-eagle3
parent_model: gemma-4-26b-a4b-it-awq
maintainer: sandermage
status: experimental
created: '2026-06-15'

# role=structured: any profile carrying spec_decode_override MUST declare a
# non-default role (per the 10_default_clean validator contract).
role: structured

# EAGLE-3 K=3 — official RedHatAI draft head; reads target hidden states,
# not shared KV (sidesteps the MTP 0%-acceptance collapse). num_speculative_
# tokens kept explicit (vLLM PR#44566 is unmerged, so speculators-format
# drafts require it restated, matching the RedHatAI serve command).
spec_decode_override:
  method: eagle3
  num_speculative_tokens: 3
  model: /models/gemma-4-26B-A4B-it-speculator.eagle3

# 26B-A4B uses kv_cache_dtype=auto (no TQ stack); MoE expert routing handles
# spreading. EAGLE-3 needs no per-layer compression/backend plan.
compression_plan: null
backend_plan: null

routing:
  intended_workloads:
    - free_chat
    - code_gen
    - summarization

# ─── Sizing override ───────────────────────────────────────────────────
# Mirrors the no-mtp/mtp 32K regime for a fair A/B. gmu trimmed 0.92->0.90:
# the ~0.93B EAGLE-3 drafter adds ~2 GB resident — keep headroom for it +
# its 1-layer KV. Re-tune toward 0.92 after a boot+OOM check.
sizing_override:
  max_model_len: 32768
  gpu_memory_utilization: 0.90
  max_num_seqs: 2
  max_num_batched_tokens: 4096
  enable_chunked_prefill: true
  enforce_eager: false
