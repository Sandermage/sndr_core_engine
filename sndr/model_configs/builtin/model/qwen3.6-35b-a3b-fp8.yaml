  GENESIS_ENABLE_SNDR_WORKSPACE_001: '1'             # Workspace grow-after-lock graceful fix.

  # ── Wave 10 (2026-05-15) — multi-concurrency + correctness recoveries ──
  # All flags below verified via tools/multi_conc_bench.py on dev371+bf610c2f5.
