# SPDX-License-Identifier: Apache-2.0
# Status: ✅ Production
# Cross-rig parity: club-3090 dual/preview-mtp.yml = 90/115 TPS single-stream
#   on 2× 3090 (vLLM MTP × MoE penalty); our P67 multi-query kernel + TQ k8v4
#   delivers 211 single / 644 @ conc=8 on 2× A5000. Genesis PROD reference.
# Genesis V2 model definition — Qwen 3.6 35B-A3B FP8 (Sander PROD reference).
# Source-of-truth identity + capabilities + canonical patches.
# POC migration from legacy combined `a5000-2x-35b-prod.yaml`.
# Wave 9 reference bench: wall_TPS 232.36 / decode_TPOT 3.97 ms on 2× A5000 24 GB.
#
# Per-line comment style (W-B exemplar from legacy 35B PROD):
#   • explain WHAT the patch does in 1 line
#   • state default + valid values for non-binary settings
#   • cite empirical evidence (TPS delta / OOM avoided / tool quality) when known
#   • for exhaustive details run `sndr patches explain <patch-id>` (e.g. P67)

schema_version: 2
kind: model
id: qwen3.6-35b-a3b-fp8                          # canonical ID; <model-family>-<size>-<quant> kebab style
title: Qwen 3.6 35B-A3B FP8 (Sander PROD reference)
maintainer: sandermage
last_validated: '2026-05-21'                     # ISO-8601 date of last bench-and-update (P2.4c dev371 smoke + 4-variant chat bench)
license: apache-2.0                              # values: apache-2.0 | mit | ...; apache-2.0 matches upstream Qwen license

# ─── Identity ──────────────────────────────────────────────────────────
model_path: /models/Qwen3.6-35B-A3B-FP8          # container-side path; matches Y3 artifact spec
served_model_name: qwen3.6-35b-a3b               # OpenAI-API `model` field clients send
quantization: null                               # null = FP8 native (no extra --quantization arg). Range: null|auto_round|gptq_marlin|fp8|...
dtype: float16                                   # values: float16|bfloat16|float32; float16 standard for MTP+TQ k8v4
trust_remote_code: true                          # required for Qwen3-A3B custom modeling code (vendor pattern)

# 2026-05-14 chat-template override — Qwen3.6-35B-A3B-FP8 ships the
# byte-identical chat_template.jinja as 27B-int4-AutoRound (verified
# via cmp -s). Same multi-turn tool-call bug (club-3090 disc #53),
# same fix. Enhanced template lives next to the checkpoint and is
# exposed via the existing /models mount.
chat_template: /models/Qwen3.6-35B-A3B-FP8/chat_template_enhanced.jinja

# Pin Qwen3.5/3.6 canonical sampling defaults (club-3090 spec). Without
# this, vllm uses model-supplied generation_config which may not match
# canonical recommendation. Emitted as `--override-generation-config
# '<json>'` by compose.py.
override_generation_config:
  temperature: 0.6
  top_p: 0.95
  top_k: 20

# ─── Capabilities — inherent to this model ─────────────────────────────
# Different capabilities mean a different model file; do NOT override these
# from hardware/profile layers (ownership rule, see roadmap §4.2).
capabilities:
  attention_arch: hybrid_gdn_moe                 # Qwen 3.6 architecture: hybrid GDN (gated delta net) + MoE; drives PN59/P98/PN11 enablement
  tool_call_parser: qwen3_xml                    # engine-native XML parser — streaming-robust with NO Genesis-wrap dependency. (Switched from qwen3_coder 2026-06-14: qwen3_coder streaming leaks the tool-call XML to the content channel once PN392's within-call coalesce wrap is retired; qwen3_xml emits clean tool_calls deltas on dev259. NOTE: vllm#45171 remaps qwen3_xml->Qwen3CoderToolParser on dev491+, so revisit this on a dev491 promotion — pin_runtime_contract.py guards the remap.)
  reasoning_parser: qwen3                        # qwen3 reasoning_content parser (</think> boundaries)
  enable_auto_tool_choice: true                  # auto-set tool_choice=required when prompt mentions tools (P68 dependency)
  spec_decode:
    method: mtp                                  # spec-decode method (range: mtp|dflash|ngram|null); MTP K=3 is the throughput winner on hybrid GDN
    num_speculative_tokens: 5                    # MTP K-value (1-7 valid). K=5 RE-TUNED 2026-06-19 (warm sweep b3aqyo1n2, CV 4.9%): 239.7 TPS / TPOT 3.94ms vs K=3 207.1/4.46 = +15.8% TPS / -12% TPOT. Lossless (MTP verify is target-exact). K was UNDER-TUNED at 3 — this is the "speed was higher before" root cause.
    model: null                                  # MTP draft is integrated into target; DFlash variant uses separate /models/Qwen3.6-35B-A3B-DFlash
    # 2026-05-15 ROLLBACK: probabilistic draft sampling tested on dev371 +
    # MTP K=3 + hybrid_gdn_moe + TQ k8v4 — DELIVERED REGRESSION not gain.
    # Empirical bench (n=25, same hardware, same prompts, same Triton cache):
    #   - greedy draft (current):       TPS 209.90, accept 0.793
    #   - probabilistic draft:          TPS 197.54, accept 0.716
    #   - Delta:                        −5.9% TPS, −10% accept_rate
    # The PN90-era "+1.4-2.8% accept_rate" measurement was on dev93/dev209
    # pre-merge state — upstream native vllm#40269 implementation behaves
    # differently for our exact (MTP integrated draft + K=3) combo: the
    # full-logits path costs more memory + has different rejection bias
    # than the PN90 backport did. Leaving fields commented out so anyone
    # who tries them sees the bench history before flipping again.
    # rejection_sample_method: standard           # → regression on our shape
    # draft_sample_method: probabilistic          # → regression on our shape
  kv_cache_dtype: turboquant_k8v4                # values: fp16|fp8_e5m2|fp8_e4m3|turboquant_k8v4; TQ k8v4 = +~2× KV concurrency at quality parity (Wave 9 win)
  # Byte-level architecture dims for `sndr kv-calc` VRAM/KV projection.
  # Source: config.json (qwen3_5_moe) + docs/MODELS.md, EMPIRICALLY VALIDATED
  # against the dev424 PN403 live engine telemetry (kv_cache_size_tokens=388620,
  # num_gpu_blocks=161 at max-model-len=280000, TP=2, k8v4): the 10-full-attn ×
  # 2-KV-head × 128-head_dim × k8v4 per-token formula reproduces 388,672 token
  # capacity = 0.01% off the live 388,620. This is the projector's STRONG anchor.
  shape:
    num_hidden_layers: 40                         # 10 full-attention + 30 GDN (qwen3_5_moe hybrid)
    num_attention_layers: 10                      # full-attention layers — these GROW the KV pool
    num_recurrent_layers: 30                      # GDN layers — fixed-size recurrent state (not KV)
    hidden_size: 2048
    num_attention_heads: 16                       # query heads
    num_kv_heads: 2                               # KV heads (GQA 8:1) — sizes the KV pool
    head_dim: 128
    weight_bits: 8                                # FP8 native
    weights_total_gib: 33.53                      # ~36 GB FP8 on disk == 33.53 GiB resident, all ranks (÷TP at projection)
    num_experts: 256
    num_experts_per_tok: 8
    mtp_num_layers: 1                             # 1 MTP draft layer (backbone shared via PN348)

# ─── Hardware preconditions composer enforces ──────────────────────────
requires:
  min_total_vram_mib: 44000                      # 2 × 22 GB minimum (weights ~14 GB + KV pool ~6 GB + activations + reserve)
  min_gpu_count: 2                               # 35B+TQ k8v4 needs TP=2; single-card variant not validated for this model
  min_cuda_capability: [8, 6]                    # CUDA SM 8.6 (Ampere); 8.9 (Ada) + 9.0 (Hopper) are forward-compat
  rig_arch_blocklist: []                         # empty — no rig class refuses this model

versions:
  genesis_pin_min: v11.0.0                       # minimum sndr_core version (semver)
  vllm_pin_required: 0.23.1rc1.dev748+g2dfaae752 # PROMOTED 2026-07-04 (pin bump dev714 -> dev748): operator-authorized. 35B-A3B live-window validated on the real dev748 digest (sha256:6a93ae43): boot apply applied=87/failed=0, 7/7 tool-call (qwen3_xml, no leak), 242.55 wall_TPS (CV 6.9%) within CV of same-day dev714 234.16 (parity, no regression), MTP K=5 accept 0.653, ctx-scaling 1K->32K LINEAR_OK. Full 7-model fleet sweep failed=0, re-verified on real dev748 2026-07-05 (PR#48 digest fix). dev714 = previous/rollback; dev672 dropped (<=2-pin). PRIOR: PROMOTED 2026-07-02 (pin bump dev672 -> dev714): operator-authorized. 35B-A3B live-window validated: boot apply applied=87/skipped=166/failed=0, 7/7 tool-call (qwen3_xml, no leak), 236.5 wall_TPS (CV 6.3%) within CV of dev672 240.55 (no regression), MTP K=5 accept 0.666. Improved wiring-aware drift tool: IDENTICAL profile to dev672 (0 new drifts). Other A5000-2x models carry the shared hardware pin; boot-validate on next launch. dev672 = previous/rollback; dev424 dropped (<=2-pin). PRIOR: PROMOTED 2026-07-01 (pin bump dev424 -> dev672): operator-authorized. 35B-A3B window-validated on the main-sync tree: boot apply failed=0, 7/7 tool-call + get_weather Berlin (qwen3_xml, no leak), 240.55 wall_TPS (CV 6.0%) = 98.4% of dev424 244.35 within CV (no regression), MTP K=5 accept 0.679, TQ CUDA stack applies (PN119/P67/P67b/PN399). Other A5000-2x models carried with the shared hardware pin; boot-validate on next launch. dev424 = previous/rollback. PRIOR: PROMOTED 2026-06-25 (pin bump dev301 -> dev424): operator-authorized. Apples-to-apples canonical bench: 35B 244.35 TPS vs dev301 234.77 = +4.08% (NO regression); 27B 134.53 net-neutral; Gemma 26B/31B smoke PASS (Paris + get_weather). DOGFOOD bump_preflight = EXIT 1 (HIGH PN353A->PN399 static edge, MITIGATED: PN399 native C2 sibling applied + the +4.08% A/B clears it); PN386 RETIRED (vllm#45389 merged, IN dev424). dev301 = previous/rollback. Earlier evidence: PROMOTED 2026-06-24 (pin bump dev148 -> dev301): 35B 208 TPS + 31B 94.7 TPS boot+chat+tool-call validated; 5 anchor_drift handled (PN394/PN400 retired, PN353A/PN382 re-anchored, P85 OFF); dev148 = previous/rollback. Prior dev148 evidence: PROMOTED 2026-06-19 (supersedes dev101+g4c6266331): live rig pin — 35B PROD runs it. K=5 + PN394/PN399 + Gemma kv-auto validated on dev148; dev101 = previous/rollback. MTP K=3->K=5 re-tune: 239.7 TPS single-stream / TPOT 3.94 ms (+15.8% vs K=3 207). PN119 tensor-core FP8-key decode live (tl.dot=8), P18b revived; PN394 (#46047 qwen3 partial-param `<` truncation fix) + PN399 (#46067 TQ decode-scratch fixed buffer, IMA-safe FULL cudagraph) promoted to PROD; PN353A (vllm#44053 TQ builder workspace reserve) enabled. PROD boot apply failed=0; streaming tool-calls verified (get_weather {"city":"Paris"/"Berlin"}, no XML leak, finish_reason=tool_calls); reasoning clean (no </think> leak). P67 multi-query spec-decode kernel version-cap <0.24.0; PN30 retired; #45171/#45588 engine-native qwen3_engine_tool_parser owns streaming; GENESIS_ENFORCE_VERSION_RANGE=1 caps the dev259-era P64/P61c/PN56 wraps. Previous dev101 (nightly-4c626633) retained as rollback per CLAUDE.md pin policy.
  # pin_hold CLEARED 2026-06-25 (dev424 bump): the shared a5000-2x hardware
  # YAML now pins the dev424 image (nightly-3f5a1e173, @sha256:c4fac672…) so
  # the ModelDef pin and the hardware image AGREE — audit_v2_modeldef_vs_
  # hardware_pin reports a true sha==image match, no waiver needed. dev301 is
  # the retained vLLM rollback; dev148 stays on the rig (sndr-daemon sidecar).
  pin_hold: null
  reference_metrics_ref: null  # Phase 5.2.D (2026-05-22): formalize receipt-only state. The prior dev338 Wave-9 baseline (tests/integration/baselines/35b_v11_wave9.json) is no longer authoritative for this dev371-promoted ModelDef; keeping that reference produced a sticky audit mismatch in audit_v2_vllm_pin_consistency. Current dev371 runtime evidence: sndr_private/planning/bench_results/2026-05-21/P2_4C_Q35_TQ_DEV371_BENCH_RECEIPT_2026-05-21_RU.md + sibling smoke/4-variant receipts in that directory. A formal canonical baseline JSON requires the full sustained-methodology cycle and is deferred to Phase 7.

# Y1 (Phase 10 — 2026-06-01): in-container python package pins. Migrated
# from V1 a5000-2x-35b-prod.yaml `package_versions:` block as part of the
# V2 ModelDef schema extension that unblocks V1 sunset of the V1 PROD
# file. Same pins (pandas==2.2.3, scipy==1.14.1, xxhash==3.5.0) — both
# V1 PROD files (35b-prod and 27b-int4-tq-k8v4) declared identical
# versions, so hosting them at the V2 model level is consistent. Forward-
# refed into composed cfg.package_versions via compose.py:603.
package_versions:
  python_packages:
    pandas: '2.2.3'
    scipy: '1.14.1'
    xxhash: '3.5.0'
  notes: >-
    Pinned post-B6 fix; supply-chain reproducibility. Installed only when
    SNDR_DEV_INSTALL_RUNTIME_DEPS=1 is set inside the container (otherwise
    the wheel-baked runtime stack is used).

# ─── Extra vLLM CLI flags (escape hatch) ───────────────────────────────
# B10 (schema_v2.py:339) generic pass-through for raw vLLM `serve` flags
# that this model needs but that have NO dedicated ModelDef field. Shape is
# a {flag: value} MAPPING (NOT a list); keys MUST start with `--`; a flag
# with an empty-string value is emitted bare (no argument). compose.py:548
# appends each pair to cfg.vllm_extra_args after the targeted fields.
# Empty by design here: this 35B PROD config derives every launch arg from
# the typed fields above (kv_cache_dtype, max_model_len, spec_decode,
# chat_template, override_generation_config, tensor-parallel, …) plus the
# GENESIS_* patch env matrix below — nothing one-off remains to pass raw.
# Declared explicitly (rather than omitted) so the escape hatch is visible
# and self-documenting to operators; `{}` is byte-identical to the field
# default, so this adds zero launch behavior.
extra_vllm_flags: {}

# ─── Canonical patches matrix (44 entries) ─────────────────────────────
# Format: 'GENESIS_ENABLE_<PATCH_ID>': '1' enables; '0' or absent disables.
patches:
  # ── Spec-decode + structured-output safety net (Qwen3-A3B + MTP K=3) ──
  GENESIS_ENABLE_P58_ASYNC_PLACEHOLDER_FIX: '1'      # vllm#40807 backport — async-scheduler [-1] placeholder fix; root-cause for #40831 spec-decode degenerate loops
  GENESIS_ENABLE_P60_GDN_NGRAM_FIX: '1'              # vllm#40738 backport (Phase 1) — GDN+ngram SSM state recovery on rollback
  GENESIS_ENABLE_P60B_TRITON_KERNEL: '1'             # Phase 2 — Triton kernel offset fix for GDN+ngram
  GENESIS_ENABLE_P61B_STREAMING_OVERLAP: '1'         # vllm#40783 backport — Qwen3 streaming partial-tag overlap guard
  GENESIS_ENABLE_P61C_QWEN3CODER_DEFERRED_COMMIT: '1'   # 2026-05-06: closes club-3090#72 (30-120s SSE silence on narrative `<tool_call>`). Live verify: gap 0.24s vs 57.9s upstream, 30/30 tool regression, TPS −0.3% (noise).
  GENESIS_ENABLE_P62_STRUCT_OUT_SPEC_TIMING: '1'     # vllm#36138 backport — structured-output spec-decode reasoning-end timing fix
  GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: '1'   # vllm#39598 backport — qwen3coder MTP streaming early-return removal (4 sub-patches across parser + serving)
  GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: '1'      # cudagraph capture size filter — protects against OOM when too many capture sizes
  # ── TQ kernel + MoE optimisation ──
  GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL: '1'      # Genesis-original Triton multi-query kernel for spec-decode K+1 verify (+32% TPS on 35B PROD)
  GENESIS_P67_USE_UPSTREAM: '1'                      # P67 routing flag: '1'=upstream Genesis kernel, '0'=Genesis fork (DEFAULT 1; fork was quality mirage 2026-04-28)
  GENESIS_P67_NUM_KV_SPLITS: '48'                    # P67 split-K factor. A/B 2026-06-14 (dev491 opt-cycle A1): tested 24 vs 48 on the canonical chat-matrix — 24 was FLAT on decode-bound variants (code 217.6 vs 218.1, long_gen 190.9 vs 187.9 within CV) and -3..4% on long_ctx 8k/32k. Kept 48 (long-ctx-safe, the Sprint 1 320K optimum). Split-KV is not the 35B decode bottleneck.
  GENESIS_ENABLE_P81_FP8_BLOCK_SCALED_M_LE_8: '1'    # Genesis-original — FP8 block-scaled MM optimization for M≤8 (spec-decode K+1 batch shape)
  GENESIS_ENABLE_P95: '1'                            # vllm#40385 backport — Marlin TP cudagraph cap on Ampere (TP=2 + Marlin defensive). no-op on this model: applies_to excludes it (bug-hunt D16); applies_to is the SoT
  # ── Tool-call safety net ──
  GENESIS_ENABLE_P68_AUTO_FORCE_TOOL: '1'            # Genesis-original — auto-set tool_choice=required when prompt mentions tools (long-ctx adherence mitigation)
  GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: '1'     # Genesis-original — inject system-message reminder of tool format at long-ctx threshold
  GENESIS_ENABLE_P70_AUTO_STRICT_NGRAM: '1'          # Genesis-original — auto-set prompt_lookup_min=8 (closes club-3090#34 ngram quality cliff)
  GENESIS_ENABLE_PN56_QWEN3CODER_XML_FALLBACK: '1'   # vllm#41466 backport — XML parse fallback when JSON tool-call parse fails (qwen3_coder)
  GENESIS_P68_P69_LONG_CTX_THRESHOLD_CHARS: '50000'  # P68/P69 threshold in CHARACTERS (≈12K tokens at 4 chars/tok); below = no reminder, above = inject
  # ── Memory / KV cache management ──
  GENESIS_ENABLE_P71_BLOCK_VERIFY: '0'               # P71 falls back every step on this shape; disabled to drop the per-step exception overhead. (vllm#40819 + gemini bug-fixes — block-verify rejection sampler; activates when max_spec_len>=3 + draft_probs available, but is known-broken on this MoE shape.)
  GENESIS_ENABLE_P72_PROFILE_RUN_CAP: '1'            # Genesis-original — caps profile_run M dim at GENESIS_PROFILE_RUN_CAP_M (Dynamo fake-tensor mismatch on moe_align_block_size symbolic shape)
  GENESIS_PROFILE_RUN_CAP_M: '4096'                  # P72 cap value (must equal max_num_batched_tokens)
  GENESIS_ENABLE_P74_CHUNK_CLAMP: '1'                # chunked-prefill chunk-size clamp (avoids degenerate single-token chunks under spec-decode)
  VLLM_TQ_DECODE_NUM_WARPS: '4'                      # override hardware default 8→4 for this 35B (P18b emits it into the grouped TQ-decode kernel). A/B 2026-06-16: nw=4 = +1.26% long-ctx decode (72.3 vs 71.4 TPS @~6K ctx, CV 0.1% → decisive) and within-noise short-ctx (207 vs 212, CV ~9%); bit-identical (max_abs_diff=0); matches upstream default + the P67 verify kernel (GENESIS_P67_NUM_WARPS=4). Net win on the 280K-provisioned long-ctx path.
  GENESIS_ENABLE_PN17_FA2_LSE_CLAMP: '1'             # Cliff 1 mech A guard (Issue #11) — runtime clamp on FA2 softmax_lse for long context (280K relevant after 2026-05-15 trim). +50-100 MiB reclaimed at long-ctx (over-allocation when max_seq_len=max_model_len for cudagraph capture shape stability leaks into runtime — see vllm#40961 SWA case).
  GENESIS_TQ_MAX_MODEL_LEN: '280000'                 # 2026-05-15: trimmed 320000→280000. Reasoning: 35B-A3B+TQ k8v4+MTP K=3 at gpu_memory_utilization=0.9 left ~1.0-1.5 GiB headroom per card. FULL_AND_PIECEWISE cudagraph capture (v1 default for hybrid_gdn_moe) needs +200-400 MiB margin. 280K still serves above the model's 256K published context (VLLM_ALLOW_LONG_MAX_MODEL_LEN=1) while restoring ~3-4 GiB free per card for cudagraph + activation safety. Must equal --max-model-len in launch script.
  GENESIS_PREALLOC_TOKEN_BUDGET: '4096'              # Genesis prealloc framework — token budget for shared scratch pools
  # ── Hybrid-GDN attention specifics ──
  GENESIS_ENABLE_PN11_GDN_AB_CONTIGUOUS: '1'         # GDN A/B projection contiguity guard (avoids non-contiguous tensor on hybrid GDN path)
  GENESIS_ENABLE_P37: '1'                            # MoE intermediate cache pool (avoids per-call torch.empty for top-k aggregation)
  # ── MoE / FP8 ──
  GENESIS_ENABLE_P99: '1'                            # WorkspaceManager.get_simultaneous memoize (vllm#40941 perf hotfix — composes with P98)
  GENESIS_ENABLE_P101: '1'                           # vllm#41127 backport (P100-companion) — uniform query_len>1 batches through prefill wrapper in cudagraph mode
  GENESIS_ENABLE_PN66: '1'                           # vllm#41696 backport — multiturn </think> leak fix in DelegatingParser (streaming reasoning purity)
  GENESIS_ENABLE_PN67: '0'                           # vllm#41674 merged at bf610c2f5… — the dev371 canonical baseline. Patch lifecycle=retired with vllm_version_range "<0.20.2rc1.dev371", so it auto-skips at runtime even when enabled. Explicit disable here keeps the active matrix free of retired patches (Phase 5.2.A 2026-05-22).
  GENESIS_ENABLE_PN77_FP8_LM_HEAD: '1'               # Phase E.6 Marlin tier — FP8 LM head; on 35B (vocab=248320, hidden=2048) ≈243 MiB/rank saving
  GENESIS_ENABLE_PN348: '1'                          # vllm#44644 vendor — Qwen3.5/3.6 MTP backbone dedup (embed_tokens + lm_head shared with target). enable+measure 2026-06-11: ~1 GiB/rank peak VRAM + 1-3s boot expected; A/B at next restart
  # ── perf-opt Batch A (2026-06-14, dev491-perf-optimize workflow) ──
  GENESIS_ENABLE_PN368_MARLIN_MOE_ATOMIC_ADD: '1'    # opt-#10: wires the dense-path should_use_atomic_add_reduce heuristic into the w13 MoE up-projection GEMM (upstream approves it for this shape; Ampere hardcodes False). Reduction-order swap only, no precision change. +0..+1.5% steady-state TPS. conflicts_with P23_WIRE (neither else enabled). Disable via GENESIS_DISABLE_PN368_MARLIN_MOE_ATOMIC_ADD=1.
  GENESIS_ENABLE_PN390_STREAMING_LSE_SAMPLER: '1'    # opt-#3 (vendor vllm#45369): streaming-LSE rejection sampler — replaces the full-vocab fp32 softmax materialized every non-greedy MTP verify step with one logsumexp/row + in-kernel exp(logit-lse) (ULP-stable identity). Eliminates a 3.6-14.6MB HBM write+read burst per step. decode_TPOT -1..-2%. conflicts_with PN369 (not enabled). Disable via GENESIS_DISABLE_PN390_STREAMING_LSE_SAMPLER=1.
  # ── Probabilistic draft + truncation detection ──
  GENESIS_ENABLE_PN90_PROBABILISTIC_DRAFT: '0'       # DISABLED 2026-06-14 (drift D2): the old "+2.8% accept, no TPS penalty" bench was on dev93/dev209 pre-merge state. On dev371+/dev491 probabilistic draft REGRESSES (-5.9% TPS, -10% accept — see the spec_decode ROLLBACK note above, lines 60-73) and PROD runs GREEDY draft. The flag was inert on dev491 (Genesis patch self-skips on upstream-native #40269) but =1 falsely signalled "probabilistic on" AND was a landmine: re-activation would both regress and unmask the latent P71⊥PN390 target_probs NameError (drift D1). Keep 0.
  GENESIS_ENABLE_P107_MTP_TRUNCATION_DETECTOR: '1'   # vllm#41467 — detect+log MTP truncation at think→tool_call boundary; defensive, +tool_call quality on edge cases
  # ── PN353A + PN394 REMOVED 2026-06-25 (dev148 cleanup) ──────────────────
  # Both are lifecycle=retired and version-capped <0.23.1rc1.dev301, i.e. pure
  # no-ops on dev424 (vllm#44053 + vllm#46047 are native in dev301 AND dev424;
  # verified live: neither produces an apply line on the dev424 35B boot).
  # They were kept only as dev148-rollback correctness flags; the rollback is
  # now dev301 (which carries both fixes natively), so the env flags are gone.
  # The registry tombstones (lifecycle=retired, version-gated) stay for any
  # future <dev301 rollback. PN399 is DECOUPLED from PN353A on dev301+
  # (verified live: its pn399_pn353a_decode_reserve_remove sub-patch soft-skips
  # "anchor not found"; PN399 still applies its full set via the native-form
  # sibling anchor — applied 4 sub-patches + 1 shutdown on the dev424 boot).
  GENESIS_ENABLE_PN399_TQ_DECODE_SCRATCH_IMA: '1'      # vllm#46067 (consolidated re-author) — fixed module-level TQ decode-scratch buffer (IMA-safe in FULL cudagraph; addr never moves). On dev424 it applies via its native-form (dev301+) sibling anchor (4 sub-patches on turboquant_attn.py + 1 on shutdown.py); the PN353A-form decode-reserve removal sub-patch soft-skips cleanly since PN353A is upstream-native. Validated end-to-end on live 35B (decode OK, zero IMA). Disable via GENESIS_ENABLE_PN399_TQ_DECODE_SCRATCH_IMA=0.
  GENESIS_ENABLE_PN401_TQ_PREFILL_CONTINUATION_GUARD: '1'  # vllm#46461 (backport+improve) — gate the TQ flash_attn prefill fast path with `not _has_continuation` so a batch co-locating a first-chunk prefill (max_query_len==max_seq_len) with a continuation request (q_len<seq_len) no longer silently drops the continuation's cached prefix K/V -> hallucination. LIVE on this TQ-always-on stack via plain chunked-prefill (NO prefix caching needed). Genesis hardening over the raw PR: conservative None-mirror fall-safe + length-clamp (a missing/inconsistent CPU mirror skips the fast path). Disjoint anchor from P101 (continuation loop) / PN116 (forward max_seq fallback) / PN399 (decode path); composes cleanly. Common all-first-chunk batch keeps the fast path (no hot-path TPS regression). Disable via GENESIS_ENABLE_PN401_TQ_PREFILL_CONTINUATION_GUARD=0.
  # ── Lazy reasoner (PN16 v2) ──
  GENESIS_ENABLE_PN16_LAZY_REASONER: '1'             # PN16 v2 — cache-safe; default behavior leaves chat_template_kwargs untouched. Hook overhead micro-secs per request. V1 RETIRED 2026-05-09: Wave 6 bench measured −28% wall_TPS + 6× CV amplification (236→170 TPS, CV 6.3→37.6%) because forcing enable_thinking=False renders different chat-template prefix → CUDA graph dispatch miss + MTP draft divergence.
