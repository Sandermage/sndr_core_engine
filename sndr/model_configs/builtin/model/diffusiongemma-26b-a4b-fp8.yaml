# SPDX-License-Identifier: Apache-2.0
# Status: 🧪 Experimental
# Caveats: TP=2 COHERENT serve validated on the rig 2026-06-17 (2× A5000,
#   dev491 pin). Speed is PENDING — proper block-diffusion end-to-end
#   measurement is required; the autoregressive decode-TPOT metric is N/A
#   for a block-diffusion sampler (no per-token AR loop). Both Genesis
#   flags below are still default-OFF in the registry (experimental,
#   not yet bench-gated); this ModelDef opts them in explicitly because
#   the model does NOT boot / serve coherently at TP=2 without them.
#
# Genesis V2 model definition — DiffusionGemma 26B-A4B-it FP8-dynamic.
# Block-diffusion text model (NOT autoregressive). 128-expert MoE,
# A≈4B active params. HF arch DiffusionGemmaForBlockDiffusion; runtime
# class DiffusionGemmaForConditionalGeneration. compressed-tensors
# FP8-dynamic quantization.
#
# ═══════════════════════════════════════════════════════════════════════
# ⚠️  RENDER-PATH GAPS — READ BEFORE LAUNCHING (operator action required)
# ═══════════════════════════════════════════════════════════════════════
# `sndr profile render-launchers diffusiongemma-tp2` reproduces MOST of the
# rig-validated launcher, but the current V2 render path (sndr/cli/legacy/
# profile.py:render_profile_launcher) CANNOT express four things this model
# requires. Verified against the render source 2026-06-17. The operator MUST
# hand-add them to the rendered launcher (or they must be added to the
# render path before this profile is production-promoted):
#
#   1. EXPLICIT GENESIS APPLY STEP (the load-bearing one).
#      The V2 model runner (VLLM_USE_V2_MODEL_RUNNER=1) does NOT fire the
#      `vllm.general_plugins` entry-point reliably — entry-point ordering
#      under the V2 runner means the Genesis register() can run AFTER the
#      model executor has already imported diffusion_gemma.py, so the
#      PN-FP8MOE-KPAD TextPatcher never patches the live module. (G4_26
#      was RETIRED 2026-07-05: native vllm#46177 local-shard soft-embed
#      supersedes it on dev672+, so only PN-FP8MOE-KPAD remains
#      load-bearing here.)
#      The render path only does `pip install -e ${GENESIS_REPO} --no-deps`
#      and trusts the entry-point. This model needs an EXPLICIT pre-serve
#      apply step inside the container, BEFORE `exec vllm serve`:
#          python3 -c "from sndr.plugin import register; register()" 2>&1 | tail -20
#      (equivalently `python3 -m sndr.apply 2>&1 | tail -20`, the canonical
#      apply entrypoint used by emitters/docker_cmd.py — same effect.)
#      Without this step the FP8 MoE N=352 tile-pad (PN-FP8MOE-KPAD) is
#      never installed and the engine crashes at init (Invalid thread
#      config MKN=[16384,352,2816]).
#
#   2. --enforce-eager. The render path NEVER emits --enforce-eager (it
#      reads cfg.enforce_eager nowhere in inner_run, even though the
#      sizing field exists). The profile sets enforce_eager: true for
#      self-documentation, but the operator must add `--enforce-eager`
#      by hand. Block-diffusion needs eager (its sampler is not
#      cudagraph-capture-safe on this pin).
#
#   3. --generation-config vllm. There is NO schema field for the
#      `--generation-config` flag (only --override-generation-config via
#      override_generation_config, a DIFFERENT flag). The operator must
#      hand-add `--generation-config vllm` so vLLM uses its own
#      generation defaults rather than the checkpoint's generation_config.
#
#   4. Model-specific system_env. `system_env` is HARDWARE-scoped, and the
#      shared a5000-2x hardware deliberately keeps VLLM_USE_V2_MODEL_RUNNER
#      OFF (default 0). These env vars are DiffusionGemma-specific and must
#      be added to the container env by hand (do NOT edit the shared
#      hardware YAML — it would flip the V2 runner on for Qwen/Gemma too):
#          VLLM_USE_V2_MODEL_RUNNER=1
#          VLLM_LOGGING_LEVEL=INFO
#          VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
#          PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
#
# Also note: the render path UNCONDITIONALLY emits --disable-custom-all-reduce
# (benign extra flag at TP=2; the validated hand-launcher omits it but it
# does not change behaviour) and a back-compat sndr mount. The sndr mount
# at .../vllm/sndr_core is REQUIRED for the plugin path — see the profile's
# render-notes block.
# ═══════════════════════════════════════════════════════════════════════

schema_version: 2
kind: model
id: diffusiongemma-26b-a4b-fp8
title: DiffusionGemma 26B-A4B-it FP8-dynamic (block-diffusion text)
maintainer: sandermage
last_validated: '2026-06-17'
license: gemma-license

# ─── Identity ──────────────────────────────────────────────────────────
model_path: /models/diffusiongemma-26B-A4B-it-FP8-dynamic   # rig checkpoint (/nfs/genesis/models mount → /models:ro)
served_model_name: diffusiongemma                           # OpenAI-API model name (matches validated launcher)
quantization: null                                          # let vLLM detect compressed-tensors FP8-dynamic from checkpoint metadata
dtype: bfloat16                                             # compute dtype; FP8 weights, bf16 activations on SM 8.6 Ampere
trust_remote_code: false                                   # DiffusionGemma is a native vLLM model_executor model on dev491

# ─── Capabilities ──────────────────────────────────────────────────────
capabilities:
  attention_arch: gemma4_moe                               # 128-expert MoE, A≈4B active (shares Gemma 4 MoE block shape)
  tool_call_parser: gemma4                                 # native gemma4 tool-call parser
  reasoning_parser: null
  enable_auto_tool_choice: true
  # NO MTP / spec-decode. Block diffusion has its OWN sampler (parallel
  # denoising over a block, not an autoregressive draft+verify loop).
  # vLLM treats diffusion models specially (model_config.is_diffusion →
  # num_sampled_tokens_per_step=0 in the scheduler). A speculative drafter
  # would be semantically meaningless here. Leave spec_decode null.
  spec_decode: null
  kv_cache_dtype: auto                                     # let the engine pick (validated launcher passes no --kv-cache-dtype)

# ─── Hardware preconditions ────────────────────────────────────────────
requires:
  min_total_vram_mib: 28000                                # 26B-A4B FP8 weights ~13 GB + KV at 4K ctx; needs 2× 24 GB at TP=2
  min_gpu_count: 2                                         # validated config is TP=2 (native #46177 local-shard soft-embed + FP8 MoE on two cards)
  min_cuda_capability: [8, 6]                              # Ampere SM 8.6
  rig_arch_blocklist: []

versions:
  genesis_pin_min: v12.0.0
  vllm_pin_required: 0.23.1rc1.dev748+g2dfaae752 # PROMOTED 2026-07-02 (pin bump dev672 -> dev714): operator-authorized. 35B-A3B live-window validated: boot apply applied=87/skipped=166/failed=0, 7/7 tool-call (qwen3_xml, no leak), 236.5 wall_TPS (CV 6.3%) within CV of dev672 240.55 (no regression), MTP K=5 accept 0.666. Improved wiring-aware drift tool: IDENTICAL profile to dev672 (0 new drifts). Other A5000-2x models carry the shared hardware pin; boot-validate on next launch. dev672 = previous/rollback; dev424 dropped (<=2-pin). PRIOR: PROMOTED 2026-07-01 (pin bump dev424 -> dev672): operator-authorized. 35B-A3B window-validated on the main-sync tree: boot apply failed=0, 7/7 tool-call + get_weather Berlin (qwen3_xml, no leak), 240.55 wall_TPS (CV 6.0%) = 98.4% of dev424 244.35 within CV (no regression), MTP K=5 accept 0.679, TQ CUDA stack applies (PN119/P67/P67b/PN399). Other A5000-2x models carried with the shared hardware pin; boot-validate on next launch. dev424 = previous/rollback. PRIOR: PROMOTED 2026-06-25 (pin bump dev301 -> dev424): operator-authorized. Apples-to-apples canonical bench: 35B 244.35 TPS vs dev301 234.77 = +4.08% (NO regression); 27B 134.53 net-neutral; Gemma 26B/31B smoke PASS (Paris + get_weather). DOGFOOD bump_preflight = EXIT 1 (HIGH PN353A->PN399 static edge, MITIGATED: PN399 native C2 sibling applied + the +4.08% A/B clears it); PN386 RETIRED (vllm#45389 merged, IN dev424). dev301 = previous/rollback. Earlier evidence: PROMOTED 2026-06-24 (pin bump dev148 -> dev301): 35B 208 TPS + 31B 94.7 TPS boot+chat+tool-call validated; 5 anchor_drift handled (PN394/PN400 retired, PN353A/PN382 re-anchored, P85 OFF); dev148 = previous/rollback. Prior dev148 evidence: PROMOTED 2026-06-19 (supersedes dev101+g4c6266331): K=5 + PN394/PN399 + Gemma kv-auto validated on dev148; dev101 = previous/rollback. Drift-audited clean on dev148 2026-06-19 (journal §20-COMPLETE: health=200, applied=42/failed=0, DRIFT skipped=NONE). Earlier dev101 validation 2026-06-17 — block-diffusion serve apply failed=0 + coherent gen ("The capital of France is Paris." / Red-Blue-Yellow) + get_weather {"city":"Berlin"} tool-call (gemma4 parser). G4_26 applies_to.vllm_version_range >=0.22.1rc1.dev491 still satisfied (dev148 > dev491). Previous dev101 (nightly-4c626633) retained as rollback.
  # Consumed by `audit_v2_modeldef_vs_hardware_pin.py` (Phase 5.2.E) to
  # pin_hold CLEARED 2026-06-25 (dev424 bump): the shared a5000-2x hardware
  # YAML now pins the dev424 image (nightly-3f5a1e173, @sha256:c4fac672…) so
  # the ModelDef pin and the hardware image AGREE — no waiver needed. dev301
  # is the retained vLLM rollback; dev148 stays on the rig (sndr-daemon).
  pin_hold: null
  reference_metrics_ref: null  # no canonical baseline JSON yet — see reference_metrics block below (coherent-serve receipt only; speed pending).

# ─── Canonical patches matrix ──────────────────────────────────────────
# Only the one remaining DiffusionGemma-load-bearing flag (default_on=False
# in the registry; enabling it here is intentional — the model does not
# serve at TP=2 without it).
# G4_26 REMOVED 2026-07-05 (batch-triage STEP 0a): retired — vllm#46177
# (fix for #45719, merged 2026-06-26) ships a native different-approach TP
# fix (local vocab-shard slice + all_reduce) in dev672/dev714/dev748; the
# G4_26 anchor site is byte-absent on every live pin, so the flag was an
# enabled-flag-on-a-dead-patch landmine (opt-in flags outrank range caps).
patches:
  # PN-FP8MOE-KPAD — FP8-core backport of OPEN vllm#45703. The fused
  # Marlin MoE kernel needs the intermediate dim % 64 == 0; DiffusionGemma's
  # N=352 (352 % 64 == 32) crashes with "Invalid thread config ...
  # MKN=[16384,352,2816] num_bits=8". PN-FP8MOE-KPAD pads the intermediate
  # (and the converted FP8 scales) so the misaligned FP8 layer USES fast
  # Marlin. Shape-gated: already-aligned intermediates pass through at zero
  # cost (no 35B regression even when on). Padded region self-cancels.
  GENESIS_ENABLE_PN_FP8MOE_KPAD: '1'

# ─── patches_attribution — INTENTIONALLY OMITTED (schema-blocked) ──────
# The gold reference (qwen3.6-27b-int4-autoround-tq-k8v4.yaml) carries a
# `patches_attribution:` map keyed by canonical registry patch ID (P67,
# PN17, …). That map CANNOT be expressed for this model: the schema key
# validator `_check_patch_id` (sndr/model_configs/schema_v2.py:71) enforces
# the regex `^P[N]?[0-9]+[A-Za-z0-9_]*$`, which requires a digit
# immediately after `P`/`PN`. THIS model's only two patches have canonical
# registry IDs `G4_26` (starts with `G`) and `PN-FP8MOE-KPAD` (no digit
# after `PN`) — both are REJECTED by that regex. Verified 2026-06-23:
# constructing patches_attribution['G4_26'] raises
#   SchemaError: patches_attribution['G4_26']='G4_26' must match pattern
#   P[N]?\d+[A-Za-z0-9_]* (e.g. P67, P67b, PN119, PN16_V6).
# So adding an attribution block here would FAIL ModelDef.validate() (it
# would break the clean-audit invariant). Using a regex-mangled key would
# break the registry cross-reference contract _check_patch_id exists to
# enforce, and would not be a real attribution. The per-patch role +
# evidence therefore live in the inline comments on the `patches:` block
# above (load_bearing — the model does NOT boot/serve at TP=2 with the
# flag OFF; see reference_metrics + the header RENDER-PATH GAPS block).
# Evidence basis:
#   • G4_26          → RETIRED 2026-07-05 (was: backport of vllm PR #45774
#                      TP-vocab all-gather). Superseded by native vllm#46177
#                      local-shard soft-embed (in dev672+); flag removed
#                      from the patches block above.
#   • PN-FP8MOE-KPAD → registry category=kernel, family=quantization.marlin,
#                      backport of OPEN vllm#45703 (FP8 MoE tile pad).
#                      Gold-equivalent role: load_bearing (removal → engine
#                      init crash "Invalid thread config MKN=[16384,352,2816]").
# RE-ENABLE this block ONLY after the schema regex is widened to accept
# `G4_*` / hyphenated registry IDs (a separate, reviewed schema change).

# ─── Reference metrics (coherent-serve receipt; speed pending) ─────────
# Not a formal canonical baseline JSON (versions.reference_metrics_ref is
# null). This is the qualitative validation receipt for the TP=2 config.
reference_metrics:
  validated_on: '2026-06-17'
  hardware: a5000-2x-24gbvram-16cpu-128gbram
  vllm_pin: 0.23.1rc1.dev101+g4c6266331
  config: TP=2, enforce_eager, max_model_len=4096, max_num_seqs=2, gpu_mem=0.80
  result: >-
    TP=2 coherent serve validated 2026-06-17 (model produces coherent text
    at tensor-parallel-size 2 on 2× A5000 with G4_26 + PN-FP8MOE-KPAD).
    Speed pending proper block-diffusion end-to-end measurement
    (AR decode-TPOT N/A — block diffusion has no autoregressive per-token
    decode loop; throughput must be measured per generated block, not per
    AR step). wall_TPS / TPOT / accept_rate intentionally omitted until a
    block-diffusion-aware bench harness is wired.

# ─── Composition hints ─────────────────────────────────────────────────
compose_hints:
  family: gemma4
  attention_arch: gemma4_moe
  drafter_method: null      # NO drafter — block diffusion, not spec-decode
  drafter_id: null

# ─── extra_vllm_flags — raw vLLM CLI escape hatch ──────────────────────
# Generic pass-through map `{--flag: value}` (compose() emits each as
# `--flag value`, or bare `--flag` for an empty-string value). Schema type
# is dict[str,str] (schema_v2.py:349) — an empty MAP `{}` is the no-op form,
# NOT an empty list. Most flags this model needs are already derived from
# the structured fields above (model_path, dtype, capabilities, requires) or
# documented in the header RENDER-PATH GAPS block as an operator hand-add the
# V2 render path cannot yet express (--enforce-eager, --generation-config
# vllm, the explicit Genesis apply step, DiffusionGemma-specific system_env).
# Those are deliberately NOT placed here because they require render
# semantics (eager sizing, a different generation flag, an in-container apply
# step) that a plain `--flag value` pass-through cannot carry.
#
# --num-gpu-blocks-override (2026-06-23): THE key lever for the rig-validated
# gmu0.90 / 131072-ctx config (see the diffusiongemma-tp2 profile sizing
# header). vLLM sizes the KV pool to FILL the gpu-memory-utilization budget;
# at gmu0.90 the unbounded pool over-allocates KV and OOMs the post-load
# block-diffusion working set (root cause of the prior gmu0.70 fallback was
# KV over-allocation, NOT an activation spike). Capping the pool to 8192
# blocks × 16 tokens/block = 131072 tokens leaves the util budget with the
# ~1.4 GiB/card headroom the rig agent measured (94.3% real util at boot).
# It is a true raw pass-through with no special render handling, so it lives
# here (the only such flag for this model). This model is used by exactly one
# profile (diffusiongemma-tp2), so the model-level placement is effectively
# per-profile. NOTE: the profile render path emits model.extra_vllm_flags
# (cli/legacy/profile.py render_profile_launcher); verify the rendered
# launcher carries `--num-gpu-blocks-override 8192`.
extra_vllm_flags:
  --num-gpu-blocks-override: '8192'

