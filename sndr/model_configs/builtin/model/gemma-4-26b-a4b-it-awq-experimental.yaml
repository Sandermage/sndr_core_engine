# SPDX-License-Identifier: Apache-2.0
# Status: 🧪 Experimental
# Caveats: G4_08 K-pad + G4_18 per-layer KV have implementation_status="partial".
#   Explicit experimental overlay — flips G4_02/G4_13 guards OFF, enables
#   G4_08/G4_18. Use base gemma-4-26b-a4b-it-awq.yaml for stable production.
# Genesis V2 model definition — Gemma 4 26B-A4B AWQ-4bit EXPERIMENTAL overlay.
#
# Per audit GEMMA4_PATCH_OPTIMIZATION_PLAN_2026-05-17_RU section P0:
#   "move G4_08/G4_18 from default-on into the experimental overlay
#    until real server validation lands".
#
# This profile flips:
#   G4_02 guard OFF  → allows boot when Marlin K%64≠0 path triggers
#   G4_08 K-pad ON   → routes through Genesis Triton zero-pad kernel
#   G4_13 guard OFF  → allows boot when asymmetric KV-heads config exists
#   G4_18 per-layer ON → uses per-layer-type KV-head counts
#
# WARNING: implementation_status for G4_08 and G4_18 is "partial" — these
# need server bench validation before promoting to default. See base
# profile gemma-4-26b-a4b-it-awq.yaml for the stable production stack.

schema_version: 2
kind: model
id: gemma-4-26b-a4b-it-awq-experimental
title: Gemma 4 26B-A4B AWQ-4bit EXPERIMENTAL (G4_08 K-pad + G4_18 per-layer KV)
maintainer: sandermage
last_validated: '2026-05-17'
license: gemma-license
inherits_from: gemma-4-26b-a4b-it-awq                    # base config (use compose if supported)

# ─── Identity (same as base) ───────────────────────────────────────────
model_path: /models/gemma-4-26B-A4B-it-AWQ-4bit
served_model_name: gemma-4-26b-a4b-exp
quantization: null
dtype: bfloat16
trust_remote_code: false
# 2026-06-23 LIVE FINDING (validated on prod-gemma4-26b, same AWQ-int4 Gemma
# family): the custom G4_11 gemma4.jinja BREAKS tool-calls + chat quality (raw
# <start_of_turn>... token echo, unreadable <|channel>thought<channel|> format,
# ZERO tool_calls / finish=length, spurious "thought\n"). Booting WITHOUT the
# override (built-in HF template) gives clean chat + a working tool-call. Set
# null so compose() emits NO --chat-template → vLLM uses the built-in HF template.
chat_template: null  # was /tmp/genesis/chat_templates/gemma4.jinja — see live finding above
override_generation_config:
  # 2026-06-23 quality fix (validated live on the 26B sibling; same AWQ-int4 Gemma
  # family). The checkpoint default temperature=1.0 degenerates into verbatim-repetition
  # loops on longer/creative generation; temp=0.7 + frequency/presence penalties is
  # coherent. Pin a stable serving default (clients/profiles may override per request).
  temperature: 0.7
  top_p: 0.95
  top_k: 64
  frequency_penalty: 0.6
  presence_penalty: 0.4

# ─── Capabilities ──────────────────────────────────────────────────────
capabilities:
  attention_arch: gemma4_moe
  tool_call_parser: gemma4
  reasoning_parser: null
  enable_auto_tool_choice: true
  # Phase 7.G4.26B-A4B.VARIANT-A-FIX (2026-05-23): MTP ownership moved
  # from ModelDef to ProfileDef. Mirrors the canonical 26B-A4B ModelDef
  # (gemma-4-26b-a4b-it-awq.yaml). The experimental variant follows the
  # same convention so future profiles using it inherit no K default.
  spec_decode: null
  kv_cache_dtype: auto

requires:
  min_total_vram_mib: 24000
  min_gpu_count: 1
  min_cuda_capability: [8, 6]
  rig_arch_blocklist: []

versions:
  genesis_pin_min: v12.0.0
  vllm_pin_required: 0.23.1rc1.dev748+g2dfaae752 # PROMOTED 2026-07-04 (pin bump dev714 -> dev748): operator-authorized. 35B-A3B live-window validated on the real dev748 digest (sha256:6a93ae43): boot apply applied=87/failed=0, 7/7 tool-call (qwen3_xml, no leak), 242.55 wall_TPS (CV 6.9%) within CV of same-day dev714 234.16 (parity, no regression), MTP K=5 accept 0.653, ctx-scaling 1K->32K LINEAR_OK. Full 7-model fleet sweep failed=0, re-verified on real dev748 2026-07-05 (PR#48 digest fix). dev714 = previous/rollback; dev672 dropped (<=2-pin). PRIOR: PROMOTED 2026-07-02 (pin bump dev672 -> dev714): operator-authorized. 35B-A3B live-window validated: boot apply applied=87/skipped=166/failed=0, 7/7 tool-call (qwen3_xml, no leak), 236.5 wall_TPS (CV 6.3%) within CV of dev672 240.55 (no regression), MTP K=5 accept 0.666. Improved wiring-aware drift tool: IDENTICAL profile to dev672 (0 new drifts). Other A5000-2x models carry the shared hardware pin; boot-validate on next launch. dev672 = previous/rollback; dev424 dropped (<=2-pin). PRIOR: PROMOTED 2026-07-01 (pin bump dev424 -> dev672): operator-authorized. 35B-A3B window-validated on the main-sync tree: boot apply failed=0, 7/7 tool-call + get_weather Berlin (qwen3_xml, no leak), 240.55 wall_TPS (CV 6.0%) = 98.4% of dev424 244.35 within CV (no regression), MTP K=5 accept 0.679, TQ CUDA stack applies (PN119/P67/P67b/PN399). Other A5000-2x models carried with the shared hardware pin; boot-validate on next launch. dev424 = previous/rollback. PRIOR: PROMOTED 2026-06-25 (pin bump dev301 -> dev424): operator-authorized. Apples-to-apples canonical bench: 35B 244.35 TPS vs dev301 234.77 = +4.08% (NO regression); 27B 134.53 net-neutral; Gemma 26B/31B smoke PASS (Paris + get_weather). DOGFOOD bump_preflight = EXIT 1 (HIGH PN353A->PN399 static edge, MITIGATED: PN399 native C2 sibling applied + the +4.08% A/B clears it); PN386 RETIRED (vllm#45389 merged, IN dev424). dev301 = previous/rollback. Earlier evidence: PROMOTED 2026-06-24 (pin bump dev148 -> dev301): 35B 208 TPS + 31B 94.7 TPS boot+chat+tool-call validated; 5 anchor_drift handled (PN394/PN400 retired, PN353A/PN382 re-anchored, P85 OFF); dev148 = previous/rollback. Prior dev148 evidence: PROMOTED 2026-06-19 (K=5 + PN394/PN399 + Gemma kv-auto validated on dev148); dev101 = previous/rollback. Engine + patch set fleet-validated on dev148 (35B/27B/Gemma4-31B/26B-MoE/DiffusionGemma boot apply failed=0); this variant boot-validates on next launch.
  # Consumed by `audit_v2_modeldef_vs_hardware_pin.py` (Phase 5.2.E)
  # to suppress the would-be ERROR for this row.
  pin_hold: "experimental variant not covered by the 2026-06-11 fleet validation
    (base 26B ModelDef promoted; this variant needs its own boot+bench
    cycle on 0.22.1 before promotion)."
  reference_metrics_ref: null  # Phase 5.2.D (2026-05-22): formalize receipt-only state. The referenced baseline JSON was never generated (audit_v2_vllm_pin_consistency reported file-not-found). This is the experimental variant — runtime evidence shares the canonical Gemma 26B path via P1.7d byte-equivalence rehearsal. A formal canonical baseline JSON requires the full sustained-methodology bench cycle and is deferred to Phase 7.

# ─── Canonical patches matrix — EXPERIMENTAL: G4_08 + G4_18 ENABLED ────
patches:
  # ── Guards (default-on safety) ──
  GENESIS_ENABLE_G4_01_GEMMA4_FP8_BLOCK_GUARD: '1'
  GENESIS_ENABLE_G4_03_GEMMA4_NON_CAUSAL_DRAFTER_GUARD: '1'
  GENESIS_ENABLE_G4_12_GEMMA4_FP8_E4NV_GUARD: '1'

  # ── KEY DIFFERENCE from base profile: G4_02 OFF, G4_08 ON ──
  GENESIS_ENABLE_G4_02_GEMMA4_MARLIN_KDIM_GUARD: '0'      # disabled — G4_08 will route through Triton K-pad kernel
  GENESIS_DISABLE_G4_02_GUARD: '1'                        # explicit override for G4_02 (mutual-exclusive with G4_08)
  GENESIS_ENABLE_G4_08_MARLIN_KDIM_PAD: '1'               # EXPERIMENTAL — Genesis Triton K-pad MoE GEMM kernel

  # ── KEY DIFFERENCE: G4_13 OFF, G4_18 ON (only if checkpoint truly asymmetric) ──
  GENESIS_ENABLE_G4_13_GEMMA4_PER_TOKEN_HEAD_KV_GUARD: '0'    # disabled — G4_18 will adapt KV spec per layer type
  GENESIS_DISABLE_G4_13_GUARD: '1'                            # explicit override
  GENESIS_ENABLE_G4_18_GEMMA4_PER_LAYER_KV_PAGE_SIZE: '1'     # EXPERIMENTAL — per-layer KV-head spec

  # ── Stable fixes (same as base) ──
  GENESIS_ENABLE_G4_04_GEMMA4_AWQ_MOE_KEYS_REMAP: '1'
  # G4_05 retired 2026-05-24 (PIN.R-G4_05-RETIRE.1) — superseded by vllm#39930 in dev16+; env removed.
  GENESIS_ENABLE_G4_09_GEMMA4_SWA_PREFILL_CHUNKER: '1'
  # 2026-06-23 LIVE FINDING: the custom template G4_11 installs is what broke
  # tool-calls + chat quality on the 26B sibling. Disabled so chat_template:null
  # falls through to the model's built-in HF template.
  GENESIS_ENABLE_G4_11_GEMMA4_CHAT_TEMPLATE_INSTALL: '0'  # was '1' — see live finding above
  GENESIS_ENABLE_G4_14_GEMMA4_TOOL_CALL_PARSER_PAD: '1'
  GENESIS_ENABLE_G4_16_GEMMA4_FULL_AND_PIECEWISE: '1'
  GENESIS_ENABLE_G4_23_GEMMA4_VISION_FP16_OVERFLOW: '1'
  GENESIS_ENABLE_G4_25_GEMMA4_RoPE_DUAL_BASE_GUARD: '1'
  GENESIS_ENABLE_G4_17_GEMMA4_VISION_SKIP: '0'

  # ── Perf experimental (still OFF until deep anchor patches G4_15b/G4_24b land) ──
  GENESIS_ENABLE_G4_15_GEMMA4_FUSED_RMSNORM: '0'
  GENESIS_ENABLE_G4_24_GEMMA4_FUSED_SOFTCAP: '0'
  GENESIS_ENABLE_G4_06_GEMMA4_KV_PROJ_V0: '0'

  # ── PR #40914 backport — TQ K+1 spec-verify cudagraph fix (added 2026-05-17) ──
  GENESIS_ENABLE_G4_67_TQ_SPEC_VERIFY_ROUTE: '1'             # safe no-op without TQ backend

  # ── Qwen-applicable patches (MTP/general-purpose, added 2026-05-17) ──
  GENESIS_ENABLE_PN33_SPEC_DECODE_WARMUP_K: '1'              # MTP K-aware warmup
  GENESIS_ENABLE_PN35_INPUTS_EMBEDS_OPTIONAL: '1'  # text-only inputs_embeds skip
  GENESIS_ENABLE_PN116: '1'  # TQ prefill max_seq_len fallback
  GENESIS_ENABLE_PN118: '1'  # TQ workspace graceful-fallback
  GENESIS_ENABLE_PN119: '1'  # TQ k8v4 GQA head grouping
  GENESIS_ENABLE_PN286_FA_LAYOUT_REVERT_SM86: '1'  # Ampere SM 8.6 FA KV layout revert
  GENESIS_ENABLE_P108: '1'             # MTP draft stream sync
  GENESIS_ENABLE_P109: '1'             # sampler safety (vllm#42614) — short form matches registry env_flag
  GENESIS_ENABLE_PN110: '1'            # BlockPool.free_blocks dedup (vllm#42615) — short form matches registry env_flag

  # ── Cross-family ──
  GENESIS_ENABLE_PN126_V1_DECODE_WARMUP: '1'

compose_hints:
  family: gemma4
  attention_arch: gemma4_moe
  drafter_method: mtp
  drafter_id: gemma4-26b-a4b-assistant
  workload_hint: experimental

# ─── Raw vLLM CLI escape hatch ─────────────────────────────────────────
# Generic {flag: value} pass-through emitted by compose() into
# cfg.vllm_extra_args as `--flag value` pairs (B10, schema_v2.py:339).
# Keys MUST start with `--`. Empty {} BY DESIGN: this experimental overlay
# needs no raw flags — every behavior knob it changes is derived from the
# `patches`/`capabilities`/`chat_template` fields above (compose() already
# emits --chat-template + --enable-expert-parallel for the gemma4_moe path).
# Use this only for a one-off vLLM CLI flag with no dedicated config field.
# NOTE: the schema field is dict[str, str]; an empty MAP is `{}`, not `[]`
# (validate() iterates `.items()`, so a list would raise AttributeError).
extra_vllm_flags: {}

# ─── Operator notes ────────────────────────────────────────────────────
notes:
  - "Gemma 4 26B-A4B AWQ-4bit EXPERIMENTAL overlay on 1× / 2× A5000 (Ampere
    SM 8.6, >=24 GiB VRAM). Diverges from the stable base
    gemma-4-26b-a4b-it-awq.yaml on exactly two axes: it flips the
    Marlin-K-dim guard (G4_02) OFF + routes K%64!=0 MoE GEMMs through the
    Genesis Triton zero-pad kernel (G4_08), and flips the asymmetric-KV
    guard (G4_13) OFF + selects per-layer-type KV-head counts (G4_18)."
  - "STATUS: experimental. G4_08 (Marlin K-pad) and G4_18 (per-layer KV)
    both carry implementation_status='partial' in PATCH_REGISTRY and have
    NOT had a server boot+bench cycle on the 0.23.1 pin. Use the stable
    base profile for production; this variant is a validation candidate
    only. See header WARNING + GEMMA4_PATCH_OPTIMIZATION_PLAN_2026-05-17_RU
    section P0 (move G4_08/G4_18 into this overlay until real validation)."
  - "G4_18 CAVEAT (registry doc, dev491 audit): on vLLM >=0.22 the
    get_num_kv_heads(self, parallel_config) signature dropped the layer_idx
    kwarg, so the per-layer branch cannot fire and G4_18 falls through to
    the original — it does NOT actually supersede G4_13 on that pin. The
    G4_13-OFF flip here is therefore only safe once #40391 lands; treat the
    G4_13/G4_18 swap as the headline thing this overlay exists to validate."
  - "kv_cache_dtype=auto + spec_decode=null are intentional on this
    ModelDef: MTP ownership lives in ProfileDef (Phase 7.G4.26B-A4B.
    VARIANT-A-FIX), mirroring the canonical 26B base. The TQ-path /
    spec-decode patches enabled below (PN116/PN118/PN119, PN33/P108) only
    actually fire once a profile composes TQ KV + MTP K on top — on the
    bare ModelDef their applies_to / spec-decode predicates self-skip."

# ─── patches_attribution (Phase A backfill, 2026-06-22) ────────────────
# Keyed by canonical registry patch ID (NOT env-flag name). Same taxonomy +
# house style as the GOLD reference qwen3.6-27b-int4-autoround-tq-k8v4.yaml.
# Evidence-based: each role is derived from the patch's PATCH_REGISTRY
# entry (category + doc) and, where the same shared patch is attributed in
# the gold qwen file, the SAME classification vocabulary.
#
# SCOPE: only P*/PN* IDs appear here. The Gemma-specific G4_* patches
# (G4_01/02/03/04/08/09/11/12/13/14/16/18/23/25/67) CANNOT be keyed — the
# schema's _check_patch_id regex `^P[N]?\d+...` rejects the `G4_` prefix
# (schema_v2.py:68), exactly as the gold file omits its G4_61 entry. The
# G4_* roles are documented inline in the `patches:` matrix comments above.
#
# load_bearing | suspected_regression -> `note` required
# optional_perf                       -> `bench_evidence` required
# defensive | no_op | unknown         -> no auxiliary field required
patches_attribution:
  PN33:
    role: defensive
    note: |
      K-aware spec-decode warmup (vllm#37521, registry category
      spec_decode, stable/full). On the bare ModelDef spec_decode=null so
      it self-skips; defensive once a profile adds MTP K — closes the
      eagle_prepare_* / TQ-workspace-grow OOM that a K=1 dummy warmup
      causes (registry doc: "real correctness fix, not experimental").
  PN35:
    role: defensive
    note: |
      Skip the (max_num_tokens, hidden_size) inputs_embeds buffer for
      text-only models (vllm#35975, perf_hotfix/stable). Registry: "no
      regression possible" — the if-guard preserves the original
      allocation for multimodal. Pure memory-headroom guard on the
      borderline 24 GiB single-card path.
  PN116:
    role: defensive
    note: |
      tentative: TurboQuant prefill max_seq_len counter-regression fix
      (corrects vllm#41434; registry category perf_hotfix, SM<9.0-gated).
      On the GOLD TQ ModelDef this is load_bearing (-9.7% wall_TPS on
      removal), but THIS overlay declares kv_cache_dtype=auto, so the
      applies_to:{is_turboquant} predicate self-skips until a profile
      composes TQ k8v4 KV on top. Classified defensive-for-now;
      re-tag load_bearing if a TQ profile adopts this variant.
  PN118:
    role: defensive
    note: |
      tentative: TurboQuant workspace graceful-fallback (vllm#42551,
      stability/experimental) — closes a first-decode AssertionError on
      partial-TQ models. Inert on this auto-KV ModelDef; fires only under
      a composed TQ k8v4 profile. Conservative defensive pending a TQ
      bench on this variant.
  PN119:
    role: optional_perf
    bench_evidence: >-
      tentative: upstream vllm#40792 measured +16.5-27.2% TPS on A100/H100
      at GQA-ratio in {4,8,24}; not yet benched on this auto-KV overlay
      (TQ grouped-decode kernel only routes under a composed TQ k8v4
      profile, so the win is unrealized on the bare ModelDef).
    note: |
      TurboQuant k8v4 GQA head-grouping decode kernel (kernel_perf,
      experimental). Self-skips on the non-TQ auto path here.
  PN286:
    role: defensive
    note: |
      FA KV-cache layout revert for Ampere SM 8.6 (Genesis-original,
      perf_hotfix). Strictly SM-8.6 gated and self-skips on TQ-only paths;
      on the gold 27B MTP path it was measured NEUTRAL (TQ layers bypass
      native FA) and +6.6% on the 35B native-FA path. Defensive insurance
      for any native-FlashAttention layer this overlay routes on A5000.
  P108:
    role: defensive
    note: |
      MTP draft-loop stream synchronization (derived from vllm#42603,
      registry upstream_pr_relationship=defensive_overlay). Backend-gated
      to the FlashInfer family + cached first-call decision; a single
      attribute read on non-racy backends. Closes a cudaErrorIllegalAddress
      race in LLMBaseProposer.propose(); no-op without spec-decode active.
  P109:
    role: defensive
    note: |
      sampling_params vocab-range validators (vllm#42614, stability).
      Bounces out-of-vocab stop_token_ids / logprob_token_ids with a clean
      400 instead of OOB-ing the Triton bias kernel. Bit-identical for
      valid inputs — defense-in-depth for the public OpenAI-compatible
      serving surface.
  PN110:
    role: defensive
    note: |
      BlockPool.free_blocks deduplication (vllm#42615, stability/kv_cache).
      Dedups by id(block) so a double-freed KVCacheBlock cannot
      double-decrement ref_cnt. Composes cleanly with the PN95/PN96 cache
      family; warns when duplicates are observed.
  PN126:
    role: defensive
    bench_evidence: "TTFT spike 5-25s on first decode without warmup (boot-only cost)"
    note: |
      V1 decode + spec-decode kernel warmup orchestrator (Genesis-original,
      perf_hotfix). Same role + bench anchor the GOLD qwen file assigns to
      PN126 — pre-JITs decode kernels at boot so the first user request
      does not eat a JIT spike.
