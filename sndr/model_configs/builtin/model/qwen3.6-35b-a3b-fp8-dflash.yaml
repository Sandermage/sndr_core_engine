# Status: ⚠️ Production w/ caveats
# Caveats: single-stream path only (bf16 KV, no TQ k8v4); requires separate
#   /models/Qwen3.6-35B-A3B-DFlash drafter checkpoint. For multi-conc serving
#   use sister qwen3.6-35b-a3b-fp8 (TQ k8v4 + MTP K=3 + 644 TPS @ conc=8).
# Genesis V2 model definition — Qwen 3.6 35B-A3B FP8 + DFlash N=3 spec-decode.
# Sister of qwen3.6-35b-a3b-fp8 (MTP K=3 + TQ k8v4 KV).
# Same target checkpoint, but DFlash needs a SEPARATE drafter model,
# default-fp16 KV (no TQ), bfloat16 dtype, single-stream sizing.
# Migrated from legacy a5000-2x-35b-fp8-dflash.yaml (Phase 3, 2026-05-12; V1 source retired 2026-06-01 in V1 sunset #4).
#
# Per-line comment style — same W-B exemplar discipline as 35B PROD.

schema_version: 2
kind: model
id: qwen3.6-35b-a3b-fp8-dflash                   # canonical ID; differs from MTP variant by spec method + KV
title: Qwen 3.6 35B-A3B FP8 + DFlash N=3 (Sander single-stream reference)
maintainer: sandermage
last_validated: '2026-05-21'                     # P2.DFlash M8-Q35 dev371 smoke + quick bench PASS
license: apache-2.0

# ─── Identity ──────────────────────────────────────────────────────────
model_path: /models/Qwen3.6-35B-A3B-FP8          # same checkpoint as MTP variant (different spec/KV path)
served_model_name: qwen3.6-35b-a3b               # OpenAI-API model name
quantization: null                               # null = FP8 native (no --quantization arg needed)
dtype: bfloat16                                  # bfloat16 (NOT float16) — DFlash drafter expects bf16; deviation from MTP variant
trust_remote_code: true                          # required for Qwen3 hybrid-GDN custom modeling code

# 2026-05-14 chat-template override — same Qwen3.6 family bug as the
# MTP sister (club-3090 disc #53). Chat-template gates input prompt
# rendering only; DFlash drafter affects verify-side spec decode and
# does not change template handling.
chat_template: /models/Qwen3.6-35B-A3B-FP8/chat_template_enhanced.jinja

# ─── Capabilities — DFlash variant ─────────────────────────────────────
# DFlash needs head_size=256 + non-causal attn. No Ampere backend supports
# that with fp8/turbo KV → KV must stay at default fp16 (different from
# MTP variant which uses TQ k8v4).
capabilities:
  attention_arch: hybrid_gdn_moe                 # same arch as MTP variant
  tool_call_parser: qwen3_xml  # 2026-06-17 (0.23.1): switched qwen3_coder -> qwen3_xml to match the validated 35B choice (qwen3_coder streaming leaks tool-call XML to the content channel; qwen3_xml emits clean tool_calls deltas; #45171 remaps qwen3_xml->Qwen3CoderToolParser engine-native on 0.23.1).
  reasoning_parser: qwen3                        # qwen3 </think> parser
  enable_auto_tool_choice: true                  # P68/P69 dependency
  spec_decode:
    method: dflash                               # DFlash N=3 with separate drafter (range: mtp|dflash|ngram|null)
    num_speculative_tokens: 3                    # DFlash N-value (3 is z-lab reference)
    model: /models/Qwen3.6-35B-A3B-DFlash        # z-lab separate drafter checkpoint (NOT integrated like MTP)
  kv_cache_dtype: null                           # null = default fp16; DFlash head_size=256 constraint forbids TQ/fp8 on Ampere

# ─── Hardware preconditions composer enforces ──────────────────────────
requires:
  min_total_vram_mib: 44000                      # 2 × 22 GB minimum (weights + KV + drafter overhead)
  min_gpu_count: 2                               # DFlash 35B needs TP=2
  min_cuda_capability: [8, 6]                    # Ampere SM 8.6
  rig_arch_blocklist: []

versions:
  genesis_pin_min: v11.0.0                       # minimum sndr_core version
  vllm_pin_required: 0.23.1rc1.dev748+g2dfaae752 # PROMOTED 2026-07-04 (pin bump dev714 -> dev748): operator-authorized. 35B-A3B live-window validated on the real dev748 digest (sha256:6a93ae43): boot apply applied=87/failed=0, 7/7 tool-call (qwen3_xml, no leak), 242.55 wall_TPS (CV 6.9%) within CV of same-day dev714 234.16 (parity, no regression), MTP K=5 accept 0.653, ctx-scaling 1K->32K LINEAR_OK. Full 7-model fleet sweep failed=0, re-verified on real dev748 2026-07-05 (PR#48 digest fix). dev714 = previous/rollback; dev672 dropped (<=2-pin). PRIOR: PROMOTED 2026-07-02 (pin bump dev672 -> dev714): operator-authorized. 35B-A3B live-window validated: boot apply applied=87/skipped=166/failed=0, 7/7 tool-call (qwen3_xml, no leak), 236.5 wall_TPS (CV 6.3%) within CV of dev672 240.55 (no regression), MTP K=5 accept 0.666. Improved wiring-aware drift tool: IDENTICAL profile to dev672 (0 new drifts). Other A5000-2x models carry the shared hardware pin; boot-validate on next launch. dev672 = previous/rollback; dev424 dropped (<=2-pin). PRIOR: PROMOTED 2026-07-01 (pin bump dev424 -> dev672): operator-authorized. 35B-A3B window-validated on the main-sync tree: boot apply failed=0, 7/7 tool-call + get_weather Berlin (qwen3_xml, no leak), 240.55 wall_TPS (CV 6.0%) = 98.4% of dev424 244.35 within CV (no regression), MTP K=5 accept 0.679, TQ CUDA stack applies (PN119/P67/P67b/PN399). Other A5000-2x models carried with the shared hardware pin; boot-validate on next launch. dev424 = previous/rollback. PRIOR: PROMOTED 2026-06-25 (pin bump dev301 -> dev424): operator-authorized. Apples-to-apples canonical bench: 35B 244.35 TPS vs dev301 234.77 = +4.08% (NO regression); 27B 134.53 net-neutral; Gemma 26B/31B smoke PASS (Paris + get_weather). DOGFOOD bump_preflight = EXIT 1 (HIGH PN353A->PN399 static edge, MITIGATED: PN399 native C2 sibling applied + the +4.08% A/B clears it); PN386 RETIRED (vllm#45389 merged, IN dev424). dev301 = previous/rollback. Earlier evidence: PROMOTED 2026-06-24 (pin bump dev148 -> dev301): 35B 208 TPS + 31B 94.7 TPS boot+chat+tool-call validated; 5 anchor_drift handled (PN394/PN400 retired, PN353A/PN382 re-anchored, P85 OFF); dev148 = previous/rollback. Prior dev148 evidence: PROMOTED 2026-06-19 (supersedes dev101+g4c6266331): K=5 + PN394/PN399 + Gemma kv-auto validated on dev148; dev101 = previous/rollback. (DFlash M8-Q35, originally P2.DFlash 2026-05-21.) Requires PN275 wired in via this ModelDef's patches matrix (M6 commit 12d901a5) — closes the cross-validator at vllm/config/vllm.py:1703-1715 that broke DFlash drafter VllmConfig rebuilds under P95 + P66. Previous dev101 (nightly-4c626633) retained as rollback per CLAUDE.md pin policy.
