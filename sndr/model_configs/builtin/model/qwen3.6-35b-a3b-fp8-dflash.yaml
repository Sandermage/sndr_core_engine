  # to suppress the would-be ERROR for this row.
  pin_hold: "DFlash drafter profile not yet smoke-validated on the
    0.22.1 pin (fleet validation 2026-06-11 covered the MTP K=3
    profile only; PN38 Site B became upstream-native on dev259 and
    the trimmed patch needs a dflash boot+bench cycle). Holding
    626fa9bb until the dflash validation cycle runs."
  reference_metrics_ref: null                    # no JSON baseline yet. dev371 quick bench (n=25): decode_TPOT 8.73 ms mean (CV 13.4%), TTFT 153.5 ms mean, wall_TPS 83.7 mean — the FASTEST decode TPOT in the Qwen lineup thanks to A3B MoE 3B active params + DFlash K=3. Receipt: sndr_private/planning/bench_results/2026-05-21/P2_DFLASH_M5_RETRY_Q35_PASS_2026-05-21_RU.md. NOT a formal canonical baseline — full sustained-methodology cycle still pending.

# ─── Canonical patches matrix (37 entries) ─────────────────────────────
# Notable differences vs MTP variant:
#   • P67_NUM_KV_SPLITS=32 (vs 48 — non-TQ path uses smaller split count)
#   • P78_TOLIST_CAPTURE_GUARD=1 (ON for DFlash; OFF in MTP)
#   • DFlash family enabled: PN23/PN24/PN40
#   • TQ-specific patches dropped: P95, PN52, PN66, PN67, PN77, PN8
patches:
  # ── dev371 DFlash compatibility (required) ──
  # PN275 closes the dev371 boot defect for DFlash spec_decode paths:
  # P95 (Marlin TP cudagraph cap) sets max_cudagraph_capture_size=8
  # post-init while P66 keeps cudagraph_capture_sizes at 6, producing
  # a mid-rebuild desync that dev371's new cross-validator at
  # vllm/config/vllm.py:1703-1715 rejects. PN275 ships a 3-layer fix:
  #   (a) utils.replace text-patch self-install (catches workers'
  #       _create_draft_vllm_config → replace() chain)
  #   (b) vllm/config/vllm.py validator waiver (catches EngineCore's
  #       _perform_handshakes → direct __post_init__ entry point)
  #   (c) in-process setattr wrap (defense-in-depth for already-imported
  #       module state in APIServer + EngineCore)
  # Env-off behavior is byte-identical to upstream. Required for DFlash
  # ModelDef pin promotion to dev371.
  # Evidence: sndr_private/planning/bench_results/2026-05-21/
  #   P2_DFLASH_M5_RETRY_Q35_PASS_2026-05-21_RU.md (Q35-DFlash E2E PASS).
  GENESIS_ENABLE_PN275_DFLASH_MAX_CGS_ALIGN: '1'
  GENESIS_ENABLE_PN33_SPEC_DECODE_WARMUP_K: '1'  # K-aware MTP warmup — closes eagle_prepare_* JIT spikes (vllm#37521)
  GENESIS_ENABLE_PN35_INPUTS_EMBEDS_OPTIONAL: '1'  # text-only inputs_embeds skip
  # PN286_FA_LAYOUT_REVERT_SM86 disabled on DFlash — incompatible with DFlash KV layout
  # (caused "key_cache, value_cache = kv_cache.unbind(1)" ValueError at boot 2026-06-03).
  # GENESIS_ENABLE_PN286_FA_LAYOUT_REVERT_SM86: "0"
  GENESIS_ENABLE_P108: '1'  # MTP draft stream sync
  GENESIS_ENABLE_P109: '1'  # sampling_params vocab-range validators
  GENESIS_ENABLE_PN110: '1'  # BlockPool.free_blocks dedup

  # ── Spec-decode + structured-output safety net ──
  GENESIS_ENABLE_P58_ASYNC_PLACEHOLDER_FIX: '1'      # vllm#40807 — async-scheduler placeholder fix
  GENESIS_ENABLE_P60_GDN_NGRAM_FIX: '1'              # vllm#40738 (Phase 1) — GDN+ngram SSM state recovery on rollback
  GENESIS_ENABLE_P60B_TRITON_KERNEL: '1'             # Phase 2 — Triton kernel offset fix for GDN+ngram
  GENESIS_ENABLE_P61B_STREAMING_OVERLAP: '1'         # vllm#40783 — Qwen3 streaming partial-tag overlap guard
  GENESIS_ENABLE_P62_STRUCT_OUT_SPEC_TIMING: '1'     # vllm#36138 — structured-output spec-decode timing fix
  GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: '1'   # vllm#39598 — MTP streaming early-return removal (composes with DFlash via dispatcher)
  GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: '1'      # cudagraph capture size filter — OOM protection
  # ── TQ kernel still helps even without TQ KV (smaller splits) ──
  GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL: '1'      # Genesis-original Triton multi-query kernel
  GENESIS_P67_USE_UPSTREAM: '1'                      # P67 routing: '1'=upstream Genesis kernel
  GENESIS_P67_NUM_KV_SPLITS: '32'                    # 32 (vs 48 in MTP) — non-TQ KV path uses smaller split count
  # ── Tool-call safety net ──
  GENESIS_ENABLE_P68_AUTO_FORCE_TOOL: '1'            # auto tool_choice on tool-mention prompts
  GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: '1'     # long-ctx tool-format reminder
  GENESIS_ENABLE_P70_AUTO_STRICT_NGRAM: '1'          # auto-set prompt_lookup_min=8
  GENESIS_P68_P69_LONG_CTX_THRESHOLD_CHARS: '50000'  # threshold in chars (≈12K tokens)
  # ── Memory / KV cache management ──
  GENESIS_ENABLE_P37: '1'                            # MoE intermediate cache pool
  GENESIS_TQ_MAX_MODEL_LEN: '320000'                 # TQ cap — informational on non-TQ path
  GENESIS_ENABLE_P72_PROFILE_RUN_CAP: '1'            # caps profile_run M dim
  GENESIS_PROFILE_RUN_CAP_M: '4096'                  # must equal max_num_batched_tokens
  GENESIS_ENABLE_P74_CHUNK_CLAMP: '1'                # chunked-prefill chunk-size clamp
  # ── FP8 + MoE ──
  GENESIS_ENABLE_P81_FP8_BLOCK_SCALED_M_LE_8: '1'    # FP8 block-scaled MM optimization for M≤8 (35B FP8 native)
  GENESIS_ENABLE_P82: '1'                            # SGLang acceptance OR-clause backport
  GENESIS_P82_THRESHOLD_SINGLE: '0.3'                # 0.3 = optimum for 35B with FP8 path (range 0.1-0.5)
  GENESIS_ENABLE_P98: '1'                            # vllm#40941 WorkspaceManager fix (hybrid GDN essential)
  GENESIS_ENABLE_P99: '1'                            # WorkspaceManager.get_simultaneous memoize (vllm#40941 perf hotfix — composes with P98)
  GENESIS_ENABLE_P101: '1'                           # vllm#41127 — uniform query_len>1 batches through prefill wrapper
  # ── DFlash-specific safeguards ──
  GENESIS_ENABLE_P78_TOLIST_CAPTURE_GUARD: '1'       # ON for DFlash (OFF in MTP) — protects against tolist capture in cudagraph mode
  GENESIS_ENABLE_PN11_GDN_AB_CONTIGUOUS: '1'         # GDN A/B contiguity guard
  GENESIS_ENABLE_PN17_FA2_LSE_CLAMP: '1'             # FA2 softmax_lse long-ctx clamp
  GENESIS_ENABLE_PN22_LOCAL_ARGMAX_TP: '1'           # local argmax under TP — sampling correctness on DFlash path
  # ── DFlash family (separate drafter optimizations) ──
  GENESIS_ENABLE_PN23_DFLASH_DTYPE_FIX: '1'          # DFlash dtype guard — drafter bf16 mismatch fix
  GENESIS_ENABLE_PN24_DFLASH_AUX_LAYER_FIX: '1'      # DFlash auxiliary layer indexing fix
  GENESIS_ENABLE_PN40_DFLASH_OMNIBUS: '1'            # DFlash 4-part omnibus optimization (composes with MTP via dispatcher gate)
  # ── Misc + buffer mode ──
  GENESIS_ENABLE_P103: '1'                           # FLA Cliff 2 chunked prefill — hybrid GDN applicable
  GENESIS_PREALLOC_TOKEN_BUDGET: '4096'              # Genesis prealloc framework — token budget for shared scratch pools
  GENESIS_BUFFER_MODE: 'shared'                      # Genesis buffer mode (range: 'shared'|'exclusive'|'auto')
  # ── Wave 9 (2026-05-14) — same matrix verified on 35B-A3B-FP8 256K
  #    ladder (sibling `qwen3.6-35b-a3b-fp8` model). The dflash path
  #    here adds DFlash drafter on top; it is NOT yet bench-verified
  #    on the new env-flag matrix, so the entries below mirror the
  #    verified neighbour conservatively.
  GENESIS_ENABLE_P87: '1'                            # Spec-decode rejection ratio sanity guard.
  GENESIS_ENABLE_P91: '1'                            # AutoRound INT4 row-parallel group cdiv + start-idx quant-correctness fix (vllm#39460) — NOT a tool reminder
  GENESIS_ENABLE_PN71_THINKING_TAG_NORMALIZE: '1'    # Normalises malformed `<think>` from tokenizer drift.
  GENESIS_ENABLE_PN73_TOOL_ARGS_SAFE_NORMALIZE: '1'  # Tool argument JSON normaliser (Qwen3-Coder edge cases).
  GENESIS_ENABLE_PN91_DEVELOPER_ROLE: '1'            # OpenAI `developer` role passthrough for IDE agents.
  GENESIS_ENABLE_PN92_NIXL_EP_TRIAL_IMPORT: '1'      # Backport vllm#40154 — trial-import guard for nixl_ep / deep_ep / mori.
  GENESIS_ENABLE_PN95_TIER_AWARE_CACHE: '1'          # Tier-aware KV cache (GPU + CPU pinned + disk cold).
  GENESIS_ENABLE_PN96_EMERGENCY_DEMOTE: '1'          # Companion to PN95 — emergency demote on free-blocks threshold.
  GENESIS_ENABLE_PN102_PARAM_POOL: '0'               # PrefetchOffloader pinned-allocator prewarm. OFF — 35B FP8 PROD does not weight-offload.
  GENESIS_ENABLE_PN104_OFFLOAD_PREFETCH_REDIRECT: '0' # cpu_offload → Prefetch redirect. OFF — same.
  GENESIS_ENABLE_PN105_AUTOROUND_OFFLOAD_COMPAT: '0' # AutoRound INT4 + Prefetch compat. OFF — irrelevant on FP8 35B.
  GENESIS_ENABLE_PN106_GDN_H_POOL: '1'               # GDN inner chunk-state `h` pool.
  GENESIS_ENABLE_PN108_FUSED_RECURRENT_PREFILL: '0' # TOMBSTONED — fla recurrent kernel cannot serve single-seq prefill.
  GENESIS_ENABLE_PN201_SCHEDULER_EMPTY_CACHE: '1'    # Scheduler-tick `empty_cache()` hook, threshold-gated.
  GENESIS_ENABLE_PN204_DUAL_STREAM_INPROJ: '0'       # vllm#42301 port — OFF in single-conc DFlash profile.
                                                       # v1 history: eager torch.cuda.Event allocation raised type error.
                                                       # v1 lazy-init follow-up: dev371 profile_run crashed via
                                                       #   torch/_inductor/runtime/static_triton_launcher.py:291 CUDA invalid argument.
                                                       # v2 fix 2026-05-15: torch.compiler.is_compiling() guard + _PN204_ARMED hook
                                                       #   + explicit device=hidden_states.device on Stream + per-layer fallback.
                                                       # Bench dev371: neutral within CV on Ampere; future-proof for Hopper +5-10%.
                                                       # Re-enable in DFlash multi-conc preset if/when bench validates the combo
                                                       # (DFlash drafter overhead may compete with dual-stream benefits — re-test
                                                       # before promoting). Requires GENESIS_LEGACY_P7=0.
  GENESIS_ENABLE_SNDR_WORKSPACE_001: '1'             # Workspace grow-after-lock graceful fix.

  # ── Wave 10 (2026-05-15) — multi-conc unlock + correctness recoveries ──
  # Inherited from MTP sibling qwen3.6-35b-a3b-fp8.yaml. DFlash uses different
  # spec-decode path (separate drafter model, not MTP integrated), but most
  # Wave 10 patches apply identically — they target hybrid_gdn_moe forward
  # pass / serving layer / Marlin MoE workspace, independent of spec-decode method.
  # Multi-conc bench on DFlash NOT YET EXECUTED — apply with caution and re-bench
  # before promoting DFlash multi-conc to validated status.
  GENESIS_ENABLE_PN96B: '1'                          # Marlin persistent workspace (renamed 2026-05-15 from PN96 dict-key collision). +4-5% TPS recovery on Marlin MoE — was silently unloaded pre-rename. APPLIES on DFlash (same MoE expert path).
  GENESIS_ENABLE_PN51_QWEN3_STREAMING_THINKING_DISABLED: '1'  # vllm#40816 (OPEN). Defensive streaming guard for OpenAI clients reading delta.content. Reasoning-parser qwen3 used identically on DFlash.
  GENESIS_ENABLE_PN125_HYBRID_FULL_AND_PIECEWISE: '1' # PyTorch blog 2026-05 — forces cudagraph_mode=FULL_AND_PIECEWISE on Qwen3.5/3.6 hybrid_gdn_moe. Applies on DFlash target model (separate drafter has its own config).
  GENESIS_ENABLE_PN126_V1_DECODE_WARMUP: '1'         # V1 decode kernel warmup orchestrator — pre-JITs decode kernels at boot. DFlash benefits from this on target model warmup.
  GENESIS_ENABLE_PN127_AUTO_CHAT_TEMPLATE: '1'       # Qwen3.5/3.6 enhanced chat-template auto-install.
  GENESIS_ENABLE_PN128_SPEC_DECODE_WARMUP: '1'       # vllm#41481 backport — pre-JITs 4 eagle helper kernels. NOTE: eagle helpers are MTP-specific; on DFlash this becomes no-op (eagle kernels not in code path) but cost zero — keep ON for compatibility.
  GENESIS_ENABLE_PN129_SLOT_MAPPING_WARMUP: '1'      # vllm#42165 backport — pre-JITs _compute_slot_mapping_kernel. Applies on both MTP + DFlash decode paths.
  GENESIS_ENABLE_PN130_TQ_DECODE_WARMUP: '1'         # vllm#42215 backport — pre-JITs _tq_grouped_decode_stage1. NOTE: DFlash uses fp16/null KV (head_size=256 forbids TQ on Ampere), so this is no-op on DFlash target — keep ON for compatibility (it self-detects and skips).
  GENESIS_ENABLE_PN133_MTP_EMPTY_OUTPUT_FIX: '1'     # vllm#42722 backport — MTP scheduler empty-output guard. NOTE: targets MTP scheduler — no-op on DFlash spec-decode path but cost zero — keep ON.
  # GENESIS_ENABLE_PN134_TORCH_COMPILE_FULLGRAPH_211: KEEP OFF — retired 2026-05-15 (-25% TPS bench regressor on hybrid_gdn_moe; affects ALL spec-decode paths including DFlash via Inductor cache blow-up).

# ─── extra_vllm_flags — raw vLLM CLI escape hatch ──────────────────────
# Generic pass-through for raw vLLM CLI flags that compose.py does NOT
# already derive from this ModelDef (e.g. chat_template, override-generation
# -config, spec-decode, KV dtype are all emitted from their dedicated fields,
# so they MUST NOT be duplicated here). Schema: dict[str, str] keyed by
# `--flag`; compose.py emits `--flag value` per entry (empty-string value =
# bare flag). Empty {} by design — this DFlash variant needs no raw flags
# beyond what the typed fields above already render. Add an entry only for a
# flag with no dedicated ModelDef field.
extra_vllm_flags: {}

