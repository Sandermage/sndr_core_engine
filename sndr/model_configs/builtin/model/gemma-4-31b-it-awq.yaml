  - "Genesis G4_NN family carries the Gemma 4 enablement: Ampere refuse-
    guards (G4_01/03/12/13), prefill chunker for >4K (G4_09), tool-call
    pad-strip (G4_14), vision BF16 overflow fix (G4_23), FULL_AND_PIECEWISE
    cudagraph (G4_16), and the G4-TurboQuant VQ KV stack (G4_19/19B/31) that
    unlocks 256K context. G4_19C round-trip wrapper is OFF (codebook quality
    regression pending). G4_11 chat-template install is OFF (2026-06-23 live
    finding: the custom gemma4.jinja broke tool-calls + chat quality;
    chat_template:null now uses the model's built-in HF template)."
  - "Status: experimental — bench figures are projected (~80-100 TPS dense
    decode, MTP K=3); server validation pending (promote to Production
    after verify-full + 5x5 n=25 + soak PASS). MTP is workload-conditional:
    the default-role profile leaves spec_decode unset; the structured K=4
