# Status: 🧪 Experimental
# Caveats: projected bench only (~80-100 TPS dense decode, MTP K=3).
#   Server validation pending — promote to ✅ after verify-full + 5×5 bench
#   n=25 + soak PASS on 2× A5000. club-3090 ref `dual.yml` = 108/142 TPS.
# Genesis V2 model definition — Gemma 4 31B AWQ-4bit (cyankiwi) + MTP assistant.
# Dense architecture; MTP K=3 spec decode via google/gemma-4-31B-it-assistant.
# Tested on 2× A5000 (SM 8.6) — uses Genesis G4_NN family patches.
#
# Per-line comment style:
#   • WHAT the patch does / why this setting
#   • default + valid values for non-binary settings
#   • cross-reference to G4_NN patch when applicable
#
# Bench reference (projected — server validation pending):
#   wall_TPS  ~80-100 (dense decode, MTP K=3)
#   TPOT_ms   ~10-12  (decode at batch=1)
#   accept_rate ~0.75-0.85 (MTP assistant causal, KV-shared)
#   context   256K (with G4_09 chunked prefill)

schema_version: 2
kind: model
id: gemma-4-31b-it-awq
title: Gemma 4 31B-it AWQ-4bit (cyankiwi) + MTP assistant
maintainer: sandermage
last_validated: '2026-05-17'
license: gemma-license

# ─── Identity ──────────────────────────────────────────────────────────
model_path: /models/gemma-4-31B-it-AWQ-4bit              # cyankiwi/gemma-4-31B-it-AWQ-4bit checkpoint
served_model_name: gemma-4-31b                           # OpenAI-API model name
quantization: null                                       # let vLLM detect from compressed-tensors metadata (cyankiwi uses CT not stock awq_marlin)
dtype: bfloat16                                          # CHANGED 2026-05-17 per audit: club-3090 A/B confirmed --dtype half is -2-3% on Gemma 4 AWQ Ampere; BF16 is canonical for AWQ Marlin path on SM 8.6
trust_remote_code: false                                 # Gemma 4 is native vLLM model — no custom code
# 2026-06-23 LIVE FINDING (validated on prod-gemma4-26b, same AWQ-int4 Gemma
# family): forcing the custom G4_11 gemma4.jinja BREAKS tool-calls + chat quality
# (raw <start_of_turn>... token echo, unreadable <|channel>thought<channel|>
# format, ZERO tool_calls / finish=length, spurious "thought\n"). Booting WITHOUT
# the override (built-in HF template) gives clean chat + a working tool-call. null
# → compose() emits NO --chat-template → vLLM uses the model's built-in HF template.
chat_template: null  # was /tmp/genesis/chat_templates/gemma4.jinja — see live finding above
override_generation_config:
  # 2026-06-23 quality fix (validated live on the 26B sibling; same AWQ-int4 Gemma
  # family). The checkpoint default temperature=1.0 degenerates into verbatim-repetition
  # loops on longer/creative generation; temp=0.7 + frequency/presence penalties is
  # coherent. Pin a stable serving default (clients/profiles may override per request).
  temperature: 0.7
  top_p: 0.95
  top_k: 64
  frequency_penalty: 0.6
  presence_penalty: 0.4

# ─── Capabilities — inherent to this model ─────────────────────────────
capabilities:
  attention_arch: gemma4_dense                           # Gemma 4 dense (interleaved sliding+global+p-RoPE)
  tool_call_parser: gemma4                               # Gemma 4 tool-call parser (cleaned by G4_14 pad-strip)
  reasoning_parser: null                                 # Gemma 4 doesn't use <think> tags by default
  enable_auto_tool_choice: true                          # auto tool_choice on tool-mention prompts
  # Variant A migration (2026-05-20): MTP moved from ModelDef into the
  # structured-role profile gemma4-31b-tq-mtp-structured-k4. MTP is a
  # workload-conditional behavior, not an inherent model property:
  # structured workloads (tool_json, structured_count) benefit (+24%
  # on G5 bench); chat / summarization regress (-51%). The default-
  # role profile leaves spec_decode unset; structured/code profiles
  # set it via spec_decode_override.
  # See docs/_internal/GEMMA4_MTP_MODELDEF_MIGRATION_AUDIT_2026-05-20.md
  # for the audit + decision record.
  spec_decode: null
  kv_cache_dtype: auto                                   # values: auto|fp8|fp16; auto stays in dtype for safety

# ─── Hardware preconditions composer enforces ──────────────────────────
requires:
  min_total_vram_mib: 28000                              # 14 GB × 2 (AWQ 4-bit at TP=2; plus KV ~6 GB)
  min_gpu_count: 1                                       # supports 1× (single A6000 48 GB) and 2× (A5000 24 GB each)
  min_cuda_capability: [8, 6]                            # Ampere SM 8.6; G4_01 / G4_03 / G4_12 protect against unsupported combos
  rig_arch_blocklist: []

versions:
  genesis_pin_min: v12.0.0                               # G4_NN family lands in v12
  vllm_pin_required: 0.23.1rc1.dev748+g2dfaae752 # PROMOTED 2026-07-04 (pin bump dev714 -> dev748): operator-authorized. 35B-A3B live-window validated on the real dev748 digest (sha256:6a93ae43): boot apply applied=87/failed=0, 7/7 tool-call (qwen3_xml, no leak), 242.55 wall_TPS (CV 6.9%) within CV of same-day dev714 234.16 (parity, no regression), MTP K=5 accept 0.653, ctx-scaling 1K->32K LINEAR_OK. Full 7-model fleet sweep failed=0, re-verified on real dev748 2026-07-05 (PR#48 digest fix). dev714 = previous/rollback; dev672 dropped (<=2-pin). PRIOR: PROMOTED 2026-07-02 (pin bump dev672 -> dev714): operator-authorized. 35B-A3B live-window validated: boot apply applied=87/skipped=166/failed=0, 7/7 tool-call (qwen3_xml, no leak), 236.5 wall_TPS (CV 6.3%) within CV of dev672 240.55 (no regression), MTP K=5 accept 0.666. Improved wiring-aware drift tool: IDENTICAL profile to dev672 (0 new drifts). Other A5000-2x models carry the shared hardware pin; boot-validate on next launch. dev672 = previous/rollback; dev424 dropped (<=2-pin). PRIOR: PROMOTED 2026-07-01 (pin bump dev424 -> dev672): operator-authorized. 35B-A3B window-validated on the main-sync tree: boot apply failed=0, 7/7 tool-call + get_weather Berlin (qwen3_xml, no leak), 240.55 wall_TPS (CV 6.0%) = 98.4% of dev424 244.35 within CV (no regression), MTP K=5 accept 0.679, TQ CUDA stack applies (PN119/P67/P67b/PN399). Other A5000-2x models carried with the shared hardware pin; boot-validate on next launch. dev424 = previous/rollback. PRIOR: PROMOTED 2026-06-25 (pin bump dev301 -> dev424): operator-authorized. Apples-to-apples canonical bench: 35B 244.35 TPS vs dev301 234.77 = +4.08% (NO regression); 27B 134.53 net-neutral; Gemma 26B/31B smoke PASS (Paris + get_weather). DOGFOOD bump_preflight = EXIT 1 (HIGH PN353A->PN399 static edge, MITIGATED: PN399 native C2 sibling applied + the +4.08% A/B clears it); PN386 RETIRED (vllm#45389 merged, IN dev424). dev301 = previous/rollback. Earlier evidence: PROMOTED 2026-06-24 (pin bump dev148 -> dev301): 35B 208 TPS + 31B 94.7 TPS boot+chat+tool-call validated; 5 anchor_drift handled (PN394/PN400 retired, PN353A/PN382 re-anchored, P85 OFF); dev148 = previous/rollback. Prior dev148 evidence: PROMOTED 2026-06-19 (supersedes dev101+g4c6266331): K=5 + PN394/PN399 + Gemma kv-auto validated on dev148; dev101 = previous/rollback. Gemma 4 native model_executor + TURBOQUANT validated on dev148 (journal §20-COMPLETE: 31B health=200; §21 TQ A/B). Previous dev101 (nightly-4c626633) retained as rollback.
