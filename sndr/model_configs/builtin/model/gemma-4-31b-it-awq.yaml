  # role profile gets its first observation window. Drift-check is OFF
  # for this model until that baseline lands.
  reference_metrics_ref: null

# ─── Canonical patches matrix ──────────────────────────────────────────
patches:
  # ── Gemma 4 family guards (refuse known-broken combos) ──
  GENESIS_ENABLE_G4_01_GEMMA4_FP8_BLOCK_GUARD: '1'        # refuses FP8_BLOCK + Ampere (closes vllm#39407 user pain)
  GENESIS_ENABLE_G4_03_GEMMA4_NON_CAUSAL_DRAFTER_GUARD: '1'  # refuses Eagle3/DFlash drafter on Ampere (closes #40382)
  GENESIS_ENABLE_G4_12_GEMMA4_FP8_E4NV_GUARD: '1'         # refuses FP8 e4nv on Ampere (closes #41014)
  # ── Gemma 4 family fixes (default-on stability) ──
  # G4_05 retired 2026-05-24 (PIN.R-G4_05-RETIRE.1) — superseded by vllm#39930 in dev16+; env removed.
  GENESIS_ENABLE_G4_09_GEMMA4_SWA_PREFILL_CHUNKER: '1'    # closes vllm#39914 engine hang at prefill > 4K
  GENESIS_ENABLE_G4_11_GEMMA4_CHAT_TEMPLATE_INSTALL: '0'  # was '1' — 2026-06-23 live finding: the installed gemma4.jinja broke tool-calls + chat; disabled, chat_template:null uses built-in HF template
  GENESIS_ENABLE_G4_14_GEMMA4_TOOL_CALL_PARSER_PAD: '1'   # strips <pad>/<eos> from tool-call JSON (closes #39392)
  GENESIS_ENABLE_G4_16_GEMMA4_FULL_AND_PIECEWISE: '1'     # forces FULL_AND_PIECEWISE cudagraph (+10-30% TPS at low batch)
  GENESIS_ENABLE_G4_23_GEMMA4_VISION_FP16_OVERFLOW: '1'   # vision tower → BF16 to avoid FP16 overflow (closes #40124)
  GENESIS_ENABLE_G4_25_GEMMA4_RoPE_DUAL_BASE_GUARD: '1'   # diagnoses dual-RoPE config; warns on single-table collapse
  # ── Gemma 4 family perf (opt-in; bench-gate before promoting) ──
  GENESIS_ENABLE_G4_15_GEMMA4_FUSED_RMSNORM: '0'          # ~0% under torch.compile (no-op: apply() falls through to original — the +5-10% needs a non-existent G4_15b anchor; profiles run enforce_eager=false so Inductor already fuses the norms). 2026-06-15 audit.
  GENESIS_ENABLE_G4_24_GEMMA4_FUSED_SOFTCAP: '0'          # <0.5% (fuses only the final-logits softcap; the attention-logits softcap is already kernel-fused in-pin. Advertised +3-5% is fictional under torch.compile). 2026-06-15 audit.
  GENESIS_ENABLE_G4_06_GEMMA4_KV_PROJ_V0: '0'             # vendor #41944 — ~3% memory savings on V slot
  # ── Vision tower management (operator choice) ──
  GENESIS_ENABLE_G4_17_GEMMA4_VISION_SKIP: '0'            # set + GENESIS_GEMMA4_TEXT_ONLY=1 to save ~2.3 GB VRAM
  # ── Gemma 4 stability extension (added 2026-05-17) ──
  GENESIS_ENABLE_G4_13_GEMMA4_PER_TOKEN_HEAD_KV_GUARD: '1' # silent corruption guard (closes vllm#40388)
  # ── Genesis G4 TurboQuant KV cache wrapper-stack (Gemma 4 256K unlock) ──
  GENESIS_ENABLE_G4_19_GEMMA4_TURBOQUANT_KV: '1'          # vector-quant KV (3-bit global / 4-bit sliding); 5.33x compression
  GENESIS_ENABLE_G4_19B_GEMMA4_TQ_KV_SPEC: '1'            # memory accounting hook (effective 37.84 GB)
  # Phase 7.G4.31B-MODELDEF.G4_19C-DEFAULT-OFF (2026-05-23):
  # default flipped '1' → '0'. The iter-3 architectural fix
  # (commit 47acc808) made the wrapper fullgraph-safe, but the
  # SEPARATE Lloyd-Max codebook quality regression documented in
  # g4_19c_attention_wrapper.py §"SERVER A/B RESULT 2026-05-17"
  # is NOT fixed — running G4_19C on production K/V tensors skews
  # attention scores → divergent token sampling (rig smoke
  # 2026-05-23 confirmed: output text "SBBBBBBBBBBBB" / "Sそしてそして…").
  # Production default must match the wrapper docstring's stated
  # "Default status of G4_19c: OFF in production launcher until
  # quality regression is resolved" stance. Operators running the
  # A/B harness for codebook calibration can force-on via
  # `sndr launch <preset> --extra-env GENESIS_ENABLE_G4_19C_ATTN_WRAP=1`
  # (CLI passthrough from Phase 7.G4.CLI-EXTRA-ENV, commit 9d2470fd).
  GENESIS_ENABLE_G4_19C_ATTN_WRAP: '0'                    # round-trip wrapper OFF by default (codebook quality regression pending)
  GENESIS_ENABLE_G4_31_TQ_DTYPE_PRESERVE: '1'             # preserve turboquant_* against AWQ kv_cache_scheme override
  # ── PR #40914 backport — TQ K+1 spec-verify cudagraph fix ──
  GENESIS_ENABLE_G4_67_TQ_SPEC_VERIFY_ROUTE: '1'          # safe no-op for wrapper path; primes upstream-overlay path
  # ── #41190 TP>1+MTP D2H race guard — Gemma-ONLY (dense, NOT GDN) ──
  # PN290 forces the num_accepted_tokens.gpu D2H copy blocking so a TP=2
  # NCCL collective can't recycle the source tensor mid-flight (#41190
  # cudaErrorIllegalAddress on TP>1 + MTP + multi-conc). On Qwen3.6 hybrid
  # this race is already eliminated by PN341 (GDN gpu_model_runner rewrite
  # drops the event.synchronize entirely) so PN290 is NOT set there
  # (redundant + a small per-step blocking-D2H cost). Gemma-4 is DENSE →
  # PN341 does not apply → the racy synchronize remains → PN290 is the
  # actual guard here. Applies cleanly dev491 (validated 2026-06-16);
  # blocking-D2H is inherently crash-safe. Disable via GENESIS_PN290_FORCE_NONBLOCKING=1.
  GENESIS_ENABLE_PN290_NUM_ACCEPTED_TOKENS_RACE: '1'
  # ── Qwen-applicable patches (general-purpose, MTP-aware) ──
  GENESIS_ENABLE_PN33_SPEC_DECODE_WARMUP_K: '1'           # MTP K-aware warmup sizing (vllm#37521)
  GENESIS_ENABLE_PN35_INPUTS_EMBEDS_OPTIONAL: '1'  # text-only inputs_embeds skip
  GENESIS_ENABLE_PN116: '1'  # TQ prefill max_seq_len fallback. no-op on this model: applies_to excludes it (bug-hunt D16); applies_to is the SoT
  GENESIS_ENABLE_PN118: '1'  # TQ workspace graceful-fallback. no-op on this model: applies_to excludes it (bug-hunt D16); applies_to is the SoT
  GENESIS_ENABLE_PN286_FA_LAYOUT_REVERT_SM86: '1'  # Ampere SM 8.6 FA KV layout revert
  GENESIS_ENABLE_P108: '1'          # MTP draft-loop stream synchronization (vllm#42603)
  GENESIS_ENABLE_P109: '1'          # sampler safety (vllm#42614) — short form matches registry env_flag
  GENESIS_ENABLE_PN110: '1'         # BlockPool.free_blocks dedup (vllm#42615) — short form matches registry env_flag
  # ── Cross-family supporting patches (Genesis-wide quality) ──
  GENESIS_ENABLE_PN119: '0'               # Gemma 4 doesn't use upstream TQ — N/A on wrapper path
  GENESIS_ENABLE_PN126_V1_DECODE_WARMUP: '1'              # V1 decode + spec-decode warmup at boot (TTFT CV drop). no-op on this model: applies_to excludes it (bug-hunt D16); applies_to is the SoT

# ─── extra_vllm_flags — raw vLLM CLI escape hatch ──────────────────────
# B10 generic pass-through: a {flag: value} map (keys MUST start with `--`)
# that compose() emits verbatim as `--flag value` AFTER the config-derived
# args. Use ONLY for raw vLLM flags this layered config does not already
# derive (dtype / quantization / chat-template / spec-decode / KV-dtype all
# come from the fields above, NOT from here). Empty by design: this Gemma 4
# ModelDef needs no out-of-band flags — every launch arg is composed from
# the typed fields. Keep `{}` unless a genuinely un-modeled flag is needed.
extra_vllm_flags: {}

# ─── notes — operator-facing summary ───────────────────────────────────
# Free-form list forwarded onto the composed ModelConfig for `sndr
