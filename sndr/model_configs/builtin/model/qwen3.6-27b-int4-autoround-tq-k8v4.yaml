# Status: ✅ Production
# Cross-rig parity: club-3090 dual.yml v7.72.2 + Genesis (2× 3090 PCIe 250W) =
#   89.78 / 117.60 TPS single-stream; our 2× A5000 = 120 single / 292 @ conc=4.
#   Wave 9 ref: long_gen_sustained_tps 109.8 + tool 10/10.
# Genesis V2 model definition — Qwen 3.6 27B INT4 (Lorbus AutoRound) + TurboQuant k8v4 KV.
# Hybrid GDN architecture; MTP K=3 spec decode; turboquant_k8v4 KV cache.
# Source: legacy `a5000-2x-27b-int4-tq-k8v4.yaml` (Wave 9 dev209 validated).
# Wave 9 reference bench: long_gen_sustained_tps 109.8 on 2× A5000, tool 10/10.
#
# Per-line comment style — same W-B exemplar discipline as 35B PROD:
#   • WHAT the patch does in one line
#   • default + valid values for non-binary settings
#   • empirical evidence when known

schema_version: 2
kind: model
id: qwen3.6-27b-int4-autoround-tq-k8v4           # canonical ID; <model-family>-<size>-<quant>-<kv-format>
title: Qwen 3.6 27B INT4 Lorbus AutoRound + TurboQuant k8v4 KV
maintainer: sandermage
last_validated: '2026-05-21'                     # P2.4d-Q27 dev371 smoke + canonical-flow validation
license: apache-2.0

# ─── Identity ──────────────────────────────────────────────────────────
model_path: /models/Qwen3.6-27B-int4-AutoRound   # container-side path; Lorbus INT4 AutoRound checkpoint
served_model_name: qwen3.6-27b                   # OpenAI-API model name
quantization: null                               # null = auto-detected by vLLM from AutoRound metadata (range: null|auto_round|gptq_marlin|fp8)
dtype: float16                                   # values: float16|bfloat16|float32; float16 standard for MTP+TQ k8v4 hybrid path
trust_remote_code: true                          # required for Qwen3 hybrid-GDN custom modeling code

# 2026-05-14 chat-template override. Stock chat_template.jinja shipped
# with Qwen3.6-27B has a multi-turn agentic bug — the assistant branch
# can leave `<think>` open before `<tool_call>` blocks, so historical
# reasoning leaks into `tool_response` and downstream tool-call rate
# collapses (club-3090 disc #53 — allanchan339 root-cause writeup).
# `qwen3.6-enhanced.jinja` adds self-healing logic that injects
# `</think>` immediately before the first `<tool_call>` when the
# model output did not close the reasoning block itself. The file
# lives next to the checkpoint on host (under ${models_dir}) so the
# existing `${models_dir}:/models:ro` mount exposes it inside the
# container — no new mount slot required.
chat_template: /models/Qwen3.6-27B-int4-AutoRound/chat_template_enhanced.jinja

# Pin Qwen3.5/3.6 canonical sampling defaults (club-3090 spec). Without
# this, vllm uses model-supplied generation_config which may not match
# canonical recommendation. Emitted as `--override-generation-config
# '<json>'` by compose.py.
override_generation_config:
  temperature: 0.6
  top_p: 0.95
  top_k: 20

# ─── Capabilities — inherent to this model ─────────────────────────────
capabilities:
  attention_arch: hybrid_gdn_moe                 # Qwen 3.6 hybrid (gated delta net + MoE); drives PN59/P98/PN11 + PN82
  tool_call_parser: qwen3_xml  # 2026-06-17 (0.23.1): switched qwen3_coder -> qwen3_xml to match the validated 35B choice (qwen3_coder streaming leaks tool-call XML to the content channel; qwen3_xml emits clean tool_calls deltas; #45171 remaps qwen3_xml->Qwen3CoderToolParser engine-native on 0.23.1).
  reasoning_parser: qwen3                        # qwen3 </think> reasoning_content parser
  enable_auto_tool_choice: true                  # P68/P69 dependency — auto tool_choice on tool-mention prompts
  spec_decode:
    method: mtp                                  # MTP K=3 throughput winner on hybrid GDN (range: mtp|dflash|ngram|null)
    num_speculative_tokens: 4                    # MTP K-value (1-7 valid). CORRECTNESS: MTP on this INT4 TQ-k8v4 27B is ONLY valid with GENESIS_ENABLE_PN521_TQ_RAW_TAIL_VERIFY=1 (see patches: block) — without it, TQ×MTP collapses into token-repetition (root-caused 2026-07-02: 4-bit-V spec-verify read-back). K=5->4 (2026-07-03 coherence K-sweep on dev714, PN521 ON, full re-config not runtime-override): K=5 produced UNPARSEABLE tool-calls (draft over-proposes bad structural tokens the verify accepts -> "<function>" / duplicated empty tags, tool_calls=None) while smoke stayed coherent; K=4 AND K=3 both emit a parseable tool_call (get_weather {"city":"Berlin"}) stably at max_tokens 128 & 200. K=4 chosen as the max coherent K (historical warm TPS K=4=125.2 ~ K=5=127.4, so ~0 speed cost). The old K=5 was picked by the 2026-06-19 sweep that clocked TOKEN SPEED of DEGENERATE output (pre-PN521), never coherence. RESIDUAL (K-independent, see TOOLCALL_27B_RCA): the INT4 model emits <function="NAME"> with quotes, so tool_calls[].name carries literal quotes — needs a parser strip or grammar-decode, tracked separately.
    model: null                                  # integrated MTP draft (DFlash uses separate /models/Qwen3.6-27B-DFlash drafter)
  kv_cache_dtype: turboquant_k8v4                # TQ k8v4: ~2× KV concurrency vs fp16, +91% TPS vs fp8_e5m2 (Wave 9 win)
  # Byte-level architecture dims for `sndr kv-calc` VRAM/KV projection.
  # PROVISIONAL CALIBRATION: unlike the 35B (which has live PN403 engine
  # telemetry: kv_cache_size_tokens/num_gpu_blocks), this 27B has NO captured
  # num_gpu_blocks anchor — only the docs/HARDWARE.md residency table (32K→~12
  # GiB, 256K→~22 GiB, 320K→~23 GiB per card, TP=2) and the HARDWARE.md context
  # formula. The dims below are config.json-derived (qwen3_5 dense hybrid 3:1
  # GDN+full pattern, head_dim=128 GQA family), but the projector flags this
  # model's projection PROVISIONAL until a live num_gpu_blocks capture lands.
  shape:
    num_hidden_layers: 48                         # qwen3_5 dense hybrid; 3:1 GDN:full pattern
    num_attention_layers: 12                      # full-attention layers (grow KV) — 1 of every 4 (3:1)
    num_recurrent_layers: 36                       # GDN layers — fixed recurrent state
    hidden_size: 4096
    num_attention_heads: 40                       # query heads (qwen3.6 family)
    num_kv_heads: 4                               # KV heads (GQA) — PROVISIONAL (no live block anchor)
    head_dim: 128
    weight_bits: 4                                # AutoRound INT4 (w4a16)
    weights_total_gib: 13.04                      # ~14 GB int4 on disk == 13.04 GiB resident, all ranks (÷TP)
    num_experts: null                             # dense — no MoE experts
    num_experts_per_tok: null
    mtp_num_layers: 1                             # 1 MTP draft layer

# ─── Hardware preconditions composer enforces ──────────────────────────
requires:
  # Absolute minimum to run this model. The 2× rig is the bench-validated
  # reference (see profile wave9-qwen3.6-27b-tq-k8v4); single-card 78K context is
  # also bench-validated (see profile qa-27b-tq-1x-tested).
  min_total_vram_mib: 22000                      # 1 × 22 GB minimum (78K ctx single-card variant)
  min_gpu_count: 1                               # supports 1× (single-card 78K) and 2× (131K production)
  min_cuda_capability: [8, 6]                    # Ampere SM 8.6; 8.9 / 9.0 forward-compat
  rig_arch_blocklist: []                         # no rig class refuses this model

versions:
  genesis_pin_min: v11.0.0                       # minimum sndr_core version
  vllm_pin_required: 0.23.1rc1.dev748+g2dfaae752 # PROMOTED 2026-07-02 (pin bump dev672 -> dev714): operator-authorized. 35B-A3B live-window validated: boot apply applied=87/skipped=166/failed=0, 7/7 tool-call (qwen3_xml, no leak), 236.5 wall_TPS (CV 6.3%) within CV of dev672 240.55 (no regression), MTP K=5 accept 0.666. Improved wiring-aware drift tool: IDENTICAL profile to dev672 (0 new drifts). Other A5000-2x models carry the shared hardware pin; boot-validate on next launch. dev672 = previous/rollback; dev424 dropped (<=2-pin). PRIOR: PROMOTED 2026-07-01 (pin bump dev424 -> dev672): operator-authorized. 35B-A3B window-validated on the main-sync tree: boot apply failed=0, 7/7 tool-call + get_weather Berlin (qwen3_xml, no leak), 240.55 wall_TPS (CV 6.0%) = 98.4% of dev424 244.35 within CV (no regression), MTP K=5 accept 0.679, TQ CUDA stack applies (PN119/P67/P67b/PN399). Other A5000-2x models carried with the shared hardware pin; boot-validate on next launch. dev424 = previous/rollback. PRIOR: PROMOTED 2026-06-25 (pin bump dev301 -> dev424): operator-authorized. Apples-to-apples canonical bench: 35B 244.35 TPS vs dev301 234.77 = +4.08% (NO regression); 27B 134.53 net-neutral; Gemma 26B/31B smoke PASS (Paris + get_weather). DOGFOOD bump_preflight = EXIT 1 (HIGH PN353A->PN399 static edge, MITIGATED: PN399 native C2 sibling applied + the +4.08% A/B clears it); PN386 RETIRED (vllm#45389 merged, IN dev424). dev301 = previous/rollback. Earlier evidence: PROMOTED 2026-06-24 (pin bump dev148 -> dev301): 35B 208 TPS + 31B 94.7 TPS boot+chat+tool-call validated; 5 anchor_drift handled (PN394/PN400 retired, PN353A/PN382 re-anchored, P85 OFF); dev148 = previous/rollback. Prior dev148 evidence: PROMOTED 2026-06-19 (supersedes dev101+g4c6266331): live rig pin. K=5 + PN394/PN399 + Gemma kv-auto validated on dev148; dev101 = previous/rollback. MTP K=3->K=5 re-tune: 127.4 TPS single-stream / TPOT 7.54 ms (+8.2% vs K=3 117.7); PN119 tensor-core FP8-key decode live (tl.dot live), P18b revived; PN353A (vllm#44053 TQ builder workspace reserve) enabled. config-render boot: with GENESIS_ENFORCE_VERSION_RANGE=1 (composed from a5000-2x hardware) PN30 (capped <0.23.0, upstream fused-postprocess kernel supersedes) version-gates OFF -> apply failed=0; gen coherent + MTP K=5 finish=stop; tool-calls fire get_weather {"city":"Tokyo"} via qwen3_xml (#45171 remap to engine-native Qwen3CoderToolParser, no XML-to-content leak); PN119+P18B chain applied. NOTE: the rig render-launcher MUST carry GENESIS_ENFORCE_VERSION_RANGE=1 + --tool-call-parser qwen3_xml (re-render from this config). Previous dev101 (nightly-4c626633) retained as rollback.
  # pin_hold CLEARED 2026-06-25 (dev424 bump): the shared a5000-2x hardware
  # YAML now pins the dev424 image (nightly-3f5a1e173, @sha256:c4fac672…) so
  # the ModelDef pin and the hardware image AGREE — audit_v2_modeldef_vs_
  # hardware_pin reports a true sha==image match, no waiver needed. dev301 is
  # the retained vLLM rollback; dev148 stays on the rig (sndr-daemon sidecar).
  pin_hold: null
  reference_metrics_ref: null   # Phase 5.2.D (2026-05-22): formalize receipt-only state. The prior dev338 Wave-9 baseline (tests/integration/baselines/27b_v11_wave9.json) is no longer authoritative for this dev371-promoted ModelDef; keeping that reference produced a sticky audit mismatch in audit_v2_vllm_pin_consistency. Current dev371 runtime evidence: sndr_private/planning/bench_results/2026-05-21/P2_Q27_TQ_DEV371_SMOKE_RECEIPT_2026-05-21_RU.md (smoke + quick bench: decode_TPOT 10.03 ms / TTFT 111 ms / wall_TPS 81.6 mean). A formal canonical baseline JSON requires the full sustained-methodology cycle and is deferred to Phase 7.

# Y1 (Phase 10 — 2026-06-01): in-container python package pins. Migrated
# from V1 a5000-2x-27b-int4-tq-k8v4.yaml `package_versions:` block as
# part of the V2 ModelDef schema extension that unblocks V1 sunset of
# the V1 PROD file. Identical pins to qwen3.6-35b-a3b-fp8.yaml (both V1
# PROD files declared the same versions; V2 hosts them at the model
# level so V2-composed configs surface the same cfg.package_versions
# API that V1 callers expect). Forwarded into ModelConfig via
# compose.py:603.
package_versions:
  python_packages:
    pandas: '2.2.3'
    scipy: '1.14.1'
    xxhash: '3.5.0'
  notes: >-
    Pinned post-B6 fix; supply-chain reproducibility. Installed only when
    SNDR_DEV_INSTALL_RUNTIME_DEPS=1 is set inside the container (otherwise
    the wheel-baked runtime stack is used).

# B10 (2026-06-22 schema field): generic escape hatch for raw vLLM CLI
# flags this config needs but that compose.py does NOT already derive from
# a structured field. compose.py emits each `--flag value` pair (value '' →
# bare flag). Keys MUST start with `--`. Schema type is a MAP {flag: value},
# NOT a list — an empty list `[]` fails ModelDef.validate() (`.items()`).
# Empty by design here: every runtime flag this model needs is already
# derived from a dedicated, semantics-carrying field —
#   • --chat-template            ← chat_template (bind-mounted, line 42)
#   • --override-generation-config ← override_generation_config (lines 48-51)
#   • --tool-call-parser / --reasoning-parser / spec-decode / KV-dtype
#                                ← capabilities (lines 54-63)
#   • all GENESIS_* patch envs   ← patches matrix below
# so nothing needs the raw pass-through. Add an entry only for a one-off
# vLLM CLI flag with no structured home (then re-render the launcher).
extra_vllm_flags: {}

# ─── Canonical patches matrix (52 entries) ─────────────────────────────
patches:
  # ── Spec-decode + structured-output safety net ──
  GENESIS_ENABLE_P58_ASYNC_PLACEHOLDER_FIX: '1'      # vllm#40807 — async-scheduler [-1] placeholder fix; root-cause for #40831 spec-decode degenerate loops
  GENESIS_ENABLE_P60_GDN_NGRAM_FIX: '1'              # vllm#40738 (Phase 1) — GDN+ngram SSM state recovery on rollback
  GENESIS_ENABLE_P60B_TRITON_KERNEL: '1'             # Phase 2 — Triton kernel offset fix for GDN+ngram
  GENESIS_ENABLE_P61B_STREAMING_OVERLAP: '1'         # vllm#40783 — Qwen3 streaming partial-tag overlap guard
  GENESIS_ENABLE_P61C_QWEN3CODER_DEFERRED_COMMIT: '1' # PR38 Day 3 (2026-05-08): close club-3090#72 SSE silence on narrative <tool_call>
  GENESIS_ENABLE_P62_STRUCT_OUT_SPEC_TIMING: '1'     # vllm#36138 — structured-output spec-decode reasoning-end timing fix
  GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING: '1'   # vllm#39598 — qwen3coder MTP streaming early-return removal
  GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER: '1'      # cudagraph capture size filter — OOM protection on many sizes
  # ── TQ k8v4 KV + MoE ──
  GENESIS_ENABLE_P67_TQ_MULTI_QUERY_KERNEL: '1'      # Genesis-original Triton multi-query kernel for spec-decode K+1 verify. Cross-rig: +25-35% on A5000 (Genesis-internal bench); REQUIRED for TQ k8v4 + spec-decode correctness (without it tool-call cascades degenerate; see club-3090 #178-related Class 1 drift docs).
  GENESIS_P67_USE_UPSTREAM: '1'                      # P67 routing: '1'=upstream Genesis kernel, '0'=fork (DEFAULT 1)
  GENESIS_P67_NUM_KV_SPLITS: '32'                    # P67 split-K factor. Wave 8 sweep: P67=16 (132.28 TPS / TTFT 100.9) vs P67=32 (131.48 / TTFT 97.1, CV 4.76% more stable). 32 wins TTFT by 3.7% on 27B@131K. 35B@320K wants 48 — per-model.
  GENESIS_ENABLE_P95: '1'                            # vllm#40385 — Marlin TP cudagraph cap on Ampere (TP=2 defensive)
  GENESIS_ENABLE_P98: '1'                            # CRITICAL: vllm#40941 WorkspaceManager race-condition lock fix (TQ + hybrid GDN combo)
  GENESIS_ENABLE_G4_61_TQ_SHARED_WORKSPACE: '1'      # vllm#40798 cherry-pick — share TQ decode workspace across layers + capture_model reservation walk. Superset of upstream PR (still OPEN as of 2026-05-29). Composes with P98/P99/PN118. Adds during 2026-05-29 club-3090 cross-reference wave.
  GENESIS_ENABLE_G4_62_TQ_KERNEL_WARMUP: '1'         # vllm#42215 cherry-pick — warm TQ decode kernels BEFORE WorkspaceManager.lock_workspace(). Companion to G4_61.
  GENESIS_ENABLE_PN14_TQ_DECODE_OOB_CLAMP: '1'       # GroupAB: out-of-bounds clamp in TQ decode; +9.2% group with PN12+P94
  # ── Hybrid GDN ──
  GENESIS_ENABLE_PN11_GDN_AB_CONTIGUOUS: '1'         # GDN A/B projection contiguity guard
  GENESIS_ENABLE_PN59_STREAMING_GDN: '1'             # required for ctx ≥ 64K hybrid (Cliff 2b OOM guard). v7.72.5 Level 2 markers verified via CI gate audit_pn59_cliff2b_markers (4/4 present). club-3090 #182: silently no-ops on v7.72.2 — pre-CI-gate catch path.
  # ── Tool-call safety net ──
  GENESIS_ENABLE_P68_AUTO_FORCE_TOOL: '1'            # auto-set tool_choice=required when prompt mentions tools
  GENESIS_P68_FORCE_ON_ALL_TOOLS: '1'               # 2026-07-03: force tool_choice=auto->required on EVERY tool request (not just long-ctx). REQUIRED on this INT4 model: tool_choice=auto builds NO grammar (vllm returns None schema), so the INT4 27B emits invalid tool-call structure (<function>/quoted names/<|tool|> spam, tool_calls=None). 'required' builds the schema -> xgrammar constrains a VALID tool_call. Validated 2026-07-03: auto=garbage, required/named=get_weather {"city":"Berlin"} (name unquoted). Trade-off: forces a tool call whenever tools are present (fine for tool-agent workloads; drop this flag for mixed chat presets).
  GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER: '1'     # inject system-message reminder of tool format at long-ctx
  GENESIS_ENABLE_P70_AUTO_STRICT_NGRAM: '1'          # auto-set prompt_lookup_min=8; closes club-3090#34 ngram quality cliff
  GENESIS_ENABLE_PN56_QWEN3CODER_XML_FALLBACK: '1'   # vllm#41466 — XML parse fallback when JSON tool-call parse fails
  GENESIS_P68_P69_LONG_CTX_THRESHOLD_CHARS: '50000'  # P68/P69 char threshold (≈12K tokens); above = inject reminder
  # ── Memory / KV management ──
  GENESIS_ENABLE_P72_PROFILE_RUN_CAP: '1'            # caps profile_run M dim (Dynamo fake-tensor mismatch on moe_align_block_size)
  GENESIS_PROFILE_RUN_CAP_M: '4096'                  # P72 cap value (must equal max_num_batched_tokens)
  GENESIS_ENABLE_P74_CHUNK_CLAMP: '1'                # chunked-prefill chunk-size clamp (degenerate single-token chunks under spec-decode)
  GENESIS_ENABLE_P78_TOLIST_CAPTURE_GUARD: '0'       # opt-out; '0' = default-off on MTP path (DFlash variant turns it '1')
  GENESIS_ENABLE_PN17_FA2_LSE_CLAMP: '1'             # Cliff 1 mech A guard — runtime clamp on FA2 softmax_lse for long context. +50-100 MiB reclaimed at long-ctx (max_seq_len leak from cudagraph capture shape stability into runtime — Genesis-original, club-3090 Issue #11).
  GENESIS_ENABLE_PN12_FFN_INTERMEDIATE_POOL: '1'     # GroupAB (2026-04-30): -1.7 GiB peak + part of +9.2% TPS group on 27B INT4+TQ
  GENESIS_TQ_MAX_MODEL_LEN: '262144'                 # 256K — verified 2026-05-31 on pin `626fa9bba` with TP=2 (initial 2026-05-31 fail at 128K was misdiagnosis: root cause was renderer auto-pick of `a5000-1x` hardware → TP=1 → insufficient KV; correct `--hardware a5000-2x-24gbvram-16cpu-128gbram` gives TP=2 and 256K fits cleanly). Per V1 comment: 'Raised 2026-05-14: TP=2 256K ladder PASS (50K/100K/156K/180K/200K/230K/256K green on dcacdf9a pin). Keep TQ_MAX in sync with max_model_len so the workspace allocator sizes correctly for the worst-case context.'
  GENESIS_PREALLOC_TOKEN_BUDGET: '4096'              # Genesis prealloc — token budget for shared scratch pools
  # ── FP8 (selective — k8v4 path) ──
  GENESIS_ENABLE_P81_FP8_BLOCK_SCALED_M_LE_8: '0'    # opt-out for k8v4 (35B FP8 turns it '1'; 27B INT4 routes elsewhere)
  GENESIS_ENABLE_P99: '1'                            # WorkspaceManager.get_simultaneous memoize (vllm#40941 perf hotfix — composes with P98)
  GENESIS_ENABLE_P101: '1'                           # vllm#41127 (P100-companion) — uniform query_len>1 batches through prefill wrapper
  GENESIS_ENABLE_P103: '1'                           # FLA Cliff 2 chunked prefill — applicable to hybrid GDN (Qwen3.5/3.6/Next)
  GENESIS_ENABLE_PN66: '1'                           # vllm#41696 — multiturn </think> leak fix in DelegatingParser
  GENESIS_ENABLE_PN67: '0'                           # vllm#41674 merged at bf610c2f5… — the dev371 canonical baseline. Patch lifecycle=retired with vllm_version_range "<0.20.2rc1.dev371", so it auto-skips at runtime even when enabled. Explicit disable here keeps the active matrix free of retired patches (Phase 5.2.A 2026-05-22).
  GENESIS_ENABLE_PN77_FP8_LM_HEAD: '1'               # Phase E.6 Marlin tier FP8 LM head; ~606 MiB/rank saving (27B+TQ proven +21% TPS)
  # ── Spec decode quality ──
  GENESIS_ENABLE_PN30_DS_LAYOUT_SPEC_DECODE: '1'     # issue #17 — DS conv state + spec-decode accept_len>1 protection
  GENESIS_ENABLE_PN33_SPEC_DECODE_WARMUP_K: '1'  # K-aware MTP warmup — closes eagle_prepare_* JIT spikes (vllm#37521)
  GENESIS_ENABLE_PN35_INPUTS_EMBEDS_OPTIONAL: '1'  # text-only inputs_embeds skip (vllm#35975)
  GENESIS_ENABLE_PN116: '1'  # TQ prefill max_seq_len fallback (vllm#41434)
  GENESIS_ENABLE_PN118: '1'  # TQ workspace graceful-fallback (vllm#42551)
  GENESIS_ENABLE_PN119: '1'  # TQ k8v4 GQA head grouping (vllm#40792)
  GENESIS_ENABLE_P109: '1'  # sampling_params vocab-range validators (vllm#42614)
  GENESIS_ENABLE_PN110: '1'  # BlockPool.free_blocks dedup (vllm#42615)
  GENESIS_ENABLE_PN90_PROBABILISTIC_DRAFT: '0'       # DISABLED 2026-06-19 (dev148 TIER-1 audit) — aligned to the 35B YAML. PN90 is experimental (NOT retired — iron-rule-#11 verdict-c: #40269 is a different approach, not a supersession) but a measured regressor: the old "+7.4% TPS" bench was on dev93/dev209 pre-#40269-merge state; on dev371+/dev491+ probabilistic draft REGRESSES (-5.9% TPS, -10% accept) and PROD runs GREEDY draft. #40269 is native in-pin, so the Genesis patch self-skips; setting =1 was inert BUT a landmine — re-activation regresses and unmasks the latent P71⊥PN390 target_probs NameError. Keep 0.
  GENESIS_ENABLE_P107_MTP_TRUNCATION_DETECTOR: '1'   # vllm#41467 — defensive at think→tool_call boundary
  # ── PN353A + PN394 REMOVED 2026-06-25 (dev148 cleanup) ──────────────────
  # Both are lifecycle=retired and version-capped <0.23.1rc1.dev301, i.e. pure
  # no-ops on dev424 (vllm#44053 + vllm#46047 are native in dev301 AND dev424).
  # They were kept only as dev148-rollback correctness flags; the rollback is
  # now dev301 (which carries both fixes natively), so the env flags are gone.
  # The registry tombstones (lifecycle=retired, version-gated) stay for any
  # future <dev301 rollback. PN399 is DECOUPLED from PN353A on dev301+
  # (verified live: PN399's pn399_pn353a_decode_reserve_remove sub-patch
  # soft-skips "anchor not found"; PN399 applies via its native-form sibling).
  GENESIS_ENABLE_PN399_TQ_DECODE_SCRATCH_IMA: '1'      # vllm#46067 (consolidated) — fixed TQ decode-scratch buffer (IMA-safe FULL cudagraph). On dev424 it applies via its native-form (dev301+) sibling anchor; the PN353A-form decode-reserve removal sub-patch soft-skips cleanly (PN353A no longer applies upstream-native). Disable via =0.
  GENESIS_ENABLE_PN401_TQ_PREFILL_CONTINUATION_GUARD: '1'  # vllm#46461 (backport+improve) — gate the TQ flash_attn prefill fast path with `not _has_continuation` so a co-batched continuation (q_len<seq_len) no longer silently drops its cached prefix K/V -> hallucination. LIVE on this TQ-always-on hybrid 27B via plain chunked-prefill (enable_chunked_prefill: true, NO prefix caching needed). Genesis hardening over the raw PR: conservative None-mirror fall-safe + length-clamp. Disjoint anchor from P101/PN116/PN399; composes cleanly; common all-first-chunk batch keeps the fast path (no hot-path TPS regression). Disable via GENESIS_ENABLE_PN401_TQ_PREFILL_CONTINUATION_GUARD=0.
  GENESIS_ENABLE_PN521_TQ_RAW_TAIL_VERIFY: '1'  # Genesis-original 2026-07-02 — REQUIRED for correctness on this INT4 27B: TurboQuant k8v4 + MTP is fundamentally broken without it. The upstream synth-decode verify reads the just-written 4-bit-V speculative K/V back out of the compressed cache; on INT4 AutoRound weights that crosses the divergence threshold -> token-repetition collapse ("you you you"/"is is is", any n>=1). PN521 routes the K+1 verify through the custom P67 split-M kernel with use_raw_tail=1, attending the speculative tokens from the RAW bf16 chunk (never through 4-bit-V) and reading compressed only for committed tokens [0,prior). Runtime-gated on non-pow2 GQA (this 27B is 24/4=6) so pow2-GQA FP8 models (35B=16/2=8) are byte-unchanged. Validated 2026-07-02: coherence n=1 AND n=5 (TQ k8v4 + MTP), tool-call get_weather (qwen3_xml, no leak), kernel L2 numeric-equiv rel~2e-4; 35B regression coherent+tool-call with flag ON. Depends on P67/P67b. Disable via =0 (reverts to upstream synth-decode = garbage on this model).
  GENESIS_ENABLE_PN522_TQ_RAW_TAIL_WARMUP: '1'  # Genesis-original 2026-07-02 — companion to PN521: pre-compiles the use_raw_tail=1 / K1=6 split-M kernel at boot (wraps kernel_warmup, per TQ-layer geometry, synthetic prior=0). No existing warmup covers this Triton variant, so without PN522 it JIT-compiles on the FIRST MTP verify request (confirmed jit_monitor: cutlass_genesis_p67_v17_split_m during inference) -> first-request latency spike (~4-8 TPS vs ~77 steady). Gated on PN521 + non-pow2 GQA; bit-exact (dummy-zeros compile). Disable via =0.
  # ── Compatibility shims ──
  GENESIS_ENABLE_PN25_SILU_INDUCTOR_SAFE: '1'        # Cliff 1B closure (Inductor opaque-op pool for SiluAndMul); NULL impact on 2×A5000, win for 24GB community
  # ── Lazy reasoner (PN16 v2) ──
  GENESIS_ENABLE_PN16_LAZY_REASONER: '1'             # PN16 v2 — cache-safe; default leaves chat_template_kwargs untouched. V1 RETIRED 2026-05-09 (Wave 6 −28% wall_TPS + 6× CV amplification on 35B); v2 production paths cache-safe.
  GENESIS_PN16_TOOL_THINK_BUDGET: '200'              # V8 — short system msg cap on <think>. 27B bench: TPS ≈baseline noise, TPOT -7%, tool 8/8 (london_think FIXED)
  GENESIS_PN16_CLASSIFIER_MAX_TOKENS: '0'            # V7 OFF — V7 cap caused -3.7% wall_TPS measurement artifact
  # ── Sweep tunable ──
  GENESIS_ENABLE_P82: '1'                            # SGLang-style spec-decode acceptance OR-clause. Cross-rig: +12% on A5000 FP8, +10.5% on 3090 INT4 (club-3090 noonghunna ref); biased toward small-batch single-stream. Allows softer accept threshold.
  GENESIS_P82_THRESHOLD_SINGLE: '0.1'                # P82 single-query threshold — 27B sweep 2026-05-09: monotonic 0.1=130.79 / 0.2=127.12 / 0.3=126.64. 27B wins at 0.1 (35B wins at 0.3 — per-model)
  # ── Observability + buffer mode ──
  GENESIS_OBSERVABILITY: '1'                         # Per-patch apply timing + RSS delta logged; zero hot-path overhead
  GENESIS_BUFFER_MODE: 'shared'                      # Genesis buffer manager mode (range: 'shared'|'exclusive'|'auto')
  # ── Wave 9 (2026-05-14) — verified on the dcacdf9a TP=2 256K ladder.
  #    Defaults match the env-flag matrix that produced
  #    `docs/_internal/runs/tp2_256k_probe_27b.json` (200K/230K/256K PASS).
  GENESIS_ENABLE_P87: '1'                            # Marlin sub-tile pad-N — vllm#40361 backport (OPEN). +24% on 2× 3090: 137→170 t/s PR bench. Fixes GPTQ_MARLIN_MIN_THREAD_N=64 misalignment for sub-tile shards (Qwen3.5 GatedDeltaNet.in_proj_ba at TP≥2 with num_v_heads=64).
  GENESIS_ENABLE_P91: '1'                            # AutoRound INT4 row-parallel group cdiv + start-idx quant-correctness fix (vllm#39460) — NOT a tool reminder
  GENESIS_ENABLE_PN71_THINKING_TAG_NORMALIZE: '1'    # Normalises malformed `<think>`/`</think>` from upstream tokenizer drift.
  GENESIS_ENABLE_PN73_TOOL_ARGS_SAFE_NORMALIZE: '1'  # Tool argument JSON normaliser (Qwen3-Coder edge cases).
  GENESIS_ENABLE_PN91_DEVELOPER_ROLE: '1'            # OpenAI-style `developer` role passthrough for IDE coding agents.
  GENESIS_ENABLE_PN92_NIXL_EP_TRIAL_IMPORT: '1'      # Backport of vllm#40154 — trial-import guard for nixl_ep / deep_ep / mori.
  GENESIS_ENABLE_PN95_TIER_AWARE_CACHE: '1'          # Tier-aware KV cache: GPU hot + CPU pinned warm + (optional) disk cold tier. 11 anchor sites in vllm/v1 (admit, touch, mamba-init, register-kv-caches, scheduler-tick, blockpool-register, demote-on-evict, promote-on-miss, phase5 boot-check, BlockPool.__init__, get_new_blocks). Active only when CONFIG_KEY set below — without it lazy-init returns and TierManager stays None (noop).
  GENESIS_PN95_CONFIG_KEY: a5000-2x-tier-aware          # Looks up tier spec from vllm/sndr_core/cache/pn95/tier_configs/a5000-2x-tier-aware.yaml (PN95-internal V2 source after 2026-06-01 architectural unblock; previously read from V1 model_configs/builtin/a5000-2x-tier-aware-EXAMPLE.yaml — same data, cleaner separation). Defines GPU tier (22 GiB per card) + CPU pinned tier (8 GiB per worker). Mamba SSM groups hard-excluded (state cannot be moved). 27B-INT4-AutoRound: ~16 attention layers + ~16 SSM layers (excluded). Mamba state is large (~256 MiB/layer) so cache pressure higher than 35B.
  GENESIS_PN95_TICK_EVERY: '100'                     # Tick frequency: scheduler-tick runs page-move evaluation every N decode steps (range 50-500). 100 = conservative, suitable for 8K-32K workloads. Lower N → faster demote response under sudden pressure but more overhead.
  GENESIS_PN95_DEMOTE_FREE_MIB_THRESHOLD: '2048'     # Trigger threshold: when free VRAM drops below 2 GiB on either card, start demoting pages to CPU pinned tier. 27B-INT4 ~13 GiB weights + Mamba state → smaller VRAM footprint than 35B but Mamba state cannot demote. On 8K + low concurrency: demote rarely fires. On 32K+ ctx or 12+seq: dominant memory mgmt path.
  GENESIS_ENABLE_PN96_EMERGENCY_DEMOTE: '1'          # Companion to PN95 — emergency demote on scheduler free-blocks threshold.
  GENESIS_ENABLE_PN104_OFFLOAD_PREFETCH_REDIRECT: '0' # cpu_offload → Prefetch redirect. OFF — only used when `--cpu-offload-gb > 0`.
  GENESIS_ENABLE_PN105_AUTOROUND_OFFLOAD_COMPAT: '0' # AutoRound INT4 + Prefetch compat. OFF — tied to PN104.
  GENESIS_ENABLE_PN106_GDN_H_POOL: '1'               # GDN inner chunk-state `h` pool — removes 32-48 MiB × 48-layer alloc churn each chunked-prefill step.
  GENESIS_ENABLE_PN108_FUSED_RECURRENT_PREFILL: '0' # TOMBSTONED — fla `fused_recurrent_gated_delta_rule` cannot serve single-seq prefill (design conflict, see patch docstring).
  GENESIS_ENABLE_PN201_SCHEDULER_EMPTY_CACHE: '1'    # Scheduler-tick `torch.cuda.empty_cache()` hook, threshold-gated.
  GENESIS_ENABLE_PN204_DUAL_STREAM_INPROJ: '0'       # Port of vllm#42301 (open). OFF in single-conc latency profile.
                                                       # v1 history: eager `__init__` allocation of torch.cuda.Event raised type error.
                                                       # v1 lazy-init follow-up: crashed during profile_run on dev371 with
