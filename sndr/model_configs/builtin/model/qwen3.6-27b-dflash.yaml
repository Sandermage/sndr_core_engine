  - "Migrated from a5000-2x-27b-dflash-true (2026-05-12; V1 source
    retired 2026-06-01 in V1 sunset #6). Needs separate Qwen3.6-27B-DFlash
    drafter checkpoint on host (/models/Qwen3.6-27B-DFlash)."
  - "Single-stream optimized; max_num_seqs=1 set in the profile."
  - "Wave 10 (2026-05-15): patches added symmetric to MTP sibling."
  - "P2.DFlash M8-Q27 runtime pin promotion 2026-05-21: dev338 → dev371.
    First DFlash variant promoted off dev338 after the full DFlash
