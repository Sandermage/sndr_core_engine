    Receipt:
    sndr_private/planning/bench_results/2026-05-21/P2_DFLASH_M4_RETRY4_M2f_PASS_2026-05-21_RU.md.
    Bench artifact: bench_q27_dflash_dev371.json in the same dir.
    Q35-DFlash sibling (qwen3.6-35b-a3b-fp8-dflash) remains on dev338
