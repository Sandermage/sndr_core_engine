# =====================================================================
# Profile (at-a-glance):
#   Model:    Gemma 4 31B AWQ-4bit (dense)   Topology: 2x A5000 (TP=2)
#   KV:       auto (uniform fp16, no TurboQuant)   Drafter:  MTP K=3 (gemma-4-31B-it-assistant)
#   Max ctx:  131072 (effective render)     Status:   ⭐ production_candidate (canonical 31B chat path)
#   Requires: >=21 GB/GPU · 2x GPU · SM 8.6+ · vLLM 0.23.1rc1.dev424+g3f5a1e173  (machine-readable: card.hardware_fit; `sndr preflight` checks it)
#   Bench:    70.1 wall_TPS, TPOT 10.98 ms, tool-call 7/7 (vs TQ 41.4 / 6/7 = +69.6%) — 2026-06-19, pin dev148; measured @32K, re-bench @128K before promoting
#   Best for: high-throughput interactive chat / tool-use at FULL fp16 quality up to 128K  ⭐ CANONICAL
# What's intentionally NOT enabled:  - TurboQuant KV / >150K context -> use prod-gemma4-31b-tq-default (long-context path; TQ-blocked on the live pin)
# To change for scenario X:          - context > ~150K (up to 256K) -> prod-gemma4-31b-tq-default
#                                    - high concurrency (>2) -> not bench-validated; single-stream sizing only
# =====================================================================
# Genesis V2 alias — Gemma 4 31B AWQ-4bit, kv-auto MTP K=3 chat-role (canonical 31B path).
# `sndr launch prod-gemma4-31b-kvauto-chat` resolves to (model, hardware, profile).
#
# High-throughput kv-auto chat preset. Uniform fp16 KV (no TurboQuant
# compression, no skip-layers), engine-default attention, MTP K=3 via the
# gemma-4-31B-it-assistant drafter, 128K context. The canonical (default)
# 31B preset; the kept long-context (>150K) sibling is the TQ default
# `prod-gemma4-31b-tq-default`. Operator runs BOTH:
#   - prod-gemma4-31b-tq-default       → >150K long-context (TurboQuant; TQ-blocked on the live pin — see that preset's PIN NOTE)
#   - prod-gemma4-31b-kvauto-chat      → 128K high-throughput (THIS, +70% TPS, full fp16 quality)
# (The earlier chat-role TQ sibling prod-gemma4-31b-tq-mtp-chat-k3 was
#  archived to presets/_archive/ in the 2026-06 canonical reorg.)
#
# CONTEXT CEILING — rig-MEASURED 2026-06-23 (keep consistent with the profile):
#   The fp16/auto-KV ceiling on 2× A5000 is 154,496 tokens (gpu-mem 0.9,
#   MTP K=3; vLLM's own "estimated maximum model length is 154,496" at the
#   163840 OOM boundary). The earlier "fp16 ~4× TQ → 32K" estimate was wrong
#   by ~5×. 128K (131072) sits ~1.10× under the ceiling at FULL fp16 quality
#   (fp16 @131K and TQ @200K both 4/4 PASS, byte-identical). This quadruples
#   usable context (32K → 128K) at no quality cost; the TQ sibling is now
#   only needed for >150K (up to 256K).
#
# Bench evidence (journal §35, sweep bcv4uksw4, single-stream,
# pin 0.23.1rc1.dev148+gb4c80ec0f, 2× A5000):
#   kv-auto     70.1 wall_TPS   TPOT 10.98 ms   tool-call 7/7   ← THIS (measured @32K)
#   TurboQuant  41.4 wall_TPS   TPOT 21.7  ms   tool-call 6/7   ← TQ sibling
#   → +69.6% TPS AND better tool-call. The 70.1 TPS was measured @32K —
#   re-bench at 128K before promoting (number kept for reference).
#   Decision: validated_conditional. Artifact at
#   sndr/engines/vllm/patches/spec_decode/artifacts/gemma4-31b-kvauto-chat.json
#
# Rig launcher reference: ~/start_31b_kvauto_chat.sh (permanent standalone
# launcher, port 8102, CONTAINER=vllm-gemma31b-kvauto-chat).

model: gemma-4-31b-it-awq                        # cyankiwi/gemma-4-31B-it-AWQ-4bit + native gemma4_dense
hardware: a5000-2x-24gbvram-16cpu-128gbram       # Sander 2× A5000 homelab
profile: gemma4-31b-kvauto-chat                  # kv-auto chat role: uniform fp16 KV, MTP K=3, 128K, +70% TPS

# CONFIG-UX.2 — operator card
card:
  title: "Gemma 4 31B AWQ — kv-auto + MTP K=3 chat-role (high-throughput)"
  summary: |
    Dense 31B gemma4_dense chat-role high-throughput variant. Uniform
    fp16 KV (no TurboQuant) + MTP K=3 delivers +69.6% decode TPS and
    better tool-call (7/7 vs 6/7) than the TurboQuant chat sibling, at
    FULL fp16 quality up to 128K context (rig-MEASURED fp16/auto-KV
    ceiling 154,496 tokens on 2× A5000, 2026-06-23 — the old "fp16 caps
    at 32K" estimate was wrong by ~5×). Use for interactive chat / tool-
    use and any workload up to 128K; use the TQ default sibling
    (prod-gemma4-31b-tq-default) only when you need >150K (up to 256K).
  status: production_candidate
  audience: operator
  maturity: draft                                  # ProfileDef.status stays experimental until the operator
                                                    # A/B observation window confirms the chat gain holds
  mode: throughput
  workload_allow:
    - free_chat
    - summarization
    - code_gen
  workload_deny:
    - structured_json.long
    - tool_call.long
  concurrency:
    min: 1
    max: 2
    canonical: 2
  K: 3
  # K>1 production_candidate requires a K=1-or-fallback pointer of same
  # routing_family. Points at the kept K=1 TQ default — the long-context
  # (>150K) fallback for this family (same routing_family gemma4_dense_31b_tq).
  # Repointed in the 2026-06 canonical reorg: the previous target
  # prod-gemma4-31b-tq-mtp-chat-k3 was archived to presets/_archive/.
  fallback_preset: prod-gemma4-31b-tq-default
  context:
    max_model_len: 131072                          # 128K — ~1.10× under the rig-MEASURED 154,496-token fp16/auto-KV ceiling (2× A5000, gpu-mem 0.9, MTP K=3, 2026-06-23); consistent with the profile sizing_override
    typical_input_tokens: 2048
    typical_output_tokens: 2048
  # Machine-readable hardware envelope — consumed by `sndr preflight <preset>`
  # (club-3090 compose-trailer convention, typed + rig-cross-validated).
  hardware_fit:
    requires_min_vram_gb: 21                       # per-GPU floor (22000 MiB usable)
    tensor_parallel: 2                             # TP=2 across both A5000s
    requires_min_gpu_count: 2                      # 31B dense AWQ weights + fp16 KV need both cards
    requires_min_cuda_capability: [8, 6]           # Ampere SM 8.6
    engine_pin: 0.23.1rc1.dev714+g09663abde        # validated vLLM build
  routing_family: gemma4_dense_31b_tq
  default_for_family: false                        # default_for_family stays with gemma4-31b-tq-default
  primary_metric:
    kind: agg_TPS
    value: 70.1
    source: sndr/engines/vllm/patches/spec_decode/artifacts/gemma4-31b-kvauto-chat.json
    measured_at: 2026-06-19
  evidence_refs:
    - type: bench
      path: sndr/engines/vllm/patches/spec_decode/artifacts/gemma4-31b-kvauto-chat.json
      visibility: public
      note: |
        kv-auto vs TurboQuant single-stream A/B on pin dev148: 70.1 vs
        41.4 wall_TPS (+69.6%), TPOT 10.98 vs 21.7 ms, tool-call 7/7 vs
        6/7. decision=validated_conditional. The 70.1 TPS was measured
        @32K — re-bench at 128K before promoting. Context is now 128K at
        FULL fp16 quality (rig-MEASURED fp16/auto-KV ceiling 154,496
        tokens, 2026-06-23 — the old "64K → 32K, fp16 ~4× TQ" framing was
        wrong by ~5×).
  evidence_visibility: public
  tradeoffs:
    - "kv-auto uniform fp16 KV → +69.6% decode TPS + better tool-call (7/7) vs the TurboQuant chat sibling, at FULL fp16 quality up to 128K (rig-MEASURED fp16/auto-KV ceiling 154,496 tokens on 2× A5000, 2026-06-23 — the old 'fp16 ~4× TQ → 32K' framing was wrong by ~5×)."
    - "Run alongside prod-gemma4-31b-tq-default, not as a replacement: kv-auto owns high-throughput chat up to 128K (full fp16 quality); the kept TQ default sibling is now only needed for >150K (up to 256K)."
  do_not_use:
    - condition: "context requirement > ~150K (up to 256K)"
      reason: "Use prod-gemma4-31b-tq-default (TurboQuant long-context path). The kv-auto fp16/auto-KV ceiling on 2× A5000 is 154,496 tokens (rig-MEASURED 2026-06-23); 128K is the configured max."
    - condition: "high-concurrency (>2)"
      reason: "Single-stream bench-validated only; sizing matches the canonical chat-role default."
  card_version: 1
  card_updated: 2026-06-19
  card_author: sander
