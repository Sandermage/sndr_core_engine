#   max_model_len:        4096
#   max_num_seqs:         1
#   max_num_batched_tokens: 8192
#   gpu_memory_utilization: 0.92
#   enable_chunked_prefill: true
#
# Acceptance artifact reference:
#   sndr/engines/vllm/patches/spec_decode/artifacts/gemma4-31b-tq-mtp-structured-k4.json
#   config_hash: 71c874d7ffedae04
#   decision: validated_conditional
