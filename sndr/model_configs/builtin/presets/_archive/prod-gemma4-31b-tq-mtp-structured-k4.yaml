# Hand-launcher reference: the β'-A control on this rig
# (~/start_g4_betaA_k1.sh) renders the same K=4 spec-decode config; the
# V2-composed launcher emitted by this preset should be functionally
# equivalent. md5 of hand-launcher (immutable per standing constraint):
#   085cdccee8c80aa9b70aef1092d4dfae
#
# ⛔ PIN NOTE / TQ-BLOCKED (2026-06-11 fleet validation): the
