# SPDX-License-Identifier: Apache-2.0
# Genesis V2 alias — Gemma 4 26B-A4B AWQ-4bit, MTP K=3 chat-role.
# `sndr launch prod-gemma4-26b-mtp-chat-k3` resolves to (model, hardware, profile).
#
# Chat-role preset for the MoE A=4B target. MTP K=3 via the
# 26B-A4B-it-assistant drafter. Mirror-sibling of
# `prod-gemma4-26b-mtp-k4` (structured-role K=4 sibling) —
# together they implement the role-split deployment topology
# described in
# `docs/_internal/DEPLOYMENT_PROFILE_ROUTING_PLAN_2026-05-20.md`
# at the 26B MoE arch.
#
# Sibling presets:
#   prod-gemma4-26b-default       — K=1 control (effective MTP-off)
#   prod-gemma4-26b-mtp-k4        — K=4 structured-role
#   prod-gemma4-26b-multiconc     — K=4 + conc=8
#   prod-gemma4-26b-multiconc-k1  — K=1 + conc=8
#
# Bench evidence (2026-05-31, vllm pin 0.21.1rc1.dev354+g626fa9bba):
#   profile_free_mean_tps:       K=3 145.40   K=4 128.67   +13.0%
#   profile_struct_mean_tps:     K=3 228.41   K=4 237.51   -3.8%
#   profile_geomean_tps:         K=3 188.48   K=4 184.07   +2.4%
#
# Direction matches 31B chat-k3 finding (K=3 wins chat, K=4 wins
# structured) but magnitude is smaller because the 26B MoE assistant
# has higher per-token acceptance on free-form prose than the 31B
# dense assistant. The architectural split is still warranted because
# free_chat + summarization see meaningful gains (+15% / +11%).

model: gemma-4-26b-a4b-it-awq
hardware: a5000-2x-24gbvram-16cpu-128gbram
profile: gemma4-26b-mtp-chat-k3                   # K=3 + assistant; same single-stream sizing as K=4 sibling

# CONFIG-UX.2 — operator card
card:
  title: "Gemma 4 26B-A4B AWQ — single-stream K=3 chat-role"
  summary: |
    K=3 MTP single-stream preset for free-chat + summarization
    workloads. Uses the 26B-A4B-it-assistant drafter. Designed for
    workloads where the K=4 sibling's lookahead wastes cycles on
    draft-rejection. Structured workloads (tool_json, structured_count,
    code_gen) should use the K=4 sibling instead.
  status: production_candidate
  audience: operator
  maturity: draft                                  # promote to validated after operator A/B observation window
  mode: throughput
  workload_allow:
    - free_chat
    - summarization
  workload_deny:
    - structured_json.short
    - structured_json.long
    - tool_call.short
    - tool_call.long
    - code_gen
  concurrency:
    min: 1
    max: 2
    canonical: 2
  K: 3
  context:
    max_model_len: 32768
    typical_input_tokens: 1024
    typical_output_tokens: 2048
  routing_family: gemma4_moe_26b_a4b
  default_for_family: false
  fallback_preset: prod-gemma4-26b-mtp-k4      # structured workloads fall back to K=4 sibling
  primary_metric:
    kind: agg_TPS
    value: 188.482
    source: sndr/engines/vllm/patches/spec_decode/artifacts/gemma4-26b-mtp-chat-k3.json
    measured_at: 2026-05-31
  evidence_refs:
    - type: bench
      # Phase 10.5 (2026-06-01) — visibility flipped private → public.
      # The artifact JSON is committed to the public repo at the path
      # below (sndr/engines/vllm/patches/spec_decode/artifacts/), so
      # any operator with a public checkout can audit the K=3-vs-K=4
      # five-class A/B numbers directly. Clears the audit_config_catalog
      # `production_candidate_public_evidence` warning that previously
      # gated this preset from promoting to status=production.
      path: sndr/engines/vllm/patches/spec_decode/artifacts/gemma4-26b-mtp-chat-k3.json
      visibility: public
      note: |
        K=3 vs K=4 5-class A/B bench evidence on 26B-A4B; +13% free-form
        mean / +2.4% global geomean delta.
  evidence_visibility: public
  tradeoffs:
    - "K=3 wins free_chat (+15%) and summarization (+11%) vs K=4 sibling but loses on structured workloads."
    - "Best deployed as a sibling upstream behind the spec_decode gateway, not as a single-launcher replacement for the K=4 preset."
  do_not_use:
    - condition: "structured workloads (tool_json, structured_count, code_gen)"
      reason: "Use prod-gemma4-26b-mtp-k4 K=4 sibling. The chat-k3 artifact denies these workload classes."
    - condition: "high-concurrency (>2)"
      reason: "Single-stream sizing; for concurrency >2 use the multiconc-K=1 or multiconc-K=4 siblings."
  card_version: 1
  card_updated: 2026-05-31
  card_author: sander
