# SPDX-License-Identifier: Apache-2.0
# Genesis V2 alias — 27B INT4 fp8kv QA / regression-test on 2× A5000.
# Lifecycle: tested (NOT recommended; use prod-qwen3.6-27b-tq-k8v4 for production).
#
# ⚠ PIN NOTE (2026-06-11 fleet validation): the
# qwen3.6-27b-int4-autoround-fp8kv ModelDef pin_holds 626fa9bb
# (versions.pin_hold — fp8kv KV variant not covered by the 0.22.1 fleet
# validation), while the a5000-2x hardware YAML image is the promoted
# 0.22.1 pin (303916e93). QA runs on the current image are UNVALIDATED
# until an fp8kv smoke runs on 0.22.1; :nightly-previous (626fa9bb) is
# retained on the rig for exactly this case (CLAUDE.md pin policy).

model: qwen3.6-27b-int4-autoround-fp8kv
hardware: a5000-2x-24gbvram-16cpu-128gbram
profile: qa-qwen3.6-27b-fp8kv

card:
  title: "Qwen 3.6 27B INT4 AutoRound + FP8 KV — QA regression baseline (2× A5000)"
  summary: |
    QA / regression-test preset on the fp8_e5m2 KV variant. Maintained
    for community parity with the noonghunna club-3090 default fp8 path
    and as a regression baseline against the TQ k8v4 production sister.
    NOT for production — fp8_e5m2 underperforms TQ k8v4 by ~48% on
    the same hardware. Use prod-qwen3.6-27b-tq-k8v4 for production workloads.
  status: qa
  audience: qa
  maturity: tested
  mode: throughput
  workload_allow:
    - regression_bench
  workload_deny:
    - free_chat
    - structured_json.long
    - tool_call.long
    - summarization
    - code_gen
  concurrency:
    min: 1
    max: 4
    canonical: 4
  K: 3
  context:
    max_model_len: 131072
    typical_input_tokens: 4096
    typical_output_tokens: 4096
  routing_family: qwen3_6_27b_int4_fp8kv
  default_for_family: false
  fallback_preset: prod-qwen3.6-27b-tq-k8v4
