# =====================================================================
# Profile (at-a-glance):
#   Model:     Qwen 3.6 35B-A3B FP8          Topology: 2x A5000 (TP=2)
#   Engine:    vLLM (Genesis overlay)        Drafter:  MTP K=3
#   KV:        turboquant_k8v4               Vision:   no
#   Max ctx:   280000 (effective render)     Status:   ⭐ production_candidate (family default)
#   Genesis:   dev424 pin · PN340/PN341/PN29 GDN + PN345/PN29x autotune-cap families · PN346/347/348 correctness
#   Requires:  >=21 GB/GPU · 2x GPU · SM 8.6+ · vLLM 0.23.1rc1.dev424+g3f5a1e173   (machine-readable: card.hardware_fit)
#   Bench:     pending — see card.primary_metric (Wave 9 baseline 35b_v11_wave9.json; this session's single-stream ~233 TPS @ 280K is informational, not the card metric)
#   Best for:  balanced single-conc latency-quality default for the 35B family  ⭐ CANONICAL
# What's intentionally NOT enabled:  - high concurrency -> use prod-qwen3.6-35b-multiconc (689 TPS @ conc=8)
# To change for scenario X:          - agentic/batch throughput -> prod-qwen3.6-35b-multiconc
#                                    - lower single-user latency -> already this preset (max_num_seqs=2)
# Preflight:  `sndr preflight prod-qwen3.6-35b-balanced` projects this envelope
#             against the live rig (or --rig) BEFORE boot — VRAM/GPU-count/SM/pin.
#             Header convention + the requires_* fields adapted from club-3090's
#             compose-header trailers (noonghunna/club-3090@master); typed + tied
#             to this card's lifecycle, see card.hardware_fit below.
# =====================================================================
# Genesis V2 alias — operator shortcut for the 35B PROD triplet (family default).
# `sndr launch prod-qwen3.6-35b-balanced` resolves this file to (model, hardware, profile).

model: qwen3.6-35b-a3b-fp8                        # cyankiwi/Qwen3.6-35B-A3B-FP8 dense MoE (A=3B active)
hardware: a5000-2x-24gbvram-16cpu-128gbram        # Sander 2x A5000 homelab (TP=2)
profile: qwen3.6-35b-balanced                     # balanced latency profile: TurboQuant k8v4 KV, MTP K=3, max_num_seqs=2, 280K ctx
# runtime: docker      # optional; defaults to hardware.runtime.default

# CONFIG-UX.2 — operator card (2026-05-24)
card:
  title: "Qwen 3.6 35B-A3B FP8 — balanced default (K=3 MTP)"
  summary: |
    Family default for qwen3_6_35b_a3b_fp8. FP8 target + TurboQuant k8v4
    KV + MTP K=3 balanced single-conc profile. Public baseline coverage
    in 35b_v11_wave9.json (Wave 9). Production baseline for free-chat
    multi-conc reference (~672 TPS at conc=8 in multi-conc sibling).
  status: production_candidate
  audience: operator
  maturity: validated
  mode: throughput
  workload_allow:
    - free_chat
    - structured_json.short
    - tool_call.short
    - summarization
    - code_gen
  workload_deny:
    - structured_json.long
    - tool_call.long
  concurrency:
    min: 1
    max: 2
    canonical: 2
  K: 3
  context:
    max_model_len: 280000
    typical_input_tokens: 4096
    typical_output_tokens: 4096
  # Machine-readable hardware envelope — consumed by `sndr preflight <preset>`.
  # Adapted from club-3090's compose-header trailers (Requires-min-vram-gb /
  # Tensor-parallel / Requires-min-gpu-count / Requires-sm), here typed + tied
  # to this card's status and cross-validated against the composed rig by
  # audit_config_catalog.py (the values below must agree with hardware
  # a5000-2x-24gbvram-16cpu-128gbram: n_gpus=2, min_vram_per_gpu_mib=22000 ->
  # 21 GB floor, cuda_capability_min=[8,6]).
  hardware_fit:
    requires_min_vram_gb: 21                       # per-GPU floor (22000 MiB usable -> 21 GB)
    tensor_parallel: 2                             # TP=2 across both A5000s
    requires_min_gpu_count: 2                      # MoE FP8 weights + TQ KV pool need both cards
    requires_min_cuda_capability: [8, 6]           # Ampere SM 8.6 (A5000 / 3090 / 4090 class)
    engine_pin: 0.23.1rc1.dev714+g09663abde        # validated vLLM build (matches model vllm_pin_required)
  routing_family: qwen3_6_35b_a3b_fp8
  default_for_family: true
  fallback_preset: prod-qwen3.6-35b-balanced
  primary_metric:
    kind: agg_TPS
    value: 0.0
    source: tests/integration/baselines/35b_v11_wave9.json
    measured_at: 2026-05-15
  evidence_refs:
    - type: bench
      path: tests/integration/baselines/35b_v11_wave9.json
      visibility: public
      note: Wave 9 canonical baseline for Qwen 3.6 35B-A3B (vllm dev338+).
    - type: bench
      path: tests/integration/baselines/35b_v8only.json
      visibility: public
      note: Wave 8 baseline retained for cross-pin regression comparison.
  evidence_visibility: public
  tradeoffs:
    - "Single-conc balanced profile (max_num_seqs=2); for high-conc use prod-qwen3.6-35b-multiconc."
    - "FP8 KV via TurboQuant k8v4 — different tier than INT4 27B variants."
    - "Family default falls back to itself (no K=1 35B sibling yet)."
  do_not_use:
    - condition: "concurrency > 2"
      reason: "Sized for max_num_seqs=2; use prod-qwen3.6-35b-multiconc for higher concurrency."
  card_version: 1
  card_updated: 2026-05-24
  card_author: sander
