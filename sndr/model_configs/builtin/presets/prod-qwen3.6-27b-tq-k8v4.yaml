# =====================================================================
# Profile (at-a-glance):
#   Model:    Qwen 3.6 27B INT4 AutoRound (hybrid GDN+Mamba)   Topology: 2x A5000 (TP=2)
#   KV:       turboquant_k8v4               Drafter:  MTP K=3
#   Max ctx:  262144 (effective render)     Status:   ⭐ production_candidate (family default)
#   Requires: >=21 GB/GPU · 2x GPU · SM 8.6+ · vLLM 0.23.1rc1.dev424+g3f5a1e173  (machine-readable: card.hardware_fit; `sndr preflight` checks it)
#   Bench:    pending — see card.primary_metric (Wave 9 baseline 27b_v11_wave9.json; this session's single-stream ~122 TPS is informational, not the card metric)
#   Best for: long-context single-stream inference on the 27B INT4 family  ⭐ CANONICAL
# What's intentionally NOT enabled:  - high concurrency -> use prod-qwen3.6-27b-tq-multiconc (379 TPS @ conc=8, trims ctx to 131K)
# To change for scenario X:          - multi-conc throughput -> prod-qwen3.6-27b-tq-multiconc
#                                    - single-card / 1x A5000 -> qa-qwen3.6-27b-tq-1x (QA preset)
# =====================================================================
# Genesis V2 alias — operator shortcut for the 27B TQ k8v4 production triplet (family default).
# `sndr launch prod-qwen3.6-27b-tq-k8v4` resolves to (model, hardware, profile).

model: qwen3.6-27b-int4-autoround-tq-k8v4         # Lorbus/Qwen3.6-27B-int4-AutoRound, hybrid GDN+Mamba, GQA=6
hardware: a5000-2x-24gbvram-16cpu-128gbram         # Sander 2x A5000 homelab (TP=2)
profile: qwen3.6-27b-tq-k8v4                       # latency profile: TurboQuant k8v4 KV, MTP K=3, max_num_seqs=4, 262K ctx

# CONFIG-UX.2 — operator card (2026-05-24)
card:
  title: "Qwen 3.6 27B INT4 AutoRound — TQ k8v4 family default (K=3 MTP)"
  summary: |
    Family default for the qwen3_6_27b_int4_tq family. INT4 AutoRound +
    TurboQuant k8v4 KV + MTP K=3 single-conc latency-balanced profile.
    Public baseline coverage in 27b_v11_wave9.json (Wave 9). Use for
    long-context single-stream inference; multi-conc variant available.
  status: production_candidate
  audience: operator
  maturity: validated
  mode: throughput
  workload_allow:
    - free_chat
    - structured_json.short
    - tool_call.short
    - summarization
    - code_gen
  workload_deny:
    - structured_json.long
    - tool_call.long
  concurrency:
    min: 1
    max: 4
    canonical: 4
  K: 3
  context:
    max_model_len: 262144
    typical_input_tokens: 4096
    typical_output_tokens: 4096
  # Machine-readable hardware envelope — consumed by `sndr preflight <preset>`
  # (club-3090 compose-trailer convention, typed + rig-cross-validated).
  hardware_fit:
    requires_min_vram_gb: 21                       # per-GPU floor (22000 MiB usable)
    tensor_parallel: 2                             # TP=2 across both A5000s — also escapes single-card Cliff 2b (docs/SINGLE_CARD.md)
    requires_min_gpu_count: 2                      # INT4 weights + TQ k8v4 KV pool at 262K need both cards
    requires_min_cuda_capability: [8, 6]           # Ampere SM 8.6 (PN26b sparse-V kernel is SM86-tuned)
    engine_pin: 0.23.1rc1.dev672+g93d8f834d        # validated vLLM build
  routing_family: qwen3_6_27b_int4_tq
  default_for_family: true
  # Single-card escape hatch (multi-engine Phase 1, 2026-06-27): a 1×24GB
  # operator cannot run this 2× tensor-parallel vLLM lane. The fallback is the
  # cliff-immune llama.cpp GGUF lane they CAN launch on one card (the GUI
  # EscapeHatchCard [Switch] routes here). Previously self-referential.
  fallback_preset: llamacpp-qwen3.6-27b-q4km-1x
  primary_metric:
    kind: agg_TPS
    value: 0.0
    source: tests/integration/baselines/27b_v11_wave9.json
    measured_at: 2026-05-15
  evidence_refs:
    - type: bench
      path: tests/integration/baselines/27b_v11_wave9.json
      visibility: public
      note: Wave 9 canonical bench harness for Qwen 3.6 27B (vllm dev338+).
    - type: bench
      path: tests/integration/baselines/27b_v8.json
      visibility: public
      note: Wave 8 baseline retained for cross-pin regression comparison.
  evidence_visibility: public
  tradeoffs:
    - "K=3 MTP draft adds ~10-15% TPS on free-chat; loses on very-long-output workloads with low acceptance."
    - "Family default falls back to itself (no K=1 27B-TQ sibling yet — see CONFIG-UX.2b qa-qwen3.6-27b-tq-1x annotation work)."
    - "Long-context envelope (262K) means high VRAM pressure; bench measured at lower ctx typically."
  do_not_use:
    - condition: "concurrency > 4 with full context budget"
      reason: "VRAM headroom tightens at full 262K; multi-conc use prod-qwen3.6-27b-tq-multiconc which trims ctx."
  card_version: 1
  card_updated: 2026-05-24
  card_author: sander
