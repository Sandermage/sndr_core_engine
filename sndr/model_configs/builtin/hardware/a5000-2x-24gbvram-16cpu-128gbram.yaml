# SPDX-License-Identifier: Apache-2.0
# Genesis V2 hardware definition — 2× RTX A5000 (24 GB) Sander's homelab rig.
# Identity + sizing knobs + runtime block (docker default).
# POC migration from legacy combined `a5000-2x-35b-prod.yaml`.

schema_version: 2
kind: hardware
id: a5000-2x-24gbvram-16cpu-128gbram             # canonical ID encoding: <gpu>-<count>x-<vram>-<cpu>-<ram>
title: 2× RTX A5000 24GB (Sander homelab)
maintainer: sandermage

# ─── Hardware identity ─────────────────────────────────────────────────
hardware:
  gpu_match_keys: [rtx a5000]                    # gpu detection substrings (case-insensitive); add 4090/3090 if cross-class needed
  n_gpus: 2                                      # TP=2 across cards (NCCL_P2P_DISABLE=1 via PCIe — no NVLink on A5000 consumer)
  min_vram_per_gpu_mib: 22000                    # 22 GB usable (24 GB physical minus ~2 GB OS/driver reserve)
  cuda_capability_min: [8, 6]                    # Ampere SM 8.6 minimum

# ─── Sizing knobs operator-tuned for this rig ──────────────────────────
# DEFAULT: latency-optimised single-conc profile (max_num_seqs=2).
# Sizing knobs reference the LATENCY mode; for throughput workloads use one
# of these multi-conc presets (all inherit this hardware identity but
# override max_num_seqs=8 + enable PN204 v2 dual-stream):
#   35B (Qwen3.6-A3B FP8):
#     V2 launch  → presets/prod-qwen3.6-35b-multiconc.yaml (alias)
#     V2 profile → profile/qwen3.6-35b-multiconc.yaml (sizing_override + patches_delta)
#     V1 flat    → a5000-2x-qwen3.6-35b-multiconc.yaml (legacy)
#   27B (Qwen3.6 INT4 AutoRound + TQ k8v4):
#     V2 launch  → presets/prod-qwen3.6-27b-tq-multiconc.yaml (alias)
#     V2 profile → profile/qwen3.6-27b-multiconc.yaml (sizing_override + patches_delta)
#     V1 flat    → a5000-2x-27b-int4-multiconc.yaml (legacy)
# Bench characterisation (Wave 10, dev371+bf610c2f5, tools/multi_conc_bench.py):
#   max_num_seqs=2 (this default) : 215 TPS single / 339 TPS at conc=2  | TTFT 65ms / 64ms
#   max_num_seqs=4 (alt)           : 478 TPS aggregate at conc=4         | TTFT 146ms  (good compromise)
#   max_num_seqs=8 (multi-conc)    : 689 TPS aggregate at conc=8 ⭐ optimum | TTFT 243ms
#   max_num_seqs=16                : 685 TPS (diminishing returns)        | TTFT 311ms+
# Choose based on workload:
#   - Latency-critical single-user agent / chat client → max_num_seqs=2 (this default)
#   - Mixed agentic + multi-tenant workloads          → max_num_seqs=4-8 (preset override)
sizing:
  max_model_len: 280000                          # 2026-05-15: trimmed 320K→280K. Restored ~3-4 GiB VRAM headroom per card for FULL_AND_PIECEWISE cudagraph capture (v1 default) on hybrid_gdn_moe; still serves above model's 256K published context (VLLM_ALLOW_LONG_MAX_MODEL_LEN=1 in system_env). Profile may override; GENESIS_TQ_MAX_MODEL_LEN must match.
  gpu_memory_utilization: 0.90                   # vLLM KV cache budget fraction (range 0.5-0.95; 0.90 = ~21.6 GiB on 24 GiB card)
  max_num_seqs: 2                                # max concurrent sequences (range 1-N; 2 = single-conc latency reference; 8 = multi-conc throughput optimum — override via multi-conc preset)
  max_num_batched_tokens: 4096                   # chunked prefill chunk size (must equal GENESIS_PROFILE_RUN_CAP_M). Bench 2026-05-15: 8192 regresses TTFT (240→683ms at conc=8), keep at 4096.
  enable_chunked_prefill: true                   # required for spec-decode + long ctx (avoids degenerate single-token chunks via P74)
  enforce_eager: false                           # false = cudagraph capture enabled (production); true = debug-only
  disable_custom_all_reduce: true                # disable custom all-reduce (NCCL fallback — required on consumer Ampere PCIe)
  disable_log_stats: false                        # 2026-06-08: expose vLLM stat logger (num_requests/kv_cache/throughput/TTFT) so the GUI Inference panel shows live metrics. Small overhead; set true to suppress.
  # Multi-conc throughput-mode additional flags (NOT enabled here — see preset):
  #   scheduler_reserve_full_isl: false          # --no-scheduler-reserve-full-isl — Sprint 1 flag, allows packing more sequences
  # Anti-patterns confirmed BAD on dev371 (do NOT enable):
  #   enable_prefix_caching: true                # → -28.8% TPS (forces Mamba `align` mode incompatible with TQ k8v4)
  #   performance_mode: interactivity            # → neutral to -3.5% TPS (Sprint 1-era flag, no benefit on dev371)
  #   async_scheduling: true                     # → neutral at conc=8 (244ms TTFT vs 237ms baseline, in CV)

# ─── Runtime block — docker default; podman / bare-metal can be added later ──
runtime:
  default: docker                                # values: docker|podman|kubernetes|systemd|bare; docker is the operator default
  supported: [docker]                            # which runtime emitters this hardware definition declares as supported
  docker:
    image: vllm/vllm-openai:nightly-1033ffac2  # vllm container image tag — 0.22.1rc1.dev491+g1033ffac2 (PROMOTED 2026-06-14; supersedes dev259+g303916e93). dev491 = validated streaming-tool-call pin: #45171 deleted qwen3xml_tool_parser and remapped qwen3_xml->Qwen3CoderToolParser; Genesis P64/P61c/PN56 version-capped <dev491 (skip) + PN392 retired so the engine-native parser handles streaming. Previous nightly-303916e93 (dev259) retained as rollback.
    image_digest: vllm/vllm-openai@sha256:779772129ce2cbd64329e370aed9dd8f27ffea9b8eb69038e9a2d5ee5791202d  # pinned digest — nightly-1033ffac2 (0.22.1rc1.dev491+g1033ffac2). Previous nightly-303916e93 (dev259, digest d892cc41…) retained as rollback per CLAUDE.md vLLM pin policy.
    container_name_template: vllm-{model_id}     # template; {model_id} expanded at compose time
    host_port: 8000                              # OpenAI-API port on host
    container_port: 8000                         # OpenAI-API port inside container
    shm_size: 8g                                 # /dev/shm size (8 GiB sufficient for 2× TP NCCL). Do NOT shrink: a container left at the docker 64 MB default crashed NCCL on first TP all-reduce (27B drift container, fleet validation 2026-06-11). `--ipc=host` is the validated alternative (35B PROD pattern; used to fix the 27B drift container) — it shares the host /dev/shm instead of a private segment; prefer shm_size for isolation, ipc=host when host-level sharing is acceptable. Guarded by tests/unit/model_configs/test_fleet_parser_contract.py.
    network: genesis-vllm-patches_default        # docker network name (project-default)
    mounts:                                      # bind-mount specs; expanded via env var lookup at launch
      # ── Canonical 5-slot mount schema (E22 restoration: aligned with ──
      # ── start_35b_fp8_PROD.sh ground truth + V1 a5000-2x-35b-prod.yaml). ──
      # ── audit-launch-coverage gate enforces presence of every slot. ──
      - "${models_dir}:/models:ro"                                                                  # 1. model checkpoints — read-only
      - "${hf_cache}:/root/.cache/huggingface:ro"                                                   # 2. HuggingFace cache — read-only
      - "${triton_cache}:/root/.triton/cache"                                                       # 3. Triton kernel cache — RW (persist across restarts to avoid +30-60s recompile penalty)
      - "${compile_cache}:/root/.cache/vllm/torch_compile_cache"                                    # 4. torch.compile cache — RW (persist across restarts)
      - "${plugin_src}:/plugin:ro"                                                                  # 5. Genesis vLLM plugin source — REQUIRED for plugin loading

# ─── System env — host-side knobs stable across models ─────────────────
# Convention: explicit values for non-default behaviour + explicit defaults
# for cross-version stability (vllm/pytorch env semantics can shift between
# nightlies — pinning makes the operator config self-documenting).
system_env:
  # ── PyTorch / CUDA allocator + memory ──
  PYTORCH_CUDA_ALLOC_CONF: 'expandable_segments:True,max_split_size_mb:512'   # PyTorch allocator: expandable_segments + 512 MiB max_split — matches club-3090 reference compose (138/207 TPS gemma 26b validated); larger splits = less allocator fragmentation under MoE expert routing
  CUDA_MODULE_LOADING: 'LAZY'                    # CUDA 12+ default; explicit for portability. Defers kernel module loading from process start to first use → faster startup + lower idle VRAM (saves ~50-200 MiB on multi-package frameworks like vLLM+Triton+FlashInfer).
  PYTORCH_NVML_BASED_CUDA_CHECK: '1'             # Use NVML (not full cuInit) for torch.cuda.is_available() checks. Marginal startup speedup; safe on all driver versions (NVML is part of any NVIDIA driver).
  # ── NCCL (TP=2 PCIe — no NVLink on consumer Ampere) ──
  NCCL_P2P_DISABLE: '1'                          # REQUIRED on consumer Ampere — no NVLink → P2P falls back to PCIe with bugs
  NCCL_CUMEM_ENABLE: '0'                         # disable cuMem allocator (NCCL 2.19+ default ON broke MoE expert all_reduce on PCIe Ampere; club-3090 reference compose has this off; matches cyankiwi/cyan-eng known-good config)
  NCCL_DEBUG: 'WARN'                             # surface silent NCCL failures (e.g. P2P fallback regressions) without verbose chatter. Tiny overhead; high diagnostic value when TP coordination misbehaves.
  # ── CPU / thread pinning ──
  OMP_NUM_THREADS: '1'                           # OpenMP thread count per worker (1 = avoid CPU oversubscription with TP=2)
  CUDA_DEVICE_MAX_CONNECTIONS: '8'               # CUDA stream pool size per device (8 = empirical optimum for spec-decode K+1 verify pattern)
  # ── Triton kernel cache ──
  TRITON_CACHE_DIR: '/root/.triton/cache'        # Triton kernel cache location (mounted as docker volume to persist across restarts)
  # ── vLLM core knobs ──
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: '1'             # allow max_model_len > model's published context (we run 280K on a 256K-trained model — 2026-05-15 trim from 320K)
  VLLM_FLOAT32_MATMUL_PRECISION: 'high'          # values: 'highest'|'high'|'medium'; 'high' uses TF32 on Ampere+ (~3-4× faster, bit-identical for our shapes)
  VLLM_LOGGING_LEVEL: 'WARNING'                  # 2026-05-15 bench validated: INFO → WARNING saves -10ms TTFT on short prompts (95→85ms). INFO enabled uvicorn access log + verbose per-request stats in the hot path. WARNING preserves ERROR/WARN-level messages (PN95/PN94 etc) but removes per-request log noise. Primary TTFT win — do not change.
  VLLM_LOG_MODEL_INSPECTION: '1'                 # at boot, log transformers-style hierarchical view of the model with quantization + attention backends. Free observability — fires once, zero hot-path cost. Diagnoses MoE routing + hybrid layer split + TQ vs Marlin tier confusion.
  VLLM_NO_USAGE_STATS: '1'                       # disable telemetry ping (privacy + offline boots)
  # ── vLLM torch.compile / AOT ──
  VLLM_USE_AOT_COMPILE: '1'                      # explicit (default 1 on torch 2.10+). AOT compile shifts work to warmup phase + caches Python bytecode hooks for subsequent calls. Pairs with VLLM_USE_STANDALONE_COMPILE and TRITON_CACHE_DIR.
  VLLM_USE_STANDALONE_COMPILE: '1'               # explicit (default 1). Loads compiled artifacts directly without re-splitting graph modules → reduces model-load overhead.
  VLLM_ENABLE_PREGRAD_PASSES: '1'                # explicit (default 1). vLLM custom passes before grad to work around pytorch/pytorch#174502. Required for compile correctness on hybrid attention/Mamba models.
  # ── TurboQuant decode stage1 tune (Genesis P18b, SM 8.6 A5000) ──
  # Upstream defaults BLOCK_KV=4 num_warps=1 num_stages=1 are H100-tuned and
  # under-utilize Ampere SMs (each program has too few warps, no pipelining).
  # Empirically validated SM 8.6 A5000 tune: 32/8/3. Source: prior session
  # 35B baseline at 244 TPS; section 15.1 of master plan explicitly records
  # num_stages=2 regressed -2% to -9% on A5000 — keep stages=3.
  # Re-derived 2026-06-08 after audit found launcher template lost these
  # envs in some pin transition; without them P18b runs upstream defaults.
  VLLM_TQ_DECODE_BLOCK_KV: '32'                  # INERT (left for provenance): the grouped FP8 decode kernel hardcodes BLOCK_KV_GROUPED=16 and the legacy MHA branch hardcodes BLOCK_KV=4 — neither reads this env (P18b only emits num_warps/num_stages). A/B 2026-06-16: forcing BLOCK_KV=32 in the kernel REGRESSES -5.2% (211.8→200.8) — SM 8.6 smem spill at stages=3. 16 is optimal. Do NOT wire this env or raise it.
  VLLM_TQ_DECODE_NUM_WARPS: '8'                  # warps per program (whitelist {1,2,4,8}); A5000 wants 8 (8× upstream)
  VLLM_TQ_DECODE_NUM_STAGES: '3'                 # software pipeline depth (1..8); A5000 wants 3 — stages=2 measured -2%..-9% regression
  GENESIS_P67_NUM_WARPS: '4'                      # opt-#6 (2026-06-14): the P67 multi-query TQ decode kernel defaults num_warps=8 for sm>=8 and is NOT reached by the PN296/299 autotune-cap family (it uses its OWN env). 8 warps + the 16KB split-M acc tensor can spill-to-local on the 100KB/SM A5000; cap to 4. A/B-revertible (unset = upstream 8). Conditional +1-3% wall_TPS if currently spilling. Validate vs the 8-warp baseline; revert if it ties/loses.
  # ── Dispatcher version-gate (REQUIRED on dev491+) ──────────────────
  GENESIS_ENFORCE_VERSION_RANGE: '1'             # Enforce each patch's vllm_version_range at apply time (deep-audit #1). REQUIRED on dev491: upstream #45171 deleted qwen3xml_tool_parser and remapped qwen3_xml/qwen3_coder -> Qwen3CoderToolParser, so the dev259-era Genesis streaming wraps P64/P61c/PN56 (capped <dev491) CORRUPT the engine-native parser and leak tool-call XML to content. With the gate on, those wraps + the redundant PN125/PN90 (capped <0.22.0) correctly SKIP on dev491; the 6 stale-range WARN patches are opt-in and unaffected. Verified 2026-06-14: no load-bearing perf patch over-skips on dev491 (scripts/audit_stale_vllm_version_ranges.py --pin dev491). Drop on a pin where the wraps are in-range again.
  # ── Genesis kernel patches enabled by default on Ampere SM 8.6 ──
  # Both are session-validated kernel-level wins for the Ampere stack:
  GENESIS_ENABLE_P18B_TEXT: '1'                  # text-patches triton_turboquant_decode.py launcher literals at boot (closes the "P18b is dead-code" finding 2026-06-08; without this the env vars above are read but never applied to the kernel). Confirmed +1-2 TPS warm + better TPOT at all conc>=1. Disable via GENESIS_DISABLE_P18B_TEXT=1.
  # ── PN296 KEYSTONE — REQUIRED for the PN299B/C/D/E warp-caps below to fire ──
  # perf-opt #1 (2026-06-14): PN296 is the SOLE writer of
  # GENESIS_TRITON_AUTOTUNE_MAX_WARPS=4 / MAX_STAGES=2 on SM8.6. Without it the
  # already-enabled PN299C/D/E read the upstream '8'/'16' fallbacks and are
  # RUNTIME NO-OPS — un-capped num_warps=8/16 configs spill on the 100KB/SM A5000
  # (notably the per-token-per-layer KV writer triton_reshape_and_cache_flash and
  # the per-LN layernorm_guard). Config-only, correctness-neutral (pure autotune
  # pruning, bit-identical output), +2-4% wall_TPS + -5..-10ms TTFT. Apply-order
  # PN296->298->299 enforced in _per_patch_dispatch.py. Disable via GENESIS_DISABLE_PN296*=1.
  GENESIS_ENABLE_PN296_ARCH_PROFILE_INIT: '1'
  GENESIS_ENABLE_PN298_FLA_CHUNK_O_ARCH_WARPS: '1'
  GENESIS_ENABLE_PN299_FLA_MULTI_ARCH_WARPS: '1'
  GENESIS_ENABLE_PN299B: '1'                     # extends PN299 arch-aware NUM_WARPS prune to cumsum/kda/solve_tril FLA ops (10 sub-patches). kda.py is the Qwen3.6 KDA hot path; pruning 8-warp configs there saves 5-7ms TTFT per cold-start. Composes with PN296+PN298+PN299. Disable via GENESIS_DISABLE_PN299B=1.
  GENESIS_ENABLE_PN299C: '1'                     # caps the runtime num_warps heuristic in fla/ops/layernorm_guard.py — closes the LAST num_warps=8 site in FLA on SM 8.6. For Qwen3.6-A3B (hidden 5120 → BLOCK_N 8192) upstream picks num_warps=8 every LN call; PN299C reads GENESIS_TRITON_AUTOTUNE_MAX_WARPS (PN296 auto-sets =4 on Ampere). Composes with PN296+PN298+PN299+PN299B. Disable via GENESIS_DISABLE_PN299C=1.
  GENESIS_ENABLE_PN299D: '1'                     # defensive cap on Mamba2 selective_state_update FALLBACK heuristic (mamba/ops/mamba_ssm.py). Fires only when tuned JSON config for (headdim, dstate, cache_dtype, device) is missing. dstate>128 + not-Blackwell branch would leave num_warps=8 — spills on SM 8.6. Reads same env as PN299C. No-op when tuned config is present. Composes with PN296+PN298+PN299+PN299B+PN299C. Disable via GENESIS_DISABLE_PN299D=1.
  GENESIS_ENABLE_PN299E: '1'                     # CRITICAL: caps num_warps + num_stages in v1/attention/ops/triton_reshape_and_cache_flash.py — the KV cache writer that fires PER TOKEN PER LAYER. Upstream hardcodes num_warps=16 num_stages=10 for CUDA non-Hopper, massively spilling on SM 8.6 (100KB shared). PN299E reads MAX_WARPS/MAX_STAGES (PN296 auto-sets =4/=2). 3 sub-patches on 3 launchers. Composes with PN296+PN298+PN299+PN299B+PN299C+PN299D. Disable via GENESIS_DISABLE_PN299E=1.
  GENESIS_ENABLE_PN340: '1'                      # Vendor of OPEN vllm#43955 gdn_attn.py portion (Nekofish-L). Replaces per-step torch.arange + CPU-mask indexing in GDN backend's metadata build with preallocated arange buffer + slice. Three sub-patches. Direct hit for Qwen3.6 hybrid + MTP K=3 hot path. Bench-validated: peak single-stream 216.4 TPS (was 211.8 baseline). Composes with PN125+PN204+PN286+PN341. Disable via GENESIS_DISABLE_PN340=1.
  GENESIS_ENABLE_PN341: '1'                      # ⭐ BIGGEST WIN: Vendor of OPEN vllm#43955 gpu_model_runner.py portion. Eliminates per-step num_accepted_tokens_event.synchronize() CPU bubble on hybrid + MTP K=3. Four sub-patches: __init__ flag, _update_states early return, _compute_prev_positions optional arg, _prepare_inputs GPU branch. Net: no CPU-GPU round-trip, no NumPy intermediate, no event synchronize per decode step. Bench-validated: mean warm 227.6 TPS (+12.7 vs PN340 only), peak 231.2 TPS. TPOT improved at all conc levels (-9% conc=1). Composes with PN340. Disable via GENESIS_DISABLE_PN341=1.
  GENESIS_ENABLE_PN29_GDN_SCALE_FOLD: '1'        # GDN chunk_o scale-fold (vllm#41446 pattern (c) backport). chunk_fwd_kernel_o now uses (b_o + dot) * scale instead of b_o*scale + dot*scale — 1 fewer fp32 mul per inner iter. Small but real win on GDN-heavy prefill. Bench-validated: 0.4 TPS mean warm with this added on top of PN341 stack. Apply matrix 101→102 with this enabled. Disable via GENESIS_DISABLE_PN29_GDN_SCALE_FOLD=1.
  GENESIS_ENABLE_PN364_HYBRID_GDN_WARMUP: '1'    # Vendor of OPEN vllm#43642 (hybrid GDN/Mamba/MRoPE startup warmup). Closes LAST 4-5 first-request JIT-spike kernels that PN126/PN128/PN129/PN130 do NOT cover: _causal_conv1d_update_kernel DECODE shape (distinct from PN126 prefill), fused_recurrent_gated_delta_rule_packed_decode_kernel, MRotaryEmbedding.forward_cuda first-shape, _kv_block_zeroer warmup, extra capture-size single-token-decode shapes. Wraps Worker.compile_or_warm_up_model AFTER PN126 chain. Expected: TTFT -200-1500ms on first user request; CV tightening on bench mean (less mid-bench JIT variance). No effect on steady-state wall_TPS mean. Composes with PN126+PN128+PN129+PN130. Auto-skip on V2/enforce_eager/non-hybrid. Disable via GENESIS_DISABLE_PN364=1.
  GENESIS_ENABLE_PN353A: '1'                     # Vendor of OPEN vllm#44053 (Bot1822) — TurboQuant workspace reservation BEFORE CG capture lock. TurboQuantMetadataBuilder.__init__ now calls _reserve_workspace covering decode mid_o/output/lse + continuation-prefill K/V dequant buffers. Bug present in our pin (TQ k8v4 + MTP K=3 PROD). Bug fix, no perf cost. Composes with PN118 (different vector — both grow same workspace). DEFERRED: PN353B (#43747 CG support downgrade — -5-8% TPS risk, no observed crash today) and PN353C/D (perf wins, kernel rewrites + MTP K+1 routing competes with our P67 +32%). Disable via GENESIS_DISABLE_PN353A=1.
  GENESIS_ENABLE_PN350: '1'                      # Convergent port of SGLang #26206 + TRT-LLM #12966 — fused GDN post-conv Q/K/V split Triton kernel. Replaces upstream torch.cat-based split (1 full-buffer memcpy + 4-5 ATen launches per layer call) with single Triton launch (1 read + 3 writes per token row). Per-layer kernel 5.7× speedup (18.97ms → 3.33ms on B200). SGLang bench: Qwen3.6-35B-A3B +2.66% output TPS. On Ampere SM 8.6 memory-bandwidth-bound → carries; estimated +1-1.5% single-stream wall_TPS on A5000. Strict no-regression fallback on kernel exception. Composes with PN340+PN341+PN345+PN54+PN29+PN204+P28. Disable via GENESIS_DISABLE_PN350=1.
  GENESIS_ENABLE_PN349: '1'                      # Vendor of OPEN vllm#44797 — Gemma 4 KV-shared layers now skip k_norm/v_norm RMSNorm allocation (their checkpoints omit those weights). Eliminates default-init silent ~1% logit drift class on Gemma 4 26B-A4B + 31B PROD. No-op on Qwen3.6 (file-scoped to gemma4.py). Composes with G4_* family. Disable via GENESIS_DISABLE_PN349=1.
  GENESIS_ENABLE_PN351: '1'                      # Vendor of OPEN vllm#43257 — Triton unified_attention tune for head_dim>=512. _get_tile_size + kernel launch now use 64-tile + num_warps=8 + num_stages=2 for FP8 prefill on head_dim>=512 (Gemma 4 31B head_dim=512 + 26B-A4B global heads). Author Hopper bench: occupancy 6-13% → 25-40%. Expected -3-7% decode_TPOT on Gemma 4 31B FP8 prefill. No-op on Qwen3.6 head_dim=128. Composes with PN29x+PN345. Disable via GENESIS_DISABLE_PN351=1.
  GENESIS_ENABLE_PN361: '1'                      # Vendor of OPEN vllm#44869 — Spec-decode fail-closed on missing draft probs. GPUModelRunner._get_spec_decode_draft_probs replaces silent logger.warning + return None with raise RuntimeError. Defensive observability: surfaces silent fallback from probabilistic→greedy rejection. Our PROD draft_sample_method=probabilistic. Composes with PN340+PN341. Disable via GENESIS_DISABLE_PN361=1.
  GENESIS_ENABLE_PN346: '1'                      # Vendor of OPEN vllm#43650 (6-LOC) — MambaManager.find_longest_cache_hit boundary fix. When drop_eagle_block=True (EAGLE/MTP active), search loop now walks max_num_blocks back by 1 BEFORE the loop so the partially-accepted final state block is never included. Closes vllm#43559: silent -1.6 pp GSM8K accuracy drop on Qwen3.5/3.6-35B-A3B FP8 + MTP K=3 + --enable-prefix-caching overlap path (our exact PROD config). Trade-off: small QPS regression on the overlapping prefix-cache path (author 18.6→15.5 QPS) for accuracy parity restoration (0.900→0.914 GSM8K). CORRECTNESS, not perf. No-op when EAGLE/MTP disabled. Composes with PN340 + PN341 + PN345. Disable via GENESIS_DISABLE_PN346=1.
  GENESIS_ENABLE_PN347: '1'                      # Vendor of OPEN vllm#44113 — MarlinFP8 N==K silent corruption fix on sm_75-88 (our A5000 sm_86 IN RANGE). Buggy `if w_q.shape != (in, out)` guard evaluates False for SQUARE weights (N==K and (N,K)==(K,N) tuple identity) → transpose silently skipped → Marlin multiplies a wrongly-laid-out weight → silent data corruption. Direct hit for Qwen3.6 27B (square 4096² q/k/v/o_proj) and 35B FP8 (square 5120² q/o_proj). Fix: replace shape-tuple check with `w_q.is_contiguous()` (a `.t()` view is non-contiguous regardless of square shape). Upstream A40 test: BF16 coherent vs FP8 ',,,,,,,,...' token-stream collapse on square layers. CORRECTNESS, not perf. Closes vllm#44110. Composes with PN77 + PN81 + PN91 + PN91B + P87. Disable via GENESIS_DISABLE_PN347=1.
  GENESIS_ENABLE_PN348: '1'                      # Vendor of OPEN vllm#44644 — Qwen3.5/3.6 MTP backbone dedup. Qwen3.6-35B-A3B-FP8 config.json sets text_config.mtp_use_dedicated_embeddings=False (model author signal to share embed+lm_head with target) but pin pre-dates fix so MTP allocates duplicate VocabParallelEmbedding + ParallelLMHead = ~1 GiB/worker × TP=2 = ~2 GiB cluster-wide wasted on 2× A5000. Three sub-patches text-patch qwen3_5_mtp.py: embed_tokens predicate + lm_head PPMissingLayer + weight-loader skip. Required gate PP=1 (matches our TP=2 PP=1). Qwen3.6 reuses Qwen3_5MoeForConditionalGeneration per #44720 in pin. Composes with PN108+PN133+PN290+PN340+PN341+PN77. Disable via GENESIS_DISABLE_PN348=1.
  GENESIS_ENABLE_PN345: '1'                      # Vendor of OPEN vllm#43047 — shmem-aware Triton autotune pruner on chunk_delta_h.py + chunk_o.py FLA kernels. Precise per-config + per-num_stages shmem-budget filter via Triton's early_config_prune hook. A5000 has 99 KiB opt-in budget (verified torch.cuda.get_device_properties.shared_memory_per_block_optin=101376 bytes); upstream configs assume 228 KiB (H100/H200) — BV=64 BT=64 num_stages=4 needs 160 KiB → OOR at JIT. Pruner drops it; smaller BV=32 num_stages=2 (76 KiB) survives → autotune picks fitting optimal. STRICTLY DIFFERENT from PN298+PN299+PN299B+PN299C+PN299D+PN299E (coarse env-based warps cap on 6 OTHER files; no anchor overlap; compose). Author's SM_120 bench: +3-7% GDN prefill TPS. Closes vllm#36598; partially #38918+#36802+#41063+#32826. Disable via GENESIS_DISABLE_PN345=1.
  # ── Security / correctness fleet-wide (deep-audit 2026-06-14) ──
  GENESIS_ENABLE_PN252_MROPE_PROMPT_EMBEDS_DOS: '1'   # Backport vllm#45252 / GHSA-33cg-gxv8-3p8g — M-RoPE prompt_embeds-only DoS: a /v1/completions with prompt_embeds + prompt=None crashed EngineCore (unprivileged remote DoS). LIVE on Gemma-4 26B-A4B / 31B-AWQ (M-RoPE, accept prompt_embeds); INERT on Qwen3.6 (non-M-RoPE — supports_mrope guard short-circuits). Host-side fix, arch-neutral. Byte-verified dev259+dev491. Disable via GENESIS_DISABLE_PN252_MROPE_PROMPT_EMBEDS_DOS=1.
  GENESIS_ENABLE_PN517_INIT_SNAPSHOT_BEFORE_NCCL: '1' # Backport vllm#45517 — installs the pre-NCCL MemorySnapshot conditional + _startup_free_bytes observability. RUNTIME branch stays OFF here (no VLLM_INIT_SNAPSHOT_BEFORE_NCCL set) so behavior is unchanged on TP=2 PP=1 symmetric; the asymmetric-TP+PP OOM guard is dormant on this hardware. Installs cleanly (byte-verified dev259+dev491). Disable via GENESIS_DISABLE_PN517_INIT_SNAPSHOT_BEFORE_NCCL=1.
  # ── Marlin / FP8 / MoE (Ampere SM 8.6 specific) ──
  VLLM_FLASHINFER_AUTOTUNE_CACHE_DIR: '/var/cache/vllm/flashinfer_autotune'  # Per vllm#42537, persistent FlashInfer autotune cache directory. Default path is $VLLM_CACHE_ROOT/flashinfer_autotune_cache/<flashinfer-version>/<arch>/<cache-hash>/ — typically ephemeral. Persistent path saves 30s-2min on every container restart (FlashInfer autotune cache hit on Qwen3.6 + Gemma 4 stacks). First run writes autotune_configs.json; subsequent restarts skip autotune entirely. Operator must mount /var/cache/vllm into the container OR change to a path that survives restart.
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'                # Marlin reduction via atomicAdd (faster on Ampere SM 8.6 with shared L2)
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: '1'  # vllm#30515 — include CUDA graphs in memory profiler estimate (prevents post-warmup OOM). RECONCILE (pn384 2026-06-11, vllm#45197 — upstream wants default=0, CHANGES_REQUESTED): sndr/compat/presets.py "3090-1x-long-context" sets the OPPOSITE value ('0', max-KV stance) — same 24GB trade-off, no measurement behind either side. MEASURE-FIRST, do not flip: run tools/cudagraph_mem_estimate_ab.py (emit-env → two boots → diff-report) on 35B/27B; flip only if OVERESTIMATE_CONFIRMED (>~200 MiB) AND the root-cause capture-all-and-measure patch is not taken instead.
  VLLM_MOE_USE_DEEP_GEMM: '0'                    # disable DeepGEMM in MoE — Marlin tier faster on consumer Ampere
  VLLM_USE_DEEP_GEMM: '0'                        # disable DeepGEMM globally (Hopper-only optimization, no Ampere benefit)
  VLLM_USE_FLASHINFER_MOE_FP8: '0'               # disable FlashInfer MoE FP8 (Hopper SM 9.0+ required; Ampere routes through Marlin)
  VLLM_USE_FLASHINFER_SAMPLER: '1'               # FlashInfer top-p/top-k sampler (faster than reference; required for spec-decode acceptance)
  VLLM_USE_FUSED_MOE_GROUPED_TOPK: '1'           # fused MoE gate+topk kernel (saves ~1 launch per layer)
  # ── vLLM worker / dist ──
  VLLM_WORKER_MULTIPROC_METHOD: spawn            # values: 'spawn'|'fork'; spawn required for CUDA reinit across workers (TP>1)
  # ── Notes on knobs we DELIBERATELY leave at defaults ──
  # VLLM_USE_V2_MODEL_RUNNER:  default 0 — V2 has automatic warmup_kernels()
  #     which would eliminate 8-10 JIT spikes we currently see in
  #     `jit_monitor` warnings during first inference. NOT enabled because
  #     V2 path is new (May 2026) and not yet validated on our hybrid_gdn_moe
  #     + TQ k8v4 + MTP K=3 combo. Tracking as Phase 6 follow-up after a
  #     dedicated bench cycle.
  # VLLM_USE_SPINLOOP_EXT:     default 0 — PR #36517 saves up to 110W idle
  #     power via mwaitx/pause busy-poll. We're a homelab; idle power not
  #     a priority. Enable on metered deployments.
  # VLLM_KV_CACHE_LAYOUT:      default None → NHD. HND only required for
  #     NIXL disagg PD transfer (we don't use).
  # VLLM_SSM_CONV_STATE_LAYOUT: default None → SD. DS only required for
  #     NIXL SSM transfer + CPU GDN backend (we don't use either).
  # VLLM_ENABLE_CUDAGRAPH_GC:  default 0 (GC frozen during capture for
  #     speed). Flip to 1 only if capture-time OOM observed.
  # VLLM_FLASHINFER_WORKSPACE_BUFFER_SIZE: default ~394 MiB. Tune down to
  #     128 MiB if VRAM pressure on long context (cost: per-call workspace
  #     resizes if shape exceeds).

