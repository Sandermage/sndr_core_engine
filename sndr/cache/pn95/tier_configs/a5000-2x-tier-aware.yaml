#
# ┌──────────────────────────────────────────────────────────────────┐
# │ PN95 tier-aware cache config — 2× A5000 (24 GiB each) + TP=2.    │
# │                                                                   │
# │ Origin: extracted from V1 a5000-2x-tier-aware-EXAMPLE.yaml on    │
# │ 2026-06-01 as part of the PN95 architectural unblock that lets   │
# │ the V1 source file retire (V1 sunset gate).                       │
# │                                                                   │
# │ Loader: sndr/cache/pn95/tier_config_loader.load_by_key           │
# │ Reader: sndr/cache/pn95/hooks.py:lazy_init via                   │
# │         GENESIS_PN95_CONFIG_KEY env var                          │
# │                                                                   │
# │ This is the data PN95 actually reads at runtime. The V1 source   │
# │ file carried 100+ additional lines of launch-args + hardware     │
# │ + tool-call config that PN95 never used — those are now in the   │
# │ V2 preset `example-2x-tier-aware` triplet (model + hardware +    │
# │ profile). PN95 tier_specs and V2 deployment config are now       │
# │ orthogonal concerns held in separate files.                       │
# │                                                                   │
# │ TierManager is per-worker, so capacity_gib values are            │
# │ PER-WORKER (each TP worker gets its own singleton with these     │
# │ tiers).                                                          │
# └──────────────────────────────────────────────────────────────────┘

eviction_policy: lru
tiers:
  - device: gpu
    capacity_gib: 22.0  # ~92% of 24 GiB; tier_low_water_pct triggers demote when <8% free
    eviction_policy: lru
    promote_on_hit: true
    demote_threshold_pct: 0.92
    low_water_pct: 0.75
  - device: cpu
    capacity_gib: 8.0   # per-worker; 2 workers = 16 GiB total pinned RAM
    eviction_policy: lru
    promote_on_hit: true
    vision_first: true
    pinned: true
    notes: >-
      8 GiB per worker × 2 TP workers = 16 GiB pinned host RAM total.
      Lazy-allocated on first store(). Bump to 16-24 GiB per worker
      if host has 96+ GiB RAM AND `ulimit -l unlimited` is set.
exclude_mamba_ssm: true
vision_demote_first: true
tier_low_water_pct: 0.05
async_demote: true
notes: >-
  Per-worker tiers — total resources scale with n_gpus. Sandermage rig:
  2× A5000 + 64 GiB host = comfortable headroom. Increase cpu tier
  capacity for longer-context workloads (more demote candidates).
