# Genesis v7.10 dense model test — RYS-Qwen3.5-27B-FP8-XL.
#
# Purpose: validate P52/P53 dispatch gates on a DENSE model (no MoE, no
# hybrid linear-attention). Expected: P52 skips P24/P31/P37 with
# "no MoE layers" reason, P53 skips P28/P34/P39a/P46 with
# "pure-attention" reason.
#
# Not for production. Blue/green against prod vllm-server.

services:
  vllm-qwen3-5-dense:
    image: vllm/vllm-openai:genesis-v7.0-baseline
    container_name: vllm-integration-qwen3-5-dense
    network_mode: host
    ipc: host
    shm_size: 10gb
    environment:
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=0
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - NCCL_P2P_DISABLE=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - HF_HOME=/root/.cache/huggingface
      - TRANSFORMERS_OFFLINE=1
      - VLLM_LOGGING_LEVEL=INFO
      - GENESIS_ENABLE_P37=1
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface:ro
      - /home/sander/Genesis_Project/vllm_engine/triton-cache:/root/.triton/cache
      - /home/sander/Genesis_Project/vllm_engine/compile-cache-integration:/root/.cache/vllm/torch_compile_cache
      - ../vllm/_genesis:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
      - ../genesis_vllm_plugin:/plugin:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo "=== Install prod-equivalent runtime deps + Genesis plugin ==="
        pip install --no-deps --quiet /plugin 2>&1 | tail -2 || true
        echo "=== Apply Genesis wiring (text-patches + rebinds) ==="
        python3 -m vllm.sndr_core.patches.apply_all || true
        echo "=== Start vLLM server (RYS-Qwen3.5-27B-FP8-XL dense) ==="
        exec python3 -m vllm.entrypoints.openai.api_server \
          --model dnhkng/RYS-Qwen3.5-27B-FP8-XL \
          --tensor-parallel-size 2 \
          --gpu-memory-utilization 0.92 \
          --max-model-len 32768 \
          --kv-cache-dtype auto \
          --max-num-seqs 2 \
          --max-num-batched-tokens 4096 \
          --enable-chunked-prefill \
          --enable-prefix-caching \
          --dtype float16 \
          --disable-custom-all-reduce \
          --trust-remote-code \
          --api-key genesis-local \
          --served-model-name qwen3-5-dense \
          --host 0.0.0.0 \
          --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Authorization: Bearer genesis-local", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 360s
